sByType[tyKey] || 0) + 1;\n            const recTopic = topicLabel(currentQData.topic);\n            const recQuestion = (currentQData.q || '').replace(/<[^>]*>?/gm, ' ').replace(/\\s+/g, ' ').trim();\n            let studentAns = '', correctAns = '';\n            if (currentQData.type === 'match') {\n                studentAns = [0, 1, 2, 3].map(t => { const z = document.getElementById('ans-' + t); return z.firstChild ? z.firstChild.innerText.trim() : '(blank)'; }).join(' ➔ ');\n                correctAns = [0, 1, 2, 3].map(t => currentQData.correct[t]).join(' ➔ ');\n            } else if (currentQData.type === 'mcq') {\n                const sb = document.querySelector('.mcq-btn.selected');\n                studentAns = sb ? sb.innerText.trim() : '(blank)';\n                correctAns = currentQData.correct;\n            } else if (currentQData.type === 'fitb') {\n                const ins = [...document.querySelectorAll('.fitb-input')];\n                studentAns = ins.map(i => i.value.trim() || '(blank)').join(', ');\n                correctAns = ins.map(i => i.dataset.answer).join(', ');\n            }\n\n            document.getElementById('btn-submit').style.display = 'none';\n            { const bh = document.getElementById('btn-hint'); if (bh) bh.style.display = 'none'; }\n\n            stopQuizTimer();\n            flashSubmit(allCorrect);\n            nudgeTier(allCorrect);              // ENH1: difficulty follows performance\n            srsSchedule(currentQData, allCorrect);  // ENH7: schedule spaced review\n\n            if (allCorrect) {\n                correctAnswers++;\n                globalCorrectAnswers++;\n                sessionCorrect++;\n                if (!currentQData.isVariant && !currentQData.scaffoldTier) {\n                    correctAnswersLog.push({ timestamp: new Date().toISOString(), level: (String(tpKey).match(/^p(\\d)/i) ? 'P' + String(tpKey).match(/^p(\\d)/i)[1] : ''), topic: recTopic, question: recQuestion, correctAnswer: correctAns, isVariant: false });\n                }\n                checkBadges();\n                if (currentQData && (currentQData.isVariant || reviewKeysThisSession.has(qKey(currentQData)))) unlockBadge('comeback');\n                showMessage(\"Correct!\", 1500);\n                if (window.sfx) sfx.correct();\n                \n                const reveal = document.getElementById('answer-reveal');\n                reveal.style.display = 'block';\n                reveal.style.background = 'rgba(63,195,95,0.14)';\n                reveal.style.borderColor = '#3fc35f';\n                const whyCorrect = (currentQData.type === 'mcq' || currentQData.type === 'fitb') ? \"<br><br><div id='why-explain' style='color:var(--sc-text-soft,#c9d6e5)'><\u002Fdiv>\" : \"\";\n                reveal.innerHTML = \"🌟 <strong>Brilliant!<\u002Fstrong><br><br>\" + correctText + whyCorrect;\n                if (whyCorrect) explainAnswer(currentQData, true);\n                \n                document.getElementById('btn-next-q').style.display = 'inline-block';\n            } else {\n                showMessage(\"Incorrect!\", 2000);\n                if (window.sfx) sfx.wrong();\n                wrongQuestionsLog.add(currentQuestionText.replace(/<[^>]*>?/gm, '').substring(0, 80) + \"...\");\n                wrongAnswersLog.push({ timestamp: new Date().toISOString(), level: (String(tpKey).match(/^p(\\d)/i) ? 'P' + String(tpKey).match(/^p(\\d)/i)[1] : ''), topic: recTopic, qType: tyKey, question: recQuestion, studentAnswer: studentAns, correctAnswer: correctAns, isVariant: !!(currentQData.isVariant || currentQData.scaffoldTier) });\n                wrongByTopic[tpKey] = (wrongByTopic[tpKey] || 0) + 1;\n                wrongByType[tyKey] = (wrongByType[tyKey] || 0) + 1;\n                sessionWrong.push({ topic: recTopic, type: tyKey });\n                \n                const reveal = document.getElementById('answer-reveal');\n                reveal.style.display = 'block';\n                reveal.style.background = 'rgba(232,73,63,0.14)';\n                reveal.style.borderColor = '#e8493f';\n                reveal.innerHTML = \"❌ <strong>Incorrect!<\u002Fstrong><br><br>\" + correctText + ((currentQData.type === 'mcq' || currentQData.type === 'fitb') ? \"<br><br><div id='why-explain' style='color:var(--sc-text-soft,#c9d6e5)'><\u002Fdiv>\" : \"\") + \"<br><br><em style='color:var(--sc-blue-bright)'>\" + ((currentQData.type === 'match' || currentQData.scaffoldTier) ? \"🪜 Let's make it simpler — an easier fill-in-the-blank on the same idea is up next.\" : \"🔁 Twin question up next — same concept, new example. Show what you've learnt!\") + \"<\u002Fem>\";\n                if (currentQData.type === 'mcq' || currentQData.type === 'fitb') explainAnswer(currentQData, false);\n\n                // ---- Twin retest — with a DIFFICULTY LADDER for CECL questions ----\n                // CECL (match) failed → step down to a tier-2 fill-in-blank on the same\n                // concept. A failed scaffold fitb → step down again to tier 1. Other\n                // types keep the same-keyword twin behaviour.\n                let variant;\n                const isCECL = currentQData.type === 'match';\n                const priorTier = currentQData.scaffoldTier; // set on a scaffold fitb\n                if (isCECL || priorTier) {\n                    const nextTier = priorTier ? Math.max(1, priorTier - 1) : 2;\n                    variant = buildScaffoldFitb(currentQData, nextTier);\n                    scaffoldRephraseAI(variant, currentQData, nextTier); // online: sharper phrasing\n                } else {\n                    variant = Object.assign(JSON.parse(JSON.stringify(currentQData)), { srcId: currentQData.id });\n                    switchArrangement(variant); // reorder blanks/options — keywords unchanged\n                    variant.id = Date.now();\n                    variant.isVariant = true;\n                    // Reviewable set first: an APPROVED teacher rephrasing (works offline).\n                    // Else live AI rephrase (keyword-preserving).\n                    const approvedText = getApprovedTwin(variant.srcId);\n                    if (approvedText) {\n                        applyApprovedTwin(variant, approvedText);\n                    } else {\n                        rephraseTwinQuestion(variant);\n                    }\n                }\n\n                // Push to the END of the pool — pop() serves from the end, so the twin\n                // appears as the very NEXT question.\n                activeQuestionPool.push(variant);\n                quizTarget++; // Extend quiz so the retest is an additional question\n                \n                document.getElementById('btn-next-q').style.display = 'inline-block';\n            }\n            autoSaveSession();\n            // Auto-send this answer to the teacher's sheet (flat single-attempt schema → \"else\" branch).\n            try {\n                // Identity: prefer the in-game vars, else fall back to the shared wallet (set on the landing page).\n                var _wp = (window.SciClawState && SciClawState.getPlayer) ? (SciClawState.getPlayer() || {}) : {};\n                var _nm = (studentName && studentName.trim()) || (_wp.name && _wp.name !== 'Guest' ? _wp.name : '') || '';\n                var _cl = (studentClass && studentClass.trim()) || _wp.studentClass || _wp.level || '';\n                if (_nm) {\n                    // keep the globals in sync so the roster/report shows the name too\n                    if (!studentName || !studentName.trim()) studentName = _nm;\n                    if (!studentClass || !studentClass.trim()) studentClass = _cl;\n                    const lvl = (String(tpKey).match(/^p(\\d)/i) ? 'P' + String(tpKey).match(/^p(\\d)/i)[1] : '');\n                    submitToServer({\n                        name: _nm,\n                        studentClass: _cl,\n                        level: lvl,\n                        topic: recTopic,\n                        question: recQuestion,\n                        studentAnswer: studentAns,\n                        correctAnswer: correctAns,\n                        result: allCorrect ? 'Correct' : 'Wrong',\n                        score: correctAnswers + '/' + questionsAnswered,\n                        at: new Date().toISOString()\n                    }, true);\n                }\n            } catch (e) {}\n        }\n        \n        // ---- SUBMISSION FEEDBACK ANIMATION ----\n        // Correct: green glow sweep + a brief rainbow mist over the box (~0.5s).\n        // Wrong: shake + flashing red border (~0.5s). Purely visual; auto-cleans up.\n        function flashSubmit(correct) {\n            const box = document.getElementById('quiz-modal');\n            if (!box) return;\n            const cls = correct ? 'answer-correct' : 'answer-wrong';\n            box.classList.remove('answer-correct', 'answer-wrong');\n            void box.offsetWidth; // restart animation\n            box.classList.add(cls);\n            setTimeout(() => box.classList.remove(cls), 650);\n            if (correct) {\n                const r = box.getBoundingClientRect();\n                const mist = document.createElement('div');\n                mist.className = 'sc-rainbow-mist';\n                mist.style.left = r.left + 'px';\n                mist.style.top = r.top + 'px';\n                mist.style.width = r.width + 'px';\n                mist.style.height = r.height + 'px';\n                document.body.appendChild(mist);\n                setTimeout(() => mist.remove(), 550);\n            }\n        }\n\n        // ---- WHY-IT'S-CORRECT EXPLANATION (syllabus-accurate) ----\n        // CURATED_EXPLANATIONS: exact, teacher-written \"why\" keyed by question text.\n        // Built topic-by-topic so every note is syllabus-accurate & works offline.\n        let EXPL_OVERRIDES = {};\n        try { EXPL_OVERRIDES = JSON.parse(localStorage.getItem('scienceClawExpl_v1') || '{}') || {}; } catch (e) {}\n        const CURATED_EXPLANATIONS = {\n            // ===================== P3 · DIVERSITY =====================\n            \"Which characteristic can solely be used to confirm that an animal is a mammal?\": \"Only mammals have <b>hair or fur<\u002Fb>. Other traits can be shared across groups, but hair/fur is unique to mammals — so it alone confirms an animal is a mammal.\",\n            \"In a family tree, Suzy's brown eyes are a characteristic passed down from her parents. This is an example of:\": \"Traits like eye colour are <b>inherited<\u002Fb> — passed from parents to their young through reproduction. They are not learnt or chosen.\",\n            \"Why are fungi not classified as plants?\": \"Plants have <b>chlorophyll<\u002Fb> and make their own food by photosynthesis. Fungi have no chlorophyll, so they cannot make food and must absorb nutrients from other things — that is why they are not plants.\",\n            \"How can we tell if an object will float or sink in water?\": \"Whether an object floats or sinks depends on the <b>material<\u002Fb> it is made of. Light materials like cork float, while heavy materials like iron sink.\",\n            \"Which of the following is true about all birds?\": \"<b>Feathers<\u002Fb> are found only on birds, and every bird has them. Not all birds fly (e.g. penguins, ostriches), but all birds have feathers.\",\n            \"Why are bacteria called microorganisms?\": \"'Micro' means very small. Bacteria are <b>microorganisms<\u002Fb> because they are too tiny to see with our eyes alone and can only be seen using a <b>microscope<\u002Fb>.\",\n            \"What is a common characteristic of all insects?\": \"All insects have a body in <b>3 parts<\u002Fb> (head, thorax, abdomen) and <b>6 legs<\u002Fb>. A spider has 8 legs, so it is not an insect.\",\n            \"What are the characteristics of living things?\": \"All living things carry out life processes: they <b>grow<\u002Fb>, reproduce, respond to their surroundings, and need air, food and <b>water<\u002Fb> to survive.\",\n            \"Which material would be best for making the lenses of spectacles?\": \"Lenses must let light pass through so we can see clearly. <b>Clear glass or clear plastic<\u002Fb> are transparent, so they are the best choice.\",\n            \"What do we call materials that block light completely?\": \"<b>Opaque<\u002Fb> materials do not let any light pass through, so they block light and form dark shadows.\",\n            \"How does a plant respond to its environment?\": \"Plants respond to their surroundings. One example is their <b>leaves growing towards sunlight<\u002Fb> so they can get more light to make food.\",\n            \"Which of the following describes a physical property of a material?\": \"A <b>physical property<\u002Fb> is something we can observe or measure without changing the material — like its <b>flexibility<\u002Fb>, strength or whether it is waterproof.\",\n            \"What is the main function of the outer covering of an animal?\": \"An animal's outer covering (fur, feathers, scales or shell) mainly <b>protects its body<\u002Fb> from injury, weather and enemies.\",\n            \"How do birds reproduce?\": \"Birds are covered in <b>feathers<\u002Fb> and reproduce by laying <b>eggs<\u002Fb>, which the parents keep warm until they hatch.\",\n            \"Which group of animals is correctly paired with its characteristic?\": \"<b>Fish<\u002Fb> are covered in scales and breathe through <b>gills<\u002Fb>, which take in oxygen dissolved in water — the correctly matched pair.\",\n            // ===================== P3 · INTERACTIONS (MAGNETS) =====================\n            \"Why does a magnet repel another magnet?\": \"'Repel' means to push away. Magnets push away when <b>like poles<\u002Fb> (N–N or S–S) face each other. Like poles repel; unlike poles attract.\",\n            \"Aminah placed Magnet A 30cm away from Material B, but B did not move. Why?\": \"A magnet's pull gets <b>weaker with distance<\u002Fb>. At 30 cm the magnetic force is too weak to pull Material B, so it does not move.\",\n            \"How does a compass work?\": \"A compass is a <b>freely-suspended magnet<\u002Fb>. It always rests pointing <b>North–South<\u002Fb> because it lines up with the Earth's magnetic field.\",\n            \"What happens when a bar magnet is cut in half?\": \"Every magnet must have <b>two poles<\u002Fb>. Cutting one in half makes <b>two smaller magnets<\u002Fb>, each with its own North and South pole.\",\n            \"Where on a magnet is it strongest?\": \"A magnet's pulling force is strongest at its <b>poles<\u002Fb> (the two ends) and weakest in the middle.\",\n            \"Which of the following materials can be made into a temporary magnet?\": \"<b>Steel<\u002Fb> is a magnetic material and can be made into a temporary magnet (e.g. by stroking). Copper and aluminium cannot be magnetised.\",\n            \"How do you demagnetise a magnet?\": \"A magnet loses its magnetism when its neat inside arrangement is disturbed — for example by <b>dropping it often<\u002Fb> or <b>heating<\u002Fb> it strongly over a flame.\",\n            \"Which of the following actions will NOT demagnetise a magnet?\": \"Dropping, hammering and heating all weaken a magnet. <b>Stroking with another magnet in one direction actually makes a magnet<\u002Fb>, so it will NOT demagnetise one.\",\n            \"Can magnets work through plastic?\": \"Magnetic force can pass through <b>non-magnetic<\u002Fb> materials like paper and plastic, so a magnet can still move a steel paperclip through them.\",\n            \"If a magnet is placed near a mixture of iron filings and sand, what will happen?\": \"A magnet only attracts magnetic materials. The <b>iron filings<\u002Fb> are pulled to the magnet while the <b>sand<\u002Fb> (non-magnetic) is left behind.\",\n            \"What is the invisible area around a magnet called?\": \"The <b>magnetic field<\u002Fb> is the space around a magnet where its magnetic force can be felt.\",\n            \"Which object uses a magnet to function?\": \"A <b>compass<\u002Fb> uses a small magnet as its needle, which lines up with the Earth's magnetic field to point North–South.\",\n            \"What is the rule of magnetic poles?\": \"The rule is: <b>like poles repel<\u002Fb> (push apart) and <b>unlike poles attract<\u002Fb> (pull together).\",\n            \"A student hangs a bar magnet from a string. When it stops swinging, in which direction will it point?\": \"A freely-hanging magnet always settles pointing <b>North–South<\u002Fb>, lining up with the Earth's magnetic field. This is how a compass works.\",\n            \"How does an electromagnet work?\": \"An electromagnet is made by passing an <b>electric current<\u002Fb> through a coil of wire. The current turns the coil into a magnet; switch it off and the magnetism stops.\",\n            \"Which of these is NOT a magnetic material?\": \"Magnets attract only iron, steel, nickel and cobalt. <b>Aluminium<\u002Fb> is not magnetic, so it is not attracted.\",\n            \"How can you make an electromagnet stronger?\": \"You can strengthen an electromagnet by increasing the number of <b>coils<\u002Fb> of wire or adding more <b>batteries<\u002Fb> to increase the current.\",\n            \"A U-shaped magnet is brought near a bar magnet. What determines whether they attract or repel?\": \"It depends on which <b>poles face each other<\u002Fb>: unlike poles attract, like poles repel.\",\n            \"Which combination of materials will be attracted to a magnet?\": \"Only magnetic materials are attracted. <b>Iron nails and steel screws<\u002Fb> are both magnetic, so both are pulled to the magnet.\",\n            \"Why do we use rubber for car tyres?\": \"Rubber grips the road, creating high <b>friction<\u002Fb> between the tyre and the road surface. This friction stops the tyre from <b>skidding<\u002Fb>, so the car can move and stop safely.\",\n            \"How do frogs survive out of water?\": \"Frogs are amphibians with <b>moist<\u002Fb> skin. They live near <b>water<\u002Fb> and in damp places so their skin does not dry out, because they also breathe through their skin.\",\n            \"Can a magnet attract iron through a table?\": \"Yes — magnetic force can pass through <b>non-magnetic<\u002Fb> materials like a wooden or plastic tabletop, so a magnet can still attract a steel or iron object through it.\",\n            // ===================== P4 · CYCLES (MATTER & LIFE CYCLES) =====================\n            \"Why do puddles dry up?\": \"On a sunny day the water gains <b>heat<\u002Fb> from the Sun and <b>evaporates<\u002Fb> — it changes into water vapour and goes into the air, so the puddle dries up.\",\n            \"Why cannot a syringe filled completely with water be compressed?\": \"A <b>liquid has a definite volume<\u002Fb> and its particles are already close together, so water cannot be squeezed into a smaller space.\",\n            \"What are the necessary conditions for a seed to germinate?\": \"A seed needs <b>water, air (oxygen) and warmth<\u002Fb> to germinate. It does not need light or soil at this early stage.\",\n            \"Why does a cold drink get heavier?\": \"The cold can cools the water vapour in the air, which <b>condenses<\u002Fb> into water droplets on the outside. These droplets add <b>mass<\u002Fb>, so the reading increases.\",\n            \"Why does the volume of water remain the same when poured from a tall beaker into a wide basin?\": \"A liquid has a <b>definite volume but no definite shape<\u002Fb>. It takes the shape of the new container, but the amount of water stays the same.\",\n            \"Why do cockroaches have a 3-stage life cycle while butterflies have a 4-stage cycle?\": \"Cockroaches undergo <b>incomplete metamorphosis<\u002Fb> (egg → nymph → adult) and skip the <b>pupa<\u002Fb> stage, so they have 3 stages instead of 4.\",\n            \"What happens to water when it is heated to 100°C?\": \"At <b>100°C<\u002Fb> water reaches its boiling point: it gains heat and changes from liquid into <b>steam<\u002Fb> (a gas).\",\n            \"At what temperature does pure water freeze into ice?\": \"Pure water freezes — turns from liquid into solid ice — at <b>0°C<\u002Fb>, its freezing point.\",\n            \"What defines matter?\": \"<b>Matter<\u002Fb> is anything that has <b>mass<\u002Fb> and takes up <b>space<\u002Fb>. Solids, liquids and gases are all matter.\",\n            \"Which of the following has no definite shape but has a definite volume?\": \"A <b>liquid<\u002Fb> has a definite volume but no definite shape. <b>Oil<\u002Fb> is a liquid, so it takes the shape of its container but keeps the same volume.\",\n            \"Why can air be squeezed into a small tank?\": \"A <b>gas<\u002Fb> has no definite shape or volume and its particles are far apart, so air can be <b>compressed<\u002Fb> into a smaller space.\",\n            \"Which process involves a loss of heat to the surroundings?\": \"<b>Freezing<\u002Fb> is when a liquid loses heat and turns into a solid. (Melting, boiling and evaporation all gain heat.)\",\n            \"What are the states of matter?\": \"The three states of matter are <b>solid<\u002Fb>, <b>liquid<\u002Fb> and <b>gas<\u002Fb>.\",\n            \"Which animal goes through a 4-stage life cycle?\": \"A <b>mosquito<\u002Fb> goes through 4 stages (egg → larva → pupa → adult) — complete metamorphosis, including a pupa stage.\",\n            \"What does a caterpillar do?\": \"A caterpillar is the <b>larva<\u002Fb> of a butterfly. It spends most of its time <b>eating<\u002Fb> so it can grow before it becomes a pupa.\",\n            \"What is the young of a cockroach called?\": \"The young of a cockroach is called a <b>nymph<\u002Fb>. It looks like a small adult and grows by moulting.\",\n            \"How do seeds survive before germination?\": \"A seed holds a baby plant and a store of <b>food<\u002Fb>. This food gives energy until the plant grows its own <b>leaves<\u002Fb> to make food by photosynthesis.\",\n            \"Which list correctly orders the stages of a bean plant's life cycle?\": \"A bean plant grows in the order <b>seed → seedling → adult plant<\u002Fb>, which then makes new seeds.\",\n            \"How does a nymph grow?\": \"During the <b>nymph<\u002Fb> stage, insects like grasshoppers grow by shedding their outer skin — a process called <b>moulting<\u002Fb>.\",\n            // ===================== P4 · ENERGY (LIGHT & HEAT) =====================\n            \"Why does Daisy's shadow get longer as she walks further away from the streetlamp?\": \"As Daisy moves away, the <b>angle of the light rays changes<\u002Fb> so she blocks a wider beam of light, making her shadow longer.\",\n            \"Rizwan uses a light sensor to count balls rolling through a hole. Why do the blocked light periods have different durations?\": \"Each ball blocks the light for a different length of time because the balls rolled through at <b>different speeds<\u002Fb> — a faster ball blocks the light for less time.\",\n            \"Why does a metal ball fail to pass through a metal ring after being heated?\": \"When the metal ball is heated it gains heat and <b>expands<\u002Fb> (increases in volume), so it becomes too big to pass through the ring.\",\n            \"What is temperature?\": \"<b>Heat<\u002Fb> is a form of energy. <b>Temperature<\u002Fb> is a measure of how hot or cold something is — they are not the same thing.\",\n            \"David placed materials A, B and C between a torch and a light sensor in a dark room.<br><table class='question-table'><tr><th>Material<\u002Fth><th>Amount of Light Detected (units)<\u002Fth><\u002Ftr><tr><td>Clear Glass<\u002Ftd><td>400<\u002Ftd><\u002Ftr><tr><td>A<\u002Ftd><td>380<\u002Ftd><\u002Ftr><tr><td>B<\u002Ftd><td>0<\u002Ftd><\u002Ftr><tr><td>C<\u002Ftd><td>150<\u002Ftd><\u002Ftr><\u002Ftable>Which material is most likely a wooden board?\": \"A wooden board is <b>opaque<\u002Fb> and blocks all light, so the sensor detects <b>0 units<\u002Fb>. Material B let no light through, so it is the wooden board.\",\n            \"Which of the following objects is a source of light?\": \"A light source makes its <b>own<\u002Fb> light. The <b>Sun<\u002Fb> makes its own light. (The Moon and mirrors only reflect light — they are not sources.)\",\n            \"Why do shadows form?\": \"Light travels in a <b>straight<\u002Fb> line. When an opaque object blocks the light, a <b>shadow<\u002Fb> forms behind it because light cannot bend around it.\",\n            \"Which material would cast the darkest shadow?\": \"The more light a material blocks, the darker the shadow. A <b>wooden board<\u002Fb> is opaque and blocks all light, so it casts the darkest shadow.\",\n            \"What happens to a hot drink?\": \"A hot drink <b>loses<\u002Fb> heat to the cooler surroundings and keeps cooling until it reaches <b>room<\u002Fb> temperature.\",\n            \"A block of ice is placed in a sealed plastic bag. What happens to its mass and volume as it melts?\": \"Melting adds no matter, so the <b>mass stays the same<\u002Fb>. Water takes up less space than ice, so the <b>volume decreases<\u002Fb>.\",\n            \"How do thermometers work?\": \"A thermometer's liquid <b>expands<\u002Fb> when it gains heat and <b>contracts<\u002Fb> when it loses heat. The level of the liquid shows the temperature.\",\n            \"If you mix 50ml of water at 20°C with 50ml of water at 80°C, what is the most likely temperature of the mixture immediately after?\": \"Equal amounts of water at 20°C and 80°C mix to give the <b>average<\u002Fb>, about <b>50°C<\u002Fb>, as heat flows from the hotter water to the cooler water.\",\n            \"What are conductors and insulators?\": \"Good <b>conductors<\u002Fb> let heat pass through easily (like metal). Poor conductors, or <b>insulators<\u002Fb>, do not (like plastic or wood).\",\n            \"How can you make a shadow larger?\": \"Moving the object <b>closer to the light source<\u002Fb> makes it block more light, so the shadow becomes larger.\",\n            \"Where does Earth get energy?\": \"The <b>Sun<\u002Fb> is our main source of <b>heat<\u002Fb> and <b>light<\u002Fb> energy.\",\n            \"Which of the following surfaces reflects light most regularly?\": \"A smooth, even surface reflects light in one clear direction. A <b>calm pool of water<\u002Fb> is smooth, so it reflects light most regularly, like a mirror.\",\n            \"What happens to light on an uneven surface?\": \"When light hits a <b>rough<\u002Fb> surface it is reflected in many different <b>directions<\u002Fb>, so we do not see a clear reflection.\",\n            \"Which statement about heat is incorrect?\": \"Heat is measured in <b>joules (J)<\u002Fb> — it is a form of energy. <b>Degrees Celsius (°C)<\u002Fb> measures <b>temperature<\u002Fb>, not heat, so that statement is the incorrect one.\",\n            \"How do heat changes affect temperature?\": \"When an object gains heat, its temperature <b>increases<\u002Fb>; when it loses heat, its temperature <b>decreases<\u002Fb>.\",\n            \"If a glass cup and a metal cup, both at room temperature (25°C), are touched, why does the metal cup feel cooler?\": \"Both cups are at 25°C, but metal is a <b>better conductor of heat<\u002Fb>. It draws heat away from your hand faster, so it feels cooler.\",\n            // ===================== P5 · SYSTEMS =====================\n            \"Why chew food?\": \"Chewing breaks food into smaller pieces. This increases the <b>surface area<\u002Fb> exposed to digestive juices, so <b>digestion<\u002Fb> happens faster.\",\n            \"Why does your heart beat faster?\": \"During exercise the muscles need more energy. The heart beats faster to deliver more <b>oxygen<\u002Fb> to the muscles for <b>respiration<\u002Fb>, which releases that energy.\",\n            \"What is the function of the large intestine in the human digestive system?\": \"The large intestine <b>absorbs water and mineral salts<\u002Fb> from the undigested food. The remaining solid waste is then removed from the body.\",\n            \"A scientist recorded the amount of undigested food passing through organs X, Y and Z.<br><table class='question-table'><tr><th>Organ<\u002Fth><th>Amount of Undigested Food (g)<\u002Fth><\u002Ftr><tr><td>Entering X (Mouth)<\u002Ftd><td>100<\u002Ftd><\u002Ftr><tr><td>Entering Y (Stomach)<\u002Ftd><td>80<\u002Ftd><\u002Ftr><tr><td>Entering Z (Small Intestine)<\u002Ftd><td>50<\u002Ftd><\u002Ftr><tr><td>Leaving Z<\u002Ftd><td>10<\u002Ftd><\u002Ftr><\u002Ftable>What does the data show about the digestion process?\": \"The amount of undigested food <b>decreases at every organ<\u002Fb> (X, Y and Z), showing that digestion happens <b>continuously<\u002Fb> along the whole digestive system, not in just one place.\",\n            \"Why are leaves green?\": \"Leaves contain chloroplasts with a green pigment called <b>chlorophyll<\u002Fb>. Chlorophyll traps <b>light<\u002Fb> energy to make food by photosynthesis, and its green colour makes leaves green.\",\n            \"Where are nutrients absorbed?\": \"Digestion starts in the <b>mouth<\u002Fb>, where saliva begins breaking down food, and ends in the <b>small<\u002Fb> intestine, where the digested nutrients are absorbed into the blood.\",\n            \"What is the path of air when a person inhales?\": \"When we breathe in, air travels <b>nose → windpipe → lungs<\u002Fb>, where oxygen passes into the blood.\",\n            \"What pumps blood?\": \"The circulatory system is made up of the heart, the <b>blood<\u002Fb>, and the blood <b>vessels<\u002Fb>. The heart pumps blood around the body.\",\n            \"Which of the following substances are transported by the human circulatory system?\": \"Blood transports <b>oxygen, carbon dioxide and digested food<\u002Fb> around the body to where they are needed.\",\n            \"How do you control an electrical circuit?\": \"A <b>switch<\u002Fb> opens or closes a circuit. When closed, <b>current<\u002Fb> flows and the circuit works; when open, the current stops.\",\n            \"What happens to the brightness of a bulb in a circuit if you add more batteries in series?\": \"Adding more batteries in series pushes more current through the circuit, so the bulb shines <b>brighter<\u002Fb>.\",\n            \"What prevents electric shocks?\": \"Electrical <b>insulators<\u002Fb> like wood and <b>rubber<\u002Fb> do not let current pass through. They cover wires and tools to prevent electric shocks.\",\n            \"In a circuit with two bulbs in series, what happens if one bulb fuses?\": \"A series circuit has only <b>one path<\u002Fb> for the current. If one bulb fuses, the path is broken, so the other bulb also goes out.\",\n            \"How does a battery work?\": \"A battery stores <b>chemical<\u002Fb> potential energy. In a closed circuit this is converted into <b>electrical<\u002Fb> energy to power the circuit.\",\n            \"What is the advantage of arranging bulbs in a parallel circuit rather than a series circuit?\": \"In a parallel circuit each bulb has its <b>own path<\u002Fb> for the current. If one bulb fuses, the others stay lit because current can still flow through the other paths.\",\n            // ===================== P5 · CYCLES (REPRODUCTION & WATER) =====================\n            \"Which part of the female human reproductive system has a similar function to the male testes (producing reproductive cells)?\": \"The <b>ovary<\u002Fb> produces the female reproductive cells (ovules), just as the male testes produce the male reproductive cells — so they have a similar function.\",\n            \"What is fertilisation?\": \"<b>Fertilisation<\u002Fb> is when the nucleus of a male reproductive cell joins (fuses) with the nucleus of a female reproductive cell.\",\n            \"In human reproduction, where does the fertilised egg develop into a baby?\": \"In humans the fertilised egg develops into a baby in the <b>womb<\u002Fb> (uterus).\",\n            \"How does pollination happen?\": \"<b>Pollination<\u002Fb> is the transfer of pollen grains from the <b>anther<\u002Fb> (male part) to the <b>stigma<\u002Fb> (female part) of a flower.\",\n            \"What is the function of the ovary in a flower?\": \"The flower's <b>ovary<\u002Fb> produces the female reproductive cells (ovules) and, after fertilisation, develops into a <b>fruit<\u002Fb>.\",\n            \"What do the ovule and ovary become?\": \"After fertilisation, each <b>ovule<\u002Fb> becomes a <b>seed<\u002Fb>, and the <b>ovary<\u002Fb> swells to become the <b>fruit<\u002Fb> that protects the seeds.\",\n            \"Which characteristic is typical of a seed dispersed by wind?\": \"Wind-dispersed seeds are <b>small and light<\u002Fb>, often with wing-like or hairy structures, so they can be carried far by the wind.\",\n            \"How does a coconut float?\": \"A coconut has a thick fibrous husk that traps <b>air<\u002Fb>. This makes it light enough to float, so it can be dispersed by <b>water<\u002Fb>.\",\n            \"What is the state of water at 50°C?\": \"Water is a <b>liquid<\u002Fb> between 0°C and 100°C. At 50°C it is still a liquid — below its boiling point of 100°C.\",\n            \"What do we call the continuous movement of water?\": \"The continuous movement of water from the Earth's surface to the sky and back is called the water <b>cycle<\u002Fb>.\",\n            \"Which of the following activities helps to conserve water?\": \"Using a <b>watering can instead of a hose<\u002Fb> uses much less water, so it helps to conserve water.\",\n            \"How does dumping untreated sewage harm aquatic life?\": \"Untreated sewage uses up the dissolved <b>oxygen<\u002Fb> in the water. With less oxygen, aquatic animals like fish cannot breathe and may die.\",\n            \"Which process involves the change of state from a liquid to a solid?\": \"<b>Freezing<\u002Fb> is the change from liquid to solid, which happens when the liquid loses heat (e.g. water → ice at 0°C).\",\n            \"What happens to the temperature of water when it boils?\": \"While water boils, its temperature stays constant at <b>100<\u002Fb>°C even though it keeps gaining <b>heat<\u002Fb> — the extra heat changes liquid into gas.\",\n            \"Which process in the water cycle ensures a continuous supply of fresh water on Earth?\": \"When sea water <b>evaporates<\u002Fb> it leaves the salt behind. The vapour condenses and falls as rain, giving a continuous supply of <b>fresh<\u002Fb> water.\",\n            \"What is the process of a liquid turning into a gas?\": \"<b>Evaporation<\u002Fb> is when a liquid slowly changes into a gas at temperatures below its boiling point.\",\n            \"Where does the fertilised egg attach itself to continue growing in a human female?\": \"The fertilised egg attaches to the <b>lining of the womb<\u002Fb>, where it grows into a baby.\",\n            \"Where are the reproductive cells in a flower?\": \"In a flower, the male reproductive cells are inside the <b>pollen<\u002Fb> grains, and the female reproductive cells are inside the <b>ovules<\u002Fb>.\",\n            \"If the temperature of the environment increases globally, what will most likely happen to the rate of the water cycle?\": \"Higher temperatures cause more <b>evaporation<\u002Fb>, so the water cycle <b>speeds up<\u002Fb>.\",\n            \"How do clouds form?\": \"As water vapour rises it loses heat and <b>condenses<\u002Fb> into tiny water droplets. Many droplets gather together to form <b>clouds<\u002Fb>.\",\n            // ===================== P6 · INTERACTIONS (FORCES & INTERACTIONS) =====================\n            \"How does a parachute slow a skydiver down?\": \"The large canopy traps a lot of air, greatly increasing the upward <b>air resistance<\u002Fb> (friction). This upward force opposes gravity and slows the skydiver down.\",\n            \"How are polar bears adapted to the cold?\": \"A polar bear's thick layer of fat acts as a thermal <b>insulator<\u002Fb>. It reduces heat <b>loss<\u002Fb> from the body to the freezing surroundings, keeping the bear warm.\",\n            \"Ravi wiped his left palm with Cleaner P and his right palm with Cleaner Q.<br><table class='question-table'><tr><th>Cleaning Agent<\u002Fth><th>Bacteria at 3 mins<\u002Fth><th>Bacteria at 1 hour<\u002Fth><\u002Ftr><tr><td>Cleaner P<\u002Ftd><td>200<\u002Ftd><td>500<\u002Ftd><\u002Ftr><tr><td>Cleaner Q<\u002Ftd><td>100<\u002Ftd><td>110<\u002Ftd><\u002Ftr><\u002Ftable>What can Ravi conclude about Cleaner Q?\": \"Cleaner Q left far fewer bacteria and the number barely rose over an hour (100 → 110), while Cleaner P's rose sharply (200 → 500). So <b>Cleaner Q is more effective<\u002Fb> at killing bacteria and slowing their reproduction.\",\n            \"Which of the following is a push force?\": \"A push force moves an object away from you. <b>Kicking a football<\u002Fb> pushes it away, so it is a push force.\",\n            \"What can a force do to a moving object?\": \"A force can change the <b>shape<\u002Fb>, the speed, or the <b>direction<\u002Fb> of a moving object.\",\n            \"Why do the soles of our shoes have deep grooves or patterns?\": \"The grooves increase <b>friction<\u002Fb> between the shoe and the ground, giving better grip so we do not slip.\",\n            \"What force opposes motion through the air?\": \"<b>Air resistance<\u002Fb> is the frictional force that opposes an object moving through the air.\",\n            \"Which of the following is a behavioural adaptation?\": \"A behavioural adaptation is something an animal <b>does<\u002Fb>. Birds <b>migrating<\u002Fb> to warmer places in winter is a behaviour, so it is a behavioural adaptation.\",\n            \"What forms an ecosystem?\": \"An <b>ecosystem<\u002Fb> is formed when living things in a habitat interact with each other and with their non-living (physical) <b>environment<\u002Fb>.\",\n            \"In a food chain, what role does a mushroom play?\": \"A mushroom is a <b>decomposer<\u002Fb>. It breaks down dead plants and animals and returns nutrients to the soil.\",\n            \"What is the primary source of energy in a food chain?\": \"The <b>Sun<\u002Fb> is the ultimate source of energy for almost all food chains. Plants trap this energy to make food.\",\n            \"Which of the following is an abiotic (non-living) factor in an environment?\": \"'Abiotic' means non-living. <b>Temperature<\u002Fb> is a non-living, physical factor of the environment, so it is abiotic.\",\n            \"What is the definition of a habitat?\": \"A <b>habitat<\u002Fb> is the place where an organism lives and gets its basic needs for survival.\",\n            \"Which of the following practices is considered environmentally friendly?\": \"Using a <b>reusable cloth bag<\u002Fb> reduces waste from single-use plastic bags, so it is environmentally friendly.\",\n            \"Why is dumping factory waste harmful to rivers?\": \"Factory waste causes water <b>pollution<\u002Fb>. It uses up the dissolved <b>oxygen<\u002Fb> in the water, so fish and other animals cannot breathe and may die.\",\n            \"What is the primary cause of the rising sea levels observed in recent decades?\": \"<b>Global warming<\u002Fb> melts polar ice caps and glaciers, adding water to the oceans. This is the main cause of rising sea levels.\",\n            \"What are the 3 Rs of conservation?\": \"The 3 Rs are Reduce, <b>Reuse<\u002Fb> and <b>Recycle<\u002Fb> — ways to cut down waste and conserve resources.\",\n            \"Why do magnetic trains (Maglev) hover above tracks?\": \"The train and track have <b>like poles<\u002Fb> facing each other. Like poles repel, so the train is lifted and hovers, removing friction between solid surfaces.\",\n            \"What kind of energy does a stretched rubber band have?\": \"A stretched rubber band stores <b>elastic<\u002Fb> potential energy, which exerts a <b>pulling<\u002Fb> force when released.\",\n            // ===================== P6 · ENERGY (FORMS & CONVERSIONS) =====================\n            \"What energy conversion occurs during photosynthesis?\": \"In photosynthesis, chlorophyll traps <b>light<\u002Fb> energy from the Sun and converts it into <b>chemical<\u002Fb> potential energy stored in food.\",\n            \"What type of energy does a roller coaster possess at its highest peak before dropping?\": \"At the highest point the coaster is raised highest and moving slowest, so it has <b>maximum gravitational potential energy<\u002Fb>, ready to convert into motion on the way down.\",\n            \"Why does a bouncing ball lose height?\": \"Each time the ball hits the floor, some of its <b>kinetic<\u002Fb> energy is converted into heat and <b>sound<\u002Fb> energy. With less energy left, it bounces lower each time.\",\n            \"Which of the following describes the principle of conservation of energy?\": \"Energy <b>cannot be created or destroyed<\u002Fb> — it can only be converted from one form into another. This is the conservation of energy.\",\n            \"When does an object have kinetic and potential energy?\": \"An object has <b>kinetic<\u002Fb> energy when it is moving, and gravitational <b>potential<\u002Fb> energy when it is raised above the ground.\",\n            \"A television is switched on. What is the main useful energy conversion taking place?\": \"A television changes <b>electrical energy → light energy<\u002Fb> (the picture) <b>and sound energy<\u002Fb> (the audio).\",\n            \"What happens when you rub your hands together?\": \"Rubbing your hands converts <b>kinetic<\u002Fb> energy (movement) into <b>heat<\u002Fb> energy through friction, so they feel warmer.\",\n            \"Which of the following sources of energy is non-renewable?\": \"Non-renewable sources will run out and cannot be replaced quickly. <b>Natural gas<\u002Fb> is a fossil fuel, so it is non-renewable.\",\n            \"How do food and fossil fuels store energy?\": \"Food and fossil fuels both store energy as <b>chemical<\u002Fb> potential energy, which is released when they are used.\",\n            \"In a coal-fired power station, what is the initial source of energy?\": \"The energy starts as <b>chemical potential energy stored in the coal<\u002Fb>, which is later converted into heat, then electricity.\",\n            \"How does a solar panel generate power?\": \"Solar panels convert <b>light<\u002Fb> energy from the Sun directly into <b>electrical<\u002Fb> energy.\",\n            \"Which object does NOT possess kinetic energy?\": \"Kinetic energy is the energy of movement. A <b>stretched rubber band held still<\u002Fb> is not moving, so it has no kinetic energy — it stores elastic potential energy instead.\",\n            \"What energy is in a compressed spring?\": \"A compressed or stretched spring stores <b>elastic<\u002Fb> potential energy.\",\n            \"What is the main energy conversion in an electric iron?\": \"An electric iron converts <b>electrical energy → heat energy<\u002Fb> to press clothes.\",\n            \"Where did the energy in our food originally come from?\": \"The energy in our food originally came from the <b>Sun<\u002Fb>, trapped by plants during <b>photosynthesis<\u002Fb> and passed along the food chain.\",\n            \"What form of energy is produced by a vibrating guitar string?\": \"A vibrating guitar string produces <b>sound<\u002Fb> energy.\",\n            \"Which energy transformation takes place in a glowing firefly?\": \"A firefly converts <b>chemical potential energy → light energy<\u002Fb>, making it glow.\",\n            \"What energy transformation happens as a roller coaster moves down the track?\": \"As the coaster moves down, its gravitational potential energy is converted into <b>kinetic<\u002Fb> energy, so it speeds up.\",\n            \"What energy transformation occurs when you turn on a battery-operated fan?\": \"A battery-operated fan converts <b>chemical potential → electrical → kinetic<\u002Fb> energy (the spinning blades).\",\n            \"What type of energy is stored in a battery in an electric circuit?\": \"A battery stores <b>chemical<\u002Fb> (potential) energy, which is converted into electrical energy in a circuit.\",\n            // ===================== PROCESS SKILLS (VARIABLES & DATA) =====================\n            \"A student measured the extension of a spring when different weights were hung on it.<br><table class='question-table'><tr><th>Weight (g)<\u002Fth><th>Length of Spring (cm)<\u002Fth><\u002Ftr><tr><td>0<\u002Ftd><td>10<\u002Ftd><\u002Ftr><tr><td>50<\u002Ftd><td>12<\u002Ftd><\u002Ftr><tr><td>100<\u002Ftd><td>14<\u002Ftd><\u002Ftr><tr><td>150<\u002Ftd><td>16<\u002Ftd><\u002Ftr><\u002Ftable>What is the original length of the spring?\": \"The original length is the spring's length with <b>no weight<\u002Fb> hung on it. At 0 g the spring is <b>10 cm<\u002Fb> long.\",\n            \"Tom tested how much water different materials absorbed.<br><table class='question-table'><tr><th>Material<\u002Fth><th>Mass before dipping (g)<\u002Fth><th>Mass after dipping (g)<\u002Fth><\u002Ftr><tr><td>X<\u002Ftd><td>10<\u002Ftd><td>12<\u002Ftd><\u002Ftr><tr><td>Y<\u002Ftd><td>10<\u002Ftd><td>25<\u002Ftd><\u002Ftr><tr><td>Z<\u002Ftd><td>10<\u002Ftd><td>10<\u002Ftd><\u002Ftr><\u002Ftable>Which material is waterproof?\": \"A waterproof material does not absorb water, so its mass does not change. <b>Material Z<\u002Fb> stayed at 10 g, so it is waterproof.\",\n            \"A student dropped seeds with different wing lengths and recorded the distance travelled.<br><table class='question-table'><tr><th>Length of Wing (cm)<\u002Fth><th>Distance Travelled (m)<\u002Fth><\u002Ftr><tr><td>2<\u002Ftd><td>1.5<\u002Ftd><\u002Ftr><tr><td>4<\u002Ftd><td>3.2<\u002Ftd><\u002Ftr><tr><td>6<\u002Ftd><td>5.8<\u002Ftd><\u002Ftr><\u002Ftable>What is the correct conclusion based on the data?\": \"As the wing length increases, the distance travelled increases (2 cm → 1.5 m, 6 cm → 5.8 m). So <b>longer wings let the seed travel further<\u002Fb>.\",\n            \"Nicole cleaned her right thumb with soap and her left thumb with Liquid T.<br><table class='question-table'><tr><th>Cleaning Agent<\u002Fth><th>Bacteria at 3 mins<\u002Fth><th>Bacteria at 1 hour<\u002Fth><\u002Ftr><tr><td>Soap<\u002Ftd><td>200<\u002Ftd><td>500<\u002Ftd><\u002Ftr><tr><td>Liquid T<\u002Ftd><td>100<\u002Ftd><td>110<\u002Ftd><\u002Ftr><\u002Ftable>What can Nicole conclude about Liquid T?\": \"Liquid T left fewer bacteria and the number barely rose (100 → 110), while soap's rose sharply (200 → 500). So <b>Liquid T is more effective<\u002Fb> at killing bacteria and slowing their reproduction.\",\n            \"When investigating if light intensity affects the rate of photosynthesis, what is the independent variable?\": \"The independent variable is what you purposely change. Here it is the <b>distance of the lamp from the plant<\u002Fb>, which changes the light intensity.\",\n            \"What do you do when one reading is very different from the rest?\": \"A reading that differs greatly from the others is an <b>anomalous<\u002Fb> result. That trial should be <b>repeated<\u002Fb> to check the reliability of the data.\",\n            \"How do you ensure an experiment is fair?\": \"For a <b>fair<\u002Fb> test, only the variable being tested is changed. All others — like the amount of wind and the <b>mass<\u002Fb> of the seed — must be kept constant.\",\n            \"What are the names of the changed and measured variables?\": \"The variable we purposely change is the <b>independent<\u002Fb> variable; the variable we measure is the <b>dependent<\u002Fb> variable.\",\n            \"Why should an experiment be repeated?\": \"Repeating at least three times and taking the <b>average<\u002Fb> improves <b>reliability<\u002Fb> by reducing the effect of errors.\",\n            \"Why do we use a control setup?\": \"A control setup gives a basis for <b>comparison<\u002Fb>, so we can be sure the result is caused only by the <b>independent<\u002Fb> variable.\",\n            \"A student placed identical plants in different light intensities.<br><table class='question-table'><tr><th>Light Intensity (lux)<\u002Fth><th>Number of bubbles per minute<\u002Fth><\u002Ftr><tr><td>100<\u002Ftd><td>5<\u002Ftd><\u002Ftr><tr><td>300<\u002Ftd><td>15<\u002Ftd><\u002Ftr><tr><td>500<\u002Ftd><td>25<\u002Ftd><\u002Ftr><\u002Ftable>What is the conclusion?\": \"As light intensity increases, the bubbles per minute rise (100 lux → 5, 500 lux → 25), so the <b>rate of photosynthesis increases<\u002Fb>.\",\n            \"In an experiment testing how the number of batteries affects bulb brightness, what must be kept constant?\": \"To test only the number of batteries, everything else must stay the same. The <b>type of bulb<\u002Fb> must be kept constant to make it a fair test.\",\n            \"What do you call the variable you keep the same?\": \"Variables kept the same to ensure a fair test are called <b>controlled<\u002Fb> variables.\",\n            \"A student tested how far a toy car travelled on different surfaces.<br><table class='question-table'><tr><th>Surface<\u002Fth><th>Distance (cm)<\u002Fth><\u002Ftr><tr><td>Glass<\u002Ftd><td>80<\u002Ftd><\u002Ftr><tr><td>Wood<\u002Ftd><td>50<\u002Ftd><\u002Ftr><tr><td>Carpet<\u002Ftd><td>20<\u002Ftd><\u002Ftr><\u002Ftable>Which surface provided the most friction?\": \"The more friction a surface has, the shorter the car travels. The car went the shortest distance on <b>carpet<\u002Fb> (20 cm), so carpet gave the most friction.\",\n            \"What is the purpose of a graph?\": \"A line graph makes it easy to see the <b>trend<\u002Fb> or relationship between the independent and dependent variables.\",\n            \"A student investigates the relationship between temperature and the rate at which sugar dissolves. What should be the independent variable?\": \"The independent variable is what you change on purpose. Here it is the <b>temperature of the water<\u002Fb>, to see how it affects dissolving.\",\n            \"How should you read a measuring cylinder?\": \"Read it with your eye level at the bottom of the <b>meniscus<\u002Fb> (the curved liquid surface) to avoid parallax error.\",\n            \"If a line graph shows a downward slope over time, what does this indicate?\": \"A downward slope means that as the independent variable increases, the <b>dependent variable decreases<\u002Fb>.\",\n            \"What tool is best for continuous temperature readings?\": \"A <b>datalogger<\u002Fb> automatically records sensor readings continuously over a long time, more reliably than reading by hand.\",\n            \"A student placed a block of ice at 0°C in a room at 30°C. Which graph would best represent the temperature of the ice/water over the next hour?\": \"While the ice melts the temperature stays at <b>0°C<\u002Fb> (the heat changes solid into liquid), then it rises. So the line is <b>flat at 0°C, then slopes upward<\u002Fb>.\",\n            \"What does a steeper gradient on a distance-time graph mean?\": \"On a distance-time graph, a steeper line means the object covers more distance in the same time — it is moving at a higher <b>speed<\u002Fb>.\",\n        };\n        // Curated notes cover common P3–P6 misconceptions so the \"why\" is correct even\n        // offline. If none matches and we're online, Claude writes a 1–2 sentence reason.\n        const EXPLANATION_RULES = [\n            { re: /heat is measured in degrees celsius/i, text: \"Heat is measured in <b>joules (J)<\u002Fb> — it is a form of energy. <b>Degrees Celsius (°C)<\u002Fb> measures <b>temperature<\u002Fb>, not heat. So this statement is the incorrect one.\" },\n            { re: /temperature is measured in joules/i, text: \"Temperature is measured in <b>degrees Celsius (°C)<\u002Fb>, not joules. Joules measure heat energy.\" },\n            { re: /heat (always )?flows from.*(lower|cold).*(higher|hot)/i, text: \"Heat always flows from a <b>hotter<\u002Fb> region to a <b>colder<\u002Fb> one, never the other way. So this statement is incorrect.\" },\n            { re: /(mercury|dead|non).?living/i, text: \"Non-living things do not carry out life processes such as growing, reproducing or responding to their surroundings.\" },\n            { re: /light travels in (a )?straight line/i, text: \"Light travels in <b>straight lines<\u002Fb>. This is why shadows form when an object blocks the light.\" },\n            { re: /magnet.*(two|2) poles|north and south pole/i, text: \"Every magnet has <b>two poles<\u002Fb> — a north and a south pole. Like poles repel; unlike poles attract.\" },\n            { re: /evaporation.*(any|all) temperature|evaporation.*(does not need|without) (boiling|heat)/i, text: \"Evaporation can happen at <b>any<\u002Fb> temperature — it does not need boiling. Boiling only happens at the boiling point.\" },\n        ];\n        function curatedExplanation(q) {\n            // 1) Exact teacher-written note for this question (most accurate)\n            const stem = (q.q || '').trim();\n            if (EXPL_OVERRIDES[stem]) return EXPL_OVERRIDES[stem];\n            if (CURATED_EXPLANATIONS[stem]) return CURATED_EXPLANATIONS[stem];\n            if (q.explanation) return q.explanation; // teacher-authored on the question\n            // 2) Misconception rules (regex) for anything not yet curated\n            const hay = ((q.q || '') + ' ' + (q.correct || '') + ' ' + (q.text || '')).toLowerCase();\n            for (const r of EXPLANATION_RULES) if (r.re.test(hay)) return r.text;\n            return null;\n        }\n        // For fill-in-the-blank questions the answer lives in the _[token]_ blanks,\n        // not in q.correct — derive it so feedback never reads \"The correct answer is .\"\n        function answerTextFor(q) {\n            let a = String(q.correct || '');\n            if (!a && q.text) {\n                const toks = String(q.text).match(/_\\[(.*?)\\]_/g) || [];\n                a = toks.map(t => t.slice(2, -2)).join(', ');\n            }\n            return a || '(see the keywords above)';\n        }\n        async function explainAnswer(q, wasCorrect) {\n            const slot = document.getElementById('why-explain');\n            if (!slot) return;\n            // ENH5: on a wrong answer, frame the note as a misconception callout\n            const lead = wasCorrect ? \"💡 <b>Why:<\u002Fb> \" : \"⚠️ <b>Common mistake:<\u002Fb> \";\n            // 1) Curated / teacher note (instant, works offline)\n            const curated = curatedExplanation(q);\n            if (curated) { slot.innerHTML = lead + curated; return; }\n            // 2) AI reason when online\n            if (!navigator.onLine || !(window.claude && window.claude.complete)) {\n                slot.innerHTML = lead + \"The correct answer is <b>\" + escapeHtml(answerTextFor(q)) + \"<\u002Fb>.\";\n                return;\n            }\n            slot.innerHTML = lead + \"<span style='opacity:.7'>thinking…<\u002Fspan>\";\n            try {\n                const stem = (q.q || '').replace(/<[^>]*>/g, ' ').replace(/\\s+/g, ' ').trim();\n                const prompt =\n`You are a Singapore primary school science teacher (P3–P6), 2023 syllabus.\nIn ONE or TWO short sentences, explain WHY the correct answer is correct — simple, accurate, kid-friendly. If the question asks which statement is INCORRECT, explain what is actually true.\nDo NOT restate the question. No preamble. Plain sentences only.\n\nQUESTION: ${stem}\nCORRECT ANSWER: ${q.correct || (q.text || '').replace(/_\\[(.*?)\\]_/g, '[$1]')}`;\n                const out = await window.claude.complete(prompt);\n                const clean = (out || '').trim().replace(/^[\"'\\s]+|[\"'\\s]+$/g, '');\n                slot.innerHTML = lead + (clean ? escapeHtml(clean).replace(/\\n/g, '<br>') : (\"The correct answer is <b>\" + escapeHtml(answerTextFor(q)) + \"<\u002Fb>.\"));\n            } catch (e) {\n                slot.innerHTML = lead + \"The correct answer is <b>\" + escapeHtml(answerTextFor(q)) + \"<\u002Fb>.\";\n            }\n        }\n        function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;'); }\n\n        // ENH5: In-question hint (before submitting). Guides without giving the answer.\n        // Using a hint forfeits the perfect-run bonus (per-correct credit still earned).\n        function showHint() {\n            if (!currentQData) return;\n            const box = document.getElementById('hint-box');\n            if (!box) return;\n            hintUsedThisQ = true; sessionHints++;\n            quizBonusEligible = false;\n            const q = currentQData;\n            let hint;\n            if (q.type === 'fitb') {\n                const ins = [...document.querySelectorAll('.fitb-input')];\n                const clues = ins.map(i => { const a = (i.dataset.answer || '').trim(); return a ? '“' + a[0].toUpperCase() + '…” (' + a.length + ' letters)' : ''; }).filter(Boolean);\n                hint = 'Each blank is a key term from <b>' + topicLabel(q.topic) + '<\u002Fb>.' + (clues.length ? ' Starts with: ' + clues.join(' · ') : '');\n            } else if (q.type === 'match') {\n                hint = 'Use the <b>CECL<\u002Fb> order — <b>C<\u002Fb>oncept (name the science idea), <b>E<\u002Fb>vidence (what the question tells you), <b>C<\u002Fb>onnect, <b>L<\u002Fb>ink (the result). This tests <b>' + topicLabel(q.topic) + '<\u002Fb>.';\n            } else if (q.type === 'mcq') {\n                hint = 'Eliminate the options you are sure are wrong first. This question is about <b>' + topicLabel(q.topic) + '<\u002Fb> — pick the option that best matches that idea.';\n            } else {\n                hint = 'Break the question into parts and answer one at a time.';\n            }\n            box.innerHTML = '💡 <b>Hint:<\u002Fb> ' + hint + '<br><span style=\"font-size:12px;color:var(--sc-text-muted,#9fb0c0)\">(Using a hint means no perfect-run bonus this round — you still earn a credit for a correct answer.)<\u002Fspan>';\n            box.style.display = 'block';\n            document.getElementById('btn-hint').style.display = 'none';\n            if (window.sfx) sfx.click();\n        }\n\n        function forceNextQuestion() {\n            document.getElementById('answer-reveal').style.display = 'none';\n            document.getElementById('btn-next-q').style.display = 'none';\n            document.getElementById('btn-submit').style.display = 'inline-block';\n            \n            // Clear inputs if any\n            document.querySelectorAll('.fitb-input').forEach(inp => inp.value = '');\n            document.querySelectorAll('.mcq-btn').forEach(btn => btn.classList.remove('selected'));\n            \n            currentQuestionCount++;\n            loadNextQuestion();\n        }\n\n        // --- MICROSCOPE (1000× reveal of atoms & microchips) ---\n        // Atoms and microchips are pixel-small in the cabinet. Selecting any camera view\n        // powers up the microscope, which zooms 1000× to reveal a field of 1000 atoms and\n        // 1000 microchips scattered at random — everything else is too big to see at this scale.\n        let microRAF = null, microDots = null, microTargets = null, microCreatures = [], microPops = [], microWired = false;\n        // Draw a soft blobby cell (membrane + nucleus) at (x,y)\n        function drawCell(ctx, c, t) {\n            ctx.save();\n            ctx.translate(c.x, c.y);\n            const wob = 1 + 0.06 * Math.sin(t * 3 + c.ph);\n            ctx.scale(wob, 1 / wob);\n            ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI * 2);\n            ctx.fillStyle = 'rgba(120,225,150,0.28)'; ctx.fill();\n            ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(120,225,150,0.8)'; ctx.stroke();\n            ctx.beginPath(); ctx.arc(c.r * 0.18, -c.r * 0.12, c.r * 0.34, 0, Math.PI * 2);\n            ctx.fillStyle = 'rgba(70,180,110,0.85)'; ctx.fill();\n            ctx.restore();\n        }\n        // Draw a spiky virus (capsid + protein spikes) at (x,y)\n        function drawVirus(ctx, v, t) {\n            ctx.save();\n            ctx.translate(v.x, v.y);\n            ctx.rotate(t * 0.6 + v.ph);\n            const spikes = 12;\n            ctx.strokeStyle = 'rgba(232,73,63,0.9)'; ctx.lineWidth = 1.3;\n            for (let i = 0; i < spikes; i++) {\n                const a = (i / spikes) * Math.PI * 2;\n                ctx.beginPath();\n                ctx.moveTo(Math.cos(a) * v.r, Math.sin(a) * v.r);\n                ctx.lineTo(Math.cos(a) * (v.r + 3.5), Math.sin(a) * (v.r + 3.5));\n                ctx.stroke();\n                ctx.beginPath(); ctx.arc(Math.cos(a) * (v.r + 3.8), Math.sin(a) * (v.r + 3.8), 1.3, 0, Math.PI * 2);\n                ctx.fillStyle = 'rgba(255,140,120,0.95)'; ctx.fill();\n            }\n            ctx.beginPath(); ctx.arc(0, 0, v.r, 0, Math.PI * 2);\n            ctx.fillStyle = 'rgba(180,50,45,0.85)'; ctx.fill();\n            ctx.strokeStyle = 'rgba(255,120,110,0.9)'; ctx.stroke();\n            ctx.restore();\n        }\n        function spawnMicroTarget(kind, W, H, R) {\n            const cx = W / 2, cy = H / 2;\n            const a = Math.random() * Math.PI * 2, r = Math.random() * (R - 16);\n            const sp = 0.25 + Math.random() * 0.3, dir = Math.random() * Math.PI * 2;\n            return { kind: kind, x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r,\n                     vx: Math.cos(dir) * sp, vy: Math.sin(dir) * sp, r: 8, ph: Math.random() * Math.PI * 2 };\n        }\n        function startMicroscope() {\n            const cv = document.getElementById('micro-canvas');\n            if (!cv) return;\n            const ctx = cv.getContext('2d');\n            const W = cv.width, H = cv.height, cx = W / 2, cy = H / 2, R = W / 2 - 4;\n            if (!microDots) {\n                microDots = [];\n                const make = (kind, n) => {\n                    for (let i = 0; i < n; i++) {\n                        const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * R;\n                        microDots.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r, kind: kind, ph: Math.random() * Math.PI * 2 });\n                    }\n                };\n                make('atom', 1000);   // 1000 atoms\n                make('chip', 1000);   // 1000 microchips\n            }\n            if (!microTargets) {\n                // A few big, clickable specimens drifting in the field — the collectible ones.\n                microTargets = [];\n                for (let i = 0; i < 3; i++) microTargets.push(spawnMicroTarget('atom', W, H, R));\n                for (let i = 0; i < 2; i++) microTargets.push(spawnMicroTarget('chip', W, H, R));\n            }\n            // Wire click-to-collect once.\n            if (!microWired) {\n                microWired = true;\n                cv.style.cursor = 'pointer';\n                cv.title = 'Enter the Microscope Lab';\n                cv.addEventListener('click', () => enterMicroscopeLab());\n            }\n            cancelAnimationFrame(microRAF);\n            const draw = () => {\n                const t = performance.now() * 0.001, now = performance.now();\n                ctx.clearRect(0, 0, W, H);\n                // background field\n                for (let i = 0; i < microDots.length; i++) {\n                    const d = microDots[i];\n                    const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * 2 + d.ph));\n                    if (d.kind === 'atom') { ctx.fillStyle = 'rgba(102,204,255,' + tw + ')'; ctx.fillRect(d.x, d.y, 1.5, 1.5); }\n                    else { ctx.fillStyle = 'rgba(20,184,166,' + tw + ')'; ctx.fillRect(d.x - 0.8, d.y - 0.8, 1.8, 1.8); }\n                }\n                // occasionally spawn a drifting cell or virus (decorative)\n                if (microCreatures.length < 2 && Math.random() < 0.006) {\n                    const kind = Math.random() < 0.5 ? 'cell' : 'virus';\n                    const edge = Math.random() * Math.PI * 2;\n                    microCreatures.push({ type: kind, x: cx + Math.cos(edge) * R, y: cy + Math.sin(edge) * R,\n                        vx: -Math.cos(edge) * (0.15 + Math.random() * 0.15) + (Math.random() - 0.5) * 0.1,\n                        vy: -Math.sin(edge) * (0.15 + Math.random() * 0.15) + (Math.random() - 0.5) * 0.1,\n                        r: kind === 'cell' ? 11 : 7, ph: Math.random() * Math.PI * 2 });\n                }\n                // move + draw creatures; cull when far outside\n                for (let i = microCreatures.length - 1; i >= 0; i--) {\n                    const c = microCreatures[i];\n                    c.x += c.vx; c.y += c.vy;\n                    if (Math.hypot(c.x - cx, c.y - cy) > R + 20) { microCreatures.splice(i, 1); continue; }\n                    if (c.type === 'cell') drawCell(ctx, c, t); else drawVirus(ctx, c, t);\n                }\n                // move + draw collectible targets (bounce inside the lens)\n                for (let i = 0; i < microTargets.length; i++) {\n                    const g = microTargets[i];\n                    g.x += g.vx; g.y += g.vy;\n                    if (Math.hypot(g.x - cx, g.y - cy) > R - 8) { g.vx *= -1; g.vy *= -1; g.x += g.vx * 2; g.y += g.vy * 2; }\n                    const pulse = 1 + 0.12 * Math.sin(t * 4 + g.ph);\n                    if (g.kind === 'atom') {\n                        ctx.beginPath(); ctx.arc(g.x, g.y, 4.2 * pulse, 0, Math.PI * 2);\n                        ctx.fillStyle = '#aef0ff'; ctx.shadowColor = '#66ccff'; ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0;\n                        ctx.strokeStyle = 'rgba(102,204,255,0.7)'; ctx.lineWidth = 1;\n                        ctx.beginPath(); ctx.ellipse(g.x, g.y, 8 * pulse, 3, 0.5, 0, Math.PI * 2); ctx.stroke();\n                    } else {\n                        ctx.fillStyle = '#2dd4bf'; ctx.shadowColor = '#14b8a6'; ctx.shadowBlur = 8;\n                        ctx.fillRect(g.x - 4 * pulse, g.y - 4 * pulse, 8 * pulse, 8 * pulse); ctx.shadowBlur = 0;\n                        ctx.strokeStyle = 'rgba(255,207,77,0.85)'; ctx.lineWidth = 1;\n                        ctx.strokeRect(g.x - 5.5 * pulse, g.y - 5.5 * pulse, 11 * pulse, 11 * pulse);\n                    }\n                }\n                // \"+1\" collection pops\n                for (let i = microPops.length - 1; i >= 0; i--) {\n                    const p = microPops[i], age = (now - p.born) / 650;\n                    if (age >= 1) { microPops.splice(i, 1); continue; }\n                    ctx.globalAlpha = 1 - age;\n                    ctx.fillStyle = p.kind === 'atom' ? '#66ccff' : '#2dd4bf';\n                    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';\n                    ctx.fillText('+1', p.x, p.y - age * 16);\n                    ctx.globalAlpha = 1;\n                }\n                microRAF = requestAnimationFrame(draw);\n            };\n            draw();\n        }\n        // Collect an atom/microchip found under the microscope — same rewards as a claw grab.\n        function collectFromMicroscope(type) {\n            const cfg = SCIENCE_ITEMS[type];\n            if (!cfg) return;\n            prizesWon++;\n            collection[type]++;\n            sciencePoints += cfg.points;\n            updateHUD();\n            renderCollection();\n            autoSaveSession();\n            if (window.sfx) sfx.win();\n            unlockBadge('microscope');\n            showMessage(`🔬 ${cfg.emoji} ${cfg.name} collected! ${type === 'atom' ? \"The robot's eyes light up 👀\" : type === 'cpu' ? \"The robot's brain powers on 🧠\" : ''}  +${cfg.points} Science Points`);\n            checkCollectionComplete();\n        }\n\n        // ============================================================================\n        //  MICROSCOPE LAB — a full-screen \"micro-world\" map that replaces the cabinet.\n        //  Entry costs a bundle of collected items. Tap atoms/chips to collect (each tap\n        //  costs points); avoid germs & viruses (tapping them deducts points). Hit the\n        //  atom + chip goal to complete the level; every clear raises the goal ×1.5.\n        // ============================================================================\n        const MICRO_COST = { battery: 5, crystal: 1, titanium: 3, magnet: 5 };\n        const MICRO_BASE_GOAL = { atom: 10, cpu: 20 };\n        const LS_MICRO_LEVEL = 'scienceClawMicroLevel_v1';\n        const LS_ACH = 'scienceClawAchievements_v1';\n        let microLevel = 0;\n        try { microLevel = parseInt(localStorage.getItem(LS_MICRO_LEVEL) || '0', 10) || 0; } catch (e) {}\n        function microGoal() {\n            const f = Math.pow(1.5, microLevel);\n            return { atom: Math.round(MICRO_BASE_GOAL.atom * f), cpu: Math.round(MICRO_BASE_GOAL.cpu * f) };\n        }\n        // ---- Achievements ----\n        function getAchievements() { try { return JSON.parse(localStorage.getItem(LS_ACH) || '{}') || {}; } catch (e) { return {}; } }\n        function unlockAchievement(id, name, emoji) {\n            const a = getAchievements();\n            if (a[id]) return false;\n            a[id] = { name: name, emoji: emoji, at: new Date().toISOString() };\n            try { localStorage.setItem(LS_ACH, JSON.stringify(a)); } catch (e) {}\n            showMedal(name, emoji);\n            return true;\n        }\n        function showMedal(name, emoji) {\n            const pop = document.getElementById('medal-pop');\n            if (!pop) { showMessage('🏅 ' + name + ' unlocked!', 4000); return; }\n            document.getElementById('medal-emoji').textContent = emoji;\n            document.getElementById('medal-name').textContent = name;\n            const inner = pop.querySelector('.medal-inner');\n            if (inner) { inner.style.animation = 'none'; void inner.offsetWidth; inner.style.animation = ''; }\n            pop.classList.add('active');\n            if (window.sfx) sfx.win();\n        }\n\n        // ---- Lab state + loop ----\n        let labState = null, labRAF = null, labWired = false;\n        // Lab-only key tracker (independent of the global `keys` + its modal guard).\n        const labKeys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };\n        // speeds (px/frame at 600px canvas): atom fastest > virus = chip > germ slowest\n        const LAB_SPEED = { atom: 1.9, chip: 1.2, virus: 1.2, germ: 0.55 };\n        function labSpawn(kind, W, H, R) {\n            const cx = W / 2, cy = H / 2;\n            const a = Math.random() * Math.PI * 2, r = Math.random() * (R - 40);\n            const dir = Math.random() * Math.PI * 2, sp = LAB_SPEED[kind] * (0.8 + Math.random() * 0.4);\n            const rad = kind === 'germ' ? 26 : kind === 'virus' ? 20 : kind === 'chip' ? 17 : 15;\n            return { kind: kind, x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r,\n                     vx: Math.cos(dir) * sp, vy: Math.sin(dir) * sp, r: rad, ph: Math.random() * Math.PI * 2 };\n        }\n        function enterMicroscopeLab() {\n            // Gate on collected materials.\n            const lack = Object.keys(MICRO_COST).filter(k => (collection[k] || 0) < MICRO_COST[k]);\n            if (lack.length) {\n                const names = { battery: '🔋 batteries', crystal: '🔍 lens', titanium: '🔩 titanium', magnet: '🧲 magnets' };\n                showMessage('🔬 Not enough power! Collect 5 🔋, 1 🔍, 3 🔩, 5 🧲 to run the microscope. Still need: ' +\n                    lack.map(k => (MICRO_COST[k] - (collection[k] || 0)) + '× ' + names[k]).join(', '), 5000);\n                if (window.sfx) sfx.wrong();\n                return;\n            }\n            // Consume the materials.\n            Object.keys(MICRO_COST).forEach(k => { collection[k] -= MICRO_COST[k]; });\n            renderCollection(); updateHUD(); autoSaveSession();\n            unlockAchievement('microscope', 'Microscope Unlocked', '🔬');\n            showMessage('🔬 Microscope powered up! (used 5 🔋 · 1 🔍 · 3 🔩 · 5 🧲) — collect them again to run it next time.', 5000);\n\n            const goal = microGoal();\n            labState = { atomsGot: 0, chipsGot: 0, goal: goal, objs: [], creatures: [], pops: [], cursor: { x: 300, y: 300 } };\n            for (let i = 0; i < 5; i++) labState.objs.push(labSpawn('atom', 600, 600, 296));\n            for (let i = 0; i < 5; i++) labState.objs.push(labSpawn('chip', 600, 600, 296));\n            document.getElementById('lab-atoms-goal').textContent = goal.atom;\n            document.getElementById('lab-chips-goal').textContent = goal.cpu;\n            document.getElementById('lab-level').textContent = (microLevel + 1);\n            updateLabHUD();\n            document.getElementById('micro-lab').classList.add('active');\n            setLabReturnBtn(false);\n            if (window.sfx) sfx.enter && sfx.enter();\n            startLab();\n        }\n        // Re-open the CURRENT lab session without re-charging materials (used by the Return button).\n        function resumeMicroscopeLab() {\n            if (!labState) { showMessage('Collect the materials again to power the microscope.', 2600); return; }\n            if (!labState.cursor) labState.cursor = { x: 300, y: 300 };\n            document.getElementById('lab-atoms-goal').textContent = labState.goal.atom;\n            document.getElementById('lab-chips-goal').textContent = labState.goal.cpu;\n            document.getElementById('lab-level').textContent = (microLevel + 1);\n            updateLabHUD();\n            document.getElement f (hit < 0) { updateLabHUD(); return; } // missed — only the tap cost applies\n            if (!isCreature) {\n                const o = labState.objs[hit];\n                const cfg = SCIENCE_ITEMS[o.kind === 'atom' ? 'atom' : 'cpu'];\n                sciencePoints += cfg.points;\n                if (o.kind === 'atom') labState.atomsGot++; else labState.chipsGot++;\n                labState.pops.push({ x: o.x, y: o.y, born: performance.now(), txt: '+' + cfg.points, col: o.kind === 'atom' ? '#66ccff' : '#2dd4bf' });\n                labState.objs[hit] = labSpawn(o.kind, 600, 600, 296);\n                if (window.sfx) sfx.coin();\n                updateLabHUD();\n                checkLabWin();\n            } else {\n                const c = labState.creatures[hit];\n                const pen = c.type === 'germ' ? 50 : 20;\n                sciencePoints = Math.max(0, sciencePoints - pen);\n                labState.pops.push({ x: c.x, y: c.y, born: performance.now(), txt: '-' + pen, col: c.type === 'germ' ? '#e8493f' : '#ff8f6b' });\n                labState.creatures.splice(hit, 1);\n                if (window.sfx) sfx.wrong();\n                updateLabHUD();\n            }\n            updateHUD();\n            autoSaveSession();\n        }\n        function checkLabWin() {\n            if (!labState) return;\n            if (labState.atomsGot >= labState.goal.atom && labState.chipsGot >= labState.goal.cpu) {\n                sciencePoints += 100; // clear bonus\n                microLevel++;\n                try { localStorage.setItem(LS_MICRO_LEVEL, String(microLevel)); } catch (e) {}\n                updateHUD(); autoSaveSession();\n                cancelAnimationFrame(labRAF); labRAF = null;\n                document.getElementById('micro-lab').classList.remove('active');\n                unlockAchievement('hardmode', 'Hard Mode Unlocked', '🔥');\n                setLabReturnBtn(false);\n                setTimeout(() => showMedal('Mr Soh is impressed!  Level '
