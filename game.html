  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ansform:translateX(-50%);\n    align-items:center; gap:8px; padding:13px 22px; border:none; border-radius:14px; cursor:pointer;\n    font-family:var(--font-display); font-weight:800; font-size:15px; color:#05202e;\n    background:linear-gradient(180deg,var(--sc-cyan,#66ccff),#2aa9e0);\n    box-shadow:0 0 20px rgba(102,204,255,.6), 0 4px 14px rgba(0,0,0,.5); }\n  #lab-return-btn:hover{ filter:brightness(1.08); }\n  .lab-hint{ color:var(--sc-text-muted); font-size:13px; padding:8px 20px 16px; text-align:center; max-width:660px; }\n\n  /* ---------- ACHIEVEMENT MEDAL POP ---------- */\n  #medal-pop{ display:none; position:fixed; inset:0; z-index:40; align-items:center; justify-content:center;\n    background:rgba(4,7,12,.72); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }\n  #medal-pop.active{ display:flex; }\n  .medal-inner{ text-align:center; animation:medal-pop .5s cubic-bezier(.2,1.4,.4,1); }\n  @keyframes medal-pop{ 0%{ transform:scale(.4) rotate(-12deg); opacity:0; } 100%{ transform:scale(1) rotate(0); opacity:1; } }\n  .medal-disc{ width:132px; height:132px; margin:0 auto 16px; border-radius:50%; display:flex; align-items:center; justify-content:center;\n    font-size:62px; background:radial-gradient(circle at 40% 32%, #ffe08a, #ffb627 55%, #c8860f);\n    box-shadow:0 0 0 8px rgba(255,182,39,.22), 0 0 44px rgba(255,182,39,.6); animation:medal-spin 4s linear infinite; }\n  @keyframes medal-spin{ to{ box-shadow:0 0 0 8px rgba(255,182,39,.22), 0 0 60px rgba(255,182,39,.85); } }\n  .medal-kicker{ font-family:var(--font-display); font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:13px; color:var(--sc-yellow); }\n  .medal-title{ font-family:var(--font-display); font-weight:900; font-size:26px; color:#fff; margin:4px 0 18px; }\n\n  /* Topic selector / levels */\n  .topic-selector{ text-align:left; background:var(--sc-ink-900); padding:16px; border-radius:14px; margin-bottom:20px; border:1px solid var(--sc-glass-line); max-height nd:linear-gradient(90deg,var(--sc-cyan,#66ccff),#2a6fdb); }\n  .vs-side.right .vs-bar{ background:linear-gradient(90deg,#f06fff,#c235d6); }\n  #vs-turn-banner{ position:absolute; top:16px; left:50%; transform:translateX(-50%); pointer-events:none;\n    font-family:var(--font-display); font-weight:900; font-size:16px; padding:10px 24px; border-radius:999px;\n    background:linear-gradient(180deg,var(--sc-yellow-soft,#ffe89a),var(--sc-yellow,#f5c518)); color:#3a2c00;\n    box-shadow:0 6px 24px rgba(0,0,0,.4); white-space:nowrap; }\n  .vs-exit{ pointer-events:auto; margin-top:12px; font-family:var(--font-display); font-weight:700; font-size:12px;\n    background:var(--sc-ink-800,#12202f); color:var(--sc-text-muted,#9fb0c0); border:1px solid var(--sc-glass-line,rgba(255,255,255,.1));\n    border-radius:10px; padding:8px 12px; cursor:pointer; }\n\n  /* ---- Versus finale (shooting gallery) ---- */\n  /* Per-player microscope: transparent container so the OTHER player's live claw\n     shows through their half. Only an active player's own pane is opaque. */\n  #vs-finale{ display:none; position:absolute; inset:0; z-index:8; pointer-events:none; background:transparent; }\n  #vs-finale.active{ display:block; }\n  #fin-legend{ position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:4; pointer-events:none;\n    display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:94%;\n    background:rgba(5,16,28,.86); border:1px solid var(--sc-glass-line); border-radius:999px; padding:8px 18px;\n    font-family:var(--font-display); font-weight:800; font-size:13px; color:#fff; box-shadow:var(--shadow-panel); }\n  #fin-legend .lg{ display:flex; align-items:center; gap:5px; white-space:nowrap; }\n  #fin-legend .lg.ttl{ color:var(--sc-yellow,#f5c518); font-weight:900; }\n  #fin-arena{ position:absolute; inset:0; pointer-events:none; }\n  /* Each pane is absolutely positioned to its own half (versus) or full width (co-op). */\n  .fin-pane{ position:absolute; top:0; bottom:0; width:50%; overflow:hidden; pointer-events:auto;\n    background:radial-gradient(circle at 50% 40%, #0c2233 0%, #05101c 82%); }\n  .fin-pane.left{ left:0; border-right:2px solid rgba(255,255,255,.16); }\n  .fin-pane.right{ right:0; border-left:2px solid rgba(255,255,255,.16); }\n  .fin-pane.solo{ left:0; width:100%; border:none; }\n  .fin-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair; }\n  .fin-cursor{ position:absolute; width:38px; height:38px; margin:-19px 0 0 -19px; z-index:4; pointer-events:none;\n    border:3px solid #fff; border-radius:50%; box-shadow:0 0 12px rgba(255,255,255,.8), inset 0 0 8px rgba(255,255,255,.5); display:none; }\n  .fin-cursor::before, .fin-cursor::after{ content:''; position:absolute; background:#fff; }\n  .fin-cursor::before{ left:50%; top:-9px; width:2px; height:56px; margin-left:-1px; }\n  .fin-cursor::after{ top:50%; left:-9px; height:2px; width:56px; margin-top:-1px; }\n  .fin-pane-hud{ position:absolute; top:70px; left:0; right:0; z-index:3; pointer-events:none;\n    display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:6px 10px;\n    font-family:var(--font-display); font-weight:800; font-size:13px; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.75); }\n  .fin-pane-name{ font-weight:900; font-size:15px; }\n  .fin-pane-hud b{ color:#eaf7ff; }\n  .fin-pane-hud b.low{ color:#ff6b6b; }\n  /* Out-of-power banner + power-run controls inside a pane */\n  .fin-power-msg{ position:absolute; top:44%; left:0; right:0; z-index:5; pointer-events:none; text-align:center;\n    font-family:var(--font-display); font-weight:900; font-size:16px; color:#ffd166; text-shadow:0 2px 10px #000;\n    padding:0 12px; display:none; }\n  .fin-btns{ position:absolute; top:104px; left:0; right:0; z-index:6; display:flex; gap:8px; justify-content:center; pointer-events:none; }\n  .fin-btns button{ pointer-events:auto; border:none; border-radius:10px; padding:8px 14px; font-family:var(--font-display);\n    font-weight:800; font-size:13px; cursor:pointer; box-shadow:var(--shadow-btn); }\n  .fin-btn-power{ background:linear-gradient(180deg,#ffd85c,#f5b301); color:#3a2a00; }\n  .fin-btn-scope{ background:linear-gradient(180deg,var(--sc-cyan,#66ccff),#2aa9e0); color:#05202e; display:none; }\n\n  /* ---- Winner / team-win fullscreen ---- */\n  #win-overlay{ display:none; position:fixed; inset:0; z-index:60; background:radial-gradient(circle at 50% 35%, rgba(10,25,45,.96), rgba(3,7,14,.99)); }\n  #win-overlay.active{ display:flex; align-items:center; justify-content:center; }\n  #win-confetti{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }\n  #win-inner{ position:relative; text-align:center; padding:20px; animation:winPop .6s cubic-bezier(.2,1.4,.4,1) both; }\n  @keyframes winPop{ 0%{ transform:scale(.5); opacity:0 } 100%{ transform:scale(1); opacity:1 } }\n  #win-emoji{ font-size:88px; line-height:1; filter:drop-shadow(0 6px 18px rgba(0,0,0,.5)); animation:winBob 1.8s ease-in-out infinite; }\n  @keyframes winBob{ 0%,100%{ transform:translateY(0) rotate(-4deg) } 50%{ transform:translateY(-14px) rotate(4deg) } }\n  #win-title{ font-family:var(--font-display); font-weight:900; font-size:64px; letter-spacing:.02em; margin:6px 0 4px; text-transform:uppercase;\n    background:linear-gradient(90deg,#ff3b3b,#ff9e00,#ffe600,#3fd07a,#3aa0ff,#b45cff,#ff3b3b); background-size:300% 100%;\n    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;\n    animation:rainbowSlide 3s linear infinite; text-shadow:0 2px 30px rgba(255,255,255,.15); }\n  @keyframes rainbowSlide{ 0%{ background-position:0% 50% } 100%{ background-position:300% 50% } }\n  #win-sub{ font-family:var(--font-display); font-weight:800; font-size:20px; color:#e6f0ff; margin-bottom:22px; text-shadow:0 2px 8px rgba(0,0,0,.5); }\n  #win-actions{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }\n  #win-actions button{ font-size:18px; padding:14px 22px; }\n  #stats-modal .sp-block{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:12px 14px; margin-bottom:10px; text-align:left; }\n  #stats-modal .sp-name{ font-family:var(--font-display); font-weight:800; font-size:16px; margin-bottom:4px; }\n  #stats-modal .sp-fb{ font-size:13px; color:var(--sc-text-muted); line-height:1.5; }\n  #stats-modal .sp-topics{ font-size:12px; color:#ffb4a8; margin-top:5px; }\n  /* Interactive wrong-question review cards on the results page */\n  .rev-card{ margin-top:8px; border-radius:10px; overflow:hidden; border:1px solid rgba(255,90,90,.35);\n    background:rgba(255,90,90,.08); cursor:pointer; transition:border-color .2s, box-shadow .2s, transform .2s; }\n  .rev-card:hover, .rev-card.open{ border-color:rgba(255,120,110,.8); box-shadow:0 0 16px rgba(232,73,63,.3); transform:translateY(-1px); }\n  .rev-head{ display:flex; align-items:center; gap:8px; padding:9px 12px; font-family:var(--font-display); font-weight:800; font-size:13px; }\n  .rev-head .rev-topic{ background:rgba(232,73,63,.25); color:#ffd3cc; padding:2px 8px; border-radius:999px; font-size:11px; }\n  .rev-head .rev-chev{ margin-left:auto; transition:transform .3s ease; color:#ffb4a8; font-size:12px; }\n  .rev-card.open .rev-chev{ transform:rotate(180deg); }\n  .rev-head .rev-q{ flex:1; color:#fff; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n  .rev-body{ max-height:0; opacity:0; transition:max-height .4s ease, opacity .35s ease, padding .3s ease; padding:0 12px; }\n  .rev-card.open .rev-body{ max-height:340px; opacity:1; padding:0 12px 12px; }\n  .rev-full{ font-size:13px; color:#eaf2fb; line-height:1.5; margin:2px 0 10px; }\n  .rev-opt{ display:flex; align-items:flex-start; gap:8px; font-size:13px; padding:8px 10px; border-radius:8px; margin-top:6px;\n    opacity:0; transform:translateY(6px); transition:opacity .35s ease, transform .35s ease; }\n  .rev-card.open .rev-opt{ opacity:1; transform:none; }\n  .rev-card.open .rev-opt.correct{ transition-delay:.12s; }\n  .rev-opt.wrong{ background:rgba(232,73,63,.16); border:1px solid rgba(232,73,63,.4); color:#ffc9c2; }\n  .rev-opt.correct{ background:rgba(63,208,122,.16); border:1px solid rgba(63,208,122,.45); color:#c4f3d6; }\n  .rev-opt .rev-ic{ font-size:14px; }\n  @media (max-width:768px){ #win-title{ font-size:40px } #win-emoji{ font-size:60px } }\n  .fin-stat{ background:rgba(6,16,28,.75); border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:8px 16px;\n    font-weight:800; font-size:15px; color:#fff; }\n  .fin-stat small{ display:block; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--sc-text-muted,#9fb0c0); font-weight:700; }\n\n  /* ---- Leaderboard ---- */\n  .lb-table{ width:100%; border-collapse:collapse; margin-top:12px; }\n  .lb-table th{ text-align:left; font-family:var(--font-display); font-size:11px; letter-spacing:.06em; text-transform:uppercase;\n    color:var(--sc-text-muted,#9fb0c0); padding:8px 10px; border-bottom:1px solid var(--sc-glass-line,rgba(255,255,255,.1)); }\n  .lb-table td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.06); font-size:14px; }\n  .lb-rank{ font-family:var(--font-display); font-weight:900; font-size:16px; width:44px; }\n  .lb-rank.gold{ color:#ffd400; } .lb-rank.silver{ color:#cfd8e3; } .lb-rank.bronze{ color:#e0965a; }\n  .lb-win{ font-weight:800; color:var(--sc-green-bright,#3fc35f); }\n  .lb-time{ font-variant-numeric:tabular-nums; font-weight:800; color:var(--sc-cyan,#66ccff); }\n  .lb-empty{ text-align:center; color:var(--sc-text-muted,#9fb0c0); padding:26px 0; font-size:14px; }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n    \n\n    <div id=\"canvas-container\"><\u002Fdiv>\n    <div id=\"message-box\">Message goes here<\u002Fdiv>\n\n    <div id=\"ui-layer\">\n        <button id=\"mute-toggle\" onclick=\"toggleMute()\" title=\"Sound on / off\" aria-label=\"Toggle sound\">🔊<\u002Fbutton>\n        <div id=\"top-left-hud\" class=\"hud\">\n            <a href=\"index.html\" style=\"display:inline-flex;align-items:center;gap:5px;font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--sc-cyan);text-decoration:none;margin-bottom:6px\">← Home<\u002Fa>\n            <h2>Science Claw<\u002Fh2>\n            <div class=\"stat-block\">\n                <p>Playtime <span id=\"playtime-display\">00:00:00<\u002Fspan><\u002Fp>\n                <p>Credits <span id=\"credit-display\">0<\u002Fspan><\u002Fp>\n                <p>Prizes Won <span id=\"prizes-display\">0<\u002Fspan><\u002Fp>\n                <p>Science Points <span id=\"score-display\">0<\u002Fspan><\u002Fp>\n                <p style=\"opacity:.6;font-size:11px\">Build <span id=\"build-tag\">claw-data-v4<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n            <button onclick=\"showTopUpMenu()\">Earn Credits<\u002Fbutton>\n            <button onclick=\"startGame()\" id=\"btn-start\" class=\"btn-blue\">Start Game (1 Credit)<\u002Fbutton>\n            <button onclick=\"openLeaderboard()\" class=\"btn-neutral\">🏆 Leaderboard<\u002Fbutton>\n            <button onclick=\"openBadges()\" class=\"btn-neutral\">🎖️ My Badges<\u002Fbutton>\n            <button onclick=\"openRecords()\" class=\"btn-neutral\">📥 Student Records<\u002Fbutton>\n            <div class=\"panel-divider\"><\u002Fdiv>\n            <button onclick=\"promptEditor()\" class=\"btn-purple\">⚙️ Question Bank Editor<\u002Fbutton>\n            <button onclick=\"promptDashboard()\" class=\"btn-purple\">📊 Teacher Dashboard<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"top-bar\">\n        <a id=\"genie-link\" href=\"Shirtpapa%20Genie.dc.html\" style=\"text-decoration:none;padding:12px 16px;border-radius:10px;background:linear-gradient(180deg,var(--sc-green-bright),var(--sc-green));color:#06210f;font-weight:800;box-shadow:var(--glow-green),var(--shadow-btn);width:157px;text-align:center;font-size:15px;\">🧞 Genie<br>(Learning Mode)<\u002Fa>\n        <button onclick=\"openVersusSetup()\" id=\"btn-versus\" class=\"btn-yellow\" style=\"width:152px;\"><span style=\"letter-spacing:0.01em;font-size:20px\">⚔️ Versus Mode<\u002Fspan><\u002Fbutton>\n        <button onclick=\"openVersusSetup(true)\" id=\"btn-coop\" class=\"btn-green\" style=\"width:152px;\"><span style=\"letter-spacing:0.01em;font-size:20px\">🤝 Co-op Mode<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n\n        <div id=\"right-stack\">\n        <div id=\"top-right-hud\" class=\"hud\">\n            <h3>Camera Views<\u002Fh3>\n            <div class=\"seg\">\n                <button class=\"cam-btn\" data-view=\"top\" onclick=\"setCamera('top')\">Top View<\u002Fbutton>\n                <button class=\"cam-btn\" data-view=\"side\" onclick=\"setCamera('side')\">Side View<\u002Fbutton>\n                <button class=\"cam-btn\" data-view=\"front\" onclick=\"setCamera('front')\">Front View<\u002Fbutton>\n            <\u002Fdiv>\n            <p class=\"cam-hint\">Use <b>W A S D<\u002Fb> or Arrow Keys to move the claw<\u002Fp>\n        <\u002Fdiv>\n\n        <div id=\"micro-quest\" class=\"hud hidden-quest\" style=\"display:none\">\n            <div class=\"hq-banner\">🌟 Hidden Quest Unlocked<\u002Fdiv>\n            <div id=\"microscope\" style=\"display:block;margin-top:6px;padding-top:0;border-top:none\">\n                <div class=\"micro-label\">🔬 Microscope · <span id=\"micro-zoom\">1000×<\u002Fspan><\u002Fdiv>\n                <div class=\"micro-lens\">\n                    <canvas id=\"micro-canvas\" width=\"150\" height=\"150\"><\u002Fcanvas>\n                <\u002Fdiv>\n                <button class=\"btn-blue\" style=\"width:100%;margin-top:10px;padding:11px;font-size:14px\" onclick=\"enterMicroscopeLab()\">🔬 Enter Microscope Lab<\u002Fbutton>\n                <p class=\"cam-hint\" style=\"margin-top:8px\">Power cost: 5 🔋 · 1 🔍 · 3 🔩 · 5 🧲. Inside, tap ⚛️ atoms (the robot's 👀 eyes) &amp; 🔲 chips (its 🧠 brain) at 1000× — the microscopic parts that bring Mr Soh's robot to life.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"collection-hud\" class=\"hud\">\n            <h3>Science Collection<\u002Fh3>\n            <div id=\"collection-list\"><\u002Fdiv>\n            <div class=\"coll-progress\"><div id=\"coll-bar\"><\u002Fdiv><\u002Fdiv>\n            <p id=\"coll-progress-label\" class=\"coll-label\">0 / 10 collected<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"bottom-hud\" class=\"hud\">\n            <span id=\"timer-display\">Time: 30s<\u002Fspan>\n            <button onclick=\"dropClaw()\" id=\"btn-drop\">Drop Claw (Space)<\u002Fbutton>\n            <button onclick=\"releaseCatch()\" id=\"btn-release\" class=\"btn-yellow\" style=\"display: none;\">Release (1 Credit)<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div id=\"vs-touch-0\" class=\"vs-touch\">\n            <div><button class=\"dpad-btn\" ontouchstart=\"keys['w']=true;event.preventDefault()\" ontouchend=\"keys['w']=false\">▲<\u002Fbutton><\u002Fdiv>\n            <div>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['a']=true;event.preventDefault()\" ontouchend=\"keys['a']=false\">◀<\u002Fbutton>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['s']=true;event.preventDefault()\" ontouchend=\"keys['s']=false\">▼<\u002Fbutton>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['d']=true;event.preventDefault()\" ontouchend=\"keys['d']=false\">▶<\u002Fbutton>\n            <\u002Fdiv>\n            <button class=\"vs-drop-btn\" onclick=\"vsAction(0)\">🕹️ Drop<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"vs-touch-1\" class=\"vs-touch\">\n            <div><button class=\"dpad-btn\" ontouchstart=\"keys['ArrowUp']=true;event.preventDefault()\" ontouchend=\"keys['ArrowUp']=false\">▲<\u002Fbutton><\u002Fdiv>\n            <div>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['ArrowLeft']=true;event.preventDefault()\" ontouchend=\"keys['ArrowLeft']=false\">◀<\u002Fbutton>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['ArrowDown']=true;event.preventDefault()\" ontouchend=\"keys['ArrowDown']=false\">▼<\u002Fbutton>\n                <button class=\"dpad-btn\" ontouchstart=\"keys['ArrowRight']=true;event.preventDefault()\" ontouchend=\"keys['ArrowRight']=false\">▶<\u002Fbutton>\n            <\u002Fdiv>\n            <button class=\"vs-drop-btn\" onclick=\"vsAction(1)\">🕹️ Drop<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div id=\"dpad-hud\" class=\"hud\">\n            <div><button class=\"dpad-btn\" onmousedown=\"keys['w']=true\" onmouseup=\"keys['w']=false\" onmouseleave=\"keys['w']=false\" ontouchstart=\"keys['w']=true\" ontouchend=\"keys['w']=false\">▲<\u002Fbutton><\u002Fdiv>\n            <div>\n                <button class=\"dpad-btn\" onmousedown=\"keys['a']=true\" onmouseup=\"keys['a']=false\" onmouseleave=\"keys['a']=false\" ontouchstart=\"keys['a']=true\" ontouchend=\"keys['a']=false\">◀<\u002Fbutton>\n                <button class=\"dpad-btn\" onmousedown=\"keys['s']=true\" onmouseup=\"keys['s']=false\" onmouseleave=\"keys['s']=false\" ontouchstart=\"keys['s']=true\" ontouchend=\"keys['s']=false\">▼<\u002Fbutton>\n                <button class=\"dpad-btn\" onmousedown=\"keys['d']=true\" onmouseup=\"keys['d']=false\" onmouseleave=\"keys['d']=false\" ontouchstart=\"keys['d']=true\" ontouchend=\"keys['d']=false\">▶<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ============ VERSUS SPLIT OVERLAY ============ -->\n        <div id=\"versus-overlay\">\n            <div id=\"vs-turn-banner\">Player 1's turn<\u002Fdiv>\n            <div class=\"vs-side left\" id=\"vs-side-0\">\n                <div class=\"vs-card\">\n                    <div class=\"vs-name\"><span class=\"vs-swatch\" id=\"vs-swatch-0\"><\u002Fspan> <span id=\"vs-name-0\">Player 1<\u002Fspan> <span class=\"vs-turn-badge\" id=\"vs-badge-0\" style=\"display:none\">Your turn<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-ctrl-hint\" style=\"font-size:11px;color:var(--sc-text-muted);margin:2px 0 6px\">WASD + Space<\u002Fdiv>\n                    <div class=\"vs-credits\">💳 Credits: <span id=\"vs-credits-0\">0<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-score\">🔬 Science Points: <span id=\"vs-points-0\">0<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-score\" style=\"font-size:12px\">✏️ Questions: <span id=\"vs-qstat-0\">0 / 0 correct<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-coll\" id=\"vs-coll-0\"><\u002Fdiv>\n                    <div class=\"vs-bar-wrap\"><div class=\"vs-bar\" id=\"vs-progbar-0\"><\u002Fdiv><\u002Fdiv>\n                    <div class=\"vs-quiz\" id=\"vs-quiz-0\" style=\"display:none\"><\u002Fdiv>\n                <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"vs-side right\" id=\"vs-side-1\">\n                <div class=\"vs-card\">\n                    <div class=\"vs-name\"><span class=\"vs-swatch\" id=\"vs-swatch-1\"><\u002Fspan> <span id=\"vs-name-1\">Player 2<\u002Fspan> <span class=\"vs-turn-badge\" id=\"vs-badge-1\" style=\"display:none\">Your turn<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-ctrl-hint\" style=\"font-size:11px;color:var(--sc-text-muted);margin:2px 0 6px\">Arrow keys + Enter<\u002Fdiv>\n                    <div class=\"vs-credits\">💳 Credits: <span id=\"vs-credits-1\">0<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-score\">🔬 Science Points: <span id=\"vs-points-1\">0<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-score\" style=\"font-size:12px\">✏️ Questions: <span id=\"vs-qstat-1\">0 / 0 correct<\u002Fspan><\u002Fdiv>\n                    <div class=\"vs-coll\" id=\"vs-coll-1\"><\u002Fdiv>\n                    <div class=\"vs-bar-wrap\"><div class=\"vs-bar\" id=\"vs-progbar-1\"><\u002Fdiv><\u002Fdiv>\n                    <div class=\"vs-quiz\" id=\"vs-quiz-1\" style=\"display:none\"><\u002Fdiv>\n                <\u002Fdiv>\n                <button class=\"vs-exit\" onclick=\"exitVersus()\" style=\"position:absolute;left:-76px;top:740px;width:137px;height:65px;font-size:20px\">Exit Versus<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ============ VERSUS FINALE (microscope shootout) ============ -->\n        <div id=\"vs-finale\">\n            <div id=\"fin-legend\">\n                <span class=\"lg ttl\">🔬 Microscope Shootout<\u002Fspan>\n                <span class=\"lg\">🎯 Each shot uses 5 🔋<\u002Fspan>\n                <span class=\"lg\">⚛️ Atom +15<\u002Fspan>\n                <span class=\"lg\">🔲 Chip +8<\u002Fspan>\n                <span class=\"lg\">🦠 Germ −30<\u002Fspan>\n                <span class=\"lg\">👾 Virus −20<\u002Fspan>\n                <span class=\"lg\">🔋 0? Get Power in the claw<\u002Fspan>\n            <\u002Fdiv>\n            <div id=\"fin-arena\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ============ WINNER / TEAM-WIN FULLSCREEN ============ -->\n        <div id=\"win-overlay\">\n            <canvas id=\"win-confetti\"><\u002Fcanvas>\n            <div id=\"win-inner\">\n                <div id=\"win-emoji\">🏆<\u002Fdiv>\n                <div id=\"win-title\">PLAYER WINS!<\u002Fdiv>\n                <div id=\"win-sub\"><\u002Fdiv>\n                <div id=\"win-actions\">\n                    <button class=\"btn-green\" id=\"win-results-btn\" onclick=\"openVsStats()\">📊 See Results &amp; Feedback<\u002Fbutton>\n                    <button class=\"btn-blue\" onclick=\"exitVersus()\">🎮 Back to Claw Machine<\u002Fbutton>\n                <\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ============ END-OF-GAME STATS ============ -->\n        <div id=\"stats-modal\" class=\"modal\" style=\"max-width:640px\">\n            <h2 id=\"stats-title\">📊 Game Results<\u002Fh2>\n            <div style=\"display:flex;gap:20px;flex-wrap:wrap;align-items:center;justify-content:center;margin:6px 0 10px\">\n                <canvas id=\"stats-pie\" width=\"200\" height=\"200\"><\u002Fcanvas>\n                <div id=\"stats-legend\" style=\"min-width:180px\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div id=\"stats-players\"><\u002Fdiv>\n            <div class=\"rec-actions\" style=\"margin-top:12px\">\n                <button class=\"btn-green\" onclick=\"downloadVsFeedback()\">📄 Download Feedback (PDF)<\u002Fbutton>\n                <button class=\"btn-purple\" onclick=\"exportVsToTeacher()\">📤 Send Errors to Teacher<\u002Fbutton>\n                <button class=\"btn-blue\" onclick=\"closeStatsBackToClaw()\">🎮 Back to Claw Machine<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"versus-modal\" class=\"modal\">\n        <h2 id=\"vs-modal-title\">⚔️ Versus Mode<\u002Fh2>\n        <p id=\"vs-modal-desc\" style=\"color:var(--sc-text-muted);margin-bottom:4px\">Two players race at the <b>same time<\u002Fb> on a shared claw machine — no turns! Left player uses <b>WASD + Space<\u002Fb>, right player uses <b>Arrow keys + Enter<\u002Fb>. First to complete their Science Collection races into the Microscope Shootout — fastest to blast <b>10 atoms + 20 chips<\u002Fb> wins!<\u002Fp>\n        <div class=\"form-group\" style=\"margin-top:14px\">\n            <label>🔵 Player 1 name (left · WASD + Space)<\u002Flabel>\n            <input type=\"text\" id=\"vs-input-0\" placeholder=\"e.g. Amir\" maxlength=\"16\" autocomplete=\"off\">\n            <div id=\"vs-color-0\" class=\"vs-color-row\" style=\"display:flex;gap:8px;margin-top:8px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-group\">\n            <label>🟣 Player 2 name (right · Arrows + Enter)<\u002Flabel>\n            <input type=\"text\" id=\"vs-input-1\" placeholder=\"e.g. Bella\" maxlength=\"16\" autocomplete=\"off\">\n            <div id=\"vs-color-1\" class=\"vs-color-row\" style=\"display:flex;gap:8px;margin-top:8px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"vs-topics\" style=\"margin-top:6px\"><\u002Fdiv>\n        <div class=\"rec-actions\" style=\"margin-top:8px\">\n            <button class=\"btn-blue\" id=\"vs-start-btn\" onclick=\"startVersus()\">Start Match ⚔️<\u002Fbutton>\n            <button class=\"btn-neutral\" onclick=\"document.getElementById('versus-modal').classList.remove('active')\">Cancel<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Leaderboard Modal -->\n    <div id=\"leaderboard-modal\" class=\"modal\">\n        <h2>🏆 Versus Leaderboard<\u002Fh2>\n        <p style=\"color:var(--sc-text-muted)\">Fastest Microscope Shootout finishes. Complete a Versus match to make the board!<\u002Fp>\n        <div id=\"leaderboard-body\"><\u002Fdiv>\n        <div class=\"rec-actions\" style=\"margin-top:10px\">\n            <button class=\"btn-neutral\" onclick=\"clearLeaderboard()\">Clear board<\u002Fbutton>\n            <button class=\"btn-blue\" onclick=\"document.getElementById('leaderboard-modal').classList.remove('active')\">Close<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"password-modal\" class=\"modal\">\n        <h2>Enter Password<\u002Fh2>\n        <p>This area is restricted to teachers/admins.<\u002Fp>\n        <input type=\"password\" id=\"editor-password\" placeholder=\"Enter password...\" onkeydown=\"if(event.key==='Enter'){event.preventDefault();verifyPassword();}\">\n        <br><br>\n        <button onclick=\"verifyPassword()\">Unlock Editor<\u002Fbutton>\n        <button onclick=\"closeModals()\" class=\"btn-danger\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- ROBOT BUILD — full collection surprise -->\n    <div id=\"robot-modal\" class=\"modal robot-modal\">\n        <div class=\"robot-stage\">\n            <div class=\"robot\" id=\"robot-build\">\n                <div class=\"r-antenna\"><span>📡<\u002Fspan><\u002Fdiv>\n                <div class=\"r-head\"><span class=\"r-eye\">⚛️<\u002Fspan><span class=\"r-eye\">⚛️<\u002Fspan><\u002Fdiv>\n                <div class=\"r-neck\">🔩<\u002Fdiv>\n                <div class=\"r-torso\">\n                    <span class=\"r-arm r-arm-l\">🧲<\u002Fspan>\n                    <span class=\"r-core\">🔍<\u002Fspan>\n                    <span class=\"r-chip\">🔲<\u002Fspan>\n                    <span class=\"r-batt\">🔋<\u002Fspan>\n                    <span class=\"r-arm r-arm-r\">🧲<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"r-legs\"><span>🔩<\u002Fspan><span>🛞<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n        <h2 style=\"color:var(--sc-green-bright);margin-top:6px\">🤖 You built a Science Robot!<\u002Fh2>\n        <p style=\"font-size:18px;color:var(--sc-yellow);font-weight:800;margin:4px 0 2px\">Mr Soh is impressed!<\u002Fp>\n        <p class=\"modal-sub\" style=\"margin:8px auto 16px\">You grabbed every science part — battery, wheels, magnet, atom, lens, titanium and the CPU chip — and assembled them into a working robot. Legendary collecting! 🎉<\u002Fp>\n        <button class=\"btn-green\" onclick=\"closeRobotModal()\">🎉 Awesome!<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Question Bank Editor Modal -->\n    <div id=\"editor-modal\" class=\"modal\">\n        <h2 style=\"text-align: center;\">Question Bank Editor<\u002Fh2>\n        <div id=\"tag-legend\" style=\"text-align:left;background:var(--sc-ink-900,#0c1626);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 14px;margin:10px 0 14px\"><\u002Fdiv>\n        <div class=\"editor-table-wrapper\">\n            <table id=\"editor-table\">\n                <thead><tr><th>Type<\u002Fth><th>Topic<\u002Fth><th>Skill tag<\u002Fth><th>Question<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead>\n                <tbody id=\"editor-table-body\"><\u002Ftbody>\n            <\u002Ftable>\n        <\u002Fdiv>\n        <div style=\"text-align: center; margin-bottom: 15px;\">\n            <button onclick=\"openQuestionForm(null)\">+ Add New Question<\u002Fbutton>\n            <button onclick=\"openTwinReview()\" class=\"btn-blue\">🔁 Review Twin Questions<\u002Fbutton>\n            <button onclick=\"exportContentPack()\" class=\"btn-green\">⬇️ Export Content Pack<\u002Fbutton>\n            <button onclick=\"document.getElementById('pack-file').click()\" class=\"btn-neutral\">⬆️ Import Content Pack<\u002Fbutton>\n            <input type=\"file\" id=\"pack-file\" accept=\"application/json,.json\" style=\"display:none\" onchange=\"importContentPack(this)\">\n            <button onclick=\"exportCopyrightFree()\" class=\"btn-neutral\" title=\"Approved twin questions are original rephrasings — free to reuse\">©️❌ Copyright-Free Questions<\u002Fbutton>\n            <button onclick=\"restoreDefaultBank()\" class=\"btn-danger\">⚠️ Restore Default Questions<\u002Fbutton>\n            <button onclick=\"closeModals()\" class=\"btn-neutral\">Close Editor<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- TWIN REVIEW PANEL -->\n        <div id=\"twin-review-area\" style=\"display:none;text-align:left;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px\">\n                <h3 style=\"margin:0\">🔁 Twin Review — approve a rephrased version of each question<\u002Fh3>\n                <button onclick=\"closeTwinReview()\" class=\"btn-neutral\" style=\"margin-left:auto\">← Back to list<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:var(--sc-text-muted,#9fb0c3);line-height:1.55;margin-bottom:12px\">\n                The twin retests the <b>same concept<\u002Fb> in a new sentence structure so students <b>apply<\u002Fb> understanding, not memorise wording. Science keywords stay intact. <b>Generate<\u002Fb> a draft (needs internet), edit it, then <b>Approve<\u002Fb> — approved twins are used offline during play. <span style=\"color:var(--sc-blue-bright)\">💡 Double-click any card to Focus Mode (original + twin only).<\u002Fspan>\n                <div style=\"margin-top:6px\"><button onclick=\"generateAllTwins()\" class=\"btn-blue\" id=\"gen-all-btn\">✨ Generate drafts for all un-approved<\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n            <div id=\"twin-review-list\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"editor-form-area\" class=\"editor-form\" style=\"display: none;\">\n            <h3 id=\"form-title\">Add/Edit Question<\u002Fh3>\n            <input type=\"hidden\" id=\"edit-id\">\n            \n            <div class=\"form-group\">\n                <label>Topic:<\u002Flabel>\n                <select id=\"edit-topic\">\n                    <option value=\"p3_diversity\">P3 Diversity<\u002Foption>\n                    <option value=\"p3_interactions\">P3 Interactions (Magnets)<\u002Foption>\n                    <option value=\"p4_cycles\">P4 Cycles (Matter, Life Cycles)<\u002Foption>\n                    <option value=\"p4_energy\">P4 Energy (Light, Heat)<\u002Foption>\n                    <option value=\"p5_systems\">P5 Systems (Plant/Human, Cells, Electrical)<\u002Foption>\n                    <option value=\"p5_cycles\">P5 Cycles (Water, Reproduction)<\u002Foption>\n                    <option value=\"p6_interactions\">P6 Interactions (Forces, Environment)<\u002Foption>\n                    <option value=\"p6_energy\">P6 Energy (Forms, Conversions)<\u002Foption>\n                    <option value=\"variables\">Variables, Data &amp; Statistics<\u002Foption>\n                <\u002Fselect>\n            <\u002Fdiv>\n\n            <div class=\"form-group\">\n                <label>Question Type:<\u002Flabel>\n                <select id=\"edit-type\" onchange=\"toggleFormFields()\">\n                    <option value=\"match\">Match (4-Part Analysis)<\u002Foption>\n                    <option value=\"mcq\">Multiple Choice (MCQ)<\u002Foption>\n                    <option value=\"fitb\">Fill in the Blanks (FITB)<\u002Foption>\n                <\u002Fselect>\n            <\u002Fdiv>\n\n            <div class=\"form-group\">\n                <label>Question Text (HTML allowed for Tables):<\u002Flabel>\n                <input type=\"text\" id=\"edit-q\" placeholder=\"Enter the question...\">\n            <\u002Fdiv>\n\n            <!-- MATCH Fields -->\n            <div id=\"form-match\" style=\"display:none;\">\n                <div class=\"form-group\">\n                    <label>Analysis Template:<\u002Flabel>\n                    <select id=\"edit-template\">\n                        <option value=\"CECL\">CECL (Claim, Evidence, Concept, Link)<\u002Foption>\n                        <option value=\"EXP\">EXP (Objective, Condition, Scientific Concept, Reasoning)<\u002Foption>\n                        <option value=\"SYS\">SYS (System, Part, Function, Importance)<\u002Foption>\n                        <option value=\"MAT\">MAT (Material, Property, Scientific Concept, Application)<\u002Foption>\n                        <option value=\"CYCLE\">CYCLE (State/Stage, Process, Condition, Result)<\u002Foption>\n                    <\u002Fselect>\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Correct Answer (4 parts separated by | ):<\u002Flabel>\n                    <input type=\"text\" id=\"edit-match-correct\" placeholder=\"Part 1 | Part 2 | Part 3 | Part 4\">\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Distractor 1 (4 parts separated by | ):<\u002Flabel>\n                    <input type=\"text\" id=\"edit-match-d1\" placeholder=\"Part 1 | Part 2 | Part 3 | Part 4\">\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Distractor 2 (4 parts separated by | ):<\u002Flabel>\n                    <input type=\"text\" id=\"edit-match-d2\" placeholder=\"Part 1 | Part 2 | Part 3 | Part 4\">\n                <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- MCQ Fields -->\n            <div id=\"form-mcq\" style=\"display:none;\">\n                <div class=\"form-group\">\n                    <label>Correct Answer:<\u002Flabel>\n                    <input type=\"text\" id=\"edit-mcq-correct\" placeholder=\"Correct option...\">\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Distractor 1:<\u002Flabel>\n                    <input type=\"text\" id=\"edit-mcq-d1\" placeholder=\"Wrong option 1...\">\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Distractor 2:<\u002Flabel>\n                    <input type=\"text\" id=\"edit-mcq-d2\" placeholder=\"Wrong option 2...\">\n                <\u002Fdiv>\n                <div class=\"form-group\">\n                    <label>Distractor 3:<\u002Flabel>\n                    <input type=\"text\" id=\"edit-mcq-d3\" placeholder=\"Wrong option 3...\">\n                <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- FITB Fields -->\n            <div id=\"form-fitb\" style=\"display:none;\">\n                <div class=\"form-group\">\n                    <label>Sentence with Blanks (Use _[keyword]_ to create a blank box):<\u002Flabel>\n                    <input type=\"text\" id=\"edit-fitb-text\" placeholder=\"A seed requires _[water]_, _[oxygen]_ and _[warmth]_ to germinate.\">\n                <\u002Fdiv>\n            <\u002Fdiv>\n\n            <button onclick=\"saveQuestion()\" class=\"btn-blue\">Save Question<\u002Fbutton>\n            <button onclick=\"document.getElementById('editor-form-area').style.display='none';\" class=\"btn-neutral\">Cancel<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Top Up Menu Modal -->\n    <div id=\"topup-modal\" class=\"modal\">\n        <h2>Select Top-Up Tier<\u002Fh2>\n        <div class=\"topic-selector\">\n            <div class=\"level-group\">\n                <h3>Primary 3<\u002Fh3>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p3_diversity\" checked=\"\"> Diversity (Materials, Living/Non-living, Fungi/Bacteria)<\u002Flabel>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p3_interactions\" checked=\"\"> Interactions (Magnets and characteristics)<\u002Flabel>\n            <\u002Fdiv>\n            <div class=\"level-group\">\n                <h3>Primary 4<\u002Fh3>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p4_cycles\" checked=\"\"> Cycles (Matter, Life Cycles of Plants/Animals)<\u002Flabel>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p4_energy\" checked=\"\"> Energy (Light, Shadows, Heat, Temperature)<\u002Flabel>\n            <\u002Fdiv>\n            <div class=\"level-group\">\n                <h3>Primary 5<\u002Fh3>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p5_systems\" checked=\"\"> Systems (Cells, Human/Plant Systems, Circuits)<\u002Flabel>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p5_cycles\" checked=\"\"> Cycles (Water Cycle, Human/Plant Reproduction)<\u002Flabel>\n            <\u002Fdiv>\n            <div class=\"level-group\">\n                <h3>Primary 6<\u002Fh3>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p6_interactions\" checked=\"\"> Interactions (Forces, Food Webs, Adaptations, Environment)<\u002Flabel>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"p6_energy\" checked=\"\"> Energy (Forms of Energy, Energy Conversion)<\u002Flabel>\n            <\u002Fdiv>\n            <div class=\"level-group\" style=\"border-bottom: none;\">\n                <h3>Scientific Processing Skills<\u002Fh3>\n                <label><input type=\"checkbox\" class=\"topic-cb\" value=\"variables\" checked=\"\"> Variables, Data Analysis &amp; Statistics (Fair Tests, Graphs)<\u002Flabel>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p>Answer questions correctly to earn credits!<\u002Fp>\n        <button onclick=\"startQuiz(1, 1)\">1 Question = 1 Credit<\u002Fbutton>\n        <button onclick=\"startQuiz(5, 5)\">5 Questions = 5 Credits<\u002Fbutton>\n        <button onclick=\"startQuiz(10, 12)\">10 Questions = 12 Credits (2 Bonus!)<\u002Fbutton>\n        <button onclick=\"startQuiz(20, 25)\">20 Questions = 25 Credits (5 Bonus!)<\u002Fbutton>\n        <button onclick=\"startQuiz(28, 35)\" class=\"btn-purple\">28 Questions = 35 Credits (PSLE Booklet A)<\u002Fbutton><br>\n        <button onclick=\"closeModals()\" class=\"btn-danger\" style=\"margin-top: 20px;\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Quiz Modal -->\n    <div id=\"quiz-modal\" class=\"modal\">\n        <h2>Science Knowledge Analysis<\u002Fh2>\n        <p id=\"quiz-progress\">Question 1 of 5<\u002Fp>\n        <p id=\"quiz-timer\" style=\"color:var(--sc-yellow);font-weight:800;margin-top:-6px\">⏱️ 60s<\u002Fp>\n        <button id=\"quiz-mode-toggle\" onclick=\"toggleQuizMode()\" class=\"btn-neutral\" style=\"padding:5px 12px;font-size:12px;margin:-2px auto 10px;display:block\">⏱️ Timed mode — tap for 🧘 Practice<\u002Fbutton>\n        <h3 id=\"question-text\" style=\"margin-bottom: 20px;\">Question goes here?<\u002Fh3>\n        \n        <!-- MATCH UI -->\n        <div id=\"ui-match\" style=\"display:none;\">\n            <p style=\"text-align:center; color:var(--sc-text-muted); font-size:14px; margin:0 0 14px;\">Tap an option to place it in its row — or drag it. Tap a placed option to remove it.<\u002Fp>\n            <div class=\"answer-section\">\n                <div class=\"cecl-row\"><label id=\"lbl-0\">Label 1:<\u002Flabel><div class=\"drop-zone\" id=\"ans-0\" data-type=\"0\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><\u002Fdiv><\u002Fdiv>\n                <div class=\"cecl-row\"><label id=\"lbl-1\">Label 2:<\u002Flabel><div class=\"drop-zone\" id=\"ans-1\" data-type=\"1\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><\u002Fdiv><\u002Fdiv>\n                <div class=\"cecl-row\"><label id=\"lbl-2\">Label 3:<\u002Flabel><div class=\"drop-zone\" id=\"ans-2\" data-type=\"2\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><\u002Fdiv><\u002Fdiv>\n                <div class=\"cecl-row\"><label id=\"lbl-3\">Label 4:<\u002Flabel><div class=\"drop-zone\" id=\"ans-3\" data-type=\"3\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"pool-container\">\n                <div class=\"pool-col\" id=\"pool-0\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><h4 id=\"pool-title-0\">Table 1<\u002Fh4><\u002Fdiv>\n                <div class=\"pool-col\" id=\"pool-1\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><h4 id=\"pool-title-1\">Table 2<\u002Fh4><\u002Fdiv>\n                <div class=\"pool-col\" id=\"pool-2\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><h4 id=\"pool-title-2\">Table 3<\u002Fh4><\u002Fdiv>\n                <div class=\"pool-col\" id=\"pool-3\" ondrop=\"drop(event)\" ondragover=\"allowDrop(event)\"><h4 id=\"pool-title-3\">Table 4<\u002Fh4><\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- MCQ UI -->\n        <div id=\"ui-mcq\" style=\"display:none;\" class=\"mcq-container\"><\u002Fdiv>\n\n        <!-- FITB UI -->\n        <div id=\"ui-fitb\" style=\"display:none;\" class=\"fitb-container\"><\u002Fdiv>\n\n        <!-- Answer Reveal / Proceed Logic -->\n        <div id=\"hint-box\" style=\"display:none;margin-top:14px;padding:14px 16px;border-radius:12px;background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.4);color:var(--sc-text,#dce6f0);text-align:left;font-size:15px;line-height:1.5\"><\u002Fdiv>\n        <div id=\"answer-reveal\"><\u002Fdiv>\n        <div style=\"display:flex; justify-content:center; gap: 10px; margin-top: 20px;\">\n            <button id=\"btn-submit\" onclick=\"submitAnswer()\" style=\"width: 200px; padding: 15px; font-size: 18px;\">Submit Answer<\u002Fbutton>\n            <button id=\"btn-hint\" onclick=\"showHint()\" class=\"btn-yellow\" style=\"width: 150px; padding: 15px; font-size: 16px;\">💡 Hint<\u002Fbutton>\n            <button id=\"btn-next-q\" onclick=\"forceNextQuestion()\" class=\"btn-blue\" style=\"display:none; width: 200px; padding: 15px; font-size: 18px;\">Next Question ➔<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:center; margin-top: 12px;\">\n            <button id=\"btn-quit-quiz\" onclick=\"quitQuiz()\" class=\"btn-danger\" style=\"padding: 10px 18px; font-size: 14px;\">Quit &amp; Keep Credits (no bonus)<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MICROSCOPE LAB (full-screen map) -->\n    <div id=\"micro-lab\">\n        <button id=\"lab-exit\" class=\"btn-neutral\" onclick=\"exitMicroscopeLab()\">✕ Exit Lab<\u002Fbutton>\n        <div id=\"lab-top\">\n            <div class=\"lab-stat\" style=\"color:var(--sc-cyan)\">⚛️ Atoms <b id=\"lab-atoms\">0<\u002Fb> / <span id=\"lab-atoms-goal\">10<\u002Fspan><\u002Fdiv>\n            <div class=\"lab-stat\" style=\"color:#2dd4bf\">🔲 Chips <b id=\"lab-chips\">0<\u002Fb> / <span id=\"lab-chips-goal\">20<\u002Fspan><\u002Fdiv>\n            <div class=\"lab-stat\" style=\"color:var(--sc-green)\">🔬 Points <b id=\"lab-points\">0<\u002Fb><\u002Fdiv>\n            <div class=\"lab-stat\" style=\"color:var(--sc-yellow)\">Level <b id=\"lab-level\">1<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"lab-lens-wrap\"><canvas id=\"lab-canvas\" width=\"600\" height=\"600\"><\u002Fcanvas><\u002Fdiv>\n        <p class=\"lab-hint\">Move the crosshair with <b>WASD<\u002Fb> or <b>Arrow keys<\u002Fb> · <b>Space<\u002Fb> or <b>Enter<\u002Fb> to shoot (you can also click/tap). Grab ⚛️ atoms &amp; 🔲 microchips (every shot costs <b>5 pts<\u002Fb>). Avoid 🦠 germs (<b>−50<\u002Fb>) and 🧬 viruses (<b>−20<\u002Fb>)!<\u002Fp>\n    <\u002Fdiv>\n    <button id=\"lab-return-btn\" onclick=\"resumeMicroscopeLab()\">🔬 Return to Microscope<\u002Fbutton>\n\n    <!-- ACHIEVEMENT MEDAL POP -->\n    <div id=\"medal-pop\" onclick=\"this.classList.remove('active')\">\n        <div class=\"medal-inner\">\n            <div class=\"medal-disc\" id=\"medal-emoji\">🔬<\u002Fdiv>\n            <div class=\"medal-kicker\">Achievement Unlocked<\u002Fdiv>\n            <div class=\"medal-title\" id=\"medal-name\">Microscope Unlocked<\u002Fdiv>\n            <button class=\"btn-green\" onclick=\"event.stopPropagation();document.getElementById('medal-pop').classList.remove('active')\">Awesome!<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Badges / Achievements Modal -->\n    <div id=\"badges-modal\" class=\"modal\">\n        <h2>🎖️ My Badges<\u002Fh2>\n        <p class=\"modal-sub\">Earn badges as you learn. Keep playing to unlock them all!<\u002Fp>\n        <div id=\"badges-body\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0;text-align:left\"><\u002Fdiv>\n        <div class=\"rec-actions\"><button class=\"btn-blue\" onclick=\"document.getElementById('badges-modal').classList.remove('active')\">Close<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Student Records Modal -->\n    <div id=\"records-modal\" class=\"modal\">\n        <h2>Student Records<\u002Fh2>\n        <p class=\"modal-sub\">Your progress auto-saves on this device and resumes when you reopen the game. Save a file to keep your own copy or carry it to another computer.<\u002Fp>\n        <div class=\"rec-fields\">\n            <div><label>Your Name<\u002Flabel><input type=\"text\" id=\"rec-name\" placeholder=\"e.g. Mei Ling\" oninput=\"studentName=this.value; autoSaveSession();\"><\u002Fdiv>\n            <div><label>Class<\u002Flabel><input type=\"text\" id=\"rec-class\" placeholder=\"e.g. P5 Diligence\" oninput=\"studentClass=this.value; autoSaveSession();\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rec-stats\" id=\"rec-stats\"><\u002Fdiv>\n        <div class=\"rec-actions\">\n            <button class=\"btn-blue\" onclick=\"downloadRecordFile()\">💾 Save to File<\u002Fbutton>\n            <button class=\"btn-neutral\" onclick=\"document.getElementById('rec-file').click()\">📂 Load from File<\u002Fbutton>\n            <button class=\"btn-neutral\" onclick=\"saveGameReport()\">📄 Text Report<\u002Fbutton>\n            <button class=\"btn-purple\" id=\"rec-submit-btn\" onclick=\"submitCurrentToServer()\">☁️ Submit to Teacher<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"dash-server\" style=\"margin-top:14px\">\n            <label>📲 Resume on another device — no login needed<\u002Flabel>\n            <p style=\"font-size:13px;color:var(--sc-text-muted);margin:0 0 8px\">Copy your Resume Code, then paste it into the game on any phone, tablet or laptop to continue exactly where you left off.<\u002Fp>\n            <div class=\"dash-server-row\">\n                <button class=\"btn-blue\" onclick=\"copyResumeCode()\">📋 Copy My Resume Code<\u002Fbutton>\n                <button class=\"btn-neutral\" onclick=\"promptResumeCode()\">📥 Enter a Resume Code<\u002Fbutton>\n            <\u002Fdiv>\n            <textarea id=\"resume-code-box\" readonly=\"\" style=\"width:100%;margin-top:8px;height:54px;display:none;font-family:monospace;font-size:11px;resize:none\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <input type=\"file\" id=\"rec-file\" accept=\"application/json,.json\" style=\"display:none\" onchange=\"loadRecordFile(this)\">\n        <button class=\"btn-danger\" style=\"margin-top:16px\" onclick=\"closeModals()\">Close<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- End-of-Session Student Report Modal -->\n    <div id=\"session-report-modal\" class=\"modal\" style=\"max-width:560px;\">\n        <h2>Session Report<\u002Fh2>\n        <div id=\"session-report-body\"><\u002Fdiv>\n        <div class=\"rec-actions\" style=\"margin-top:18px;\">\n            <button class=\"btn-blue\" onclick=\"saveGameReport()\">📄 Download My Report<\u002Fbutton>\n            <button class=\"btn-green\" onclick=\"exportStudyCard()\">📖 My Study Card<\u002Fbutton>\n            <button class=\"btn-purple\" id=\"sess-submit-btn\" onclick=\"submitCurrentToServer()\">☁️ Send to Teacher<\u002Fbutton>\n            <button class=\"btn-neutral\" onclick=\"closeModals()\">Close<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Teacher Dashboard Modal -->\n    <div id=\"dashboard-modal\" class=\"modal\">\n        <h2>Teacher Dashboard<\u002Fh2>\n        <p class=\"modal-sub\">Every record saved or submitted on this device is collected below. Link a Google Form / Apps Script Web App URL to have student responses POSTed to your server automatically. <b>This URL is shared with the ShirtpapaSG Genie<\u002Fb> — set it once and both apps log to the same sheet, with a <b>Game Type<\u002Fb> column showing which app each row came from.<\u002Fp>\n        <div class=\"dash-server\">\n            <div id=\"admin-mode-row\" style=\"margin:0 0 16px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,182,39,.4);background:rgba(255,182,39,.1);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n                <div style=\"text-align:left\">\n                    <div style=\"font-family:var(--font-display);font-weight:800;font-size:15px;color:var(--sc-yellow)\">🔓 Admin Test Mode<\u002Fdiv>\n                    <div style=\"font-size:13px;color:var(--sc-text-muted);line-height:1.4\">Unlimited credits in <b>all modes<\u002Fb> (Solo, Versus, Co-op) — play &amp; test freely without answering questions.<\u002Fdiv>\n                <\u002Fdiv>\n                <button id=\"admin-toggle-btn\" class=\"btn-blue\" onclick=\"toggleAdminMode()\">Enable<\u002Fbutton>\n            <\u002Fdiv>\n            <label>Server endpoint (Google Form / Apps Script Web App URL)<\u002Flabel>\n            <div class=\"dash-server-row\">\n                <input type=\"text\" id=\"dash-endpoint\" placeholder=\"https://script.google.com/macros/s/…/exec\">\n                <button class=\"btn-blue\" onclick=\"saveEndpoint()\">Save URL<\u002Fbutton>\n                <button class=\"btn-neutral\" onclick=\"testEndpoint()\">Test<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"dash-server\">\n            <label>🔑 Change teacher password (unlocks this Dashboard and the Question Bank Editor)<\u002Flabel>\n            <div class=\"dash-server-row\">\n                <input type=\"password\" id=\"admin-new-pw\" placeholder=\"New password…\">\n                <button class=\"btn-blue\" onclick=\"saveAdminPw()\">Save password<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"dash-server\">\n            <label>🎯 Collection goal — how many of each object students must grab<\u002Flabel>\n            <div id=\"quota-grid\" class=\"quota-grid\"><\u002Fdiv>\n            <div class=\"dash-server-row\" style=\"margin-top:8px\">\n                <button class=\"btn-blue\" onclick=\"saveQuota()\">Save goals<\u002Fbutton>\n                <button class=\"btn-neutral\" onclick=\"resetQuota()\">Reset to default<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <details class=\"dash-guide\">\n            <summary>📘 First time? Set up your free Google Sheet server — step by step<\u002Fsummary>\n            <div class=\"guide-body\">\n                <ol>\n                    <li>Go to <b>sheets.google.com<\u002Fb> and create a <b>new blank spreadsheet<\u002Fb> (this is where responses will land).<\u002Fli>\n                    <li>In the menu, click <b>Extensions ▸ Apps Script<\u002Fb>. A code editor opens in a new tab.<\u002Fli>\n                    <li>Delete any sample code in the editor, then <b>paste the script below<\u002Fb> (use the Copy button).<\u002Fli>\n                    <li>Click the <b>Save<\u002Fb> icon 💾 and give the project any name.<\u002Fli>\n                    <li>Click <b>Deploy ▸ New deployment<\u002Fb> (top-right).<\u002Fli>\n                    <li>Click the gear ⚙ beside “Select type” and choose <b>Web app<\u002Fb>.<\u002Fli>\n                    <li>Set <b>Execute as: Me<\u002Fb> and <b>Who has access: Anyone<\u002Fb>, then click <b>Deploy<\u002Fb>.<\u002Fli>\n                    <li>Click <b>Authorize access<\u002Fb> → pick your Google account → <b>Advanced<\u002Fb> → <b>Go to project (unsafe)<\u002Fb> → <b>Allow<\u002Fb>.<\u002Fli>\n                    <li>Copy the <b>Web app URL<\u002Fb> shown — it ends in <b>/exec<\u002Fb>.<\u002Fli>\n                    <li>Paste that URL into the <b>Server endpoint<\u002Fb> box above, click <b>Save URL<\u002Fb>, then press <b>Test<\u002Fb>. A new row should appear in your Google Sheet. ✅<\u002Fli>\n                <\u002Fol>\n                <div class=\"guide-code-head\">\n                    <span>Apps Script code — paste this into the editor<\u002Fspan>\n                    <button class=\"btn-blue\" onclick=\"copyAppsScript()\">📋 Copy code<\u002Fbutton>\n                <\u002Fdiv>\n                <textarea id=\"apps-script-code\" class=\"guide-code\" readonly=\"\" spellcheck=\"false\"><\u002Ftextarea>\n            <\u002Fdiv>\n        <\u002Fdetails>\n\n        <div class=\"dash-summary\" id=\"dash-summary\"><\u002Fdiv>\n\n        <div class=\"dash-analytics\">\n            <div class=\"dash-filter\">\n                <label for=\"dash-student-filter\">Show analytics for<\u002Flabel>\n                <select id=\"dash-student-filter\" onchange=\"renderAnalytics()\"><\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"charts-grid\">\n                <div class=\"chart-card\">\n                    <h4>% Answered Wrong, by Topic<\u002Fh4>\n                    <div id=\"chart-topic-wrap\"><canvas id=\"chart-topic\"><\u002Fcanvas><\u002Fdiv>\n                    <p class=\"chart-empty\" id=\"chart-topic-empty\" style=\"display:none;\">No quiz attempts recorded yet.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"chart-card\">\n                    <h4>Wrong Answers, by Question Type<\u002Fh4>\n                    <div class=\"donut-row\">\n                        <canvas id=\"chart-type\" width=\"190\" height=\"190\"><\u002Fcanvas>\n                        <div id=\"chart-type-legend\" class=\"donut-legend\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <p class=\"chart-empty\" id=\"chart-type-empty\" style=\"display:none;\">No wrong answers recorded yet.<\u002Fp>\n                <\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"editor-table-wrapper\">\n            <table>\n                <thead><tr><th>Name<\u002Fth><th>Class<\u002Fth><th>Date<\u002Fth><th>Duration<\u002Fth><th>Q's<\u002Fth><th>Correct<\u002Fth><th>Wrong<\u002Fth><th>Prizes<\u002Fth><\u002Ftr><\u002Fthead>\n                <tbody id=\"dash-tbody\"><\u002Ftbody>\n            <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"dash-actions\">\n            <button class=\"btn-blue\" onclick=\"exportRosterCSV()\">⬇ Sessions CSV<\u002Fbutton>\n            <button class=\"btn-purple\" onclick=\"exportWeaknessCSV()\">⬇ Weakness CSV<\u002Fbutton>\n            <button class=\"btn-blue\" onclick=\"exportRosterJSON()\">⬇ JSON<\u002Fbutton>\n            <button class=\"btn-danger\" onclick=\"clearRoster()\">Clear Roster<\u002Fbutton>\n            <button class=\"btn-neutral\" onclick=\"closeModals()\">Close<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Include Three.js (CDN r128, matches the offline vendor build) -->\n    <script src=\"8f9c92e8-cdc3-4404-aece-c8c9fc3282eb\" crossorigin=\"anonymous\"><\u002Fscript>\n    <script src=\"2bf326ea-47ed-47f0-b600-5179c5344044\" crossorigin=\"anonymous\"><\u002Fscript>\n    <!-- Science Claw arcade SFX (Web Audio, synthesized, offline) -->\n    <script src=\"1054ead9-568f-4700-aa87-a6257cc9c9f5\"><\u002Fscript>\n    <!-- Shared credit wallet + question bank (links the game to the ShirtpapaSG Genie) -->\n    <script src=\"f38469b4-7218-408a-8653-ba61fe85224c\"><\u002Fscript>\n\n    <script>\n        // DYNAMIC TEMPLATES\n        const templates = {\n            \"CECL\": [\"Claim\", \"Evidence\", \"Concept\", \"Link\"],\n            \"EXP\": [\"Objective\", \"Condition\", \"Scientific Concept\", \"Reasoning\"],\n            \"SYS\": [\"System\", \"Part\", \"Function\", \"Importance\"],\n            \"MAT\": [\"Material\", \"Property\", \"Scientific Concept\", \"Application\"],\n            \"CYCLE\": [\"State / Stage\", \"Process\", \"Condition\", \"Result\"]\n        };\n\n        // --- AI TWIN REPHRASER (online only; keeps science keywords intact) ---\n        // Restructures the twin's sentence/clauses so the student must re-apply the\n        // concept rather than pattern-match the wording. The tested ANSWER keywords are\n        // NEVER changed — for fill-in-blank the exact _[keyword]_ tokens are preserved\n        // (only their order/phrasing may change). Offline or on any error → unchanged.\n        async function rephraseTwinQuestion(variant) {\n            try {\n                if (!navigator.onLine) return;\n                if (!(window.claude && typeof window.claude.complete === 'function')) return;\n\n                if (variant.type === 'fitb') {\n                    const orig = variant.text || '';\n                    const tokens = (orig.match(/_\\[(.*?)\\]_/g) || []);\n                    if (!tokens.length) return;\n                    const prompt =\n`You are a Singapore primary science teacher writing a TWIN of a fill-in-the-blank question for a student who got it wrong.\nRewrite the sentence below with a DIFFERENT sentence structure so the student must re-apply the concept, but test the EXACT SAME blanks.\nSTRICT RULES:\n- You MUST keep every blank token EXACTLY as written, character-for-character: ${tokens.join('  ')}\n- Do NOT change, translate or reword any text inside the _[ ]_ tokens. You MAY change their order in the sentence, so a different keyword is asked first — but the rewritten sentence MUST stay scientifically correct and natural.\n- Keep the same science concept, difficulty and correct answers. Change only the surrounding phrasing/clause order.\n- One or two short sentences, P3–P6 reading level. Return ONLY the rewritten sentence with the tokens in place.\n\nSENTENCE: ${orig}`;\n                    const out = await window.claude.complete(prompt);\n                    const cleaned = (out || '').trim().replace(/^[\"'\\s]+|[\"'\\s]+$/g, '');\n                    // Validate: every original token still present (keywords preserved)\n                    const ok = cleaned && tokens.every(t => cleaned.indexOf(t) !== -1);\n                    if (ok && cleaned.length < 400) {\n                        variant.text = cleaned;\n                        variant.isCopyrightFree = true;\n                        // Auto-bank this original rephrasing as a copyright-free question (shows green)\n                        addCopyrightFree({ text: cleaned, topic: variant.topic, type: variant.type, kind: 'rephrased-twin' });\n                    }\n                    return;\n                }\n\n                const original = variant.q || '';\n                if (!original || original.length < 12) return;\n                let keep = [];\n                if (variant.type === 'mcq' && variant.correct) keep.push(variant.correct);\n                if (variant.type === 'match' && Array.isArray(variant.correct)) keep = keep.concat(variant.correct);\n                const keepStr = keep.filter(Boolean).join(', ');\n                const prompt =\n`You are a Singapore primary science teacher rewriting a quiz question for a student who just got it wrong.\nRephrase the QUESTION below so the sentence/clause structure is different and the student must re-apply the concept instead of recalling the exact wording.\nSTRICT RULES:\n- Keep the SAME science concept, difficulty and correct answer. Do NOT change the science.\n- Keep these key science words intact — they are the tested answer: ${keepStr || '(the scientific terms in the question)'}.\n- Change only phrasing/word order/clause structure. Keep it one or two short sentences, P3–P6 reading level.\n- Return ONLY the rephrased question text, no quotes, no preamble.\n\nQUESTION: ${original.replace(/<[^>]*>/g, ' ').replace(/\\s+/g, ' ').trim()}`;\n                const out = await window.claude.complete(prompt);\n                if (out && typeof out === 'string') {\n                    const cleaned = out.trim().replace(/^[\"'\\s]+|[\"'\\s]+$/g, '');\n                    if (cleaned.length > 8 && cleaned.length < 400) {\n                        variant.q = cleaned;\n                        variant.isCopyrightFree = true;\n                        // Auto-bank this original rephrasing as a copyright-free question (shows green)\n                        addCopyrightFree({ text: cleaned, topic: variant.topic, type: variant.type, kind: 'rephrased-twin' });\n                    }\n                }\n            } catch (e) { /* offline / unavailable → keep original wording */ }\n        }\n\n        // ---- DIFFICULTY-LADDER SCAFFOLD (CECL too hard → simpler fill-in-blank) ----\n        // When a student fails a CECL (tier-3 reasoning) question, we don't re-serve\n        // another CECL — that's the same wall. Instead we step DOWN a rung: build a\n        // fill-in-the-blank on the SAME concept at tier 2 (supported recall), and if\n        // they miss again, tier 1 (single-word recall with a first-letter hint).\n        function conceptKeyword(q) {\n            // The word we blank out = the key science word of the Concept row.\n            let c = (q.correct && q.correct[2]) ? String(q.correct[2]) : (q.template || '');\n            // Magnet questions must always test the syllabus term, never a sentence word.\n            if (/magnet/i.test(c)) return 'magnetism';\n            const SYL = ['classification','photosynthesis','respiration','evaporation','condensation','germination','reproduction','adaptation','conductor','insulator','circuit','friction','gravity','matter','energy','habitat','pollination','dispersal','digestion','properties','materials','microorganisms','shadow','temperature','melting','boiling','freezing','exchange','cycle','system','cell','cells','force','forces','heat','light','water','conduction','gases','liquid','solid'];\n            const words = c.replace(/[^A-Za-z\\s]/g, '').trim().split(/\\s+/).filter(Boolean);\n            // words that are NEVER acceptable blanks (off-syllabus or meaningless alone)\n            const AVOID = /^(strength|tension|distance|density|high|low|and|of|the|a|an|in|on|with|to|for|its|it)$/i;\n            for (let i = words.length - 1; i >= 0; i--) if (SYL.includes(words[i].toLowerCase())) return words[i];\n            for (let i = words.length - 1; i >= 0; i--) if (!AVOID.test(words[i])) return words[i];\n            return words.length ? words[words.length - 1] : 'concept';\n        }\n        // Normalise a source that may be a raw CECL question OR a scaffold fitb that\n        // carries the CECL parts, so the ladder (tier 2 → tier 1) keeps the source data.\n        function ceclSource(q) {\n            if (q.correct && typeof q.correct === 'object' && q.correct[2] !== undefined) {\n                return { correct: q.correct, template: q.template, q: q.q, srcId: (q.srcId != null ? q.srcId : q.id) };\n            }\n            if (q.srcCorrect) return { correct: q.srcCorrect, template: q.srcTemplate, q: q.srcQ, srcId: q.srcId };\n            return null;\n        }\n        function buildScaffoldFitb(srcQ, tier) {\n            const src = ceclSource(srcQ);\n            const correct = src ? src.correct : (srcQ.correct || {});\n            const claim = correct[0] || '';\n            const evidence = correct[1] || '';\n            const concept = correct[2] || (src && src.template) || '';\n            const kw = conceptKeyword({ correct: correct, template: (src && src.template) });\n            let text, qLabel;\n            if (tier >= 2) {\n                // Tier 2 — supported recall: give the observation, ask for the concept.\n                const lead = evidence || claim;\n                text = lead.replace(/\\.?\\s*$/, '') + '. The science idea being tested here is _[' + kw + ']_.';\n                qLabel = 'Made simpler — fill in the blank to complete the science idea:';\n            } else {\n                // Tier 1 — single-word recall with a first-letter hint.\n                const lead = claim || evidence;\n                text = lead.replace(/\\.?\\s*$/, '') + '. This is an example of _[' + kw + ']_. '\n                     + '<span style=\"color:var(--sc-text-muted,#9fb0c3)\">(Hint: it begins with &ldquo;' + kw.charAt(0).toUpperCase() + '&rdquo;)<\u002Fspan>';\n                qLabel = 'Made even simpler — fill in the one missing word:';\n            }\n            return {\n                id: Date.now(), type: 'fitb', topic: srcQ.topic,\n                q: qLabel, text: text, isVariant: true, scaffoldTier: tier,\n                srcId: src ? src.srcId : ((srcQ.srcId != null) ? srcQ.srcId : srcQ.id),\n                // carry CECL parts so a failed scaffold can step down again\n                srcCorrect: correct, srcTemplate: (src && src.template), srcQ: (src && src.q)\n            };\n        }\n        // When online, rebuild the scaffold into a well-phrased tier-appropriate\n        // fill-in-blank whose blank sits on the TRUE key word (offline picks the\n        // Concept-row word, which isn't always the crux). Validated to keep one blank.\n        async function scaffoldRephraseAI(variant, srcQ, tier) {\n            try {\n                if (!navigator.onLine || !(window.claude && window.claude.complete)) return;\n                const src = ceclSource(srcQ) || { correct: srcQ.correct || {}, q: srcQ.q };\n                const c = src.correct || {};\n                const tierDesc = tier >= 2\n                    ? \"Tier 2 (supported recall): ONE short sentence. State the situation/observation, then blank out the single key science word the student must recall.\"\n                    : \"Tier 1 (easiest): a very short, direct sentence with strong support. Blank out only the single most important science word, and end with a first-letter hint in brackets like (Hint: begins with \\\"R\\\").\";\n                const prompt =\n`You are a Singapore P3–P6 science teacher. A student failed a hard reasoning (CECL) question. Rewrite it as an EASIER fill-in-the-blank that tests the SAME core concept.\nOriginal question: ${src.q || srcQ.q}\nCorrect reasoning — Claim: ${c[0] || ''}; Evidence: ${c[1] || ''}; Concept: ${c[2] || ''}; Key idea: ${c[3] || ''}\nWrite ${tierDesc}\nRULES:\n- Put the blank as a token EXACTLY like _[word]_ around the single key answer word (choose the word that is the real crux of the concept).\n- EXACTLY ONE blank. Keep it scientifically correct, simple, P3–P6 reading level.\n- Return ONLY the sentence (you may include the hint for tier 1).`;\n                const out = await window.claude.complete(prompt);\n                let cleaned = (out || '').trim().replace(/^[\"'\\s]+|[\"'\\s]+$/g, '');\n                const toks = cleaned.match(/_\\[.*?\\]_/g) || [];\n                if (toks.length === 1 && cleaned.length < 320) variant.text = cleaned;\n            } catch (e) { /* keep the offline scaffold */ }\n        }\n\n        // Switch the ARRANGEMENT of a twin's answers WITHOUT breaking the science.\n        // IMPORTANT: for fill-in-blank we must NOT blindly reverse blank positions —\n        // that produces nonsense (\"rubber creates high skidding…\"). A sensible order\n        // flip can only come from a real rephrase (teacher-approved or AI), which keeps\n        // the sentence correct. So here we only flag MCQ/match to reshuffle their option\n        // ORDER (keywords untouched); fitb is left to the rephrase step.\n        function switchArrangement(variant) {\n            try {\n                if (variant.type === 'mcq' || variant.type === 'match') {\n                    variant.reshuffle = true; // options are re-randomised at render time\n                }\n                // fitb: intentionally no structural change here (see note above).\n            } catch (e) {}\n        }\n\n        // Apply a teacher-APPROVED twin. For fill-in-blank the approved text should keep\n        // the _[keyword]_ tokens; if it doesn't, we keep the original blanks (never lose\n        // the tested keyword) and only take the rephrase for non-blank questions.\n        function applyApprovedTwin(variant, text) {\n            if (!text) return;\n            if (variant.type === 'fitb') {\n                const tokens = (variant.text || '').match(/_\\[(.*?)\\]_/g) || [];\n                const keepsTokens = tokens.length && tokens.every(t => text.indexOf(t) !== -1);\n                if (keepsTokens) variant.text = text; // else keep original blanks intact\n            } else {\n                variant.q = text;\n            }\n        }\n\n        // --- INTELLIGENT ALLOCATION SWAPPER ---\n        function swapKeywords(text) {\n            if (!text || typeof text !== 'string') return text;\n            const dict = [\n                { match: /\\b(Ahmad|Ali|Siti|John|Daisy|Nicole|Rizwan|Aminah)\\b/g, options: [\"Ravi\", \"Mei Ling\", \"Tom\", \"Sarah\", \"Kumar\", \"Bala\", \"Minah\", \"Clara\"] },\n                { match: /\\b([Aa] student|[Tt]he student|[Aa] scientist|[Aa] boy|[Aa] girl|[Aa] child|[Aa] pupil)\\b/g, options: [\"Ravi\", \"Mei Ling\", \"Tom\", \"Sarah\", \"Kumar\", \"Bala\", \"Minah\", \"Clara\"] },\n                { match: /\\b(toy car)\\b/g, options: [\"glass marble\", \"wooden block\",
