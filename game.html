                }\n                }\n            }\n        }\n\n        function openVersusSetup(coop) {\n            vsCoop = !!coop;\n            const m = document.getElementById('versus-modal');\n            // swap copy for the chosen mode\n            const h = document.getElementById('vs-modal-title');\n            const d = document.getElementById('vs-modal-desc');\n            const sb = document.getElementById('vs-start-btn');\n            if (vsCoop) {\n                if (h) h.textContent = '🤝 Collaborative Mode';\n                if (d) d.innerHTML = 'Two players work <b>together<\u002Fb> on the <b>same<\u002Fb> Science Collection — every catch adds to one shared pool! Left player uses <b>WASD + Space<\u002Fb>, right player uses <b>Arrow keys + Enter<\u002Fb>. Fill the shared collection together to win as a team. 🌟';\n                if (sb) { sb.textContent = 'Start Team Game 🤝'; }\n            } else {\n                if (h) h.textContent = '⚔️ Versus Mode';\n                if (d) d.innerHTML = 'Two players race at the <b>same time<\u002Fb> on a shared claw machine — no turns! Left player uses <b>WASD + Space<\u002Fb>, right player uses <b>Arrow keys + Enter<\u002Fb>. First to complete their Science Collection races into the Microscope Shootout — fastest to blast <b>10 atoms + 20 chips<\u002Fb> wins!';\n                if (sb) { sb.textContent = 'Start Match ⚔️'; }\n            }\n            // prefill from wallet / last names\n            try {\n                const st = (window.SciClawState && SciClawState.getPlayer) ? SciClawState.getPlayer() : null;\n                if (st && st.name && !document.getElementById('vs-input-0').value) document.getElementById('vs-input-0').value = st.name;\n            } catch (e) {}\n            m.classList.add('active');\n            renderVsColorPickers();\n            renderVsTopics();\n            setTimeout(() => document.getElementById('vs-input-0').focus(), 60);\n            if (window.sfx) sfx.click();\n        }\n\n        function startVersus() {\n            const n0 = (document.getElementById('vs-input-0').value || '').trim() || 'Player 1';\n            const n1 = (document.getElementById('vs-input-1').value || '').trim() || 'Player 2';\n            // capture each player's chosen topics (co-op = shared set for both)\n            vsTopics = [vsGetTopics(0), vsGetTopics(1)];\n            if (!vsTopics[0].length || !vsTopics[1].length) {\n                showMessage(vsCoop ? 'Please select at least one shared topic!' : 'Each player must select at least one topic!', 3500);\n                return;\n            }\n            document.getElementById('versus-modal').classList.remove('active');\n            { const gl = document.getElementById('genie-link'); if (gl) gl.style.display = 'none'; }\n            vsSPcollection = collection;\n            vsSPcomplete = collectionComplete;\n\n            vsPlayers = [\n                { name: n0, collection: {}, done: false, color: vsColorSel[0], credits: 0, answered: 0, correct: 0, wrongLog: [] },\n                { name: n1, collection: {}, done: false, color: vsColorSel[1], credits: 0, answered: 0, correct: 0, wrongLog: [] },\n            ];\n            ITEM_KEYS.forEach(k => { vsPlayers[0].collection[k] = 0; vsPlayers[1].collection[k] = 0; });\n            // shared pool for co-op mode\n            vsShared = {}; ITEM_KEYS.forEach(k => vsShared[k] = 0);\n            vsSessionStart = Date.now();\n\n            versusMode = true;\n            vsActive = 0;\n            if (isTouchDevice()) {\n                document.getElementById('vs-touch-0').style.display = 'block';\n                document.getElementById('vs-touch-1').style.display = 'block';\n                document.getElementById('dpad-hud').style.display = 'none';\n            }\n            collectionComplete = false;\n            document.getElementById('vs-name-0').textContent = n0;\n            document.getElementById('vs-name-1').textContent = n1;\n            // colour swatches on each side\n            ['0', '1'].forEach(s => { const sw = document.getElementById('vs-swatch-' + s); if (sw) { sw.style.background = vsColorSel[+s]; sw.style.color = vsColorSel[+s]; } });\n            document.getElementById('versus-overlay').classList.add('active');\n            // hide single-player collection panel + start button; hide the single claw\n            const ch = document.getElementById('collection-hud'); if (ch) ch.style.display = 'none';\n            const btnStart = document.getElementById('btn-start'); if (btnStart) btnStart.style.display = 'none';\n            const btnVs = document.getElementById('btn-versus'); if (btnVs) btnVs.style.display = 'none';\n            const btnCoop = document.getElementById('btn-coop'); if (btnCoop) btnCoop.style.display = 'none';\n            if (clawGroup) clawGroup.visible = false;\n            if (spDropZone) spDropZone.visible = false;\n            // hide the home menu + camera stack — no distractions during the race\n            const tl = document.getElementById('top-left-hud'); if (tl) tl.style.display = 'none';\n            const rs = document.getElementById('right-stack'); if (rs) rs.style.display = 'none';\n\n            // Build two independent claws + per-side drop zones, spawn the shared pool.\n            vsSetupClaws();\n            spawnObjects();\n            gameState = 'playing';   // both claws live simultaneously\n            // Lock a permanent top-down view for fairness — no spinning, no drag.\n            if (controls) { controls.autoRotate = false; controls.enabled = false; }\n            if (orthoCamera) { activeCamera = orthoCamera; orthoCamera.position.set(0, 15, 0); orthoCamera.lookAt(0, 0, 0); orthoCamera.updateProjectionMatrix(); }\n\n            // highlight both sides (no turns)\n            for (let i = 0; i < 2; i++) {\n                const side = document.getElementById('vs-side-' + i);\n                if (side) { side.classList.add('active-turn'); side.classList.remove('inactive'); }\n                const badge = document.getElementById('vs-badge-' + i); if (badge) badge.style.display = 'none';\n            }\n            const banner = document.getElementById('vs-turn-banner');\n            banner.textContent = vsCoop\n                ? '🤝 Team up! Help each other spot the answers and share the machine — every catch fills ONE shared collection!'\n                : '🔬 Answer a science question to earn your first credit — then race to catch!';\n            banner.style.display = 'block';\n            setTimeout(() => { const b = document.getElementById('vs-turn-banner'); if (b) b.style.display = 'none'; }, vsCoop ? 5200 : 4200);\n            renderVersus();\n            // competitive music for versus; co-op keeps the original driving track\n            try { if (window.sfx && sfx.startMusic) { sfx.startMusic(vsCoop ? 'coop' : 'versus'); vsMusicOn = true; } } catch (e) {}\n            // Each player must answer an MCQ (keyboard-navigable) before they can catch.\n            vsOpenQuiz(0); vsOpenQuiz(1);\n            if (window.sfx) sfx.enter();\n        }\n\n        function beginVersusTurn(idx) {\n            vsActive = idx;\n            collection = vsPlayers[idx].collection;   // all grab/collect code now writes here\n            collectionComplete = vsPlayers[idx].done;\n            // active-side highlight\n            for (let i = 0; i < 2; i++) {\n                const side = document.getElementById('vs-side-' + i);\n                side.classList.toggle('active-turn', i === idx);\n                side.classList.toggle('inactive', i !== idx);\n                document.getElementById('vs-badge-' + i).style.display = (i === idx) ? 'inline-block' : 'none';\n            }\n            const banner = document.getElementById('vs-turn-banner');\n            const ctrl = idx === 0 ? 'WASD to move · Space to drop' : 'Arrow keys to move · Enter to drop';\n            banner.textContent = '🎯 ' + vsPlayers[idx].name + \"'s turn — \" + ctrl;\n            banner.style.display = 'block';\n            // reset any held keys so movement doesn't carry across turns\n            Object.keys(keys).forEach(k => keys[k] = false);\n            // restore this player's own camera view (if they picked one)\n            if (vsPlayers[idx].camera) setCamera(vsPlayers[idx].camera);\n            renderVersus();\n            gameState = 'idle';\n        }\n\n        function versusEndTurn() {\n            if (!versusMode) return;\n            // if the just-finished player completed their set, finale already triggered\n            if (vsPlayers[vsActive].done) return;\n            beginVersusTurn(vsActive === 0 ? 1 : 0);\n        }\n\n        function renderVersus() {\n            if (!versusMode) return;\n            for (let i = 0; i < 2; i++) {\n                const coll = vsCoop ? vsShared : vsPlayers[i].collection;\n                let totalReq = 0, totalGot = 0, pts = 0;\n                const rows = ITEM_KEYS.map(t => {\n                    const c = SCIENCE_ITEMS[t];\n                    const got = Math.min(coll[t] || 0, c.required);\n                    totalReq += c.required; totalGot += got;\n                    pts += (coll[t] || 0) * c.points;\n                    const done = (coll[t] || 0) >= c.required;\n                    if (c.required <= 0) return '';\n                    return '<div class=\"vs-coll-row ' + (done ? 'done' : '') + '\">' +\n                        '<span class=\"e\">' + c.emoji + '<\u002Fspan>' +\n                        '<span class=\"n\">' + c.name + '<\u002Fspan>' +\n                        '<span class=\"c\">' + got + '/' + c.required + '<\u002Fspan><\u002Fdiv>';\n                }).join('');\n                document.getElementById('vs-coll-' + i).innerHTML = rows;\n                // points: in co-op show shared points; also show this player's Q score\n                const qstat = ' · ✏️ ' + (vsPlayers[i].correct || 0) + '/' + (vsPlayers[i].answered || 0);\n                document.getElementById('vs-points-' + i).textContent = pts;\n                const cr = document.getElementById('vs-credits-' + i); if (cr) cr.textContent = adminMode ? '∞' : (vsPlayers[i].credits || 0);\n                const qs = document.getElementById('vs-qstat-' + i); if (qs) qs.textContent = (vsPlayers[i].correct || 0) + ' / ' + (vsPlayers[i].answered || 0) + ' correct';\n                const pct = totalReq ? Math.round(totalGot / totalReq * 100) : 0;\n                document.getElementById('vs-progbar-' + i).style.width = pct + '%';\n            }\n        }\n\n        function versusCheckComplete() {\n            // Deposits already route through vsCheckWinner / vsCheckCoopWin; delegate here too.\n            if (vsCoop) vsCheckCoopWin(); else vsCheckWinner(vsActive);\n        }\n\n        function exitVersus() {\n            versusMode = false;\n            vsCoop = false;\n            document.getElementById('vs-touch-0').style.display = 'none';\n            document.getElementById('vs-touch-1').style.display = 'none';\n            setVsDropLabel(0, '🕹️ Drop'); setVsDropLabel(1, '🕹️ Drop');\n            // tear down per-player microscope panes\n            if (vsMicroRAF) { cancelAnimationFrame(vsMicroRAF); vsMicroRAF = null; }\n            window.removeEventListener('resize', vsMicroResize);\n            vsMicro = [null, null]; vsMicroSettled = false;\n            resetClawView();\n            { const arena = document.getElementById('fin-arena'); if (arena) arena.innerHTML = ''; }\n            try { if (window.sfx && sfx.stopMusic) sfx.stopMusic(); } catch (e) {}\n            vsMusicOn = false;\n            if (winConfettiRAF) { cancelAnimationFrame(winConfettiRAF); winConfettiRAF = null; }\n            document.getElementById('win-overlay').classList.remove('active');\n            document.getElementById('stats-modal').classList.remove('active');\n            vsTeardownClaws();\n            if (clawGroup) { clawGroup.visible = true; clawGroup.position.set(3, 5, -3); }\n            if (spDropZone) spDropZone.visible = true;\n            // restore the idle spinning camera + orbit controls\n            if (controls) { controls.enabled = true; controls.autoRotate = true; }\n            activeCamera = camera;\n            const tl = document.getElementById('top-left-hud'); if (tl) tl.style.display = '';\n            { const gl = document.getElementById('genie-link'); if (gl) gl.style.display = ''; }\n            const rs = document.getElementById('right-stack'); if (rs) rs.style.display = '';\n            document.getElementById('versus-overlay').classList.remove('active');\n            document.getElementById('vs-finale').classList.remove('active');\n            document.getElementById('vs-turn-banner').style.display = 'none';\n            const ch = document.getElementById('collection-hud'); if (ch) ch.style.display = '';\n            const btnStart = document.getElementById('btn-start'); if (btnStart) { btnStart.textContent = 'Start Game (1 Credit)'; btnStart.style.display = ''; }\n            const btnVs = document.getElementById('btn-versus'); if (btnVs) btnVs.style.display = '';\n            const btnCoop = document.getElementById('btn-coop'); if (btnCoop) btnCoop.style.display = '';\n            // restore single-player state\n            if (vsSPcollection) { collection = vsSPcollection; collectionComplete = vsSPcomplete; }\n            gameState = 'idle';\n            document.getElementById('bottom-hud').style.display = 'none';\n            renderCollection();\n            if (window.sfx) sfx.click();\n        }\n\n        // ---- Microscope Shootout (per-player, independent) ----\n        // Each player enters the microscope on THEIR half the moment they finish\n        // catching; the other keeps playing the claw. First to clear the scope wins.\n        let vsMicro = [null, null];        // per-player pane state\n        let vsMicroRAF = null;             // shared render loop\n        let vsMicroSettled = false;        // overall winner already decided?\n        const MICRO_NEED_ATOMS = 10, MICRO_NEED_CHIPS = 20;\n        const MICRO_SHOT_COST = 5, MICRO_START_POWER = 100, MICRO_BATTERY_POWER = 40;\n\n        function microSpawn(P, kind) {\n            const r = kind === 'atom' ? 24 : kind === 'chip' ? 20 : kind === 'germ' ? 24 : 18;\n            // germ = slow, virus = fast, atom/chip = medium\n            const sp = kind === 'atom' ? 2.3 : kind === 'chip' ? 2.9 : kind === 'germ' ? 1.3 : 4.3;\n            const cv = P.cv, W = Math.max(cv.width, 120), H = Math.max(cv.height, 240);\n            P.targets.push({\n                kind, r,\n                x: r + Math.random() * (W - 2 * r),\n                y: r + 110 + Math.random() * (H - 2 * r - 120),\n                vx: (Math.random() * 2 - 1) * sp, vy: (Math.random() * 2 - 1) * sp,\n                ph: Math.random() * 6.28, dead: 0\n            });\n        }\n\n        function startMicroPane(idx, coop) {\n            const fin = document.getElementById('vs-finale');\n            fin.classList.add('active');\n            const arena = document.getElementById('fin-arena');\n            const touch = isTouchDevice();\n            const side = coop ? 'solo' : (idx === 0 ? 'left' : 'right');\n            const def = coop\n                ? { label: vsPlayers[0].name + ' + ' + vsPlayers[1].name + ' 🤝', color: '#2dd4bf' }\n                : { label: vsPlayers[idx].name, color: vsPlayers[idx].color || (idx === 0 ? '#66ccff' : '#ffb63a') };\n\n            const el = document.createElement('div');\n            el.className = 'fin-pane ' + side;\n            el.innerHTML =\n                '<div class=\"fin-pane-hud\">' +\n                    '<span class=\"fin-pane-name\" style=\"color:' + def.color + '\">' + def.label + '<\u002Fspan>' +\n                    '<span>⚛️ <b class=\"fin-a\">0<\u002Fb>/' + MICRO_NEED_ATOMS + '<\u002Fspan>' +\n                    '<span>🔲 <b class=\"fin-c\">0<\u002Fb>/' + MICRO_NEED_CHIPS + '<\u002Fspan>' +\n                    '<span>🔋 <b class=\"fin-s\">0<\u002Fb><\u002Fspan>' +\n                    '<span>⏱️ <b class=\"fin-t\">0.0s<\u002Fb><\u002Fspan>' +\n                '<\u002Fdiv>' +\n                '<div class=\"fin-btns\">' +\n                    '<button class=\"fin-btn-power\">🔋 Get Power (Claw)<\u002Fbutton>' +\n                    '<button class=\"fin-btn-scope\">🔬 Back to Microscope<\u002Fbutton>' +\n                '<\u002Fdiv>' +\n                '<div class=\"fin-power-msg\">⚡ Out of power! Tap “Get Power” and catch 🔋 batteries in the claw.<\u002Fdiv>' +\n                '<canvas class=\"fin-canvas\"><\u002Fcanvas>' +\n                '<div class=\"fin-cursor\"><\u002Fdiv>';\n            arena.appendChild(el);\n            const cv = el.querySelector('.fin-canvas');\n            const ctx = cv.getContext('2d');\n            function resize() { cv.width = Math.max(cv.clientWidth, 40); cv.height = Math.max(cv.clientHeight, 40); }\n            resize();\n            const P = {\n                idx, coop, el, cv, ctx, def, touch,\n                atoms: 0, chips: 0, power: MICRO_START_POWER, targets: [], flash: 0,\n                startT: performance.now(), powerRun: false, hidden: false,\n                cursor: { x: cv.width / 2, y: cv.height / 2 },\n                aB: el.querySelector('.fin-a'), cB: el.querySelector('.fin-c'),\n                sB: el.querySelector('.fin-s'), tB: el.querySelector('.fin-t'),\n                cursorEl: el.querySelector('.fin-cursor'),\n                powerMsg: el.querySelector('.fin-power-msg'),\n                btnPower: el.querySelector('.fin-btn-power'),\n                btnScope: el.querySelector('.fin-btn-scope'),\n                resize\n            };\n            P.sB.textContent = P.power;\n            for (let i = 0; i < MICRO_NEED_ATOMS; i++) microSpawn(P, 'atom');\n            for (let i = 0; i < MICRO_NEED_CHIPS; i++) microSpawn(P, 'chip');\n            for (let i = 0; i < 4; i++) microSpawn(P, 'germ');\n            for (let i = 0; i < 4; i++) microSpawn(P, 'virus');\n\n            // Desktop: click/tap directly on a target to shoot.\n            // Touch: NO direct tap — move a cursor with the d-pad, fire with the Shoot button.\n            // Show a movable crosshair for EVERYONE (keyboard on desktop, d-pad on touch).\n            P.cursorEl.style.display = 'block';\n            P.cursorEl.style.left = P.cursor.x + 'px';\n            P.cursorEl.style.top = P.cursor.y + 'px';\n            // Desktop also allows direct click-to-shoot on a target.\n            if (!touch) {\n                P.onShoot = (ev) => {\n                    ev.preventDefault();\n                    const rect = cv.getBoundingClientRect();\n                    const mx = ((ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left) * (cv.width / rect.width);\n                    const my = ((ev.touches ? ev.touches[0].clientY : ev.clientY) - rect.top) * (cv.height / rect.height);\n                    microFire(P, mx, my);\n                };\n                cv.addEventListener('pointerdown', P.onShoot);\n            }\n            P.btnPower.addEventListener('click', () => microPowerRun(P));\n            P.btnScope.addEventListener('click', () => microBackToScope(P));\n\n            vsMicro[coop ? 0 : idx] = P;\n            if (coop) vsMicro[1] = P;  // both control the one shared pane\n            if (touch) { if (coop) { setVsDropLabel(0, '🎯 Shoot'); setVsDropLabel(1, '🎯 Shoot'); } else setVsDropLabel(idx, '🎯 Shoot'); }\n            if (!vsMicroRAF) { vsMicroSettled = false; window.addEventListener('resize', vsMicroResize); microLoop(); }\n        }\n\n        function vsMicroResize() { [vsMicro[0], vsMicro[1]].forEach(p => { if (p) p.resize(); }); }\n\n        function microFire(P, mx, my) {\n            if (!P || P.hidden || vsMicroSettled) return;\n            if (P.power < MICRO_SHOT_COST) { P.powerMsg.style.display = 'block'; if (window.sfx) sfx.wrong(); return; }\n            P.power -= MICRO_SHOT_COST;                       // every shot costs power\n            let hit = false;\n            for (let i = P.targets.length - 1; i >= 0; i--) {\n                const t = P.targets[i];\n                if (t.dead) continue;\n                if (Math.hypot(mx - t.x, my - t.y) <= t.r + 10) {\n                    t.dead = performance.now(); hit = true;\n                    if (t.kind === 'atom') { P.atoms++; P.power += 15; if (window.sfx) sfx.select(); setTimeout(() => { if (!vsMicroSettled) microSpawn(P, 'atom'); }, 650); }\n                    else if (t.kind === 'chip') { P.chips++; P.power += 8; if (window.sfx) sfx.select(); setTimeout(() => { if (!vsMicroSettled) microSpawn(P, 'chip'); }, 650); }\n                    else if (t.kind === 'germ') { P.power -= 30; P.flash = performance.now(); if (window.sfx) sfx.wrong(); setTimeout(() => { if (!vsMicroSettled) microSpawn(P, 'germ'); }, 700); }\n                    else { P.power -= 20; P.flash = performance.now(); if (window.sfx) sfx.wrong(); setTimeout(() => { if (!vsMicroSettled) microSpawn(P, 'virus'); }, 700); }\n                    break;\n                }\n            }\n            if (P.power < 0) P.power = 0;                     // never negative\n            P.aB.textContent = P.atoms; P.cB.textContent = P.chips; P.sB.textContent = P.power;\n            P.sB.className = (P.power < MICRO_SHOT_COST) ? 'fin-s low' : 'fin-s';\n            if (P.power >= MICRO_SHOT_COST) P.powerMsg.style.display = 'none';\n            if (P.atoms >= MICRO_NEED_ATOMS && P.chips >= MICRO_NEED_CHIPS) finishMicro(P);\n        }\n\n        // Fire at the cursor (touch d-pad / keyboard).\n        function microFireAtCursor(idx) {\n            const P = vsMicro[idx]; if (!P || P.hidden) return;\n            microFire(P, P.cursor.x, P.cursor.y);\n        }\n\n        // Power run: hide the scope, hand the claw back so the player can catch 🔋 for power.\n        function microPowerRun(P) {\n            P.hidden = true; P.powerRun = true; P.powerMsg.style.display = 'none';\n            P.el.style.display = 'none';\n            // The return button lives inside the pane, which is now hidden — float it to the body\n            // so the player can actually get back to the microscope.\n            document.body.appendChild(P.btnScope);\n            const half = P.coop ? '50%' : (P.idx === 0 ? '25%' : '75%');\n            P.btnScope.style.cssText = 'position:fixed;z-index:60;bottom:22px;left:' + half + ';transform:translateX(-50%);display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border:none;border-radius:14px;cursor:pointer;font-family:var(--font-display);font-weight:800;font-size:16px;color:#05202e;background:linear-gradient(180deg,var(--sc-cyan,#66ccff),#2aa9e0);box-shadow:0 0 22px rgba(102,204,255,.65),0 4px 14px rgba(0,0,0,.5);';\n            if (P.touch) setVsDropLabel(P.idx, '🕹️ Drop');\n            if (!P.coop) resetClawView();   // show the full claw so this player can catch freely\n            if (vsClaws && vsClaws[P.idx]) { vsClaws[P.idx].mode = 'claw'; vsClaws[P.idx].state = 'playing'; }\n            spawnObjects();\n            showMessage(vsPlayers[P.idx].name + ': catch 🔋 batteries to recharge, then tap “Back to Microscope”.', 3600);\n        }\n        function microBackToScope(P) {\n            P.hidden = false; P.powerRun = false;\n            P.el.style.display = 'block';\n            // put the return button back inside its pane and re-hide it\n            const btns = P.el.querySelector('.fin-btns'); if (btns) btns.appendChild(P.btnScope);\n            P.btnScope.style.cssText = ''; P.btnScope.className = 'fin-btn-scope';\n            if (P.touch) setVsDropLabel(P.idx, '🎯 Shoot');\n            if (!P.coop) shiftClawToPlayer(1 - P.idx);   // re-focus claw on the other, still-catching player\n            if (vsClaws && vsClaws[P.idx]) vsClaws[P.idx].mode = 'micro';\n            P.resize();\n        }\n\n        function finishMicro(P) {\n            if (vsMicroSettled) return;\n            vsMicroSettled = true;\n            const elapsed = performance.now() - P.startT;\n            cancelAnimationFrame(vsMicroRAF); vsMicroRAF = null;\n            window.removeEventListener('resize', vsMicroResize);\n            [vsMicro[0], vsMicro[1]].forEach(p => { if (p && p.onShoot) p.cv.removeEventListener('pointerdown', p.onShoot); });\n            if (window.sfx) sfx.win();\n            const fin = document.getElementById('vs-finale');\n            if (P.coop) {\n                setTimeout(() => { fin.classList.remove('active'); document.getElementById('fin-arena').innerHTML = ''; showWinScreen('coop'); }, 450);\n            } else {\n                saveLeaderboardEntry(vsPlayers[P.idx].name, vsPlayers[1 - P.idx].name, elapsed);\n                setTimeout(() => { fin.classList.remove('active'); document.getElementById('fin-arena').innerHTML = ''; showVersusResult(P.idx, elapsed); }, 450);\n            }\n        }\n\n        function microDrawTarget(ctx, t) {\n            ctx.save();\n            const col = t.kind === 'atom' ? '#66ccff' : t.kind === 'chip' ? '#2dd4bf' : t.kind === 'germ' ? '#a3e635' : '#f472b6';\n            ctx.shadowColor = col; ctx.shadowBlur = 16;\n            ctx.font = Math.round(t.r * 1.85) + 'px serif';\n            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n            const glyph = t.kind === 'atom' ? '⚛️' : t.kind === 'chip' ? '🔲' : t.kind === 'germ' ? '🦠' : '👾';\n            ctx.fillText(glyph, t.x, t.y + 1);\n            ctx.restore();\n        }\n\n        function microLoop() {\n            vsMicroRAF = requestAnimationFrame(microLoop);\n            const now = performance.now();\n            const seen = [];\n            [vsMicro[0], vsMicro[1]].forEach(P => {\n                if (!P || seen.indexOf(P) >= 0) return; seen.push(P);\n                if (P.hidden) return;\n                const ctx = P.ctx, cv = P.cv;\n                // touch: move cursor with this player's held d-pad keys\n                // Move the crosshair with held keys (keyboard on desktop, d-pad on touch).\n                {\n                    const spd = 8;\n                    const K = P.coop\n                        ? { u: keys['w'] || keys['ArrowUp'], d: keys['s'] || keys['ArrowDown'], l: keys['a'] || keys['ArrowLeft'], r: keys['d'] || keys['ArrowRight'] }\n                        : (P.idx === 0\n                            ? { u: keys['w'], d: keys['s'], l: keys['a'], r: keys['d'] }\n                            : { u: keys['ArrowUp'], d: keys['ArrowDown'], l: keys['ArrowLeft'], r: keys['ArrowRight'] });\n                    if (K.u) P.cursor.y -= spd; if (K.d) P.cursor.y += spd;\n                    if (K.l) P.cursor.x -= spd; if (K.r) P.cursor.x += spd;\n                    P.cursor.x = Math.max(6, Math.min(cv.width - 6, P.cursor.x));\n                    P.cursor.y = Math.max(96, Math.min(cv.height - 6, P.cursor.y));\n                    P.cursorEl.style.left = P.cursor.x + 'px';\n                    P.cursorEl.style.top = P.cursor.y + 'px';\n                }\n                ctx.clearRect(0, 0, cv.width, cv.height);\n                for (let i = 0; i < 30; i++) {\n                    const gx = (i * 97.13) % cv.width, gy = (i * 53.7) % cv.height;\n                    ctx.globalAlpha = 0.05; ctx.fillStyle = '#66ccff';\n                    ctx.beginPath(); ctx.arc(gx, gy, 2, 0, 7); ctx.fill();\n                }\n                ctx.globalAlpha = 1;\n                if (P.flash && now - P.flash < 260) {\n                    ctx.fillStyle = 'rgba(232,73,63,' + (0.35 * (1 - (now - P.flash) / 260)) + ')';\n                    ctx.fillRect(0, 0, cv.width, cv.height);\n                }\n                P.tB.textContent = ((now - P.startT) / 1000).toFixed(1) + 's';\n                P.targets.forEach(t => {\n                    if (t.dead) {\n                        const age = (now - t.dead) / 260;\n                        if (age > 1) return;\n                        ctx.globalAlpha = 1 - age;\n                        ctx.strokeStyle = t.kind === 'atom' ? '#66ccff' : t.kind === 'chip' ? '#2dd4bf' : t.kind === 'germ' ? '#a3e635' : '#f472b6';\n                        ctx.lineWidth = 3;\n                        ctx.beginPath(); ctx.arc(t.x, t.y, t.r + age * 22, 0, 7); ctx.stroke();\n                        ctx.globalAlpha = 1; return;\n                    }\n                    t.x += t.vx; t.y += t.vy;\n                    if (t.x < t.r || t.x > cv.width - t.r) t.vx *= -1;\n                    if (t.y < t.r + 96 || t.y > cv.height - t.r) t.vy *= -1;\n                    t.ph += 0.06;\n                    microDrawTarget(ctx, t);\n                });\n                // drop dead ones lazily\n                if (P.targets.length > 80) P.targets = P.targets.filter(t => !t.dead || (now - t.dead) < 300);\n            });\n        }\n\n        function showVersusResult(winnerIdx, elapsed) {\n            vsLastElapsed = elapsed;\n            showWinScreen('versus', winnerIdx);\n        }\n\n        // ---- Winner / team-win fullscreen ----\n        let vsLastElapsed = 0, vsWinnerIdx = 0, winConfettiRAF = null;\n        function showWinScreen(mode, winnerIdx) {\n            vsWinnerIdx = winnerIdx || 0;\n            try { if (window.sfx && sfx.stopMusic) sfx.stopMusic(); } catch (e) {}\n            vsMusicOn = false;\n            if (window.sfx) sfx.win();\n            const ov = document.getElementById('win-overlay');\n            const title = document.getElementById('win-title');\n            const sub = document.getElementById('win-sub');\n            const emoji = document.getElementById('win-emoji');\n            if (mode === 'coop') {\n                emoji.textContent = '🤝';\n                title.textContent = 'TEAM WINS!';\n                sub.textContent = vsPlayers[0].name + ' + ' + vsPlayers[1].name + ' completed the Science Collection together! 🎉';\n            } else {\n                emoji.textContent = '🏆';\n                title.textContent = vsPlayers[vsWinnerIdx].name.toUpperCase() + ' WINS!';\n                sub.textContent = 'Completed the collection and won the Microscope Shootout' + (vsLastElapsed ? ' in ' + (vsLastElapsed / 1000).toFixed(1) + 's' : '') + '! 🎉';\n            }\n            ov.classList.add('active');\n            startWinConfetti();\n        }\n        function startWinConfetti() {\n            const cv = document.getElementById('win-confetti');\n            const ctx = cv.getContext('2d');\n            function resize() { cv.width = cv.clientWidth; cv.height = cv.clientHeight; }\n            resize(); window.addEventListener('resize', resize);\n            const cols = ['#ff3b3b', '#ff9e00', '#ffe600', '#3fd07a', '#3aa0ff', '#b45cff', '#ffffff'];\n            const bits = [];\n            for (let i = 0; i < 180; i++) bits.push({\n                x: Math.random() * cv.width, y: Math.random() * -cv.height,\n                w: 6 + Math.random() * 8, h: 8 + Math.random() * 10,\n                vy: 2 + Math.random() * 4, vx: (Math.random() * 2 - 1) * 1.5,\n                rot: Math.random() * 6.28, vr: (Math.random() * 2 - 1) * 0.2,\n                c: cols[(Math.random() * cols.length) | 0]\n            });\n            const t0 = performance.now();\n            function frame() {\n                const ov = document.getElementById('win-overlay');\n                if (!ov.classList.contains('active')) { window.removeEventListener('resize', resize); return; }\n                ctx.clearRect(0, 0, cv.width, cv.height);\n                bits.forEach(b => {\n                    b.y += b.vy; b.x += b.vx; b.rot += b.vr;\n                    if (b.y > cv.height + 20) { b.y = -20; b.x = Math.random() * cv.width; }\n                    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);\n                    ctx.fillStyle = b.c; ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);\n                    ctx.restore();\n                });\n                winConfettiRAF = requestAnimationFrame(frame);\n            }\n            frame();\n        }\n\n        // ---- End-of-game statistics ----\n        function vsAggStats() {\n            let ans = 0, cor = 0;\n            const topicErr = {};\n            for (let i = 0; i < 2; i++) {\n                ans += vsPlayers[i].answered || 0; cor += vsPlayers[i].correct || 0;\n                (vsPlayers[i].wrongLog || []).forEach(w => { topicErr[w.topic] = (topicErr[w.topic] || 0) + 1; });\n            }\n            return { ans, cor, wrong: ans - cor, topicErr };\n        }\n        function escHtml(s) {\n            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;');\n        }\n        function openVsStats() {\n            document.getElementById('win-overlay').classList.remove('active');\n            const s = vsAggStats();\n            document.getElementById('stats-title').textContent = vsCoop ? '🤝 Team Results' : '📊 Match Results';\n            drawStatsPie(s.cor, s.wrong);\n            // legend\n            const pct = s.ans ? Math.round(s.cor / s.ans * 100) : 0;\n            document.getElementById('stats-legend').innerHTML =\n                '<div style=\"font-family:var(--font-display);font-weight:800;font-size:15px;margin-bottom:8px\">Questions answered: ' + s.ans + '<\u002Fdiv>' +\n                '<div style=\"display:flex;align-items:center;gap:8px;margin:4px 0\"><span style=\"width:14px;height:14px;border-radius:3px;background:#3fd07a;display:inline-block\"><\u002Fspan> Correct: <b>' + s.cor + '<\u002Fb> (' + pct + '%)<\u002Fdiv>' +\n                '<div style=\"display:flex;align-items:center;gap:8px;margin:4px 0\"><span style=\"width:14px;height:14px;border-radius:3px;background:#ff5a5a;display:inline-block\"><\u002Fspan> Wrong: <b>' + s.wrong + '<\u002Fb> (' + (100 - pct) + '%)<\u002Fdiv>';\n            // per-player blocks\n            document.getElementById('stats-players').innerHTML = [0, 1].map(i => {\n                const p = vsPlayers[i];\n                const acc = p.answered ? Math.round(p.correct / p.answered * 100) : 0;\n                const te = {}; (p.wrongLog || []).forEach(w => te[w.topic] = (te[w.topic] || 0) + 1);\n                const topics = Object.keys(te);\n                const fb = vsPlayerFeedback(acc, topics, te);\n                const wrongs = (p.wrongLog || []);\n                const cards = wrongs.map((w, n) => {\n                    const short = escHtml((w.q || '').slice(0, 70)) + ((w.q || '').length > 70 ? '…' : '');\n                    return '<div class=\"rev-card\" onclick=\"this.classList.toggle(\\'open\\')\">' +\n                        '<div class=\"rev-head\">' +\n                            '<span class=\"rev-topic\">' + escHtml(w.topic || 'General') + '<\u002Fspan>' +\n                            '<span class=\"rev-q\">' + short + '<\u002Fspan>' +\n                            '<span class=\"rev-chev\">▼<\u002Fspan>' +\n                        '<\u002Fdiv>' +\n                        '<div class=\"rev-body\">' +\n                            '<div class=\"rev-full\">' + escHtml(w.q || '') + '<\u002Fdiv>' +\n                            '<div class=\"rev-opt wrong\"><span class=\"rev-ic\">✗<\u002Fspan><div><b>Your answer:<\u002Fb> ' + escHtml(w.chosen || '—') + '<\u002Fdiv><\u002Fdiv>' +\n                            '<div class=\"rev-opt correct\"><span class=\"rev-ic\">✓<\u002Fspan><div><b>Correct answer:<\u002Fb> ' + escHtml(w.correct || '—') + '<\u002Fdiv><\u002Fdiv>' +\n                        '<\u002Fdiv>' +\n                    '<\u002Fdiv>';\n                }).join('');\n                return '<div class=\"sp-block\">' +\n                    '<div class=\"sp-name\">' + p.name + ' — ' + p.correct + '/' + p.answered + ' correct (' + acc + '%)<\u002Fdiv>' +\n                    '<div class=\"sp-fb\">' + fb + '<\u002Fdiv>' +\n                    (wrongs.length\n                        ? '<div class=\"sp-topics\">👆 Tap a question to see the full question, your answer and the correct answer:<\u002Fdiv>' + cards\n                        : '<div class=\"sp-topics\" style=\"color:#7fe0a0\">✨ No wrong answers — flawless!<\u002Fdiv>') +\n                    '<\u002Fdiv>';\n            }).join('');\n            document.getElementById('stats-modal').classList.add('active');\n        }\n        function vsPlayerFeedback(acc, topics, te) {\n            let msg;\n            if (acc >= 90) msg = 'Outstanding work! You have a strong grasp of these concepts. ';\n            else if (acc >= 70) msg = 'Good effort! You know most of this — a little review will make you unstoppable. ';\n            else if (acc >= 50) msg = 'Nice try! You are getting there — focus your practice on the topics below. ';\n            else msg = 'Keep going! Everyone learns by making mistakes. Let us work on the topics below together. ';\n            if (topics.length) {\n                const worst = topics.slice().sort((a, b) => te[b] - te[a])[0];\n                msg += 'Your biggest challenge was <b>' + worst + '<\u002Fb> — try a few more questions on that in the ShirtpapaSG Genie.';\n            }\n            return msg;\n        }\n        function drawStatsPie(correct, wrong) {\n            const cv = document.getElementById('stats-pie'); if (!cv) return;\n            const ctx = cv.getContext('2d'); const cx = 100, cy = 100, r = 88;\n            ctx.clearRect(0, 0, 200, 200);\n            const total = correct + wrong;\n            if (total === 0) { ctx.fillStyle = '#2b3340'; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill(); ctx.fillStyle = '#9fb0c0'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('No data', cx, cy); return; }\n            const segs = [{ v: correct, c: '#3fd07a' }, { v: wrong, c: '#ff5a5a' }];\n            let a = -Math.PI / 2;\n            segs.forEach(s => {\n                if (s.v <= 0) return;\n                const ang = (s.v / total) * Math.PI * 2;\n                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, a, a + ang); ctx.closePath();\n                ctx.fillStyle = s.c; ctx.fill();\n                a += ang;\n            });\n            // donut hole\n            ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, 7); ctx.fillStyle = '#0a1320'; ctx.fill();\n            ctx.fillStyle = '#fff'; ctx.font = '900 26px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n            ctx.fillText(Math.round(correct / total * 100) + '%', cx, cy - 6);\n            ctx.font = '700 11px sans-serif'; ctx.fillStyle = '#9fb0c0'; ctx.fillText('correct', cx, cy + 14);\n        }\n        function vsFeedbackText() {\n            const s = vsAggStats();\n            const mode = vsCoop ? 'Collaborative' : 'Versus';\n            let out = 'ShirtpapaSG Science Claw — ' + mode + ' Mode Results\\n';\n            out += 'Date: ' + new Date().toLocaleString() + '\\n';\n            out += '====================================\\n\\n';\n            out += 'Overall: ' + s.cor + ' / ' + s.ans + ' correct (' + (s.ans ? Math.round(s.cor / s.ans * 100) : 0) + '%)\\n\\n';\n            [0, 1].forEach(i => {\n                const p = vsPlayers[i];\n                const acc = p.answered ? Math.round(p.correct / p.answered * 100) : 0;\n                out += '--- ' + p.name + ' ---\\n';\n                out += 'Score: ' + p.correct + '/' + p.answered + ' correct (' + acc + '%)\\n';\n                if ((p.wrongLog || []).length) {\n                    out += 'Questions to review:\\n';\n                    p.wrongLog.forEach((w, n) => {\n                        out += '  ' + (n + 1) + '. [' + w.topic + '] ' + w.q + '\\n';\n                        out += '     Your answer: ' + w.chosen + '  |  Correct: ' + w.correct + '\\n';\n                    });\n                } else { out += 'No wrong answers — excellent!\\n'; }\n                out += '\\n';\n            });\n            return out;\n        }\n        function downloadVsFeedback() {\n            const html = '<html><head><meta charset=\"utf-8\"><title>Science Claw Feedback<\u002Ftitle>' +\n                '<style>body{font-family:system-ui,Arial,sans-serif;max-width:720px;margin:32px auto;padding:0 24px;color:#111;line-height:1.6}' +\n                'h1{color:#1a7f45}h2{border-bottom:2px solid #eee;padding-bottom:4px;margin-top:26px}' +\n                '.wrong{background:#fff4f2;border-left:3px solid #ff5a5a;padding:8px 12px;margin:8px 0;border-radius:4px}' +\n                '.ok{color:#1a7f45;font-weight:700}pre{white-space:pre-wrap;font-family:inherit}<\u002Fstyle><\u002Fhead><body>' +\n                '<pre>' + vsFeedbackText().replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;') + '<\u002Fpre>' +\n                '<p style=\"margin-top:30px;color:#888;font-size:13px\">Tip: press Ctrl/Cmd+P and choose “Save as PDF”.<\u002Fp><\u002Fbody><\u002Fhtml>';\n            const blob = new Blob([html], { type: 'text/html' });\n            const w = window.open('', '_blank');\n            if (w) { w.document.write(html); w.document.close(); setTimeout(() => { try { w.print(); } catch (e) {} }, 500); }\n            else { triggerDownload(blob, 'ScienceClaw_Feedback.html'); }\n            if (window.sfx) sfx.click();\n        }\n        function exportVsToTeacher() {\n            // log every wrong answer to the unified backend (Game Type = Versus/Co-op)\n            const gameType = vsCoop ? 'Co-op Mode' : 'Versus Mode';\n            let sent = 0;\n            [0, 1].forEach(i => {\n                const p = vsPlayers[i];\n                const wrongAnswers = (p.wrongLog || []).map(w => ({ topic: w.topic, level: w.level, question: w.q, studentAnswer: w.chosen, correctAnswer: w.correct, result: 'Wrong' }));\n                if (!wrongAnswers.length) return;\n                try {\n                    submitToServer({\n                        gameType: gameType,\n                        name: p.name,\n                        studentClass: (function () { try { return (SciClawState.getPlayer() || {}).studentClass || ''; } catch (e) { return ''; } })(),\n                        score: p.correct + '/' + p.answered,\n                        wrongAnswers: wrongAnswers,\n                        at: new Date().toISOString()\n                    }, true);\n                    sent += wrongAnswers.length;\n                } catch (e) {}\n            });\n            showMessage(sent ? ('📤 Sent ' + sent + ' error report' + (sent > 1 ? 's' : '') + ' to the teacher dashboard!') : 'No wrong answers to report — great job! 🎉', 3200);\n            if (window.sfx) sfx.coin();\n        }\n        function closeStatsBackToClaw() {\n            document.getElementById('stats-modal').classList.remove('active');\n            exitVersus();\n        }\n\n        // ---- Leaderboard storage ----\n        function getLeaderboard() {\n            try { return JSON.parse(localStorage.getItem(LS_LEADERBOARD) || '[]') || []; } catch (e) { return []; }\n        }\n        function saveLeaderboardEntry(winner, loser, ms) {\n            const lb = getLeaderboard();\n            lb.push({ winner, loser, time: Math.round(ms), date: Date.now() });\n            lb.sort((a, b) => a.time - b.time);\n            try { localStorage.setItem(LS_LEADERBOARD, JSON.stringify(lb.slice(0, 50))); } catch (e) {}\n        }\n        function openLeaderboard() {\n            renderLeaderboard();\n            document.getElementById('leaderboard-modal').classList.add('active');\n            if (window.sfx) sfx.click();\n        }\n        function renderLeaderboard() {\n            const lb = getLeaderboard();\n            const body = document.getElementById('leaderboard-body');\n            if (!lb.length) { body.innerHTML = '<div class=\"lb-empty\">No matches yet — play a Versus round to set the first record! ⚔️<\u002Fdiv>'; return; }\n            const medal = ['gold', 'silver', 'bronze'];\n            body.innerHTML = '<table class=\"lb-table\"><thead><tr><th>#<\u002Fth><th>Winner<\u002Fth><th>Beat<\u002Fth><th>Time<\u002Fth><th>Date<\u002Fth><\u002Ftr><\u002Fthead><tbody>' +\n                lb.slice(0, 10).map((e, i) => {\n                    const d = new Date(e.date);\n                    const ds = (d.getMonth() + 1) + '/' + d.getDate();\n                    return '<tr><td class=\"lb-rank ' + (medal[i] || '') + '\">' + (i + 1) + '<\u002Ftd>' +\n                        '<td class=\"lb-win\">' + escapeHtmlVs(e.winner) + '<\u002Ftd>' +\n                        '<td>' + escapeHtmlVs(e.loser) + '<\u002Ftd>' +\n                        '<td class=\"lb-time\">' + (e.time / 1000).toFixed(1) + 's<\u002Ftd>' +\n                        '<td style=\"color:var(--sc-text-muted)\">' + ds + '<\u002Ftd><\u002Ftr>';\n                }).join('') + '<\u002Ftbody><\u002Ftable>';\n        }\n        function clearLeaderboard() {\n            if (!confirm('Clear the entire Versus leaderboard? This cannot be undone.')) return;\n            try { localStorage.removeItem(LS_LEADERBOARD); } catch (e) {}\n            renderLeaderboard();\n        }\n        function escapeHtmlVs(s) { return String(s || '').replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;' }[c])); }\n\n        // ============================================================================\n        //  🎖️ ENH3 — Badges / Achievements (local, persistent, offline)\n        // ============================================================================\n        const LS_BADGES = 'scienceClawBadges_v1';\n        const BADGES = [\n            { id: 'first_correct', e: '✅', t: 'First Correct', d: 'Answer your first question correctly.' },\n            { id: 'ten_correct',   e: '🔟', t: 'Perfect Ten', d: 'Get 10 questions correct in total.' },\n            { id: 'fifty_correct', e: '🧠', t: 'Brain Power', d: 'Get 50 questions correct in total.' },\n            { id: 'perfect_run',   e: '🎯', t: 'Flawless', d: 'Finish a timed quiz with every answer correct.' },\n            { id: 'no_hint_run',   e: '💪', t: 'On My Own', d: 'Finish a quiz of 3+ without using a hint.' },\n            { id: 'first_prize',   e: '🧲', t: 'First Grab', d: 'Grab your first specimen from the claw.' },\n            { id: 'microscope',    e: '🔬', t: 'Micro Explorer', d: 'Collect an atom or chip under the microscope.' },\n            { id: 'robot_built',   e: '🤖', t: 'Microscope Builder', d: 'Complete the full Science Collection.' },\n            { id: 'versus_win',    e: '⚔️', t: 'Champion', d: 'Win a Versus match.' },\n            { id: 'comeback',      e: '🔁', t: 'Comeback Kid', d: 'Get a twin/review question right after missing it.' },\n        ];\n        function badgesGet() { try { return JSON.parse(localStorage.getItem(LS_BADGES) || '[]') || []; } catch (e) { return []; } }\n        function badgesSet(a) { try { localStorage.setItem(LS_BADGES, JSON.stringify(a)); } catch (e) {} }\n        function unlockBadge(id) {\n            const have = badgesGet();\n            if (have.includes(id)) return;\n            const b = BADGES.find(x => x.id === id); if (!b) return;\n            have.push(id); badgesSet(have);\n            if (window.sfx) sfx.win();\n            showMessage('🎖️ Badge unlocked: ' + b.e + ' ' + b.t + '!', 4000);\n        }\n        function checkBadges() {\n            const totalCorrect = (typeof globalCorrectAnswers === 'number') ? globalCorrectAnswers : 0;\n            if (totalCorrect >= 1) unlockBadge('first_correct');\n            if (totalCorrect >= 10) unlockBadge('ten_correct');\n            if (totalCorrect >= 50) unlockBadge('fifty_correct');\n            if ((prizesWon || 0) >= 1) unlockBadge('first_prize');\n        }\n        function openBadges() {\n            const have = badgesGet();\n            const questOn = (typeof microQuestUnlocked === 'function') && microQuestUnlocked();\n            const questTile = questOn\n                ? `<div class=\"hidden-quest\" style=\"grid-column:1/-1;padding:12px 14px;border-radius:14px;background:var(--sc-ink-900,#0d1420)\">\n                       <b>🔬 HIDDEN QUEST — Microscope Lab<\u002Fb><br>\n                       <span style=\"font-size:12.5px;color:var(--sc-text-muted)\">Unlocked! The Microscope Lab has appeared on the Science Claw page — enter it at 1000× to find the robot's ⚛️ atom eyes and 🔲 CPU brain.<\u002Fspan>\n                   <\u002Fdiv>`\n                : `<div style=\"grid-column:1/-1;padding:12px 14px;border-radius:14px;border:1.5px dashed rgba(255,255,255,.25)\">\n                       <b>❓ Hidden Quest<\u002Fb><br>\n                       <span style=\"font-size:12.5px;color:var(--sc-text-muted)\">Complete your full claw Science Collection (Battery, Wheels, Magnet, Lens, Titanium) to reveal a secret…<\u002Fspan>\n                   <\u002Fdiv>`;\n            document.getElementById('badges-body').innerHTML = questTile + BADGES.map(b => {\n                const got = have.includes(b.id);\n                return '<div style=\"border:1px solid var(--sc-glass-line,rgba(255,255,255,.1));border-radius:12px;padding:12px;background:var(--sc-ink-900,#0b1622);opacity:' + (got ? '1' : '.45') + '\">'\n                    + '<div style=\"font-size:30px;filter:' + (got ? 'none' : 'grayscale(1)') + '\">' + b.e + '<\u002Fdiv>'\n                    + '<div style=\"font-family:var(--font-display);font-weight:800;font-size:14px;color:' + (got ? 'var(--sc-yellow-soft,#ffe89a)' : 'var(--sc-text-muted,#9fb0c0)') + ';margin-top:4px\">' + b.t + (got ? '' : ' 🔒') + '<\u002Fdiv>'\n                    + '<div style=\"font-size:12px;color:var(--sc-text-muted,#9fb0c0);margin-top:2px;line-height:1.4\">' + b.d + '<\u002Fdiv><\u002Fdiv>';\n            }).join('');\n            const n = have.length;\n            document.querySelector('#badges-modal .modal-sub').textContent = 'Earned ' + n + ' of ' + BADGES.length + ' badges. Keep playing to unlock them all!';\n            document.getElementById('badges-modal').classList.add('active');\n            if (window.sfx) sfx.click();\n        }\n\n        // ============================================================================\n        //  📲 ENH9 — Resume code (device-independent, no login, PDPA-friendly)\n        // ============================================================================\n        function encodeResume() {\n            try {\n                const rec = buildRecord();\n                rec._credits = credits; rec._sciencePoints = sciencePoints;\n                rec._collection = collection; rec._badges = badgesGet();\n                const json = JSON.stringify(rec);\n                // UTF-8 safe base64\n                return 'SCLAW1:' + btoa(unescape(encodeURIComponent(json)));\n            } catch (e) { return ''; }\n        }\n        function copyResumeCode() {\n            const code = encodeResume();\n            if (!code) { showMessage('Could not build a resume code.', 3000); return; }\n            const box = document.getElementById('resume-code-box');\n            if (box) { box.style.display = 'block'; box.value = code; box.select(); }\n            try { navigator.clipboard && navigator.clipboard.writeText(code); } catch (e) {}\n            showMessage('📋 Resume code ready — copied! Paste it on any device to continue.', 4500);\n            if (window.sfx) sfx.coin();\n        }\n        function promptResumeCode() {\n            const raw = prompt('Paste your Resume Code here:');\n            if (!raw) return;\n            const code = raw.trim().replace(/^SCLAW1:/, '');\n            try {\n                const json = decodeURIComponent(escape(atob(code)));\n                const rec = JSON.parse(json);\n                applyRecord(rec, true);\n                if (typeof rec._credits === 'number') { credits = rec._credits; }\n                if (typeof rec._sciencePoints === 'number') { sciencePoints = rec._sciencePoints; }\n                if (rec._collection) { ITEM_KEYS.forEach(k => { if (typeof rec._collection[k] === 'number') collection[k] = rec._collection[k]; }); }\n                if (Array.isArray(rec._badges)) { badgesSet(rec._badges); }\n                updateHUD(); renderCollection();\n                showMessage('✅ Progress restored from your Resume Code!', 4000);\n                if (window.sfx) sfx.win();\n            } catch (e) {\n                showMessage('That resume code could not be read. Please copy the whole code.', 4000);\n            }\n        }\n    <\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
