pe) {\n            const cfg = SCIENCE_ITEMS[type];\n            const g = new THREE.Group();\n            let glowMat = null;\n            const body = (extra) => new THREE.MeshStandardMaterial(Object.assign({ color: cfg.color, roughness: 0.35, metalness: 0.25 }, extra || {}));\n            const metal = (c) => new THREE.MeshStandardMaterial({ color: c || 0xcfd4da, metalness: 0.85, roughness: 0.22 });\n\n            if (type === 'battery') {\n                const shellMat = new THREE.MeshStandardMaterial({ color: cfg.color, roughness: 0.35, metalness: 0.25, emissive: 0xffd400, emissiveIntensity: 0.3 });\n                glowMat = shellMat;\n                const shell = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.62, 22), shellMat);\n                const band = new THREE.Mesh(new THREE.CylinderGeometry(0.282, 0.282, 0.16, 22), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 }));\n                band.position.y = -0.09;\n                const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16), metal());\n                cap.position.y = 0.36;\n                g.add(shell, band, cap);\n            } else if (type === 'plant') {\n                // HEX NUT — a real metal hexagonal nut with a threaded through-hole\n                const nutMat = new THREE.MeshStandardMaterial({ color: 0x9aa3ad, metalness: 0.92, roughness: 0.34 });\n                glowMat = nutMat;\n                const nutBody = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.22, 6), nutMat); // hex prism\n                const chamfer = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.34, 0.05, 6), nutMat); chamfer.position.y = 0.12;\n                const chamfer2 = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.3, 0.05, 6), nutMat); chamfer2.position.y = -0.12;\n                const holeRing = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.055, 12, 26), new THREE.MeshStandardMaterial({ color: 0x6b7480, metalness: 0.9, roughness: 0.45 }));\n                holeRing.rotation.x = Math.PI / 2;\n                const hole = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.26, 22), new THREE.MeshStandardMaterial({ color: 0x0a0d12, metalness: 0.5, roughness: 0.7 }));\n                g.add(nutBody, chamfer, chamfer2, holeRing, hole);\n            } else if (type === 'magnet') {\n                const arc = new THREE.Mesh(new THREE.TorusGeometry(0.26, 0.1, 14, 28, Math.PI), body());\n                arc.rotation.z = Math.PI; // U-shape, opening up\n                const tipGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.18, 14);\n                const t1 = new THREE.Mesh(tipGeo, metal(0xe6e6e6)); t1.position.set(-0.26, 0.09, 0);\n                const t2 = new THREE.Mesh(tipGeo, metal(0xe6e6e6)); t2.position.set(0.26, 0.09, 0);\n                g.add(arc, t1, t2);\n            } else if (type === 'atom') {\n                const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), new THREE.MeshStandardMaterial({ color: cfg.color, emissive: 0x0a2a44, metalness: 0.3, roughness: 0.3 }));\n                const ringGeo = new THREE.TorusGeometry(0.32, 0.026, 8, 44);\n                const r1 = new THREE.Mesh(ringGeo, body({ metalness: 0.4 })); r1.rotation.x = Math.PI / 2;\n                const r2 = new THREE.Mesh(ringGeo, body({ metalness: 0.4 })); r2.rotation.x = Math.PI / 3; r2.rotation.y = Math.PI / 4;\n                const r3 = new THREE.Mesh(ringGeo, body({ metalness: 0.4 })); r3.rotation.x = -Math.PI / 3; r3.rotation.y = -Math.PI / 4;\n                g.add(nucleus, r1, r2, r3);\n            } else if (type === 'crystal') {\n                // MAGNIFYING LENS — glass disc in a gold rim with a wooden handle (matches 🔍)\n                const glassMat = new THREE.MeshStandardMaterial({ color: 0xbfe8ff, metalness: 0.1, roughness: 0.05, transparent: true, opacity: 0.5, emissive: 0x123044, emissiveIntensity: 0.45 });\n                glowMat = glassMat;\n                const glass = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.06, 30), glassMat);\n                glass.rotation.x = Math.PI / 2;\n                const rim = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.05, 14, 32), new THREE.MeshStandardMaterial({ color: 0xffb627, metalness: 0.88, roughness: 0.28 }));\n                rim.rotation.x = Math.PI / 2;\n                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.12, 12), new THREE.MeshStandardMaterial({ color: 0xffb627, metalness: 0.85, roughness: 0.3 }));\n                neck.position.y = -0.34;\n                const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.3, 14), new THREE.MeshStandardMaterial({ color: 0x7a4e28, metalness: 0.25, roughness: 0.65 }));\n                handle.position.y = -0.52;\n                g.add(glass, rim, neck, handle);\n            } else if (type === 'titanium') {\n                // IRON BOLT — hex head + threaded shaft (matches 🔩)\n                const ironMat = new THREE.MeshStandardMaterial({ color: 0x8b929c, metalness: 0.92, roughness: 0.4 });\n                glowMat = ironMat;\n                const head = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.2, 6), ironMat);\n                head.position.y = 0.3;\n                const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.52, 20), ironMat);\n                shaft.position.y = -0.04;\n                for (let i = 0; i < 6; i++) {\n                    const th = new THREE.Mesh(new THREE.TorusGeometry(0.125, 0.022, 8, 22), ironMat);\n                    th.rotation.x = Math.PI / 2; th.position.y = 0.14 - i * 0.078;\n                    g.add(th);\n                }\n                g.add(head, shaft);\n            } else if (type === 'cpu') {\n                // a microprocessor — dark teal die on a chip body with gold pins\n                const board = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.5), new THREE.MeshStandardMaterial({ color: cfg.color, metalness: 0.4, roughness: 0.45 }));\n                const die = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.06, 0.26), new THREE.MeshStandardMaterial({ color: 0x0c2e2a, metalness: 0.6, roughness: 0.3, emissive: 0x06201d }));\n                die.position.y = 0.07;\n                const pinMat = metal(0xffcf4d);\n                for (let i = -1; i <= 1; i++) {\n                    const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.04, 0.12), pinMat); p1.position.set(i * 0.16, -0.02, 0.3);\n                    const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.04, 0.12), pinMat); p2.position.set(i * 0.16, -0.02, -0.3);\n                    const p3 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.05), pinMat); p3.position.set(0.3, -0.02, i * 0.16);\n                    const p4 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.05), pinMat); p4.position.set(-0.3, -0.02, i * 0.16);\n                    g.add(p1, p2, p3, p4);\n                }\n                g.add(board, die);\n            }\n            g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });\n            // Atoms & microchips are pixel-small in the cabinet — effectively invisible to the\n            // naked eye. They are only revealed by the 1000× microscope in the Views panel.\n            if (type === 'atom' || type === 'cpu') g.scale.setScalar(0.03);\n            g.userData = { type, spin: (type === 'atom' ? 0.02 : type === 'crystal' ? 0.016 : type === 'plant' ? 0.03 : 0), glowMat: glowMat, bounce: false, baseY: 0.4 };\n            return g;\n        }\n\n        function placeNonOverlapping(minDist, placed) {\n            for (let tries = 0; tries < 80; tries++) {\n                const x = -3.8 + Math.random() * 7.6;\n                const z = -3.3 + Math.random() * 6.6;\n                if (Math.hypot(x - (-3), z - 3) < 1.7) continue; // keep drop zone clear\n                if (placed.every(p => Math.hypot(p.x - x, p.z - z) >= minDist)) return { x, z };\n            }\n            return null;\n        }\n\n        function spawnObjects() {\n            const placed = prizes.map(p => ({ x: p.position.x, z: p.position.z }));\n            // In versus/co-op there is no microscope, so the ??? specimens (atom/cpu) must not\n            // appear on the claw bed — only the catchable set spawns there.\n            const spawnKeys = (versusMode && vsPlayers) ? CLAW_ONLY_KEYS : ITEM_KEYS;\n            spawnKeys.forEach(type => {\n                const it = SCIENCE_ITEMS[type];\n                let count;\n                if (versusMode && vsPlayers) {\n                    // Shared pool: both players need `required` each, so the machine must hold\n                    // the COMBINED requirement (required × 2), plus one spare, minus what's\n                    // already been grabbed by either player.\n                    const combinedReq = it.required * 2;\n                    const got = (vsPlayers[0].collection[type] || 0) + (vsPlayers[1].collection[type] || 0);\n                    const onBed = prizes.filter(p => p.userData && p.userData.type === type).length;\n                    count = Math.max(0, (combinedReq - got + 1) - onBed);\n                    count = Math.max(count, it.spawn);\n                } else {\n                    // How many of this type the student still needs to finish the collection.\n                    const need = Math.max(0, it.required - (collection[type] || 0));\n                    // Always place ONE EXTRA beyond what's still needed, never below base spawn.\n                    count = Math.max(it.spawn, need + 1);\n                }\n                for (let i = 0; i < count; i++) {\n                    // Retry with progressively relaxed spacing so a needed item is\n                    // NEVER silently skipped on a crowded bed.\n                    let pos = placeNonOverlapping(0.95, placed) || placeNonOverlapping(0.6, placed) || placeNonOverlapping(0.4, placed);\n                    if (!pos) pos = { x: -3.8 + Math.random() * 7.6, z: -3.3 + Math.random() * 6.6 };\n                    placed.push(pos);\n                    const obj = buildScienceObject(type);\n                    obj.position.set(pos.x, 0.4, pos.z);\n                    obj.rotation.y = Math.random() * Math.PI * 2;\n                    scene.add(obj);\n                    prizes.push(obj);\n                }\n            });\n        }\n\n        // Refill the bed whenever it is empty OR any still-needed type has run out.\n        function ensureBedStock() {\n            if (versusMode) return;   // versus/co-op use vsMaybeRespawn\n            let needMore = false;\n            ITEM_KEYS.forEach(k => {\n                if ((collection[k] || 0) < SCIENCE_ITEMS[k].required) {\n                    const left = prizes.filter(p => p.userData && p.userData.type === k).length;\n                    if (left === 0) needMore = true;\n                }\n            });\n            if (prizes.length === 0 || needMore) spawnObjects();\n        }\n\n        function renderCollection() {\n            if (versusMode) renderVersus();\n            const list = document.getElementById('collection-list');\n            if (!list) return;\n            let totalReq = 0, totalGot = 0;\n            const questOn = microQuestUnlocked();\n            list.innerHTML = ITEM_KEYS.map(t => {\n                const c = SCIENCE_ITEMS[t];\n                const got = Math.min(collection[t], c.required);\n                totalReq += c.required; totalGot += got;\n                const done = collection[t] >= c.required;\n                const isSpecial = (t === 'atom' || t === 'cpu');\n                // Once the microscope hidden quest unlocks, the two ??? specimens become a\n                // glowing rainbow \"special quest\" to chase inside the lab.\n                const nameCls = (isSpecial && questOn) ? 'coll-name rainbow-quest' : 'coll-name';\n                const rowCls = (isSpecial && questOn) ? 'coll-row special-quest ' : 'coll-row ';\n                return `<div class=\"${rowCls}${done ? 'done' : ''}\">\n                    <span class=\"coll-emoji\">${c.emoji}<\u002Fspan>\n                    <span class=\"${nameCls}\">${c.name}<\u002Fspan>\n                    <span class=\"coll-count\">${got}/${c.required}<\u002Fspan>\n                    <span class=\"coll-check\">✓<\u002Fspan>\n                <\u002Fdiv>`;\n            }).join('');\n            const pct = totalReq ? Math.round(totalGot / totalReq * 100) : 0;\n            document.getElementById('coll-bar').style.width = pct + '%';\n            document.getElementById('coll-progress-label').innerText = `${totalGot} / ${totalReq} collected · ${pct}%`;\n            renderRobotProgress();\n            updateMicroQuest();\n        }\n\n        // ---- HIDDEN QUEST: the Microscope Lab only appears once every claw-catchable\n        // item is collected (atoms + CPU chips live INSIDE the lab, so they don't gate it).\n        const CLAW_ONLY_KEYS = ['battery', 'plant', 'magnet', 'crystal', 'titanium'];\n        function microQuestUnlocked() {\n            return CLAW_ONLY_KEYS.every(t => (collection[t] || 0) >= SCIENCE_ITEMS[t].required);\n        }\n        function updateMicroQuest() {\n            const panel = document.getElementById('micro-quest');\n            if (!panel) return;\n            if (versusMode) { panel.style.display = 'none'; return; }\n            const on = microQuestUnlocked();\n            if (on && panel.style.display === 'none') {\n                panel.style.display = '';\n                startMicroscope();\n                showMessage('🌟 HIDDEN QUEST UNLOCKED — the Microscope Lab has appeared!', 4500);\n                try { if (window.sfx) sfx.win(); } catch (e) {}\n            } else if (!on) {\n                panel.style.display = 'none';\n            }\n        }\n\n        // ENH2 + ENH8: each specimen is a robot part. Parts light up as you collect them;\n        // the atom (eyes) and CPU chip (brain) come from the Microscope Lab.\n        const ROBOT_PARTS = {\n            cpu:      { emoji: '🔲', role: 'Brain', src: '🔬' },\n            atom:     { emoji: '⚛️', role: 'Eyes', src: '🔬' },\n            lens:     { emoji: '🔍', role: 'Core', src: '' },\n            battery:  { emoji: '🔋', role: 'Power', src: '' },\n            magnet:   { emoji: '🧲', role: 'Arms', src: '' },\n            titanium: { emoji: '🔩', role: 'Frame', src: '' },\n            plant:    { emoji: '🛞', role: 'Legs', src: '' },\n        };\n        function renderRobotProgress() {\n            const wrap = document.getElementById('robot-parts');\n            if (!wrap) return;\n            // order parts head-to-toe: brain, eyes, core, power, arms, frame, legs\n            const order = ['cpu', 'atom', 'lens', 'battery', 'magnet', 'titanium', 'plant'];\n            wrap.innerHTML = order.filter(k => SCIENCE_ITEMS[k] && SCIENCE_ITEMS[k].required > 0).map(k => {\n                const need = SCIENCE_ITEMS[k].required;\n                const got = Math.min(collection[k] || 0, need);\n                const done = got >= need;\n                const rp = ROBOT_PARTS[k];\n                const title = rp.role + (rp.src ? ' · from 🔬 Microscope' : '') + ' (' + got + '/' + need + ')';\n                return '<div title=\"' + title + '\" style=\"display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;'\n                    + 'opacity:' + (done ? '1' : (got > 0 ? '.6' : '.28')) + ';transition:.3s\">'\n                    + '<div style=\"font-size:20px;filter:' + (done ? 'drop-shadow(0 0 6px rgba(63,195,95,.8))' : 'grayscale(1)') + '\">' + rp.emoji + '<\u002Fdiv>'\n                    + '<div style=\"font-size:9px;font-weight:800;letter-spacing:.02em;color:' + (done ? 'var(--sc-green-bright,#3fc35f)' : 'var(--sc-text-muted,#9fb0c0)') + '\">' + rp.role + '<\u002Fdiv>'\n                    + '<\u002Fdiv>';\n            }).join('');\n        }\n\n        function showRobotModal() {\n            const m = document.getElementById('robot-modal');\n            if (!m) { showMessage('🏆 Science Collection Complete! Mr Soh is impressed! +50 Points', 6000); return; }\n            // restart the pop animations\n            const robot = document.getElementById('robot-build');\n            if (robot) { const c = robot.cloneNode(true); robot.parentNode.replaceChild(c, robot); }\n            m.classList.add('active');\n        }\n        function closeRobotModal() {\n            const m = document.getElementById('robot-modal');\n            if (m) m.classList.remove('active');\n            if (window.sfx) sfx.click();\n        }\n\n        // ---- Collapsible HUD panels (phone / tablet friendly) ----\n        function setupPanelToggles() {\n            const cfg = [\n                ['top-left-hud', '🕹️ Menu'],\n                ['top-right-hud', '🎥 Views'],\n                ['collection-hud', '🧪 Collection'],\n            ];\n            cfg.forEach(function (c) {\n                const el = document.getElementById(c[0]);\n                if (!el) return;\n                const btn = document.createElement('button');\n                btn.className = 'hud-toggle';\n                btn.type = 'button';\n                btn.title = 'Hide / show this panel';\n                btn.setAttribute('aria-label', 'Hide or show panel');\n                btn.textContent = '—';\n                btn.onclick = function () {\n                    el.classList.toggle('collapsed');\n                    btn.textContent = el.classList.contains('collapsed') ? c[1] : '—';\n                    if (window.sfx) sfx.click();\n                };\n                el.appendChild(btn);\n                // On small screens start with the side panels tucked away\n                if (window.innerWidth <= 820 && c[0] !== 'top-left-hud') {\n                    el.classList.add('collapsed');\n                    btn.textContent = c[1];\n                }\n                if (window.innerWidth <= 480 && c[0] === 'top-left-hud') {\n                    el.classList.add('collapsed');\n                    btn.textContent = c[1];\n                }\n            });\n        }\n        setupPanelToggles();\n\n        function checkCollectionComplete() {\n            if (versusMode) { versusCheckComplete(); return; }\n            const done = ITEM_KEYS.every(t => collection[t] >= SCIENCE_ITEMS[t].required);\n            if (done && !collectionComplete) {\n                collectionComplete = true;\n                sciencePoints += 50;\n                updateHUD();\n                if (window.sfx) sfx.win();\n                unlockBadge('robot_built');\n                showRobotModal();\n            }\n        }\n        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };\n\n        // SAFELY INITIALIZE\n        function bootGame() {\n            try {\n                initBank(); \n                init3DScene();\n                loadCurrentSession();\n                // The shared wallet is canonical for credits — pull in anything the\n                // student just earned in the Genie so they can spend it here.\n                if (window.SciClawState) {\n                    try { credits = SciClawState.getPlayer().credits || 0; } catch (e) {}\n                }\n                updateHUD();\n                animate();\n                playtimeInterval = setInterval(updatePlaytime, 1000);\n                window.addEventListener('beforeunload', autoSaveSession);\n            } catch (err) {\n                console.error(\"Init Error:\", err && (err.stack || err.message) || err);\n            }\n        }\n        if (document.readyState === 'loading') {\n            document.addEventListener(\"DOMContentLoaded\", bootGame);\n        } else {\n            // Defer so ALL top-level let/const (versusMode, etc.) finish initializing\n            // before bootGame runs — critical when inlined/bundled (readyState != 'loading').\n            setTimeout(bootGame, 0);\n        }\n\n        function updatePlaytime() {\n            totalPlaySeconds++;\n            if (totalPlaySeconds % 5 === 0) autoSaveSession();\n            let hrs = Math.floor(totalPlaySeconds / 3600);\n            let mins = Math.floor((totalPlaySeconds % 3600) / 60);\n            let secs = totalPlaySeconds % 60;\n            document.getElementById('playtime-display').innerText = \n                `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;\n\n            if (totalPlaySeconds === 1800 && !notified30) {\n                showMessage(\"You have played for 30 min, time to take a break!\", 8000);\n                notified30 = true;\n            } else if (totalPlaySeconds === 3000 && !notified50) {\n                showMessage(\"You have played for 50 min, time to take a break!\", 8000);\n                notified50 = true;\n            }\n        }\n\n        // ============================================================\n        //  STUDENT RECORDS, PERSISTENCE & TEACHER EXPORT\n        // ============================================================\n        const LS_CURRENT = 'scienceClawCurrent_v1';\n        const LS_ROSTER  = 'scienceClawRoster_v1';\n        const LS_ENDPOINT = 'scienceClawEndpoint';\n        // Hardcoded default endpoint — all data flows here with zero teacher setup.\n        const DEFAULT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbz7xMqT6wyu2V42WhKMZhuqAxqYX18EHJMQm_7PMo2ZJ4P6UJs0fHlv621GWoYOKQeAGw/exec';\n\n        function triggerDownload(blob, filename) {\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url; a.download = filename;\n            document.body.appendChild(a); a.click(); document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n        const stamp = () => new Date().toISOString().slice(0, 10);\n        const safeName = (s) => (s || 'student').replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '') || 'student';\n\n        function accuracyPct() {\n            return questionsAnswered > 0 ? Math.round(globalCorrectAnswers / questionsAnswered * 100) : 0;\n        }\n\n        function buildRecord() {\n            return {\n                name: studentName.trim(),\n                class: studentClass.trim(),\n                savedAt: new Date().toISOString(),\n                playDurationSeconds: totalPlaySeconds,\n                playDuration: fmtDuration(totalPlaySeconds),\n                questionsAnswered: questionsAnswered,\n                correctAnswers: globalCorrectAnswers,\n                wrongCount: wrongAnswersLog.length,\n                accuracy: accuracyPct(),\n                prizesWon: prizesWon,\n                sciencePoints: sciencePoints,\n                collectionComplete: collectionComplete,\n                credits: credits,\n                collection: Object.assign({}, collection),\n                attemptsByTopic: Object.assign({}, attemptsByTopic),\n                wrongByTopic: Object.assign({}, wrongByTopic),\n                attemptsByType: Object.assign({}, attemptsByType),\n                wrongByType: Object.assign({}, wrongByType),\n                wrongAnswers: wrongAnswersLog,\n                correctAnswers2: correctAnswersLog\n            };\n        }\n\n        function autoSaveSession() {\n            try { localStorage.setItem(LS_CURRENT, JSON.stringify(buildRecord())); } catch (e) {}\n        }\n\n        function applyRecord(r, announce) {\n            if (!r) return;\n            studentName = r.name || ''; studentClass = r.class || '';\n            totalPlaySeconds = r.playDurationSeconds || 0;\n            questionsAnswered = r.questionsAnswered || 0;\n            globalCorrectAnswers = r.correctAnswers || 0;\n            prizesWon = r.prizesWon || 0;\n            sciencePoints = r.sciencePoints || 0;\n            credits = r.credits || 0;\n            // SHARED WALLET is canonical for the credit balance — never let this stale\n            // game session overwrite credits the student just earned in the Genie.\n            if (window.SciClawState) { try { var _wc = SciClawState.getPlayer().credits; if (typeof _wc === 'number') credits = _wc; } catch (e) {} }\n            wrongAnswersLog = Array.isArray(r.wrongAnswers) ? r.wrongAnswers : [];\n            correctAnswersLog = Array.isArray(r.correctAnswers2) ? r.correctAnswers2 : [];\n            attemptsByTopic = r.attemptsByTopic || {};\n            wrongByTopic = r.wrongByTopic || {};\n            attemptsByType = r.attemptsByType || {};\n            wrongByType = r.wrongByType || {};\n            if (r.collection) { ITEM_KEYS.forEach(t => { collection[t] = r.collection[t] || 0; }); }\n            collectionComplete = ITEM_KEYS.every(t => collection[t] >= SCIENCE_ITEMS[t].required);\n            document.getElementById('playtime-display').innerText = fmtDuration(totalPlaySeconds);\n            updateHUD();\n            renderCollection();\n            const n = document.getElementById('rec-name'); if (n) n.value = studentName;\n            const c = document.getElementById('rec-class'); if (c) c.value = studentClass;\n            renderRecStats();\n            autoSaveSession();\n            if (announce) showMessage('📂 Record loaded! Your progress is restored.');\n        }\n\n        function loadCurrentSession() {\n            try {\n                const raw = localStorage.getItem(LS_CURRENT);\n                if (raw) applyRecord(JSON.parse(raw), false);\n            } catch (e) {}\n        }\n\n        // ---- Student-facing records panel ----\n        function openRecords() {\n            const n = document.getElementById('rec-name'); if (n) n.value = studentName;\n            const c = document.getElementById('rec-class'); if (c) c.value = studentClass;\n            renderRecStats();\n            const btn = document.getElementById('rec-submit-btn');\n            if (btn) btn.style.opacity = localStorage.getItem(LS_ENDPOINT) ? '1' : '0.55';\n            document.getElementById('records-modal').classList.add('active');\n        }\n\n        function renderRecStats() {\n            const el = document.getElementById('rec-stats');\n            if (!el) return;\n            const s = [\n                ['Play Time', fmtDuration(totalPlaySeconds), ''],\n                ['Questions Answered', questionsAnswered, ''],\n                ['Correct', globalCorrectAnswers, ''],\n                ['Wrong Answers', wrongAnswersLog.length, 'wrong'],\n                ['Prizes Won', prizesWon, 'prizes'],\n                ['Science Points', sciencePoints, 'points']\n            ];\n            el.innerHTML = s.map(([k, v, cls]) => `<div class=\"rec-stat ${cls}\"><span class=\"k\">${k}<\u002Fspan><span class=\"v\">${v}<\u002Fspan><\u002Fdiv>`).join('');\n        }\n\n        // ---- CONTENT PACK: portable export/import of ALL teachable content ----\n        // One JSON file carries the app's content so future upgrades lift it straight in:\n        // the question bank, teacher-approved twin questions, curated \"why\" explanations,\n        // and the claw collection goals. Interface & pedagogy (CECL flow, difficulty\n        // ladder, scaffolding) live in the code and travel with it.\n        // ---- COPYRIGHT-FREE QUESTIONS ----\n        // Teacher-approved twins are ORIGINAL rephrasings (new wording, standard\n        // non-copyrightable science), quietly banked here for free reuse. Raw copies\n        // of a source question's wording are NOT captured.\n        const LS_CF = 'scienceClawCopyrightFree_v1';\n        function getCFStore() { try { return JSON.parse(localStorage.getItem(LS_CF) || '[]') || []; } catch(e){ return []; } }\n        function addCopyrightFree(entry) {\n            if (!entry || !entry.text || !String(entry.text).trim()) return ee: true };\n            });\n            const bankList = fullQuestionBank.map(function(q){\n                const copy = {}; for (const k in q) copy[k] = q[k];\n                copy.isCopyrightFree = !!q.isCopyrightFree;\n                return copy;\n            });\n            const pack = {\n                app: 'ShirtpapaSG Genie', packVersion: CONTENT_PACK_VERSION,\n                exportedAt: new Date().toISOString(),\n                counts: { questions: bankList.length, copyrightFree: cfList.length },\n                copyrightFree: cfList,\n                questionBank: bankList,\n                approvedTwins: getTwinStore(),\n                curatedExplanations: Object.assign({}, CURATED_EXPLANATIONS, EXPL_OVERRIDES),\n                collectionQuota: (function(){ try { return JSON.parse(localStorage.getItem(LS_QUOTA) || '{}'); } catch(e){ return {}; } })()\n            };\n            const stamp = new Date().toISOString().slice(0, 10);\n            triggerDownload(new Blob([JSON.stringify(pack, null, 2)], { type: 'application/json' }),\n                'ShirtpapaSG Content Pack v' + CONTENT_PACK_VERSION + ' (' + stamp + ').json');\n            if (window.sfx) sfx.coin();\n            showMessage('⬇️ Content Pack exported — ' + bankList.length + ' bank questions + ' + cfList.length + ' copyright-free.', 4000);\n        }\n        function importContentPack(input) {\n            const file = input.files && input.files[0];\n            if (!file) return;\n            const reader = new FileReader();\n            reader.onload = (e) => {\n                try {\n                    const pack = JSON.parse(e.target.result);\n                    if (!pack || (!Array.isArray(pack.questionBank) && !Array.isArray(pack.copyrightFree))) throw new Error('bad pack');\n                    if (!confirm('Import this Content Pack? It replaces the current question bank, copyright-free questions, approved twins and explanations on this device.')) { input.value=''; return; }\n                    if (Array.isArray(pack.questionBank) && pack.questionBank.length) {\n                        fullQuestionBank = pack.questionBank.map(function(q){\n                            const copy = {}; for (const k in q) copy[k] = q[k];\n                            copy.isCopyrightFree = !!q.isCopyrightFree;\n                            return copy;\n                        });\n                        saveToLocalStorage();\n                    }\n                    if (Array.isArray(pack.copyrightFree)) {\n                        const cf = pack.copyrightFree.map(function(e){\n                            const norm = String(e.text || '').replace(/<[^>]*>/g, ' ').replace(/\\s+/g, ' ').trim().toLowerCase();\n                            return { text: e.text || '', topic: e.topic || '', type: e.type || '', kind: e.kind || 'approved-twin', addedAt: e.addedAt || '', _n: norm };\n                        }).filter(function(e){ return e.text; });\n                        try { localStorage.setItem(LS_CF, JSON.stringify(cf)); } catch(err){}\n                    }\n                    if (pack.approvedTwins) saveTwinStore(pack.approvedTwins);\n                    if (pack.curatedExplanations) {\n                        EXPL_OVERRIDES = pack.curatedExplanations;\n                        try { localStorage.setItem('scienceClawExpl_v1', JSON.stringify(EXPL_OVERRIDES)); } catch(err){}\n                    }\n                    if (pack.collectionQuota) { try { localStorage.setItem(LS_QUOTA, JSON.stringify(pack.collectionQuota)); } catch(err){} }\n                    if (window.sfx) sfx.win();\n                    showMessage('✅ Content Pack imported — ' + fullQuestionBank.length + ' bank questions + ' + getCFStore().length + ' copyright-free loaded.', 4000);\n                    renderEditorList();\n                    if (typeof renderTagLegend === 'function') renderTagLegend();\n                } catch (err) {\n                    showMessage('Could not read dsheet();\n    var sheet = ss.getSheetByName('Responses') || ss.insertSheet('Responses');\n    if (sheet.getLastRow() === 0) {\n      sheet.appendRow(['Time','Game Type','Name','Class','Level','Topic','Question','Student Answer','Correct Answer','Result','Score']);\n    }\n    var d = JSON.parse(e.postData.contents);\n    var gt = d.gameType || '';\n    var nm = d.name || ''; var cl = d['class'] || d.studentClass || '';\n    if (d.wrongAnswers && d.wrongAnswers.length) {\n      sheet.appendRow([new Date(), gt, nm, cl, '', 'SESSION SUMMARY',\n        d.questionsAnswered + ' questions \\u00b7 ' + d.accuracy + '% accuracy \\u00b7 ' + d.playDuration,\n        '', '', d.correctAnswers + ' correct / ' + d.wrongCount + ' wrong', d.sciencePoints]);\n      for (var i = 0; i < d.wrongAnswers.length; i++) {\n        var w = d.wrongAnswers[i];\n        sheet.appendRow([new Date(), gt, nm, cl, w.level || '', w.topic || '', w.question || '', w.studentAnswer || '', w.correctAnswer || '', 'WRONG', '']);\n      }\n    } else if (d.test || d.event === 'test') {\n      sheet.appendRow([new Date(), gt || '(test)', nm, cl, '', '', 'Test connection', '', '', 'OK', '']);\n    } else {\n      sheet.appendRow([new Date(), gt, nm, cl, d.level || '', d.topic || '', d.question || '', d.answer || d.studentAnswer || '', d.correctAnswer || '', d.correct || d.result || '', d.credits || d.score || '']);\n    }\n    return ContentService\n      .createTextOutput(JSON.stringify({ result: 'success' }))\n      .setMimeType(ContentService.MimeType.JSON);\n  } catch (err) {\n    return ContentService\n      .createTextOutput(JSON.stringify({ result: 'error', message: err.toString() }))\n      .setMimeType(ContentService.MimeType.JSON);\n  } finally {\n    try { lock.releaseLock(); } catch (e3) {}\n  }\n}\n\nfunction doGet() {\n  return ContentService.createTextOutput('Science Claw + Genie endpoint is running.');\n}`;\n\n        function copyAppsScript() {\n            const ta = document.getElementById(' t(A);\n        }\n\n        const sevColor = pct => pct >= 60 ? '#e8493f' : pct >= 30 ? '#ffb627' : '#3fc35f';\n\n        function drawTopicChart(A) {\n            const canvas = document.getElementById('chart-topic');\n            const empty = document.getElementById('chart-topic-empty');\n            const rows = Object.keys(A.topicAtt).map(k => ({\n                label: topicLabel(k), att: A.topicAtt[k], wrong: A.topicWrong[k] || 0,\n                pct: A.topicAtt[k] ? Math.round((A.topicWrong[k] || 0) / A.topicAtt[k] * 100) : 0\n            })).filter(r => r.att > 0).sort((a, b) => b.pct - a.pct || b.att - a.att);\n            if (!rows.length) { canvas.style.display = 'none'; empty.style.display = 'block'; return; }\n            canvas.style.display = 'block'; empty.style.display = 'none';\n            const dpr = window.devicePixelRatio || 1;\n            const cssW = canvas.parentElement.clientWidth || 360;\n            const rowH = 30, padT = 6, padB = 6;\n            const cssH = padT + padB + rows.length * rowH;\n            canvas.width = cssW * dpr; canvas.height = cssH * dpr;\n            canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';\n            const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);\n            ctx.clearRect(0, 0, cssW, cssH);\n            const labelW = Math.min(150, cssW * 0.42);\n            const barX = labelW + 8, barMax = cssW - barX - 56;\n            ctx.textBaseline = 'middle';\n            rows.forEach((r, i) => {\n                const y = padT + i * rowH + rowH / 2;\n                // label\n                ctx.fillStyle = '#d6dee6'; ctx.font = '600 12px Nunito, sans-serif'; ctx.textAlign = 'right';\n                let lab = r.label; if (ctx.measureText(lab).width > labelW) { while (lab.length > 4 && ctx.measureText(lab + '…').width > labelW) lab = lab.slice(0, -1); lab += '…'; }\n                ctx.fillText(lab, labelW, y);\n                // track\n                ctx.fillStyle = 'rgba(255,255,255,0.07)'; roundRect(ctx, barX, y - 7, barMax, 14, 7); ctx.fill();\n                // fill\n                const w = Math.max(2, barMax * r.pct / 100);\n                ctx.fillStyle = sevColor(r.pct); roundRect(ctx, barX, y - 7, w, 14, 7); ctx.fill();\n                // value\n                ctx.fillStyle = '#fff'; ctx.font = '800 12px Nunito, sans-serif'; ctx.textAlign = 'left';\n                ctx.fillText(`${r.pct}%  (${r.wrong}/${r.att})`, barX + barMax + 6, y);\n            });\n        }\n\n        function drawTypeChart(A) {\n            const canvas = document.getElementById('chart-type');\n            const legend = document.getElementById('chart-type-legend');\n            const empty = document.getElementById('chart-type-empty');\n            const colors = { mcq: '#4a90e2', fitb: '#b557e6', match: '#3fc35f' };\n            const rows = Object.keys(A.typeWrong).map(k => ({\n                key: k, label: TYPE_LABELS[k] || k, wrong: A.typeWrong[k] || 0,\n                att: A.typeAtt[k] || 0, color: colors[k] || '#66ccff'\n            })).filter(r => r.wrong > 0);\n            const totalWrong = rows.reduce((a, r) => a + r.wrong, 0);\n            if (!totalWrong) { canvas.style.display = 'none'; legend.innerHTML = ''; empty.style.display = 'block'; return; }\n            canvas.style.display = 'block'; empty.style.display = 'none';\n            const dpr = window.devicePixelRatio || 1, size = 190;\n            canvas.width = size * dpr; canvas.height = size * dpr;\n            canvas.style.width = size + 'px'; canvas.style.height = size + 'px';\n            const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);\n            ctx.clearRect(0, 0, size, size);\n            const cx = size / 2, cy = size / 2, rO = size / 2 - 6, rI = rO * 0.58;\n            let a0 = -Math.PI / 2;\n            rows.forEach(r => {\n                const a1 = a0 + (r.wrong / totalWrong) * Math.PI * 2;\n                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, rO, a0, a1); ctx.closePath();\n                ctx.fillStyle = r.color; ctx.fill();\n                a0 = a1;\n            });\n            // inner hole\n            ctx.beginPath(); ctx.arc(cx, cy, rI, 0, Math.PI * 2); ctx.fillStyle = '#111c2b'; ctx.fill();\n            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n            ctx.font = '900 26px Nunito, sans-serif'; ctx.fillText(totalWrong, cx, cy - 6);\n            ctx.fillStyle = '#8a98a6'; ctx.font = '700 11px Nunito, sans-serif'; ctx.fillText('WRONG', cx, cy + 14);\n            legend.innerHTML = rows.map(r => {\n                const share = Math.round(r.wrong / totalWrong * 100);\n                const wpct = r.att ? Math.round(r.wrong / r.att * 100) : 0;\n                return `<div class=\"lg\"><span class=\"sw\" style=\"background:${r.color}\"><\u002Fspan><span><b>${r.label}<\u002Fb> — ${r.wrong} wrong (${share}% of errors${r.att ? `, ${wpct}% of these Qs` : ''})<\u002Fspan><\u002Fdiv>`;\n            }).join('');\n        }\n\n        function roundRect(ctx, x, y, w, h, r) {\n            r = Math.min(r, h / 2, w / 2);\n            ctx.beginPath();\n            ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);\n            ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);\n            ctx.arcTo(x, y, x + w, y, r); ctx.closePath();\n        }\n\n        function renderDashboard() {\n            const roster = getRoster();\n            const tbody = document.getElementById('dash-tbody');\n            const summary = document.getElementById('dash-summary');\n            if (!roster.length) {\n                tbody.innerHTML = `<tr><td colspan=\"8\" class=\"dash-empty\">No records yet. Records appear here when a student taps “Save to File” or “Submit to Teacher”.<\u002Ftd><\u002Ftr>`;\n            } else {\n                tbody.innerHTML = roster.map(r => `<tr>\n                    <td>${esc(r.name) || '—'}<\u002Ftd><td>${esc(r.class) || ' , r.correctAnswers, (r.wrongCount != null ? r.wrongCount : (r.wrongAnswers || []).length), r.accuracy, r.prizesWon, r.sciencePoints, r.collectionComplete ? 'Yes' : 'No']));\n            triggerDownload(new Blob([toCSV(rows)], { type: 'text/csv' }), `ScienceClaw_Sessions_${stamp()}.csv`);\n            showMessage('⬇ Sessions CSV exported.');\n        }\n        function exportWeaknessCSV() {\n            const roster = getRoster();\n            const rows = [['Name', 'Class', 'Session Date', 'Question Time', 'Topic', 'Question', 'Student Answer', 'Correct Answer']];\n            roster.forEach(r => (r.wrongAnswers || []).forEach(w => rows.push([r.name, r.class, (r.savedAt || '').slice(0, 10), (w.timestamp || '').slice(0, 19).replace('T', ' '), w.topic, w.question, w.studentAnswer, w.correctAnswer])));\n            if (rows.length === 1) { showMessage('No wrong-answer records to export yet.', 2500); return; }\n            triggerDownload(new Blob([toCSV(rows)], { type: 'text/csv' }), `ScienceClaw_Weakness_${stamp()}.csv`);\n            showMessage('⬇ Areas-of-weakness CSV exported.');\n        }\n        function exportRosterJSON() {\n            const roster = getRoster();\n            if (!roster.length) { showMessage('No records to export yet.', 2500); return; }\n            triggerDownload(new Blob([JSON.stringify(roster, null, 2)], { type: 'application/json' }), `ScienceClaw_Roster_${stamp()}.json`);\n            showMessage('⬇ Roster JSON exported.');\n        }\n        function clearRoster() {\n            if (!confirm('Clear ALL collected student records on this device? Export them first if you need them.')) return;\n            try { localStorage.removeItem(LS_ROSTER); } catch (e) {}\n            renderDashboard();\n            showMessage('Roster cleared.', 2000);\n        }\n\n        const reportFileName = () => {\n            const clean = s => (s || '').replace(/[\\\\/:*?\"<>|]/g, '').replace(/\\s+/g, ' ').trim();\n            const nm = clean(studentName) || 'Student';\n            const cl = clean(studentClass) || 'Class';\n            return `Report for ${nm},${cl}.txt`;\n        };\n\n        function saveGameReport() {\n            const r = buildRecord();\n            let txt = \"=== Science Claw — Student Report ===\\n\\n\";\n            txt += `Name: ${r.name || '(not entered)'}\\n`;\n            txt += `Class: ${r.class || '(not entered)'}\\n`;\n            txt += `Saved: ${new Date().toLocaleString()}\\n\\n`;\n            txt += `Play Duration: ${r.playDuration}\\n`;\n            txt += `Questions Answered: ${r.questionsAnswered}\\n`;\n            txt += `Correct Answers: ${r.correctAnswers}  (Accuracy ${r.accuracy}%)\\n`;\n            txt += `Wrong Answers: ${r.wrongCount}\\n`;\n            txt += `Prizes Won: ${r.prizesWon}\\n`;\n            txt += `Science Points: ${r.sciencePoints}\\n\\n`;\n            // Topic breakdown\n            const tKeys = Object.keys(r.attemptsByTopic || {});\n            if (tKeys.length) {\n                txt += \"=== Performance by Topic ===\\n\";\n                tKeys.sort((a, b) => (r.wrongByTopic[b] || 0) - (r.wrongByTopic[a] || 0)).forEach(k => {\n                    const att = r.attemptsByTopic[k], wr = r.wrongByTopic[k] || 0;\n                    txt += `${topicLabel(k)}: ${att - wr}/${att} correct (${Math.round((att - wr) / att * 100)}%)\\n`;\n                });\n                txt += \"\\n\";\n            }\n            txt += \"=== Areas of Weakness (Wrong Answers) ===\\n\";\n            if (!r.wrongAnswers.length) { txt += \"None — flawless knowledge!\\n\"; }\n            else {\n                r.wrongAnswers.forEach((w, i) => {\n                    txt += `\\n${i + 1}. [${w.topic}] ${w.question}\\n`;\n                    txt += `   Your answer:    ${w.studentAnswer}\\n`;\n                    txt += `   Correct answer: ${w.correctAnswer}\\n`;\n                });\n            }\n            triggerDownload(new Blob([txt], { type: 'text/plain' }), reportFileName());\n            showMessage('📄 Report downloaded: ' + reportFileName());\n        }\n\n        // ENH10: student-facing revision card built from this student's attempts.\n        // Auto-generated twin / \"made simpler\" variants are excluded (they teach nothing\n        // on their own); we keep the substantive parent question and add critical,\n        // senior-teacher feedback for every entry.\n        function reviseData() {\n            const clean = s => String(s || '').replace(/<[^>]*>?/gm, ' ').replace(/\\s+/g, ' ').trim();\n            const bankMatch = key => fullQuestionBank.find(q => clean(q.q).slice(0, 80) === key);\n            // ---- wrong questions (top) ----\n            const seenW = {}; const wrong = [];\n            (wrongAnswersLog || []).forEach(w => {\n                if (w.isVariant) return;                       // skip redundant auto-variants\n                const key = clean(w.question).slice(0, 80);\n                if (!key || seenW[key]) return; seenW[key] = 1;\n                const match = bankMatch(key);\n                wrong.push({\n                    topic: w.topic || '', level: w.level || '', question: w.question || '',\n                    correct: w.correctAnswer || '', mine: w.studentAnswer || '',\n                    why: match ? (curatedExplanation(match) || '') : ''\n                });\n            });\n            // ---- correct questions (bottom) — quick recap, exclude anything also in wrong ----\n            const seenC = {}; const correct = [];\n            (correctAnswersLog || []).forEach(c => {\n                if (c.isVariant) return;\n                const key = clean(c.question).slice(0, 80);\n                if (!key || seenC[key] || seenW[key]) return; seenC[key] = 1;\n                const match = bankMatch(key);\n                correct.push({\n                    topic: c.topic || '', level: c.level || '', question: c.question || '',\n                    correct: c.correctAnswer || '', why: match ? (curatedExplanation(match) || '') : ''\n                });\n            });\n            return { wrong, correct };\n        }\n        function exportStudyCard() {\n            const data = reviseData();\n            if (!data.wrong.length && !data.correct.length) { showMessage('🌟 No questions attempted yet — play a round first!', 3000); return; }\n            const who = (studentName || 'My') + (studentClass ? ' (' + studentClass + ')' : '');\n            const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n            let n = 0;\n            const wrongRows = data.wrong.map(it => { n++; return `\n              <div class=\"card wrong\">\n                <div class=\"tag\">${esc(it.level)} · ${esc(it.topic)}<\u002Fdiv>\n                <div class=\"q\"><b>${n}.<\u002Fb> ${esc(it.question)}<\u002Fdiv>\n                <div class=\"mine\"><span class=\"lbl\">✗ You wrote:<\u002Fspan> ${esc(it.mine) || '(left blank)'}<\u002Fdiv>\n                <div class=\"a\"><span class=\"lbl\">✓ Model answer:<\u002Fspan> ${esc(it.correct)}<\u002Fdiv>\n                <div class=\"why\"><span class=\"lbl\">🧠 What to fix:<\u002Fspan> ${it.why || ('Re-read this ' + esc(it.topic) + ' concept and practise explaining <b>why<\u002Fb> the answer is correct — not just <b>what<\u002Fb> it is. Say your reasoning out loud in one full sentence.')}<\u002Fdiv>\n              <\u002Fdiv>`; }).join('');\n            const correctRows = data.correct.map(it => { n++; return `\n              <div class=\"card ok\">\n                <div class=\"tag\">${esc(it.level)} · ${esc(it.topic)}<\u002Fdiv>\n                <div class=\"q\"><b>${n}.<\u002Fb> ${esc(it.question)}<\u002Fdiv>\n                <div class=\"a\"><span class=\"lbl\">✓ You got this right:<\u002Fspan> ${esc(it.correct)}<\u002Fdiv>\n                ${it.why ? `<div class=\"why\"><span class=\"lbl\">🔒 Lock it in:<\u002Fspan> ${it.why}<\u002Fdiv>` : ''}\n              <\u002Fdiv>`; }).join('');\n            const wrongBlock = data.wrong.length ? `<h2 class=\"sec sec-wrong\">🎯 Revise first — ${data.wrong.length} to fix<\u002Fh2>${wrongRows}` : '';\n            const correctBlock = data.correct.length ? `<h2 class=\"sec sec-ok\">✅ Already mastered — ${data.correct.length} to keep sharp<\u002Fh2>${correctRows}` : '';\n            const doc = `<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>My Study Card<\u002Ftitle>\n              <style>body{font-family:'Segoe UI',system-ui,sans-serif;max-width:760px;margin:24px auto;padding:0 18px;color:#12202f}\n              h1{font-size:22px;margin:0 0 2px}.sub{color:#6a7a8a;margin:0 0 18px;font-size:14px}\n              .sec{font-size:15px;font-weight:800;letter-spacing:.02em;margin:22px 0 10px;padding-bottom:5px;border-bottom:2px solid #e4e9ef}\n              .sec-wrong{color:#c0392b}.sec-ok{color:#1f8a4c}\n              .card{border:1px solid #d8e0e8;border-radius:10px;padding:12px 16px;margin:0 0 12px;page-break-inside:avoid}\n              .card.wrong{border-left:5px solid #e8493f;background:#fff7f6}.card.ok{border-left:5px solid #1f8a4c;background:#f5fbf6}\n              .tag{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#6a7a8a;margin-bottom:6px}\n              .q{font-size:15px;margin-bottom:8px;line-height:1.5}\n              .mine{color:#c0392b;font-size:13.5px;margin-bottom:4px}.a{color:#1f8a4c;font-size:14px;margin-bottom:6px}\n              .why{color:#2b3a4a;font-size:13.5px;line-height:1.55;background:#f1f5fa;padding:8px 11px;border-radius:7px}\n              .lbl{font-weight:700}@media print{.no-print{display:none}}<\u002Fstyle><\u002Fhead>\n              <body><h1>📖 ${esc(who)} Study Card<\u002Fh1><p class=\"sub\">Personal revision · ${new Date().toLocaleDateString()} · ${data.wrong.length} to fix, ${data.correct.length} mastered<\u002Fp>\n              <button class=\"no-print\" onclick=\"window.print()\" style=\"margin-bottom:16px;padding:9px 16px;border:0;border-radius:8px;background:#2a6fdb;color:#fff;font-weight:700;cursor:pointer\">🖨️ Print / Save as PDF<\u002Fbutton>\n              ${wrongBlock}${correctBlock}<\u002Fbody><\u002Fhtml>`;\n            triggerDownload(new Blob([doc], { type: 'text/html' }), 'My Study Card (' + new Date().toISOString().slice(0, 10) + ').html');\n            if (window.sfx) sfx.coin();\n            showMessage('📖 Study Card downloaded — wrong questions first, mastered ones below.', 4500);\n        }\n\n        // ---- End-of-session short report ----\n        function showSessionReport() {\n            const acc = sessionAnswered > 0 ? Math.round(sessionCorrect / sessionAnswered * 100) : 0;\n            const wrongN = Math.max(0, sessionAnswered - sessionCorrect);\n            const accColor = acc >= 80 ? 'var(--sc-green-bright)' : acc >= 50 ? 'var(--sc-yellow-soft)' : 'var(--sc-red-bright)';\n            const accMsg = acc >= 80 ? '🌟 Excellent work!' : acc >= 50 ? '👍 Good effort — keep practising!' : '💪 Keep going — practice makes perfect!';\n            // weak topics this session\n            const tally = {};\n            sessionWrong.forEach(w => { tally[w.topic] = (tally[w.topic] || 0) + 1; });\n            const weak = Object.entries(tally).sort((a, b) => b[1] - a[1]);\n            const who = studentName.trim() ? `${studentName.trim()}${studentClass.trim() ? ' · ' + studentClass.trim() : ''}` : 'Add your name in Student Records to personalise this report';\n            let html = `<p class=\"sr-head\">${accMsg}<\u002Fp><p class=\"sr-sub\">${who}<\u002Fp>`;\n            html += `<div class=\"sr-grid\">\n                <div class=\"sr-cell\"><div class=\"v\" style=\"color:var(--sc-text)\">${sessionAnswered}<\u002Fdiv><div class=\"k\">Answered<\u002Fdiv><\u002Fdiv>\n                <div class=\"sr-cell\"><div class=\"v\" style=\"color:var(--sc-green-bright)\">${sessionCorrect}<\u002Fdiv><div class=\"k\">Correct<\u002Fdiv><\u002Fdiv>\n                <div class=\"sr-cell\"><div class=\"v\" style=\"color:var(--sc-red-bright)\">${wrongN}<\u002Fdiv><div class=\"k\">Wrong<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>`;\n            html += `<div class=\"sr-acc-bar\"><div class=\"sr-acc-fill\" style=\"width:${acc}%;background:${accColor}\"><\u002Fdiv><\u002Fdiv>`;\n            html += `<p class=\"sr-sub\" style=\"text-align:center;margin-top:-8px\">Accuracy: <b style=\"color:${accColor}\">${acc}%<\u002Fb><\u002Fp>`;\n            html += `<div class=\"sr-weak\">`;\n            if (weak.length) {\n                html += `<p class=\"sr-weak-title\">Topics to practise<\u002Fp>`;\n                weak.forEach(([t, n]) => { html += `<div class=\"wk\"><span>${t}<\u002Fspan><b>${n} wrong<\u002Fb><\u002Fdiv>`; });\n            } else {\n                html += `<div class=\"sr-allgood\">✅ No wrong answers this session — fantastic!<\u002Fdiv>`;\n            }\n            html += `<\u002Fdiv>`;\n            document.getElementById('session-report-body').innerHTML = html;\n            const sb = document.getElementById('sess-submit-btn');\n            if (sb) sb.style.opacity = localStorage.getItem(LS_ENDPOINT) ? '1' : '0.55';\n            document.getElementById('session-report-modal').classList.add('active');\n        }\n\n        function init3DScene() {\n            const width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth || 800;\n            const height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight || 600;\n\n            scene = new THREE.Scene();\n            scene.background = new THREE.Color(0x1a1a2e);\n\n            camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 100);\n            camera.position.set(0, 8, 12);\n            camera.lookAt(0, 0, 0);\n\n            const aspect = width / height;\n            orthoCamera = new THREE.OrthographicCamera(frustumSize * aspect / - 2, frustumSize * aspect / 2, frustumSize / 2, frustumSize / - 2, 0.1, 100);\n            activeCamera = camera;\n\n            renderer = new THREE.WebGLRenderer({ antialias: true });\n            renderer.setSize(width, height);\n            renderer.shadowMap.enabled = true;\n            renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n            document.getElementById('canvas-container').appendChild(renderer.domElement);\n\n            controls = new THREE.OrbitControls(camera, renderer.domElement);\n            controls.enableDamping = true;\n            controls.dampingFactor = 0.05;\n            controls.maxPolarAngle = Math.PI / 2 + 0.1;\n            \n            // Auto Play Background Camera\n            controls.autoRotate = true;\n            controls.autoRotateSpeed = 1.0;\n\n            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);\n            scene.add(ambientLight);\n            \n            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);\n            dirLight.position.set(5, 15, 5);\n            dirLight.castShadow = true;\n            dirLight.shadow.camera.left = -10;\n            dirLight.shadow.camera.right = 10;\n            dirLight.shadow.camera.top = 10;\n            dirLight.shadow.camera.bottom = -10;\n            scene.add(dirLight);\n\n            const floor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 10), new THREE.MeshPhongMaterial({ color: 0x333344 }));\n            floor.position.y = -0.25;\n            floor.receiveShadow = true;\n            scene.add(floor);\n\n            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 8), new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, metalness: 0, roughness: 0, ior: 1.5, thickness: 0.1, side: THREE.DoubleSide }));\n            backWall.position.set(0, 4, -5);\n            scene.add(backWall);\n\n            const dropZone = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide }));\n            dropZone.rotation.x = Math.PI / 2;\n            dropZone.position.set(-3, 0.01, 3);\n            spDropZone = dropZone;\n            dropZone.receiveShadow = true;\n            scene.add(dropZone);\n\n            clawGroup = new THREE.Group();\n            const SP_CLAW = 0x22d3ee; // single-player claw colour\n            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 }));\n            stem.position.y = 1; stem.castShadow = true; clawGroup.add(stem);\n            \n            const clawBase = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.6, 16), new THREE.MeshStandardMaterial({ color: SP_CLAW, metalness: 0.9, roughness: 0.15, emissive: SP_CLAW, emissiveIntensity: 0.6 }));\n            clawBase.castShadow = true; clawGroup.add(clawBase);\n\n            for (let i = 0; i < 3; i++) attachClawArm(clawGroup, i, SP_CLAW);\n            clawGroup.userData.openT = 0.35; clawGroup.userData.openTarget = 0.35;\n            const spGlow = new THREE.PointLight(SP_CLAW, 1.1, 3.2, 2); spGlow.position.y = -0.1; clawGroup.add(spGlow);\n            clawGroup.userData.dustColor = SP_CLAW;\n            clawGroup.position.set(3, 5, -3);\n            scene.add(clawGroup);\n\n            spawnObjects();\n            renderCollection();\n\n            window.addEventListener('keydown', (e) => { \n                if(document.activeElement.tagName === \"INPUT\" || document.querySelector('.modal.active')) return;\n                if (versusMode) { handleVersusKey(e); return; }\n                const isSpace = (e.key === ' ' || e.code === 'Space');\n                const isEnter = (e.key === 'Enter' || e.code === 'Enter');\n                if (isSpace || isEnter) {\n                    if (gameState === 'playing') { e.preventDefault(); dropClaw(); }\n                    return;\n                }\n                let key = e.key;\n                if (key && key.length === 1) key = key.toLowerCase();\n                if (keys.hasOwnProperty(key)) { if (!keys[key] && (gameState === 'playing') && window.sfx) sfx.move(); keys[key] = true; }\n            });\n            window.addEventListener('keyup', (e) => { \n                let key = e.key;\n                if (key && key.length === 1) key = key.toLowerCase();\n                if (keys.hasOwnProperty(key)) keys[key] = false; \n            });\n            window.addEventListener('resize', () => {\n                const w = window.innerWidth;\n                const h = window.innerHeight;\n                const asp = w / h;\n                camera.aspect = asp; camera.updateProjectionMatrix();\n                orthoCamera.left = -frustumSize * asp / 2; orthoCamera.right = frustumSize * asp / 2;\n                orthoCamera.top = frustumSize / 2; orthoCamera.bottom = -frustumSize / 2;\n                orthoCamera.updateProjectionMatrix();\n                renderer.setSize(w, h);\n            });\n        }\n\n        // --- GAMEPLAY MECHANICS ---\n        // Animated hide/show of mode buttons + menu options while a solo round is running\n        let _playUITimer = null;\n        function setPlayUI(playing) {\n            const els = [document.getElementById('top-bar'),\n                ...document.querySelectorAll('#top-left-hud button, #top-left-hud .panel-divider')].filter(Boolean);\n            clearTimeout(_playUITimer);\n            if (playing) {\n                els.forEach((el, i) => {\n                    el.style.display = '';\n                    el.style.transition = 'opacity .45s cubic-bezier(.55,-0.3,.7,.4), transform .45s cubic-bezier(.55,-0.3,.7,.4)';\n                    el.style.transitionDelay = (i * 55) + 'ms';\n                    el.style.opacity = '0';\n                    el.style.transform = 'translateY(-30px) scale(.8) rotate(' + ((i % 2 ? 1 : -1) * 4) + 'deg)';\n                    el.style.pointerEvents = 'none';\n                });\n                _playUITimer = setTimeout(() => els.forEach(el => { el.style.display = 'none'; }), 55 * els.length + 500);\n            } else {\n                els.forEach((el, i) => {\n                    el.style.display = '';\n                    el.style.transition = 'opacity .4s ease, transform .5s cubic-bezier(.2,1.4,.4,1)';\n                    el.style.transitionDelay = (i * 45) + 'ms';\n                    el.style.pointerEvents = '';\n                    requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'none'; });\n                });\n            }\n        }\n        function startGame() {\n            if (!versusMode) {\n                if (!adminMode) {\n                    if (credits < 1) return;\n                    credits--; updateHUD();\n                }\n            }\n            gameState = 'playing';\n            if (!versusMode) setPlayUI(true);\n            if (window.sfx) sfx.enter();\n            try { if (window.sfx && sfx.startMusic && !versusMode) sfx.startMusic('solo'); } catch (e) {}\n            \n            activeCamera = camera; // gameplay always uses the live perspective camera\n            controls.autoRotate = false;\n            camera.position.set(0, 8, 12);\n            controls.target.set(0,0,0);\n            controls.update();\n\n            document.getElementById('bottom-hud').style.display = 'flex';\n            document.getElementById('btn-drop').style.display = 'inline-block';\n            document.getElementById('btn-release').style.display = 'none';\n            document.getElementById('timer-display').style.display = 'inline-flex';\n            \n            // Show touch D-pad if on mobile/tablet\n            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {\n                document.getElementById('dpad-hud').style.display = 'block';\n            }\n\n            clawGroup.position.set(3, 5, -3);\n            \n            timer = 30; \n            document.getElementById('timer-display').innerText = `Time: ${timer}s`;\n            clearInterval(timerInterval);\n            timerInterval = setInterval(() => {\n                if (gameState !== 'playing') { clearInterval(timerInterval); return; }\n                timer--; document.getElementById('timer-display').innerText = `Time: ${timer}s`;\n                if (timer <= 0) { clearInterval(timerInterval); showMessage(\"Time's up! Auto-dropping...\"); dropClaw(); }\n            }, 1000);\n\n            showMessage(\"Game Started! Use W/A/S/D to move the claw. Click and drag to rotate view.\");\n        }\n\n        function dropClaw() {\n            if (gameState !== 'playing') return;\n            gameState = 'dropping';\n            if (window.sfx) sfx.drop();\n            document.getElementById('btn-drop').style.display = 'none';\n            document.getElementById('timer-display').style.display = 'none';\n            document.getElementById('dpad-hud').style.display = 'none';\n            clearInterval(timerInterval);\n        }\n\n        function releaseCatch() {\n            if (gameState !== 'waiting_release') return;\n            if (!versusMode) {\n                if (!adminMode) {\n                    if (credits < 1) { showMessage(\"You need 1 credit to release the catch! Answer a question to Top up.\"); return; }\n                    credits--; updateHUD();\n                }\n            }\n\n            if (caughtPrize) {\n                const type = caughtPrize.userData.type;\n                const cfg = SCIENCE_ITEMS[type];\n                scene.remove(caughtPrize); caughtPrize = null;\n                prizesWon++;\n                collection[type]++;\n                sciencePoints += cfg.points;\n                updateHUD();\n                renderCollection();\n                autoSaveSession();\n                if (window.sfx) sfx.win();\n                unlockBadge('first_prize'); checkBadges();\n                showMessage(`${cfg.emoji} ${cfg.name} collected!  +${cfg.points} Science Points`);\n                checkCollectionComplete();\n            } else {\n                showMessage(\"Prize Released!\");\n            }\n            // Refill if the bed is empty, OR if a still-needed type has run out — checked\n            // after EVERY claw cycle (collects AND slips), so a slipped last magnet can\n            // never leave the student stuck with nothing left to catch.\n            ensureBedStock();\n\n            gameState = 'idle';\n            if (!versusMode) setPlayUI(false);\n            controls.autoRotate = true; // Turn auto play background back on\n            document.getElementById('bottom-hud').style.display = 'none';\n            clawGroup.position.set(3, 5, -3);\n            if (versusMode) versusEndTurn();\n        }\n\n        const speed = 0.05;\n        function animate() {\n            requestAnimationFrame(animate);\n            if(controls) controls.update();\n            const _t = performance.now() * 0.001;\n            for (let i = 0; i < prizes.length; i++) {\n                const p = prizes[i];\n                if (p.userData.spin) p.rotation.y += p.userData.spin;\n                if (p.userData.glowMat) p.userData.glowMat.emissiveIntensity = 0.25 + 0.45 * (0.5 + 0.5 * Math.sin(_t * 3 + i));\n                if (p.userData.bounce) p.position.y = (p.userData.baseY || 0.4) + Math.abs(Math.sin(_t * 2.4 + i)) * 0.12;\n            }\n            if (caughtPrize && caughtPrize.userData.spin) caughtPrize.rotation.y += caughtPrize.userData.spin;\n            updateDust();\n\n            if (versusMode) {\n                updateVersusClaws();\n            }\n            else if (gameState === 'playing') {\n                let moved = false;\n                if ((keys.w || keys.ArrowUp) && clawGroup.position.z > -4.5) { clawGroup.position.z -= speed; moved = true; }\n                if ((keys.s || keys.ArrowDown) && clawGroup.position.z < 4.5) { clawGroup.position.z += speed; moved = true; }\n                if ((keys.a || keys.ArrowLeft) && clawGroup.position.x > -4.5) { clawGroup.position.x -= speed; moved = true; }\n                if ((keys.d || keys.ArrowRight) && clawGroup.position.x < 4.5) { clawGroup.position.x += speed; moved = true; }\n                if (moved && (_dustTick++ % 2 === 0)) spawnDust(clawGroup.position, (clawGroup.userData && clawGroup.userData.dustColor) || 0x9fe8ff);\n            } \n            // claw arms: splay open while dropping, pinch shut on the way back up\n            if (clawGroup && clawGroup.userData.arms) {\n                const t = gameState === 'dropping' ? 1 : (gameState === 'returning' || gameState === 'waiting_release') ? 0 : 0.35;\n                updateClawArms(clawGroup, t);\n            }\n            if (versusMode && vsClaws) vsClaws.forEach(c => {\n                if (!c || !c.group) return;\n                const t = c.state === 'dropping' ? 1 : c.state === 'returning' ? 0 : 0.35;\n                updateClawArms(c.group, t);\n            });\n            if (gameState === 'dropping') {\n                clawGroup.position.y -= 0.05;\n                if (clawGroup.position.y <= 0.8) {\n                    // find the closest object under the claw\n                    let target = null, ti = -1, best = 0.58;\n                    prizes.forEach((prize, index) => {\n                        const d = Math.hypot(prize.position.x - clawGroup.position.x, prize.position.z - clawGroup.position.z);\n                        if (d < best) { best = d; target = prize; ti = index; }\n                    });\n                    justSlipped = false;\n                    if (target) {\n                        const cfg = SCIENCE_ITEMS[target.userData.type];\n                        if (Math.random() < cfg.catchRate) {\n                            caughtPrize = target; prizes.splice(ti, 1);\n                        } else {\n                            justSlipped = true;\n                            showMessage(`${cfg.emoji} The ${cfg.name} slipped out! (catch rate ${Math.round(cfg.catchRate * 100)}%)`);\n                            if (window.sfx) sfx.miss();\n                        }\n                    }\n                    gameState = 'returning';\n                }\n            }\n            else if (gameState === 'returning') {\n                if (clawGroup.position.y < 5) {\n                    clawGroup.position.y += 0.05;\n                    if (caughtPrize) { caughtPrize.position.copy(clawGroup.position); caughtPrize.position.y -= 0.6; }\n                } else {\n                    const dx = -3 - clawGroup.position.x;\n                    const dz = 3 - clawGroup.position.z;\n                    \n                    if (Math.abs(dx) > 0.1 || Math.abs(dz) > 0.1) {\n                        clawGroup.position.x += dx * 0.03; clawGroup.position.z += dz * 0.03;\n                        if (caughtPrize) {\n                            caughtPrize.position.copy(clawGroup.position); caughtPrize.position.y -= 0.6;\n                        }\n                    } else {\n                        if (caughtPrize) {\n                            gameState = 'waiting_release';\n                            if (window.sfx) sfx.grab();\n                            document.getElementById('btn-release').style.display = 'inline-block';\n                            showMessage(\"Catch secured at drop zone! Use 1 credit to release.\");\n                        } else {\n                            gameState = 'idle';\n                            if (!versusMode) setPlayUI(false);\n                            controls.autoRotate = true; // Turn auto play back on\n                            document.getElementById('bottom-hud').style.display = 'none';\n                            if (justSlipped) { justSlipped = false; }\n                            else { showMessage(\"Empty claw. Try again!\"); if (window.sfx) sfx.miss(); }\n                            clawGroup.position.set(3, 5, -3);\n                            if (versusMode) versusEndTurn();\n                        }\n                    }\n                }\n            }\n\n            if (renderer && scene && activeCamera) { renderer.render(scene, activeCamera); }\n        }\n\n        // --- ARCADE SOUND: mute toggle + tactile button feedback ---\n        function toggleMute() {\n            const m = !(window.sfx && sfx.muted);\n            if (window.sfx) sfx.mute(m);\n            const btn = document.getElementById('mute-toggle');\n            btn.textContent = m ? '🔇' : '🔊';\n            btn.classList.toggle('muted', m);\n            try { localStorage.setItem('scienceClawMuted', m ? '1' : '0'); } catch (e) {}\n        }\n        (function initSound() {\n            try {\n                if (localStorage.getItem('scienceClawMuted') === '1' && window.sfx) {\n                    sfx.mute(true);\n                    const btn = document.getElementById('mute-toggle');\n                    if (btn) { btn.textContent = '🔇'; btn.classList.add('muted'); }\n                }\n            } catch (e) {}\n            // a short tactile blip on every press; answers tick, the d-pad whirs\n            document.addEventListener('pointerdown', (e) => {\n                const b = e.target.closest('button');\n                if (!b || !window.sfx) return;\n                if (b.id === 'mute-toggle') return;\n                if (b.classList.contains('mcq-btn')) sfx.select();\n                else if (b.classList.contains('dpad-btn')) sfx.move();\n                else sfx.click();\n            }, true);\n            // gentle select tick when picking up a draggable answer tile\n            document.addEventListener('dragstart', (e) => {\n                if (e.target.classList && e.target.classList.contains('draggable-item') && window.sfx) sfx.select();\n            }, true);\n        })();\n\n        // ============================================================================\n        //  ⚔️ VERSUS MODE — two players, turn-taking, split screen, microscope finale\n        // ============================================================================\n        let versusMode = false;\n        let vsCoop = false;                 // collaborative (shared pool) vs competitive\n        let vsTopics = [[], []];            // per-player selected topics (co-op = same set for both)\n        let vsShared = null;                // shared collection pool for co-op\n        let vsSessionStart = 0;\n        let vsMusicOn = false;\n        let vsActive = 0;\n        let vsPlayers = null;\n        let vsSPcollection = null;   // saved single-player collection while in versus\n        let vsSPcomplete = false;\n        const LS_LEADERBOARD = 'scienceClawVersusLeaderboard_v1';\n\n        // ---- Simultaneous dual-claw state ----\n        const VS_COLORS = ['#3aa0ff', '#b45cff', '#ff5a8a', '#ffb43a', '#3fd07a', '#22d3ee'];\n        let vsColorSel = ['#3aa0ff', '#b45cff'];\n        let vsClaws = null, vsDropZones = null;\n        const VS_HEX2INT = h => parseInt(String(h).replace('#', ''), 16);\n        function renderVsColorPickers() {\n            for (let i = 0; i < 2; i++) {\n                const row = document.getElementById('vs-color-' + i); if (!row) continue;\n                row.innerHTML = VS_COLORS.map(c => '<div class=\"vs-color-swatch' + (vsColorSel[i] === c ? ' sel' : '') + '\" style=\"background:' + c + '\" onclick=\"pickVsColor(' + i + ',\\'' + c + '\\')\"><\u002Fdiv>').join('');\n            }\n        }\n        function pickVsColor(i, c) {\n            const other = i === 0 ? 1 : 0;\n            if (vsColorSel[other] === c) { showMessage('That colour is taken by the other player!', 2000); return; }\n            vsColorSel[i] = c; renderVsColorPickers(); if (window.sfx) sfx.click();\n        }\n        // ---- Star-dust trail left by a moving claw ----\n        let _dustTex = null;\n        function getDustTex() {\n            if (_dustTex) return _dustTex;\n            const cv = document.createElement('canvas'); cv.width = cv.height = 64;\n            const x = cv.getContext('2d'); x.translate(32, 32);\n            const grd = x.createRadialGradient(0, 0, 0, 0, 0, 32);\n            grd.addColorStop(0, 'rgba(255,255,255,1)'); grd.addColorStop(0.35, 'rgba(255,255,255,.55)'); grd.addColorStop(1, 'rgba(255,255,255,0)');\n            x.fillStyle = grd; x.beginPath(); x.arc(0, 0, 32, 0, Math.PI * 2); x.fill();\n            x.fillStyle = 'rgba(255,255,255,.95)'; x.beginPath();\n            for (let i = 0; i < 4; i++) { const a = i * Math.PI / 2; x.lineTo(Math.cos(a) * 30, Math.sin(a) * 30); x.lineTo(Math.cos(a + Math.PI / 4) * 7, Math.sin(a + Math.PI / 4) * 7); }\n            x.closePath(); x.fill();\n            _dustTex = new THREE.CanvasTexture(cv); return _dustTex;\n        }\n        const dustParticles = [];\n        function spawnDust(pos, colorInt) {\n            if (dustParticles.length > 90) return;\n            const mat = new THREE.SpriteMaterial({ map: getDustTex(), color: colorInt || 0x9fe8ff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });\n            const sp = new THREE.Sprite(mat);\n            sp.position.set(pos.x + (Math.random() - 0.5) * 0.35, (pos.y - 0.2) + (Math.random() - 0.5) * 0.3, pos.z + (Math.random() - 0.5) * 0.35);\n            const s = 0.16 + Math.random() * 0.16; sp.scale.set(s, s, s);\n            scene.add(sp);\n            dustParticles.push({ sp, life: 1, vy: 0.003 + Math.random() * 0.004 });\n        }\n        function updateDust() {\n            for (let i = dustParticles.length - 1; i >= 0; i--) {\n                const d = dustParticles[i]; d.life -= 0.05;\n                if (d.life <= 0) { scene.remove(d.sp); if (d.sp.material) d.sp.material.dispose(); dustParticles.splice(i, 1); continue; }\n                d.sp.material.opacity = Math.max(0, d.life) * 0.9;\n                d.sp.position.y += d.vy; d.sp.scale.multiplyScalar(0.975); d.sp.material.rotation += 0.06;\n            }\n        }\n        let _dustTick = 0;\n\n        // ---- Realistic 3-finger claw arm: a chrome finger that attaches at the hub,\n        // bows outward and curves to a downward tip (like a real arcade claw).\n        // Each arm sits on a pivot so the whole claw can open (splay out) and close (pinch in).\n        function attachClawArm(group, i, tint) {\n            const yaw = new THREE.Group();               // fixed 120° spacing\n            yaw.rotation.y = i * (Math.PI * 2) / 3;\n            const pivot = new THREE.Group();             // animated open/close hinge\n            pivot.position.y = -0.25;\n            const chrome = new THREE.MeshStandardMaterial({ color: 0xd8dee6, metalness: 0.95, roughness: 0.15, emissive: tint, emissiveIntensity: 0.22 });\n            // short link from hub out to the finger\n            const link = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, 0.3), chrome);\n            link.position.set(0.14, -0.1, 0); link.rotation.z = 0.9; link.castShadow = true; pivot.add(link);\n            // curved finger: half-torus standing vertically — top attaches to the link,\n            // bulges outward, tip ends pointing down-and-in\n            const finger = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.035, 8, 28, Math.PI), chrome.clone());\n            finger.position.set(0.28, -0.55, 0);\n            finger.rotation.z = Math.PI / 2;             // arc spans top → outward → bottom tip\n            finger.rotation.y = Math.PI;                 // bow faces outward (+x)\n            finger.castShadow = true; pivot.add(finger);\n            // pointed tip cap\n            const tip = new THREE.Mesh(new THREE.ConeGeometry(0.045, 0.16, 10), chrome.clone());\n            tip.position.set(0.28, -0.98, 0); tip.rotation.z = Math.PI; tip.castShadow = true; pivot.add(tip);\n            yaw.add(pivot); group.add(yaw);\n            (group.userData.arms = group.userData.arms || []).push(pivot);\n        }\n        // Ease each arm toward th
