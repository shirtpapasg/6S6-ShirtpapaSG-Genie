\"rubber ball\"] },\n                { match: /\\b(3 times|three times)\\b/g, options: [\"4 times\", \"5 times\", \"six times\"] },\n                { match: /\\b(30cm)\\b/g, options: [\"40cm\", \"50cm\", \"25cm\"] },\n                { match: /\\b(apple)\\b/g, options: [\"mango\", \"durian\", \"coconut\", \"papaya\"] },\n                { match: /\\b(metal spoon)\\b/g, options: [\"steel fork\", \"iron ladle\"] },\n                { match: /\\b(clear glass)\\b/g, options: [\"transparent plastic\", \"clear acrylic\"] },\n                { match: /\\b(Container W)\\b/g, options: [\"Container X\", \"Basin A\"] },\n                { match: /\\b(Container V)\\b/g, options: [\"Container Y\", \"Basin B\"] },\n                { match: /\\b(Plant A)\\b/g, options: [\"Plant X\", \"Setup P\"] },\n                { match: /\\b(Plant B)\\b/g, options: [\"Plant Y\", \"Setup Q\"] },\n                { match: /\\b(Liquid T)\\b/g, options: [\"Liquid X\", \"Solution Y\", \"Chemical Z\"] },\n                { match: /\\b(50ml)\\b/g, options: [\"60ml\", \"80ml\", \"100ml\"] },\n                { match: /\\b(20°C)\\b/g, options: [\"25°C\", \"30°C\"] },\n                { match: /\\b(80°C)\\b/g, options: [\"90°C\", \"85°C\"] }\n            ];\n            let newText = text;\n            dict.forEach(entry => {\n                newText = newText.replace(entry.match, () => entry.options[Math.floor(Math.random() * entry.options.length)]);\n            });\n            return newText;\n        }\n\n        // --- EXAM-GRADE RAW QUESTION BANK (30 Questions per Topic = 270 Total) ---\n        const defaultRawBank = [\n            // --- P3 DIVERSITY (30) ---\n            [\"p3_diversity\", \"MAT\", \"Why are window panes usually made of clear glass?\", [\"Glass\", \"Transparent\", \"Allows most light to pass through\", \"Enables people to see outside clearly\"], [\"Wood\", \"Opaque\", \"Does not allow light to pass through\", \"Provides structural support for the house\"], [\"Metal\", \"Strong\", \"Reflects all light\", \"Prevents heat from entering the room\"]],\n            [\"p3_diversity\", \"MAT\", \"Why is a frying pan handle usually made of plastic?\", [\"Plastic\", \"Poor conductor of heat\", \"Slows down heat transfer from pan to hand\", \"Prevents the cook's hand from getting burnt\"], [\"Metal\", \"Good conductor of heat\", \"Speeds up heat transfer\", \"Allows the pan to heat up evenly\"], [\"Ceramic\", \"Fragile\", \"Breaks easily upon impact\", \"Used for aesthetic plating rather than cooking\"]],\n            [\"p3_diversity\", \"fitb\", \"Why do we use rubber for car tyres?\", \"We use rubber for car tyres because rubber creates high _[friction]_ against the road which helps to prevent _[skidding]_.\"],\n            [\"p3_diversity\", \"mcq\", \"Which characteristic can solely be used to confirm that an animal is a mammal?\", \"It has hair or fur as an outer covering.\", [\"It lays eggs to reproduce.\", \"It breathes through lungs.\", \"It lives entirely on land.\"]],\n            [\"p3_diversity\", \"mcq\", \"In a family tree, Suzy's brown eyes are a characteristic passed down from her parents. This is an example of:\", \"Inherited characteristics passed down from parents.\", [\"Adaptation.\", \"Reproduction.\", \"Evolution.\"]],\n            [\"p3_diversity\", \"mcq\", \"Why are fungi not classified as plants?\", \"They lack chlorophyll and cannot photosynthesise to make their own food.\", [\"They reproduce by microscopic spores.\", \"They grow in dark places like rotting logs.\", \"They do not require water or air to survive.\"]],\n            [\"p3_diversity\", \"fitb\", \"How can we tell if an object will float or sink in water?\", \"An object made of a light material like cork will _[float]_ on water, while an object made of iron will _[sink]_.\"],\n            [\"p3_diversity\", \"CECL\", \"How do fish breathe underwater?\", [\"Fish breathe using gills\", \"Water passes over the highly folded gills\", \"Gaseous Exchange\", \"Gills extract dissolved oxygen from water into the bloodstream\"], [\"Fish breathe using lungs\", \"They hold their breath underwater\", \"Mammalian Traits\", \"Fish surface periodically to breathe atmospheric air\"], [\"Fish breathe through scales\", \"Their skin absorbs oxygen\", \"Skin Breathing\", \"Scales trap air bubbles to supply oxygen\"]],\n            [\"p3_diversity\", \"CECL\", \"Why is a bat classified as a mammal and not a bird?\", [\"It is a mammal\", \"It has hair and gives birth to live young\", \"Mammalian Classification\", \"Birds have feathers while mammals have hair\"], [\"It is a bird\", \"It has wings and can fly\", \"Avian Classification\", \"All flying animals are classified as birds\"], [\"It is an amphibian\", \"It lives in dark caves\", \"Habitat Classification\", \"Classification depends on where the animal sleeps\"]],\n            [\"p3_diversity\", \"MAT\", \"Why is an anchor usually made of iron?\", [\"Iron\", \"It is a strong material that sinks in water\", \"Properties of materials\", \"The anchor sinks and holds the ship firmly in place\"], [\"Wood\", \"It floats on water\", \"Ability to float\", \"Helps the ship float better\"], [\"Aluminium\", \"It is a light material\", \"Ability to conduct heat\", \"Ensures the ship travels at higher speeds\"]],\n            [\"p3_diversity\", \"mcq\", \"Which of the following is true about all birds?\", \"They have an outer covering of feathers.\", [\"They can fly.\", \"They give birth to live young.\", \"They have webbed feet.\"]],\n            [\"p3_diversity\", \"fitb\", \"Why are bacteria called microorganisms?\", \"Bacteria are classified as _[microorganisms]_ because they are too small to be seen with the naked eye and require a _[microscope]_ to be observed.\"],\n            [\"p3_diversity\", \"MAT\", \"Why is cotton suitable for making a bath towel?\", [\"Cotton\", \"Highly absorbent\", \"Absorbs liquids quickly\", \"Dries the body effectively after a shower\"], [\"Plastic\", \"Waterproof\", \"Repels liquids\", \"Stops water from touching the skin\"], [\"Silk\", \"Smooth and shiny\", \"Reflects light\", \"Used for decorative purposes\"]],\n            [\"p3_diversity\", \"mcq\", \"What is a common characteristic of all insects?\", \"They have a three-part body and six legs.\", [\"They have wings and can fly.\", \"They have a hard internal skeleton.\", \"They lay eggs in water.\"]],\n            [\"p3_diversity\", \"fitb\", \"What are the characteristics of living things?\", \"Living things can _[grow]_, reproduce, respond to changes around them, and need air, food, and _[water]_ to survive.\"],\n            [\"p3_diversity\", \"CECL\", \"Why is a mushroom considered a living thing?\", [\"It is a living thing\", \"It grows and reproduces\", \"Characteristics of Life\", \"Living things require nutrients and undergo life processes\"], [\"It is a plant\", \"It makes its own food\", \"Photosynthesis\", \"Plants use sunlight to make food\"], [\"It is non-living\", \"It cannot move from place to place\", \"Locomotion\", \"Only things that can move are considered living\"]],\n            [\"p3_diversity\", \"mcq\", \"Which material would be best for making the lenses of spectacles?\", \"Clear glass or clear plastic, because they are transparent.\", [\"Frosted glass, because it is translucent.\", \"Steel, because it is strong and will not break easily.\", \"Rubber, because it is flexible and comfortable.\"]],\n            [\"p3_diversity\", \"fitb\", \"What do we call materials that block light completely?\", \"Materials that do not allow any light to pass through them are called _[opaque]_ materials.\"],\n            [\"p3_diversity\", \"MAT\", \"Why are camping tents often made of nylon?\", [\"Nylon\", \"Waterproof and lightweight\", \"Prevents water entry while portable\", \"Ideal for hikers carrying gear in the rain\"], [\"Iron\", \"Heavy and strong\", \"High density\", \"Heavy tents will not blow away in strong winds\"], [\"Cotton\", \"Absorbent\", \"Soaks up water\", \"Absorbs rain to keep the inside cool\"]],\n            [\"p3_diversity\", \"mcq\", \"How does a plant respond to its environment?\", \"Its leaves grow towards sunlight.\", [\"It moves to a shadier spot when it is too hot.\", \"It sheds its bark when touched.\", \"It makes a sound when insects land on it.\"]],\n            [\"p3_diversity\", \"CECL\", \"Why is a sponge classified as an animal?\", [\"Sponge is an animal\", \"It cannot make its own food\", \"Classification\", \"It lacks chlorophyll and must take in food from its environment\"], [\"It is a plant\", \"It stays in one place\", \"Stationary trait\", \"Plants cannot move from place to place\"], [\"It is a non-living thing\", \"It has no distinct organs\", \"Biological structure\", \"Only organisms with organs are living things\"]],\n            [\"p3_diversity\", \"fitb\", \"How do frogs survive out of water?\", \"Amphibians, such as frogs, have _[moist]_ skin and usually live near _[water]_ to prevent their skin from drying out.\"],\n            [\"p3_diversity\", \"mcq\", \"Which of the following describes a physical property of a material?\", \"Its flexibility.\", [\"Its age.\", \"Its shape.\", \"Its size.\"]],\n            [\"p3_diversity\", \"MAT\", \"Why is steel used for the structural framework of buildings?\", [\"Steel\", \"High tensile strength\", \"Can support heavy loads without breaking\", \"Ensures the building remains stable and safe\"], [\"Copper\", \"Good electrical conductor\", \"Allows electricity to flow\", \"Provides power to the building\"], [\"Rubber\", \"Elastic\", \"Can be stretched and return to shape\", \"Allows the building to bounce during an earthquake\"]],\n            [\"p3_diversity\", \"CECL\", \"How are amphibians adapted for survival?\", [\"They can live on land and in water\", \"They have moist skin\", \"Amphibian Characteristics\", \"They can absorb dissolved oxygen in water through their skin\"], [\"They can fly\", \"They have webbed wings\", \"Avian Traits\", \"They escape predators by taking to the air\"], [\"They generate heat\", \"They have thick fur\", \"Mammalian Traits\", \"They survive freezing temperatures by maintaining a constant body temperature\"]],\n            [\"p3_diversity\", \"mcq\", \"What is the main function of the outer covering of an animal?\", \"To protect the animal's body.\", [\"To help the animal digest food.\", \"To allow the animal to make its own food.\", \"To help the animal pump blood.\"]],\n            [\"p3_diversity\", \"fitb\", \"How do birds reproduce?\", \"Birds have an outer covering of _[feathers]_ and reproduce by laying _[eggs]_.\"],\n            [\"p3_diversity\", \"mcq\", \"Which group of animals is correctly paired with its characteristic?\", \"Fish - have scales and breathe through gills.\", [\"Mammals - have feathers and give birth to live young.\", \"Reptiles - have moist skin and lay eggs in water.\", \"Insects - have two body parts and eight legs.\"]],\n            [\"p3_diversity\", \"MAT\", \"Why is ceramic used for baking dishes?\", [\"Ceramic\", \"Poor conductor of heat and withstands high temperatures\", \"Heat resistance\", \"Does not melt in the oven and keeps food warm longer\"], [\"Metal\", \"Good conductor of heat\", \"Fast heat transfer\", \"Cools down the food very quickly\"], [\"Plastic\", \"Flexible\", \"Can change shape\", \"Allows the dish to be folded for easy storage\"]],\n            [\"p3_diversity\", \"CECL\", \"Why are bacteria important to the environment?\", [\"Bacteria act as decomposers\", \"They break down dead matter\", \"Decomposition\", \"They return essential nutrients to the soil for plants to use\"], [\"Bacteria make food\", \"They undergo photosynthesis\", \"Producer role\", \"They provide energy for the entire food web\"], [\"Bacteria are always harmful\", \"They cause diseases\", \"Pathogens\", \"They reduce the populations of overpopulated animals\"]],\n\n            // --- P3 INTERACTIONS (Magnets) (30) ---\n            [\"p3_interactions\", \"mcq\", \"Why does a magnet repel another magnet?\", \"Like poles are facing each other, causing magnetic repulsion.\", [\"Unlike poles are facing each other, causing repulsion.\", \"Magnetic materials naturally repel each other.\", \"The magnets have lost their magnetic domains.\"]],\n            [\"p3_interactions\", \"CECL\", \"How does stroking an iron nail with a magnet make it magnetic?\", [\"The nail becomes a temporary magnet\", \"Stroked repeatedly in one single direction\", \"Magnetic Induction\", \"The stroking action aligns the magnetic domains inside the iron nail\"], [\"The nail becomes hot\", \"Heat transfers from the magnet\", \"Frictional Heating\", \"Heat turns the iron material into a permanent magnet\"], [\"The poles become mixed\", \"Stroked back and forth continuously\", \"Magnetic Destruction\", \"Stroking in both directions makes the nail a stronger magnet\"]],\n            [\"p3_interactions\", \"mcq\", \"Aminah placed Magnet A 30cm away from Material B, but B did not move. Why?\", \"The magnetic force of attraction is not strong enough to overcome the distance.\", [\"Material B is an electromagnet that is switched off.\", \"The magnetic poles of Magnet A are facing the wrong direction.\", \"Material B has lost its magnetic domains due to the distance.\"]],\n            [\"p3_interactions\", \"fitb\", \"How does a compass work?\", \"A freely suspended magnet will always come to rest pointing in the _[North-South]_ direction due to the Earth's _[magnetic]_ field.\"],\n            [\"p3_interactions\", \"CECL\", \"Why does a magnet pick up iron nails but not copper coins?\", [\"Iron is a magnetic material\", \"The magnet exerts a pulling force on the nails\", \"Magnetic Attraction\", \"Magnets only attract specific metals like iron, steel, nickel, and cobalt\"], [\"Copper is a metal\", \"The magnet repels the coins\", \"Magnetic Repulsion\", \"Magnets repel non-magnetic metals\"], [\"Iron is heavier\", \"The magnet lifts heavy objects\", \"Gravitational Force\", \"Magnets are drawn to objects with larger mass\"]],\n            [\"p3_interactions\", \"mcq\", \"What happens when a bar magnet is cut in half?\", \"It becomes two smaller magnets, each with a North and South pole.\", [\"It loses all its magnetism.\", \"One half becomes just a North pole, and the other just a South pole.\", \"The magnetic force is concentrated only at the broken ends.\"]],\n            [\"p3_interactions\", \"fitb\", \"Where on a magnet is it strongest?\", \"The magnetic force of a magnet is strongest at its _[poles]_.\"],\n            [\"p3_interactions\", \"CECL\", \"How can you test if an unknown metal bar is a magnet?\", [\"Bring another magnet near it\", \"Check if there is a force of repulsion\", \"Test for Magnetism\", \"Repulsion is the only true test for a magnet, as attraction can occur with any magnetic material\"], [\"Bring it near an iron nail\", \"Check if it attracts the nail\", \"Magnetic Attraction\", \"Attraction proves the bar is a permanent magnet\"], [\"Put it in water\", \"Check if it floats\", \"Buoyancy\", \"Magnets have unique density properties\"]],\n            [\"p3_interactions\", \"mcq\", \"Which of the following materials can be made into a temporary magnet?\", \"Steel\", [\"Aluminium\", \"Copper\", \"Wood\"]],\n            [\"p3_interactions\", \"fitb\", \"How do you demagnetise a magnet?\", \"A magnet can lose its magnetism if it is dropped frequently or if it is _[heated]_ strongly over a flame.\"],\n            [\"p3_interactions\", \"CECL\", \"What happens when the North pole of Magnet A is brought near the South pole of Magnet B?\", [\"They pull towards each other\", \"A pulling force is observed\", \"Magnetic Attraction\", \"Unlike poles of magnets attract each other\"], [\"They push away from each other\", \"A pushing force is observed\", \"Magnetic Repulsion\", \"Unlike poles of magnets repel each other\"], [\"Nothing happens\", \"They remain stationary\", \"Neutrality\", \"Only identical magnets exert forces on each other\"]],\n            [\"p3_interactions\", \"mcq\", \"Which of the following actions will NOT demagnetise a magnet?\", \"Stroking it with another magnet in one direction.\", [\"Heating it over a Bunsen burner.\", \"Hitting it repeatedly with a hammer.\", \"Dropping it on a hard floor many times.\"]],\n            [\"p3_interactions\", \"fitb\", \"Can magnets work through plastic?\", \"Magnetic force can pass through _[non-magnetic]_ materials, allowing a magnet to move a steel paperclip through a piece of paper or plastic.\"],\n            [\"p3_interactions\", \"CECL\", \"Why does a magnetic compass work?\", [\"The needle points North\", \"The needle aligns with Earth's magnetic field\", \"Earth's Magnetism\", \"The Earth acts like a giant magnet, exerting a force on the compass needle\"], [\"The needle is heavy\", \"The needle falls downwards\", \"Gravitational Force\", \"Gravity pulls the needle to the lowest point\"], [\"The needle is charged\", \"The needle detects electricity\", \"Electromagnetism\", \"Electrical currents in the air direct the needle\"]],\n            [\"p3_interactions\", \"mcq\", \"If a magnet is placed near a mixture of iron filings and sand, what will happen?\", \"The iron filings will be attracted to the magnet, leaving the sand behind.\", [\"The sand will be attracted to the magnet, leaving the iron filings.\", \"Both the iron filings and sand will be attracted to the magnet.\", \"Neither the iron filings nor the sand will be attracted to the magnet.\"]],\n            [\"p3_interactions\", \"fitb\", \"What is the invisible area around a magnet called?\", \"The space around a magnet where its magnetic force can be felt is called its magnetic _[field]_.\"],\n            [\"p3_interactions\", \"CECL\", \"Why does a refrigerator door stay closed tightly?\", [\"The door has magnetic strips\", \"A pulling force is felt between the door and the fridge frame\", \"Magnetic Attraction\", \"The magnetic strips attract the steel casing of the refrigerator body\"], [\"The door is heavy\", \"It falls shut\", \"Gravitational Force\", \"The weight of the door pulls it closed\"], [\"The door creates a vacuum\", \"Air is sucked out\", \"Air Pressure\", \"Lower pressure inside pulls the door shut\"]],\n            [\"p3_interactions\", \"mcq\", \"Which object uses a magnet to function?\", \"A compass.\", [\"A light bulb.\", \"A thermometer.\", \"A measuring cylinder.\"]],\n            [\"p3_interactions\", \"fitb\", \"What is the rule of magnetic poles?\", \"Like poles of a magnet will _[repel]_ each other, while unlike poles will _[attract]_ each other.\"],\n            [\"p3_interactions\", \"CECL\", \"Why might a magnet fail to attract a paperclip if a thick piece of wood is placed between them?\", [\"The magnetic force cannot reach the paperclip\", \"The paperclip does not move\", \"Magnetic Attraction\", \"The thick wood places the paperclip too far away, outside the reach of the magnet's force\"], [\"Wood blocks magnetism\", \"Wood is an opaque material\", \"Magnetic Blocking\", \"Non-magnetic materials absorb magnetic forces entirely\"], [\"Wood repels the magnet\", \"The magnet is pushed away\", \"Magnetic Repulsion\", \"Wood has a magnetic field that opposes the magnet\"]],\n            [\"p3_interactions\", \"mcq\", \"A student hangs a bar magnet from a string. When it stops swinging, in which direction will it point?\", \"North-South.\", [\"East-West.\", \"Up-Down.\", \"It will point towards the nearest metal object.\"]],\n            [\"p3_interactions\", \"fitb\", \"How does an electromagnet work?\", \"An electromagnet requires an electrical _[current]_ flowing through a wire coil to act as a _[magnet]_.\"],\n            [\"p3_interactions\", \"CECL\", \"How does an electromagnet differ from a permanent magnet?\", [\"Its magnetism can be turned on and off\", \"It drops iron nails when the circuit is broken\", \"Electromagnetism\", \"An electromagnet only generates a magnetic field when electric current flows through its coil\"], [\"It is always magnetic\", \"It attracts non-magnetic materials\", \"Permanent Magnetism\", \"It possesses a magnetic field regardless of its surroundings\"], [\"It uses heat\", \"It gets hot to attract objects\", \"Thermal Magnetism\", \"It relies on temperature to generate a magnetic force\"]],\n            [\"p3_interactions\", \"mcq\", \"Which of these is NOT a magnetic material?\", \"Aluminium.\", [\"Iron.\", \"Steel.\", \"Cobalt.\"]],\n            [\"p3_interactions\", \"fitb\", \"How can you make an electromagnet stronger?\", \"To make an electromagnet stronger, you can increase the number of _[coils]_ of wire or add more _[batteries]_ to the circuit.\"],\n            [\"p3_interactions\", \"CECL\", \"Why are magnets used in junkyards?\", [\"They separate magnetic metals from other waste\", \"A crane lifts iron and steel objects, leaving plastic and wood behind\", \"Magnetic Attraction\", \"Magnets selectively exert a pulling force on magnetic materials for recycling\"], [\"They crush the garbage\", \"The heavy magnet squashes the waste\", \"Gravitational Force\", \"The large mass of the magnet provides a crushing force\"], [\"They burn the rubbish\", \"The magnet generates electricity\", \"Energy Conversion\", \"The electrical energy is converted to heat to incinerate the waste\"]],\n            [\"p3_interactions\", \"mcq\", \"A U-shaped magnet is brought near a bar magnet. What determines whether they attract or repel?\", \"The specific poles that are facing each other.\", [\"The shape of the magnets.\", \"The size of the magnets.\", \"The colour of the magnets.\"]],\n            [\"p3_interactions\", \"fitb\", \"Can a magnet attract iron through a table?\", \"If you place a sheet of plastic between a magnet and a steel nail, the magnet can still attract the nail because magnetic force can pass through _[non-magnetic]_ materials.\"],\n            [\"p3_interactions\", \"CECL\", \"Why does a magnet attract a steel paperclip?\", [\"Steel is a magnetic material\", \"The paperclip moves towards the magnet\", \"Magnetic Force\", \"The magnet exerts a force of attraction on the magnetic material\"], [\"Steel is an electrical conductor\", \"Electricity flows to the clip\", \"Electrical Force\", \"The magnet sends a current through the clip\"], [\"Steel is heavy\", \"The clip falls towards the magnet\", \"Gravitational Force\", \"The magnet increases the gravity in the area\"]],\n            [\"p3_interactions\", \"mcq\", \"Which combination of materials will be attracted to a magnet?\", \"Iron nails and steel screws.\", [\"Copper wires and aluminium cans.\", \"Gold rings and silver coins.\", \"Plastic spoons and wooden rulers.\"]],\n\n            // --- P4 CYCLES (30) ---\n            [\"p4_cycles\", \"fitb\", \"Why do puddles dry up?\", \"Water in a puddle disappears on a sunny day because the water gains _[heat]_ from the sun and _[evaporates]_ into water vapour.\"],\n            [\"p4_cycles\", \"CYCLE\", \"What causes ice cubes to melt when left on a table?\", [\"Solid Ice\", \"Melting\", \"Gains heat from warmer surroundings\", \"Changes state into liquid water\"], [\"Water Vapour\", \"Heat Transfer\", \"Loses heat to the table\", \"The table's temperature decreases drastically\"], [\"Liquid Water\", \"Condensation\", \"Water droplets form on the ice\", \"The surrounding air condenses into liquid water\"]],\n            [\"p4_cycles\", \"mcq\", \"Why cannot a syringe filled completely with water be compressed?\", \"Liquids have a definite volume and cannot be compressed.\", [\"Liquids have no definite shape and take the shape of the syringe.\", \"The plunger compresses the dissolved air molecules in the water instead.\", \"Water expands slightly when a pushing force is applied.\"]],\n            [\"p4_cycles\", \"mcq\", \"What are the necessary conditions for a seed to germinate?\", \"Water, oxygen, and warmth.\", [\"Sunlight, soil, and water.\", \"Fertiliser, water, and cold temperatures.\", \"Wind, water, and soil.\"]],\n            [\"p4_cycles\", \"fitb\", \"Why does a cold drink get heavier?\", \"When water droplets form on the outside of a cold can of soda, the reading on the weighing balance will _[increase]_ because the condensed water droplets add _[mass]_ to the can.\"],\n            [\"p4_cycles\", \"CYCLE\", \"Why does wet laundry dry faster on a windy day?\", [\"Liquid Water\", \"Evaporation\", \"Wind sweeps water vapour away\", \"Increases the rate of evaporation so clothes dry faster\"], [\"Solid Ice\", \"Boiling\", \"Gains heat from the moving wind\", \"Wind boils the water at lower temperatures\"], [\"Water Vapour\", \"Condensation\", \"Loses heat to the wind\", \"Wind turns water vapour back into liquid droplets\"]],\n            [\"p4_cycles\", \"mcq\", \"Why does the volume of water remain the same when poured from a tall beaker into a wide basin?\", \"Liquids have a definite volume but no definite shape.\", [\"Liquids have no definite shape and no definite volume.\", \"Liquids can be compressed to fit different containers.\", \"Liquids expand to fill the entire space of the wide basin.\"]],\n            [\"p4_cycles\", \"mcq\", \"Why do cockroaches have a 3-stage life cycle while butterflies have a 4-stage cycle?\", \"Cockroaches undergo incomplete metamorphosis and skip the pupa stage.\", [\"Cockroaches lay live young and skip the egg stage.\", \"Cockroach nymphs can fly immediately, skipping the adult stage.\", \"Butterflies have an extra aquatic stage in their cycle.\"]],\n            [\"p4_cycles\", \"CYCLE\", \"How are clouds formed in the water cycle?\", [\"Water Vapour (Gas)\", \"Condensation\", \"Loses heat to the cooler air high up\", \"Forms tiny liquid water droplets that group together\"], [\"Liquid Water\", \"Evaporation\", \"Gains heat from the Sun\", \"Liquid water in the sky turns into gaseous water vapour\"], [\"Solid Ice\", \"Boiling\", \"Gains heat from the atmosphere\", \"Water boils in the sky due to high atmospheric pressure\"]],\n            [\"p4_cycles\", \"fitb\", \"What happens to water when it is heated to 100°C?\", \"During boiling, liquid water gains heat continuously and changes into _[steam]_ at a temperature of _[100]_ degrees Celsius.\"],\n            [\"p4_cycles\", \"CYCLE\", \"Why does mirror fog up when you take a hot shower?\", [\"Water Vapour (Gas)\", \"Condensation\", \"Warm vapour from shower touches cool mirror\", \"Vapour loses heat and forms liquid droplets\"], [\"Liquid Water\", \"Evaporation\", \"Water splashes on mirror\", \"Heat from the shower dries the mirror\"], [\"Solid Ice\", \"Melting\", \"Cold mirror touches hot air\", \"The mirror melts slightly forming a liquid layer\"]],\n            [\"p4_cycles\", \"mcq\", \"At what temperature does pure water freeze into ice?\", \"0°C\", [\"100°C\", \"37°C\", \"Room temperature\"]],\n            [\"p4_cycles\", \"fitb\", \"What defines matter?\", \"Matter is anything that has _[mass]_ and occupies _[space]_.\"],\n            [\"p4_cycles\", \"CYCLE\", \"How does a puddle of water dry up even when it is not boiling?\", [\"Liquid Water\", \"Evaporation\", \"Gains heat from surroundings below boiling point\", \"Slowly changes into water vapour at the surface\"], [\"Solid Ice\", \"Boiling\", \"Gains intense heat from the sun\", \"Bubbles form as the whole puddle turns to gas\"], [\"Water Vapour\", \"Condensation\", \"Loses heat to the ground\", \"Water seeps into the soil\"]],\n            [\"p4_cycles\", \"mcq\", \"Which of the following has no definite shape but has a definite volume?\", \"Oil\", [\"Oxygen\", \"A wooden block\", \"Smoke\"]],\n            [\"p4_cycles\", \"fitb\", \"Why can air be squeezed into a small tank?\", \"A gas, like air, can be compressed because it has no definite _[volume]_.\"],\n            [\"p4_cycles\", \"CYCLE\", \"What happens to the mass of an ice cube as it melts?\", [\"Solid Ice\", \"Melting\", \"State change does not change mass\", \"The mass remains the same, only the state changes to liquid\"], [\"Water Vapour\", \"Evaporation\", \"Water escapes as gas\", \"The mass decreases as it turns into liquid\"], [\"Liquid Water\", \"Condensation\", \"Water from air adds to it\", \"The mass increases as it absorbs water from the air\"]],\n            [\"p4_cycles\", \"mcq\", \"Which process involves a loss of heat to the surroundings?\", \"Freezing\", [\"Evaporation\", \"Melting\", \"Boiling\"]],\n            [\"p4_cycles\", \"fitb\", \"What are the states of matter?\", \"The three states of matter are solid, _[liquid]_, and _[gas]_.\"],\n            [\"p4_cycles\", \"CYCLE\", \"Why is the life cycle of a frog considered unique?\", [\"Egg Stage\", \"Hatches into an aquatic tadpole\", \"Metamorphosis\", \"It undergoes significant physical changes from a water-breathing tadpole to a land-dwelling adult\"], [\"Adult Stage\", \"Lays eggs on land\", \"Reproduction\", \"It skips the larval stage entirely\"], [\"Larva Stage\", \"Looks exactly like the adult\", \"Growth\", \"It only increases in size without changing form\"]],\n            [\"p4_cycles\", \"mcq\", \"Which animal goes through a 4-stage life cycle?\", \"Mosquito\", [\"Grasshopper\", \"Chicken\", \"Frog\"]],\n            [\"p4_cycles\", \"fitb\", \"What does a caterpillar do?\", \"The larva of a butterfly is commonly known as a _[caterpillar]_, and it spends most of its time _[eating]_ to grow.\"],\n            [\"p4_cycles\", \"CYCLE\", \"Why is the pupa stage of a butterfly often inactive?\", [\"Pupa Stage\", \"Enclosed in a chrysalis\", \"Metamorphosis\", \"It is undergoing major internal body changes to become an adult\"], [\"Larva Stage\", \"Eating constantly\", \"Energy Storage\", \"It is resting after eating too much\"], [\"Adult Stage\", \"Ready to lay eggs\", \"Reproduction\", \"It is waiting for a mate\"]],\n            [\"p4_cycles\", \"mcq\", \"What is the young of a cockroach called?\", \"Nymph\", [\"Larva\", \"Pupa\", \"Tadpole\"]],\n            [\"p4_cycles\", \"fitb\", \"How do seeds survive before germination?\", \"A seed contains a baby plant and a store of _[food]_ to provide energy until it grows true _[leaves]_ for photosynthesis.\"],\n            [\"p4_cycles\", \"CYCLE\", \"How does the life cycle of a flowering plant begin?\", [\"Seed Stage\", \"Conditions for germination are met\", \"Germination\", \"The seed coat breaks and the root grows downwards\"], [\"Adult Stage\", \"Produces flowers\", \"Pollination\", \"Insects carry pollen to the stigma\"], [\"Seedling Stage\", \"Grows leaves\", \"Photosynthesis\", \"The plant starts making its own food\"]],\n            [\"p4_cycles\", \"mcq\", \"Which list correctly orders the stages of a bean plant's life cycle?\", \"Seed, seedling, adult plant.\", [\"Seedling, seed, adult plant.\", \"Adult plant, seedling, seed.\", \"Seed, adult plant, seedling.\"]],\n            [\"p4_cycles\", \"fitb\", \"How does a nymph grow?\", \"During the _[nymph]_ stage, an insect like a grasshopper periodically sheds its outer skin to grow, a process called _[moulting]_.\"],\n            [\"p4_cycles\", \"CYCLE\", \"Why do some insects lay their eggs on the underside of leaves?\", [\"Egg Stage\", \"Hidden from view\", \"Survival strategy\", \"Protects eggs from predators and provides immediate food for the hatching larvae\"], [\"Larva Stage\", \"Needs sunlight\", \"Warmth\", \"Helps the eggs hatch faster due to the sun's heat\"], [\"Adult Stage\", \"Easier to fly away\", \"Locomotion\", \"Allows the adult to escape quickly after laying\"]],\n\n            // --- P4 ENERGY (30) ---\n            [\"p4_energy\", \"mcq\", \"Why does Daisy's shadow get longer as she walks further away from the streetlamp?\", \"The angle of light rays changes, causing her to block a wider area of light.\", [\"She walks at a slower speed, giving the shadow more time to stretch.\", \"The intensity of the light from the streetlamp decreases.\", \"The light rays bend around her body more sharply.\"]],\n            [\"p4_energy\", \"CECL\", \"How does a shadow form behind an object?\", [\"A dark area appears on the screen\", \"An opaque object blocks the light path\", \"Light Properties\", \"Light travels in straight lines and cannot bend around the opaque object\"], [\"A faint shadow is formed\", \"A transparent object is used\", \"Light Transmission\", \"Light passes completely through the object to create a dark shadow\"], [\"A distorted shadow forms\", \"Light bends around the object's edges\", \"Refraction\", \"Light refracts around the opaque object to form the shadow\"]],\n            [\"p4_energy\", \"EXP\", \"Why do bubbles form in the beaker of water when the connected glass flask is heated?\", [\"To show that air expands\", \"The glass flask is heated by a flame\", \"Thermal Expansion of Gas\", \"Air in the flask gained heat, expanded in volume, and escaped through the tube as bubbles\"], [\"To show that water boils\", \"The water in the beaker is heated\", \"Boiling\", \"The water gained heat from the surroundings and turned into steam\"], [\"To show that air dissolves\", \"The tube is placed in cold water\", \"Solubility\", \"The cold water caused the air inside the flask to dissolve and form bubbles\"]],\n            [\"p4_energy\", \"mcq\", \"Rizwan uses a light sensor to count balls rolling through a hole. Why do the blocked light periods have different durations?\", \"The balls rolled through the hole at different speeds.\", [\"The balls were of different sizes and masses.\", \"The light sensor was moving closer to the hole.\", \"The light intensity of the lamp was fluctuating.\"]],\n            [\"p4_energy\", \"CECL\", \"Why does a metal spoon feel cold when placed in a cup of iced water?\", [\"The spoon feels cold to the touch\", \"It loses heat to the iced water\", \"Heat Transfer\", \"Heat travels from the warmer spoon to the colder water until they reach the same temperature\"], [\"The spoon absorbs coldness\", \"It gains cold from the ice\", \"Cold Transfer\", \"Cold energy moves from the water into the metal spoon\"], [\"The spoon drops in temperature\", \"Metal is naturally a cold material\", \"Material Property\", \"Metals generate their own low temperatures independently\"]],\n            [\"p4_energy\", \"mcq\", \"Why does a metal ball fail to pass through a metal ring after being heated?\", \"The solid metal ball increased in volume (expanded) when it gained heat.\", [\"The heat caused the metal ball to shrink and contract.\", \"The metal ball gained mass from the flame and became too heavy.\", \"The heat caused the metal ring to expand inwards, reducing its hole size.\"]],\n            [\"p4_energy\", \"fitb\", \"What is temperature?\", \"Heat is a form of _[energy]_, while _[temperature]_ is a measurement of the degree of hotness of an object.\"],\n            [\"p4_energy\", \"mcq\", \"David placed materials A, B and C between a torch and a light sensor in a dark room.<br><table class='question-table'><tr><th>Material<\u002Fth><th>Amount of Light Detected (units)<\u002Fth><\u002Ftr><tr><td>Clear Glass<\u002Ftd><td>400<\u002Ftd><\u002Ftr><tr><td>A<\u002Ftd><td>380<\u002Ftd><\u002Ftr><tr><td>B<\u002Ftd><td>0<\u002Ftd><\u002Ftr><tr><td>C<\u002Ftd><td>150<\u002Ftd><\u002Ftr><\u002Ftable>Which material is most likely a wooden board?\", \"Material B\", [\"Material A\", \"Material C\", \"Clear Glass\"]],\n            [\"p4_energy\", \"mcq\", \"Which of the following objects is a source of light?\", \"The Sun\", [\"The Moon\", \"A mirror\", \"A diamond ring\"]],\n            [\"p4_energy\", \"fitb\", \"Why do shadows form?\", \"Light travels in a _[straight]_ line, which is why a _[shadow]_ forms when an opaque object blocks it.\"],\n            [\"p4_energy\", \"CECL\", \"Why can you see yourself in a mirror?\", [\"An image is formed\", \"Light bounces off the mirror\", \"Reflection of Light\", \"The smooth, shiny surface of the mirror reflects light regularly into our eyes\"], [\"An image is captured\", \"The mirror absorbs the light\", \"Absorption\", \"The mirror absorbs the light rays to create a picture\"], [\"An image passes through\", \"The mirror is transparent\", \"Transmission\", \"Light travels straight through the glass to show the image\"]],\n            [\"p4_energy\", \"mcq\", \"Which material would cast the darkest shadow?\", \"A wooden board.\", [\"A clear glass sheet.\", \"Tracing paper.\", \"A plastic bag.\"]],\n            [\"p4_energy\", \"fitb\", \"What happens to a hot drink?\", \"When a cup of hot tea is left on a table, it _[loses]_ heat to the cooler surroundings until it reaches _[room]_ temperature.\"],\n            [\"p4_energy\", \"CECL\", \"Why are gaps left between railway tracks?\", [\"To prevent tracks from buckling\", \"Metal tracks gain heat on hot days\", \"Thermal Expansion\", \"The gaps provide space for the metal to expand in volume when heated by the sun\"], [\"To save metal\", \"Tracks use less material\", \"Economic Efficiency\", \"Gaps reduce the cost of building the railway\"], [\"To increase friction\", \"Wheels grip the track better\", \"Frictional Force\", \"Gaps prevent the train from slipping on rainy days\"]],\n            [\"p4_energy\", \"mcq\", \"A block of ice is placed in a sealed plastic bag. What happens to its mass and volume as it melts?\", \"Its mass remains the same, but its volume decreases.\", [\"Both its mass and volume decrease.\", \"Its mass increases, and its volume decreases.\", \"Its mass remains the same, and its volume increases.\"]],\n            [\"p4_energy\", \"fitb\", \"How do thermometers work?\", \"A thermometer uses a liquid, like alcohol, which _[expands]_ when it gains heat and _[contracts]_ when it loses heat.\"],\n            [\"p4_energy\", \"CECL\", \"Why does a tightly screwed metal lid on a glass jar open easily after running it under hot water?\", [\"The lid loosens\", \"The metal gains heat from the hot water\", \"Thermal Expansion\", \"The metal lid expands in volume more than the glass, breaking the tight seal\"], [\"The lid slips\", \"The water acts as a lubricant\", \"Friction Reduction\", \"Water reduces the friction between the lid and the jar\"], [\"The glass shrinks\", \"The jar loses heat to the water\", \"Contraction\", \"The hot water forces the glass to become smaller\"]],\n            [\"p4_energy\", \"mcq\", \"If you mix 50ml of water at 20°C with 50ml of water at 80°C, what is the most likely temperature of the mixture immediately after?\", \"50°C\", [\"100°C\", \"20°C\", \"80°C\"]],\n            [\"p4_energy\", \"fitb\", \"What are conductors and insulators?\", \"Materials that allow heat to pass through them easily are called good _[conductors]_ of heat, while those that do not are called poor conductors or _[insulators]_.\"],\n            [\"p4_energy\", \"CECL\", \"Why is a styrofoam cup better than a metal cup for holding hot coffee?\", [\"The coffee stays hot longer\", \"Styrofoam is a poor conductor of heat\", \"Heat Transfer\", \"It slows down the rate of heat loss from the hot coffee to the cooler surroundings\"], [\"The coffee cools down faster\", \"Styrofoam is a good conductor of heat\", \"Heat Conduction\", \"It speeds up the heat loss to the surroundings\"], [\"The cup gets hot\", \"Styrofoam generates heat\", \"Heat Generation\", \"The material produces thermal energy to keep the coffee warm\"]],\n            [\"p4_energy\", \"mcq\", \"How can you make a shadow larger?\", \"Move the object closer to the light source.\", [\"Move the object further from the light source.\", \"Move the screen closer to the object.\", \"Use a brighter light source.\"]],\n            [\"p4_energy\", \"fitb\", \"Where does Earth get energy?\", \"The Sun is our primary source of _[heat]_ and _[light]_ energy.\"],\n            [\"p4_energy\", \"CECL\", \"How does a periscope allow you to see over a wall?\", [\"You can see an object over the wall\", \"Mirrors inside are angled at 45 degrees\", \"Reflection of Light\", \"Light from the object is reflected by the top mirror down to the bottom mirror, then to your eye\"], [\"You can see through the wall\", \"The mirrors magnify the image\", \"Refraction\", \"The mirrors bend the light through the solid wall\"], [\"You can see around the wall\", \"The periscope emits light\", \"Light Source\", \"The periscope acts as a torch to illuminate the object\"]],\n            [\"p4_energy\", \"mcq\", \"Which of the following surfaces reflects light most regularly?\", \"A calm pool of water.\", [\"A rough piece of sandpaper.\", \"A brick wall.\", \"A crumpled piece of aluminium foil.\"]],\n            [\"p4_energy\", \"fitb\", \"What happens to light on an uneven surface?\", \"When light strikes a _[rough]_ surface, it is reflected in many different _[directions]_.\"],\n            [\"p4_energy\", \"CECL\", \"Why is double-glazed glass (two panes of glass with a layer of air between them) used for windows in cold countries?\", [\"The room stays warm\", \"Air is trapped between the glass panes\", \"Thermal Insulation\", \"Air is a poor conductor of heat, reducing heat loss from the warm room to the cold outside\"], [\"The room gets colder\", \"Air is a good conductor of heat\", \"Heat Transfer\", \"Air speeds up the transfer of heat out of the room\"], [\"The room lights up\", \"The glass magnifies sunlight\", \"Light Energy\", \"The glass traps light energy and turns it into heat\"]],\n            [\"p4_energy\", \"mcq\", \"Which statement about heat is incorrect?\", \"Heat is measured in degrees Celsius.\", [\"Heat is a form of energy.\", \"Heat flows from a region of higher temperature to lower temperature.\", \"Heat can cause an object to expand.\"]],\n            [\"p4_energy\", \"fitb\", \"How do heat changes affect temperature?\", \"When an object gains heat, its temperature _[increases]_, and when it loses heat, its temperature _[decreases]_.\"],\n            [\"p4_energy\", \"CECL\", \"Why do animals like penguins have a thick layer of blubber (fat)?\", [\"They survive in freezing environments\", \"Blubber acts as a thermal insulator\", \"Adaptation (Heat)\", \"The fat reduces the rate of body heat lost to the cold surroundings\"], [\"They sink in water\", \"Blubber is heavy\", \"Density\", \"The fat helps them dive deep into the ocean quickly\"], [\"They overheat easily\", \"Blubber generates heat\", \"Heat Production\", \"The fat creates chemical heat to keep the penguin warm\"]],\n            [\"p4_energy\", \"mcq\", \"If a glass cup and a metal cup, both at room temperature (25°C), are touched, why does the metal cup feel cooler?\", \"The metal cup conducts heat away from your hand faster than the glass cup.\", [\"The metal cup is at a lower temperature than the glass cup.\", \"The metal cup generates a cooling effect.\", \"The glass cup conducts heat into your hand.\"]],\n\n            // --- P5 SYSTEMS (30) ---\n            [\"p5_systems\", \"fitb\", \"Why chew food?\", \"Food must be chewed to break it into smaller pieces, which increases the exposed _[surface area]_ for faster _[digestion]_ by digestive juices.\"],\n            [\"p5_systems\", \"SYS\", \"Why is the stem important for a plant's survival?\", [\"Plant System\", \"Stem\", \"Holds leaves upright towards the light\", \"Maximises the amount of sunlight trapped for photosynthesis\"], [\"Plant Transport\", \"Leaves\", \"Absorbs water directly\", \"Stem absorbs moisture from the surrounding air\"], [\"Root System\", \"Roots\", \"Anchors the plant\", \"Roots prevent the plant from being uprooted by wind\"]],\n            [\"p5_systems\", \"SYS\", \"How does the small intestine absorb digested food efficiently?\", [\"Digestive System\", \"Small Intestine\", \"Absorbs digested food into the bloodstream\", \"Thin walls and a rich blood supply enable efficient transport\"], [\"Excretory System\", \"Large Intestine\", \"Absorbs excess water\", \"Absorbs water from undigested food before egestion\"], [\"Circulatory System\", \"Stomach\", \"Complete digestion\", \"Releases strong gastric juices to break down food entirely\"]],\n            [\"p5_systems\", \"fitb\", \"Why does your heart beat faster?\", \"During exercise, his heart rate increased because his muscles needed more energy, so his heart pumped faster to deliver more _[oxygen]_ for _[respiration]_.\"],\n            [\"p5_systems\", \"SYS\", \"What is the primary function of the plant's xylem?\", [\"Plant Transport\", \"Water-carrying tubes (Xylem)\", \"Transports water and mineral salts upwards\", \"Ensures all plant parts receive water for photosynthesis\"], [\"Root System\", \"Food-carrying tubes (Phloem)\", \"Moves sugar downwards\", \"Transports food manufactured by the leaves to the roots\"], [\"Plant System\", \"Stomata\", \"Gaseous exchange\", \"Allows carbon dioxide to enter for photosynthesis\"]],\n            [\"p5_systems\", \"SYS\", \"What happens when a plant stem is ringed and the outer bark is removed?\", [\"Plant Transport\", \"Phloem (Food-carrying tubes)\", \"Transport of food is disrupted\", \"Food made by leaves cannot reach the roots, causing the stem to swell above the cut\"], [\"Shoot System\", \"Xylem (Water-carrying tubes)\", \"Transport of water is disrupted\", \"Water cannot reach the leaves, causing the plant to wither instantly\"], [\"Plant System\", \"Epidermis (Outer Bark)\", \"Protects the stem\", \"The stem loses water through rapid evaporation, drying the plant out\"]],\n            [\"p5_systems\", \"mcq\", \"What is the function of the large intestine in the human digestive system?\", \"It absorbs water and mineral salts from undigested food.\", [\"It completes the digestion of food and absorbs it into the blood.\", \"It churns the food and mixes it with digestive juices.\", \"It stores the completely digested food before it is used for energy.\"]],\n            [\"p5_systems\", \"mcq\", \"A scientist recorded the amount of undigested food passing through organs X, Y and Z.<br><table class='question-table'><tr><th>Organ<\u002Fth><th>Amount of Undigested Food (g)<\u002Fth><\u002Ftr><tr><td>Entering X (Mouth)<\u002Ftd><td>100<\u002Ftd><\u002Ftr><tr><td>Entering Y (Stomach)<\u002Ftd><td>80<\u002Ftd><\u002Ftr><tr><td>Entering Z (Small Intestine)<\u002Ftd><td>50<\u002Ftd><\u002Ftr><tr><td>Leaving Z<\u002Ftd><td>10<\u002Ftd><\u002Ftr><\u002Ftable>What does the data show about the digestion process?\", \"Digestion occurs continuously across organs X, Y, and Z.\", [\"Digestion only occurs in the small intestine (Z).\", \"The stomach (Y) absorbs all the digested food into the blood.\", \"The amount of undigested food increases in the stomach.\"]],\n            [\"p5_systems\", \"fitb\", \"Why are leaves green?\", \"Chloroplasts contain a green pigment called _[chlorophyll]_, which traps _[light]_ energy to make food during photosynthesis.\"],\n            [\"p5_systems\", \"fitb\", \"Where are nutrients absorbed?\", \"Digestion begins in the _[mouth]_ where saliva starts breaking down food, and ends in the _[small]_ intestine where nutrients are absorbed.\"],\n            [\"p5_systems\", \"SYS\", \"How does the stomach aid in digestion?\", [\"Digestive System\", \"Stomach\", \"Churns food and mixes it with digestive juices\", \"Breaks down food into even simpler substances before passing to the small intestine\"], [\"Excretory System\", \"Gullet\", \"Transports food\", \"Squeezes food from the mouth directly into the intestines\"], [\"Circulatory System\", \"Large Intestine\", \"Absorbs water\", \"Removes liquid from the digested mush to form solid waste\"]],\n            [\"p5_systems\", \"mcq\", \"What is the path of air when a person inhales?\", \"Nose -> Windpipe -> Lungs\", [\"Mouth -> Gullet -> Stomach\", \"Nose -> Lungs -> Blood vessels\", \"Windpipe -> Heart -> Lungs\"]],\n            [\"p5_systems\", \"fitb\", \"What pumps blood?\", \"The human circulatory system consists of the heart, _[blood]_, and blood _[vessels]_.\"],\n            [\"p5_systems\", \"SYS\", \"What is the main function of the human heart?\", [\"Circulatory System\", \"Heart\", \"Pumps blood throughout the body\", \"Ensures oxygen and digested food reach all parts of the body continuously\"], [\"Respiratory System\", \"Lungs\", \"Gaseous exchange\", \"Takes in oxygen and removes carbon dioxide from the blood\"], [\"Digestive System\", \"Liver\", \"Produces bile\", \"Aids in the digestion of fats in the small intestine\"]],\n            [\"p5_systems\", \"mcq\", \"Which of the following substances are transported by the human circulatory system?\", \"Oxygen, carbon dioxide, and digested food.\", [\"Undigested food, water, and air.\", \"Urine, sweat, and tears.\", \"Saliva, gastric juices, and bile.\"]],\n            [\"p5_systems\", \"fitb\", \"How do you control an electrical circuit?\", \"In a simple electrical circuit, a _[switch]_ can be used to open or close the circuit, controlling the flow of electrical _[current]_.\"],\n            [\"p5_systems\", \"SYS\", \"Why are the wires in electrical cables usually made of copper?\", [\"Electrical System\", \"Copper Wire\", \"Excellent electrical conductor\", \"Allows electrical current to flow through it with very low resistance\"], [\"Magnetic System\", \"Plastic Coating\", \"Electrical insulator\", \"Prevents electric shocks to the user\"], [\"Lighting System\", \"Battery\", \"Source of energy\", \"Provides the chemical energy needed to push the current\"]],\n            [\"p5_systems\", \"mcq\", \"What happens to the brightness of a bulb in a circuit if you add more batteries in series?\", \"The bulb will shine brighter.\", [\"The bulb will become dimmer.\", \"The bulb's brightness will remain the same.\", \"The bulb will definitely fuse immediately.\"]],\n            [\"p5_systems\", \"fitb\", \"What prevents electric shocks?\", \"Materials that do not allow electric current to pass through them are called electrical _[insulators]_, such as wood and _[rubber]_.\"],\n            [\"p5_systems\", \"SYS\", \"How does a switch work in an electrical circuit?\", [\"Electrical System\", \"Switch\", \"Completes or breaks the circuit\", \"When closed, it creates a continuous path for current to flow, lighting the bulb\"], [\"Magnetic System\", \"Filament\", \"Produces light and heat\", \"Glows intensely when electrical current passes through its high resistance\"], [\"Lighting System\", \"Battery Terminal\", \"Provides connection points\", \"Ensures the wire touches the positive and negative ends securely\"]],\n            [\"p5_systems\", \"mcq\", \"In a circuit with two bulbs in series, what happens if one bulb fuses?\", \"The other bulb will go out because the circuit is broken.\", [\"The other bulb will become brighter because it gets all the current.\", \"The other bulb will remain lit with the same brightness.\", \"The other bulb will become dimmer due to increased resistance.\"]],\n            [\"p5_systems\", \"fitb\", \"How does a battery work?\", \"A battery contains stored _[chemical]_ potential energy, which is converted into _[electrical]_ energy when connected in a closed circuit.\"],\n            [\"p5_systems\", \"SYS\", \"Why does a metal paper clip make a bulb light up when it is used to close a gap in a circuit?\", [\"Electrical System\", \"Metal Paper Clip\", \"Electrical conductor\", \"It lets electric current flow through it, completing the circuit so the bulb lights up\"], [\"Lighting System\", \"Plastic Ruler\", \"Electrical insulator\", \"It does not let current pass through, so the circuit stays broken and the bulb stays off\"], [\"Heating System\", \"Rubber Band\", \"Stores electricity\", \"It holds charge inside itself and slowly releases it to the bulb\"]],\n            [\"p5_systems\", \"mcq\", \"What is the advantage of arranging bulbs in a parallel circuit rather than a series circuit?\", \"If one bulb fuses, the other bulbs will remain lit because there are alternative pathways for the current.\", [\"Parallel circuits allow less current to pass through, reducing the heat produced by the bulbs.\", \"Parallel circuits ensure the batteries last twice as long.\", \"Parallel circuits increase the voltage supplied to make the bulbs shine brighter.\"]],\n            [\"p5_systems\", \"SYS\", \"What gaseous exchange happens in the human lungs?\", [\"Respiratory System\", \"Lungs (Air Sacs)\", \"Oxygen enters blood / Carbon dioxide leaves blood\", \"Oxygen is transported to cells while CO2 is exhaled\"], [\"Excretory System\", \"Windpipe\", \"Filters inhaled air\", \"Filters out carbon dioxide from the atmospheric air\"], [\"Circulatory System\", \"Blood vessels\", \"Transports nutrients\", \"Transports digested food directly to the stomach\"]],\n\n            // --- P5 CYCLES (30) ---\n            [\"p5_cycles\", \"EXP\", \"In a sealed bottle garden, how are water droplets formed on the inner glass wall?\", [\"To form water droplets inside the bottle\", \"Warm water vapour touches the cool glass\", \"Condensation\", \"Water vapour loses heat to the cooler surface and condenses into liquid droplets\"], [\"To form clouds inside the bottle\", \"Liquid water touches the hot glass\", \"Evaporation\", \"Water gains heat from the glass and evaporates instantly\"], [\"To form dew on the leaves\", \"Plant leaves release water\", \"Transpiration\", \"Plants sweat out water droplets directly onto the glass\"]],\n            [\"p5_cycles\", \"mcq\", \"Which part of the female human reproductive system has a similar function to the male testes (producing reproductive cells)?\", \"Ovary\", [\"Womb\", \"Fallopian tube\", \"Vagina\"]],\n            [\"p5_cycles\", \"fitb\", \"What is fertilisation?\", \"The process where the nucleus of a male reproductive cell fuses with the nucleus of a female reproductive cell is called _[fertilisation]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"How is human reproduction similar to plant reproduction?\", [\"Male and Female Cells\", \"Fusion of nuclei\", \"Fertilisation\", \"Both require the fusion of a male and female reproductive cell to form a new individual\"], [\"Asexual Reproduction\", \"Spores spread by wind\", \"Dispersal\", \"Both can reproduce without the need for a partner\"], [\"Development of Young\", \"Growth in a womb\", \"Gestation\", \"Both protect their young internally until fully grown\"]],\n            [\"p5_cycles\", \"mcq\", \"In human reproduction, where does the fertilised egg develop into a baby?\", \"In the womb.\", [\"In the ovary.\", \"In the fallopian tube.\", \"In the stomach.\"]],\n            [\"p5_cycles\", \"fitb\", \"How does pollination happen?\", \"During pollination in plants, pollen grains are transferred from the _[anther]_ to the _[stigma]_ of a flower.\"],\n            [\"p5_cycles\", \"CYCLE\", \"Why do some flowers have brightly coloured petals and sweet nectar?\", [\"Bright petals and nectar\", \"Attracts insects and birds\", \"Pollination Strategy\", \"Pollinators visit the flower for food, inadvertently transferring pollen between flowers\"], [\"Dull petals and no scent\", \"Relies on wind\", \"Wind Pollination\", \"Produces large amounts of light pollen to be blown away\"], [\"Sharp thorns and poison\", \"Deters herbivores\", \"Defence Mechanism\", \"Protects the delicate reproductive organs from being eaten\"]],\n            [\"p5_cycles\", \"mcq\", \"What is the function of the ovary in a flower?\", \"It produces female reproductive cells (ovules) and develops into a fruit after fertilisation.\", [\"It produces pollen grains that contain male reproductive cells.\", \"It traps pollen grains with its sticky surface.\", \"It holds up the anther so wind can blow the pollen away.\"]],\n            [\"p5_cycles\", \"fitb\", \"What do the ovule and ovary become?\", \"After fertilisation, the ovule develops into a _[seed]_, while the ovary swells and develops into a _[fruit]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"Why is seed dispersal important for plants?\", [\"Seeds scattered away from parent plant\", \"Prevents overcrowding\", \"Competition Reduction\", \"Reduces competition between young plants and parent plant for sunlight, water, and space\"], [\"Seeds drop directly below parent\", \"Ensures ideal soil conditions\", \"Parental Care\", \"The parent plant protects the seedlings from strong winds\"], [\"Seeds eaten by animals\", \"Provides food for ecosystem\", \"Food Web Support\", \"The primary purpose of seeds is to feed herbivores\"]],\n            [\"p5_cycles\", \"mcq\", \"Which characteristic is typical of a seed dispersed by wind?\", \"It is small, light, and has wing-like structures.\", [\"It is fleshy, juicy, and brightly coloured.\", \"It has a waterproof, fibrous husk.\", \"It is covered in stiff hairs or hooks.\"]],\n            [\"p5_cycles\", \"fitb\", \"How does a coconut float?\", \"A coconut has a fibrous husk that traps _[air]_, allowing it to float and be dispersed by _[water]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"How do hooks on a fruit help in seed dispersal?\", [\"Fruits covered in stiff hooks\", \"Clings to passing animals\", \"Animal Dispersal\", \"The hooks attach to animal fur or human clothing and are carried far away before dropping off\"], [\"Fruits burst open forcefully\", \"Shoots seeds in all directions\", \"Explosive Action\", \"The pod dries up and splits, scattering the seeds\"], [\"Fruits are sweet and fleshy\", \"Eaten by animals\", \"Animal Dispersal (Ingestion)\", \"The indigestible seeds are passed out in the animal's droppings far away\"]],\n            [\"p5_cycles\", \"mcq\", \"What is the state of water at 50°C?\", \"Liquid\", [\"Solid\", \"Gas\", \"Plasma\"]],\n            [\"p5_cycles\", \"fitb\", \"What do we call the continuous movement of water?\", \"The continuous movement of water from the Earth's surface to the sky and back again is called the water _[cycle]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"What is the role of the Sun in the water cycle?\", [\"The Sun provides heat energy\", \"Causes evaporation of water bodies\", \"Energy Source\", \"Heat from the sun turns liquid water into water vapour, driving the entire cycle\"], [\"The Sun provides light energy\", \"Helps plants grow\", \"Photosynthesis\", \"Without plants, there would be no water cycle\"], [\"The Sun's gravity\", \"Pulls rain down\", \"Precipitation\", \"The Sun's gravitational pull forces clouds to drop rain\"]],\n            [\"p5_cycles\", \"mcq\", \"Which of the following activities helps to conserve water?\", \"Using a watering can instead of a hose to water plants.\", [\"Leaving the tap running while brushing your teeth.\", \"Taking long baths instead of quick showers.\", \"Washing a car with a running hose.\"]],\n            [\"p5_cycles\", \"fitb\", \"How does dumping untreated sewage harm aquatic life?\", \"Water pollution, such as dumping untreated sewage into rivers, can harm aquatic life by depleting the dissolved _[oxygen]_ in the water.\"],\n            [\"p5_cycles\", \"CYCLE\", \"Why does mist form on a bathroom mirror after a hot shower?\", [\"Warm water vapour hits the cold mirror\", \"Loses heat and condenses\", \"Condensation\", \"The temperature difference causes the gas to turn back into tiny liquid droplets on the surface\"], [\"Hot water splashes on the mirror\", \"Sticks to the glass\", \"Adhesion\", \"Liquid water from the shower head directly wets the mirror\"], [\"The mirror sweats\", \"Moisture comes from within the glass\", \"Transpiration\", \"The heat causes the mirror to release trapped water\"]],\n            [\"p5_cycles\", \"mcq\", \"Which process involves the change of state from a liquid to a solid?\", \"Freezing\", [\"Melting\", \"Evaporation\", \"Condensation\"]],\n            [\"p5_cycles\", \"fitb\", \"What happens to the temperature of water when it boils?\", \"When boiling water, the temperature remains constant at _[100]_ °C even though it continues to gain _[heat]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"How does sweating help to cool the human body?\", [\"Sweat on the skin surface\", \"Evaporates into the air\", \"Evaporative Cooling\", \"As the sweat evaporates, it absorbs heat energy from the body, lowering the body temperature\"], [\"Sweat drips off the body\", \"Removes hot water\", \"Excretion\", \"Getting rid of hot liquid directly cools the body down\"], [\"Sweat blocks the pores\", \"Stops heat from entering\", \"Insulation\", \"A layer of sweat acts as a shield against the hot sun\"]],\n            [\"p5_cycles\", \"mcq\", \"Which process in the water cycle ensures a continuous supply of fresh water on Earth?\", \"Evaporation of sea water leaving salt behind, followed by condensation and rain.\", [\"Freezing of sea water into icebergs.\", \"Melting of ice caps directly into the rivers.\", \"Rivers flowing directly into the sea without evaporating.\"]],\n            [\"p5_cycles\", \"fitb\", \"What is the process of a liquid turning into a gas?\", \"The process of a liquid changing into a gas below its boiling point is called _[evaporation]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"Why do plants close their stomata during a hot afternoon?\", [\"Prevents wilting\", \"Stomata close to reduce water loss\", \"Transpiration\", \"Limits evaporation from leaves to conserve water\"], [\"Leaves get dark\", \"Blocks sunlight\", \"Photosynthesis control\", \"Closing stomata creates shade inside the leaf\"], [\"Bugs can't enter\", \"Stops insects\", \"Defence\", \"Stomata act as doors to keep pests out\"]],\n            [\"p5_cycles\", \"mcq\", \"Where does the fertilised egg attach itself to continue growing in a human female?\", \"The lining of the womb.\", [\"The wall of the ovary.\", \"The inner tube of the fallopian tube.\", \"The base of the vagina.\"]],\n            [\"p5_cycles\", \"fitb\", \"Where are the reproductive cells in a flower?\", \"In plants, the male reproductive cells are found within the _[pollen]_ grains, while the female reproductive cells are in the _[ovules]_.\"],\n            [\"p5_cycles\", \"CYCLE\", \"How does the wind help certain plants reproduce?\", [\"Dull petals and exposed anthers\", \"Pollen is blown by the wind\", \"Wind Pollination\", \"Produces large amounts of light pollen that are carried by the wind to other stigmas\"], [\"Bright petals and sweet scent\", \"Attracts bees\", \"Insect Pollination\", \"Wind carries the scent to bees far away\"], [\"Heavy sticky pollen\", \"Drops directly below\", \"Self Pollination\", \"Wind shakes the plant to drop pollen on its own stigma\"]],\n            [\"p5_cycles\", \"mcq\", \"If the temperature of the environment increases globally, what will most likely happen to the rate of the water cycle?\", \"It will speed up due to increased evaporation rates.\", [\"It will slow down because clouds cannot form in hot weather.\", \"It will remain exactly the same.\", \"It will stop completely as all water will boil away.\"]],\n            [\"p5_cycles\", \"fitb\", \"How do clouds form?\", \"During the water cycle, water vapour rises, loses heat, and _[condenses]_ to form tiny water droplets that gather as _[clouds]_.\"],\n\n            // --- P6 INTERACTIONS (30) ---\n            [\"p6_interactions\", \"mcq\", \"How does a parachute slow a skydiver down?\", \"The large surface area of the canopy traps air, increasing the upward frictional force (air resistance).\", [\"The parachute decreases the gravitational force acting on the skydiver.\", \"The parachute decreases the overall mass of the skydiver.\", \"The parachute increases the skydiver's weight, causing a slower fall.\"]],\n            [\"p6_interactions\", \"ECO\", \"Why are food chains usually limited to three or four trophic levels?\", [\"Food Chains\", \"Top predators receive the least energy\", \"Energy Transfer\", \"Approximately 90% of energy is lost as heat or through life processes at each level\"], [\"Food Pyramid\", \"Larger predators require fewer steps\", \"Organism Size\", \"Larger animals eat larger prey, keeping the chain short\"], [\"Food Web\", \"Consumers generate their own energy\", \"Energy Generation\", \"Consumers eventually stop relying on producers for energy\"]],\n            [\"p6_interactions\", \"ECO\", \"What happens if a disease wipes out all the producers in a specific food web?\", [\"Food Web\", \"All consumers will eventually starve\", \"Interdependence\", \"Producers are the sole source of converted light energy for the entire web\"], [\"Food Chain\", \"Carnivores remain unaffected\", \"Diet Preference\", \"Carnivores only consume meat, so they survive without plants\"], [\"Energy Pyramid\", \"Decomposers become the new producers\", \"Energy Source\", \"Decomposers will provide energy directly to the primary consumers\"]],\n            [\"p6_interactions\", \"fitb\", \"How are polar bears adapted to the cold?\", \"Polar bears have thick layers of fat which act as a thermal _[insulator]_, reducing body heat _[loss]_ to the freezing Arctic surroundings.\"],\n            [\"p6_interactions\", \"CECL\", \"Why does a ripe apple fall from the tree to the ground?\", [\"The apple drops downwards\", \"Earth's gravity acts on it\", \"Gravitational Force\", \"The Earth exerts a pulling force on all objects possessing mass\"], [\"The apple is attracted to the ground\", \"The core contains iron\", \"Magnetic Force\", \"The Earth's magnetic field attracts the iron in the apple\"], [\"Air pushes it downwards\", \"Changes in air pressure\", \"Frictional Force\", \"Air resistance pushes heavy objects towards the ground\"]],\n            [\"p6_interactions\", \"mcq\", \"Ravi wiped his left palm with Cleaner P and his right palm with Cleaner Q.<br><table class='question-table'><tr><th>Cleaning Agent<\u002Fth><th>Bacteria at 3 mins<\u002Fth><th>Bacteria at 1 hour<\u002Fth><\u002Ftr><tr><td>Cleaner P<\u002Ftd><td>200<\u002Ftd><td>500<\u002Ftd><\u002Ftr><tr><td>Cleaner Q<\u002Ftd><td>100<\u002Ftd><td>110<\u002Ftd><\u002Ftr><\u002Ftable>What can Ravi conclude about Cleaner Q?\", \"Cleaner Q is more effective in killing bacteria and slowing their reproduction rate than Cleaner P.\", [\"Cleaner P is more effective in killing bacteria than Cleaner Q.\", \"Cleaner Q causes bacteria to reproduce faster than Cleaner P.\", \"Both Cleaner P and Cleaner Q are equally effective at removing bacteria.\"]],\n            [\"p6_interactions\", \"mcq\", \"Which of the following is a push force?\", \"Kicking a football.\", [\"Pulling a drawer open.\", \"Stretching a rubber band.\", \"Lifting a school bag from the floor.\"]],\n            [\"p6_interactions\", \"fitb\", \"What can a force do to a moving object?\", \"A force can change the _[shape]_, speed, or _[direction]_ of a moving object.\"],\n            [\"p6_interactions\", \"CECL\", \"Why do we apply oil or grease to the moving parts of a bicycle?\", [\"The bicycle moves more smoothly\", \"Oil acts as a lubricant between the gears\", \"Frictional Force\", \"The lubricant fills the rough gaps between surfaces, reducing friction and wear\"], [\"The bicycle becomes heavier\", \"Oil adds mass to the gears\", \"Gravitational Force\", \"The added weight helps the bicycle grip the road better\"], [\"The bicycle stops faster\", \"Oil increases the gripping power\", \"Magnetic Force\", \"Oil acts like a strong glue to increase friction for braking\"]],\n            [\"p6_interactions\", \"mcq\", \"Why do the soles of our shoes have deep grooves or patterns?\", \"To increase friction between the shoe and the ground to prevent slipping.\", [\"To decrease friction so we can walk faster.\", \"To make the shoes lighter and more comfortable.\", \"To trap air and create a cushioning effect.\"]],\n            [\"p6_interactions\", \"fitb\", \"What force opposes motion through the air?\", \"When an object moves through the air, it experiences a type of frictional force known as air _[resistance]_.\"],\n            [\"p6_interactions\", \"ECO\", \"How does a stick insect avoid being eaten by predators?\", [\"Stick Insect\", \"It resembles a twig in shape and colour\", \"Structural Adaptation (Camouflage)\", \"It blends into its surroundings, making it difficult for predators to spot it\"], [\"Grasshopper\", \"It releases a foul smell\", \"Chemical Defence\", \"Predators are repelled by the toxic odour it produces\"], [\"Beetle\", \"It runs extremely fast\", \"Behavioural Adaptation\", \"It relies on speed to outrun any pursuing predators\"]],\n            [\"p6_interactions\", \"mcq\", \"Which of the following is a behavioural adaptation?\", \"Birds migrating to warmer regions during winter.\", [\"A cactus having swollen stems to store water.\", \"A fish having gills for gaseous exchange.\", \"A polar bear having thick fur for insulation.\"]],\n            [\"p6_interactions\", \"fitb\", \"What forms an ecosystem?\", \"Organisms in a habitat interact with each other and their physical _[environment]_, forming a complex _[ecosystem]_.\"],\n            [\"p6_interactions\", \"ECO\", \"Why do some desert plants have needle-like leaves?\", [\"Cactus\", \"Leaves are reduced to spines\", \"Structural Adaptation\", \"Reduces the exposed surface area to minimise water loss through transpiration\"], [\"Fern\", \"Leaves are broad and flat\", \"Photosynthesis\", \"Maximises the surface area to trap as much sunlight as possible\"], [\"Water Lily\", \"Leaves are brightly coloured\", \"Pollination\", \"Attracts desert insects to help disperse its seeds\"]],\n            [\"p6_interactions\", \"mcq\", \"In a food chain, what role does a mushroom play?\", \"Decomposer.\", [\"Producer.\", \"Primary consumer.\", \"Secondary consumer.\"]],\n            [\"p6_interactions\", \"fitb\", \"What is the primary source of energy in a food chain?\", \"The ultimate source of energy for almost all food chains is the _[Sun]_.\"],\n            [\"p6_interactions\", \"ECO\", \"What happens during decomposition?\", [\"Fungi and Bacteria\", \"Break down dead organisms and waste\", \"Nutrient Recycling\", \"They break down complex organic matter into simpler mineral salts, returning them to the soil\"], [\"Plants\", \"Take in carbon dioxide and water\", \"Photosynthesis\", \"They convert light energy into chemical energy stored in food\"], [\"Herbivores\", \"Eat plants for energy\", \"Energy Transfer\", \"They transfer energy from producers to the rest of the food web\"]],\n            [\"p6_interactions\", \"mcq\", \"Which of the following is an abiotic (non-living) factor in an environment?\", \"Temperature.\", [\"Bacteria.\", \"Trees.\", \"Earthworms.\"]],\n            [\"p6_interactions\", \"fitb\", \"What is the definition of a habitat?\", \"The place where an organism lives and obtains its basic needs for survival is called its _[habitat]_.\"],\n            [\"p6_interactions\", \"ECO\", \"Why does deforestation contribute to global warming?\", [\"Trees are cut down in large numbers\", \"Fewer trees remain to carry out photosynthesis\", \"Environmental Impact\", \"Less carbon dioxide is removed from the air, increasing the greenhouse effect and trapping more heat\"], [\"Trees release oxygen when burned\", \"More oxygen enters the atmosphere\", \"Air Quality\", \"Excess oxygen makes the air too rich, causing global temperatures to rise\"], [\"Trees provide shade\", \"The ground is directly exposed to sunlight\", \"Surface Heating\", \"Without shadows, the soil absorbs all the heat and warms the planet\"]],\n            [\"p6_interactions\", \"mcq\", \"Which of the following practices is considered environmentally friendly?\", \"Using a reusable cloth bag for grocery shopping.\", [\"Leaving the air-conditioner on when leaving the house.\", \"Throwing plastic bottles into the general waste bin.\", \"Using disposable styrofoam plates for every meal.\"]],\n            [\"p6_interactions\", \"fitb\", \"Why is dumping factory waste harmful to rivers?\", \"Dumping untreated factory waste into rivers causes water _[pollution]_, which can kill fish by depleting the dissolved _[oxygen]_.\"],\n            [\"p6_interactions\", \"ECO\", \"How can an oil spill in the ocean affect aquatic birds?\", [\"Oil floats on the water surface\", \"Coats the feathers of diving birds\", \"Environmental Impact\", \"The oil destroys the waterproofing and insulating properties of the feathers, causing the birds to freeze or drown\"], [\"Oil sinks to the bottom\", \"Poisons the coral reefs\", \"Habitat Destruction\", \"The birds lose their primary nesting grounds on the ocean floor\"], [\"Oil is highly flammable\", \"Catches fire easily\", \"Combustion\", \"The oil ignites on the surface, burning the birds as they fly over\"]],\n            [\"p6_interactions\", \"mcq\", \"What is the primary cause of the rising sea levels observed in recent decades?\", \"The melting of polar ice caps and glaciers due to global warming.\", [\"An increase in the total amount of rainfall globally.\", \"The expansion of the ocean floor due to underwater earthquakes.\", \"More water being dumped into the oceans from rivers.\"]],\n            [\"p6_interactions\", \"fitb\", \"What are the 3 Rs of conservation?\", \"We can reduce our carbon footprint by practising the 3 Rs: Reduce, _[Reuse]_, and _[Recycle]_.\"],\n            [\"p6_interactions\", \"CECL\", \"How does a rough surface affect a sliding block?\", [\"Block slows down quickly\", \"Rough surface increases friction\", \"Frictional force\", \"Bumps on surfaces oppose motion heavily\"], [\"Speeds up\", \"Makes block slide faster\", \"Acceleration\", \"Roughness acts like a boost\"], [\"Block floats\", \"Reduces gravity\", \"Anti-gravity\", \"Roughness cancels out earth's pull\"]],\n            [\"p6_interactions\", \"mcq\", \"Why do magnetic trains (Maglev) hover above tracks?\", \"Like poles on the train and track repel, lifting the train to eliminate friction between solid surfaces.\", [\"Hovering is purely for visual effect to look cool.\", \"Hovering trains don't use any energy at all.\", \"Air is pumped beneath the train to lift it.\"]],\n            [\"p6_interactions\", \"fitb\", \"What kind of energy does a stretched rubber band have?\", \"When you stretch a rubber band, you are storing _[elastic]_ potential energy which exerts a _[pulling]_ force when released.\"],\n            [\"p6_interactions\", \"ECO\", \"What is the purpose of camouflage for a chameleon?\", [\"Chameleon\", \"Blends into the green leaves\", \"Structural Adaptation\", \"Helps it hide from predators and sneak up on prey without being seen\"], [\"Tree Frog\", \"Changes to bright red\", \"Warning Coloration\", \"Warns predators that it is highly poisonous\"], [\"Gecko\", \"Sticks to the branch\", \"Physical Support\", \"Camouflage helps the chameleon grip the branch tighter\"]],\n\n            // --- P6 ENERGY (30) ---\n            [\"p6_energy\", \"fitb\", \"What energy conversion occurs during photosynthesis?\", \"During photosynthesis, chlorophyll traps _[light]_ energy from the sun and converts it into _[chemical]_ potential energy stored in food.\"],\n            [\"p6_energy\", \"CECL\", \"What is the energy conversion when a battery-operated toy car moves?\", [\"The toy car moves forward\", \"The battery powers the electrical motor\", \"Energy Conversion\", \"Chemical potential energy -> Electrical energy -> Kinetic energy\"], [\"The toy car speeds up\", \"The motor creates electricity\", \"Energy Creation\", \"Kinetic energy -> Electrical energy -> Chemical potential energy\"], [\"The toy car moves\", \"The battery provides pushing force\", \"Energy Destruction\", \"Electrical energy -> Chemical potential energy -> Kinetic energy\"]],\n            [\"p6_energy\", \"mcq\", \"What type of energy does a roller coaster possess at its highest peak before dropping?\", \"Maximum gravitational potential energy.\", [\"Maximum kinetic energy.\", \"Zero total energy since it temporarily stops moving.\", \"Maximum elastic potential energy.\"]],\n            [\"p6_energy\", \"CECL\", \"How does a wind turbine generate electricity for a city?\", [\"Power flows to the electrical grid\", \"Moving wind spins the turbine blades\", \"Energy Conversion\", \"The kinetic energy of the wind is converted to electrical energy in the generator\"], [\"The wind pushes the blades\", \"The blades fall downwards\", \"Energy Creation\", \"Gravitational potential energy of the wind turns the blades\"], [\"The blades generate wind\", \"The turbine spins using power\", \"Energy Storage\", \"The turbine uses electrical energy to create kinetic energy in the wind\"]],\n            [\"p6_energy\", \"fitb\", \"Why does a bouncing ball lose height?\", \"A bouncing ball eventually stops because its _[kinetic]_ energy is converted into heat and _[sound]_ energy upon each impact with the floor.\"],\n            [\"p6_energy\", \"mcq\", \"Which of the following describes the principle of conservation of energy?\", \"Energy cannot be created or destroyed, only converted from one form to another.\", [\"Energy is constantly being created by the Sun and destroyed by black holes.\", \"Energy can be used up completely if a machine is inefficient.\", \"Energy is only conserved in closed electrical circuits.\"]],\n            [\"p6_energy\", \"fitb\", \"When does an object have kinetic and potential energy?\", \"An object possesses _[kinetic]_ energy when it is in motion, and gravitational _[potential]_ energy when it is raised above the ground.\"],\n            [\"p6_energy\", \"CECL\", \"What is the energy conversion when an archer shoots an arrow?\", [\"The arrow flies forward rapidly\", \"The stretched bowstring is released\", \"Energy Conversion\", \"Elastic potential energy -> Kinetic energy\"], [\"The arrow points to the sky\", \"The archer holds the bow high\", \"Energy Creation\", \"Gravitational potential energy -> Kinetic energy\"], [\"The arrow hits the target\", \"The archer eats food beforehand\", \"Energy Destruction\", \"Chemical potential energy -> Heat energy\"]],\n            [\"p6_energy\", \"mcq\", \"A television is switched on. What is the main useful energy conversion taking place?\", \"Electrical energy -> Light energy + Sound energy\", [\"Electrical energy -> Heat energy + Light energy\", \"Chemical potential energy -> Light energy + Sound energy\", \"Light energy -> Electrical energy + Sound energy\"]],\n            [\"p6_energy\", \"fitb\", \"What happens when you rub your hands together?\", \"When you rub your hands together on a cold day, you are converting _[kinetic]_ energy into _[heat]_ energy due to friction.\"],\n            [\"p6_energy\", \"CECL\", \"How does a hydroelectric dam generate power?\", [\"Electricity is produced\", \"Falling water turns the turbines\", \"Energy Conversion\", \"Gravitational potential energy -> Kinetic energy -> Electrical energy\"], [\"Water is heated up\", \"Steam turns the turbines\", \"Energy Creation\", \"Heat energy -> Kinetic energy -> Electrical energy\"], [\"Water dissolves chemicals\", \"Batteries generate power\", \"Energy Storage\", \"Chemical potential energy -> Electrical energy\"]],\n            [\"p6_energy\", \"mcq\", \"Which of the following sources of energy is non-renewable?\", \"Natural gas.\", [\"Solar energy.\", \"Wind energy.\", \"Geothermal energy.\"]],\n            [\"p6_energy\", \"fitb\", \"How do food and fossil fuels store energy?\", \"Food and fossil fuels store energy in the form of _[chemical]_ potential energy.\"],\n            [\"p6_energy\", \"CECL\", \"Why does a pendulum eventually stop swinging?\", [\"The swinging slows down and stops\", \"The pendulum swings through the air\", \"Energy Loss\", \"Kinetic energy is converted into heat and sound energy due to air resistance and friction at the pivot\"], [\"The pendulum gains height\", \"Gravity pulls it down constantly\", \"Energy Gain\", \"Gravitational potential energy overwhelms the kinetic energy\"], [\"The pendulum string stretches\", \"The weight pulls on the string\", \"Energy Conversi
