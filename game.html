on\", \"Kinetic energy is converted into elastic potential energy\"]],\n            [\"p6_energy\", \"mcq\", \"In a coal-fired power station, what is the initial source of energy?\", \"Chemical potential energy stored in the coal.\", [\"Heat energy from burning the coal.\", \"Kinetic energy of the spinning turbines.\", \"Electrical energy produced by the generator.\"]],\n            [\"p6_energy\", \"fitb\", \"How does a solar panel generate power?\", \"Solar panels convert _[light]_ energy from the Sun directly into _[electrical]_ energy.\"],\n            [\"p6_energy\", \"CECL\", \"What happens to the energy of a diver as he steps off a high diving board?\", [\"The diver falls faster towards the water\", \"The diver loses height but gains speed\", \"Energy Transfer\", \"His gravitational potential energy is converted into kinetic energy\"], [\"The diver floats momentarily\", \"The diver jumps upwards first\", \"Energy Creation\", \"His kinetic energy is converted into elastic potential energy\"], [\"The diver splashes into the water\", \"The diver makes a loud sound\", \"Energy Destruction\", \"His kinetic energy is completely destroyed upon impact\"]],\n            [\"p6_energy\", \"mcq\", \"Which object does NOT possess kinetic energy?\", \"A stretched rubber band held stationary.\", [\"A falling leaf.\", \"A car moving at a constant speed.\", \"A spinning fan blade.\"]],\n            [\"p6_energy\", \"fitb\", \"What energy is in a compressed spring?\", \"When a spring is compressed or stretched, it stores _[elastic]_ potential energy.\"],\n            [\"p6_energy\", \"CECL\", \"What is the energy conversion when a matchstick is struck against a matchbox and burns?\", [\"A flame is produced\", \"The match head is rubbed against a rough surface\", \"Energy Conversion\", \"Kinetic energy -> Heat energy -> Chemical potential energy -> Heat + Light energy\"], [\"The matchstick breaks\", \"Too much force is applied\", \"Energy Creation\", \"Kinetic energy -> Sound energy\"], [\"The matchstick gets wet\", \"Moisture prevents ignition\", \"Energy Destruction\", \"Chemical potential energy -> Water energy\"]],\n            [\"p6_energy\", \"mcq\", \"What is the main energy conversion in an electric iron?\", \"Electrical energy -> Heat energy\", [\"Electrical energy -> Kinetic energy\", \"Heat energy -> Electrical energy\", \"Chemical potential energy -> Heat energy\"]],\n            [\"p6_energy\", \"fitb\", \"Where did the energy in our food originally come from?\", \"The energy we get from eating a sandwich originally came from the _[Sun]_, which was trapped by plants during _[photosynthesis]_.\"],\n            [\"p6_energy\", \"CECL\", \"Why is a light bulb considered inefficient if it gets very hot?\", [\"The bulb feels hot to the touch\", \"It is designed to produce light, not heat\", \"Energy Efficiency\", \"A large amount of electrical energy is wasted as heat energy instead of being converted to useful light energy\"], [\"The bulb is very bright\", \"It lights up the whole room\", \"Energy Creation\", \"It successfully converts all electrical energy into light energy\"], [\"The bulb uses little electricity\", \"It has a low power rating\", \"Energy Storage\", \"It converts chemical potential energy into light energy perfectly\"]],\n            [\"p6_energy\", \"fitb\", \"What form of energy is produced by a vibrating guitar string?\", \"A vibrating guitar string produces _[sound]_ energy.\"],\n            [\"p6_energy\", \"CECL\", \"How does a catapult shoot a stone?\", [\"The stone flies through the air\", \"The stretched rubber band is released\", \"Energy Conversion\", \"Elastic potential energy in the rubber band is converted into kinetic energy in the stone\"], [\"The stone drops to the ground\", \"The rubber band snaps\", \"Energy Creation\", \"Kinetic energy in the rubber band is destroyed\"], [\"The stone gets hot\", \"The rubber band creates friction\", \"Energy Destruction\", \"Chemical potential energy is converted into heat energy\"]],\n            [\"p6_energy\", \"mcq\", \"Which energy transformation takes place in a glowing firefly?\", \"Chemical potential energy -> Light energy\", [\"Light energy -> Heat energy\", \"Electrical energy -> Light energy\", \"Kinetic energy -> Light energy\"]],\n            [\"p6_energy\", \"fitb\", \"What energy transformation happens as a roller coaster moves down the track?\", \"During a roller coaster ride, as it moves down the track, gravitational potential energy is converted into _[kinetic]_ energy.\"],\n            [\"p6_energy\", \"CECL\", \"How does the sun heat up a swimming pool?\", [\"The water gets warm\", \"Sunlight shines on the pool\", \"Energy Transfer\", \"Light energy from the Sun is absorbed by the water and converted to heat energy\"], [\"The pool lights up\", \"The water sparkles\", \"Reflection\", \"Light energy is reflected by the water surface\"], [\"The water creates current\", \"The pool moves\", \"Energy Conversion\", \"Light energy is converted to kinetic energy\"]],\n            [\"p6_energy\", \"mcq\", \"What energy transformation occurs when you turn on a battery-operated fan?\", \"Chemical potential -> Electrical -> Kinetic\", [\"Electrical -> Kinetic -> Sound\", \"Kinetic -> Electrical -> Chemical\", \"Chemical -> Heat -> Kinetic\"]],\n            [\"p6_energy\", \"fitb\", \"What type of energy is stored in a battery in an electric circuit?\", \"In a circuit, the battery is the source of _[chemical]_ energy.\"],\n\n            // --- VARIABLES, DATA ANALYSIS & STATISTICS (TABLES) (30) ---\n            [\"variables\", \"mcq\", \"A student measured the extension of a spring when different weights were hung on it.<br><table class='question-table'><tr><th>Weight (g)<\u002Fth><th>Length of Spring (cm)<\u002Fth><\u002Ftr><tr><td>0<\u002Ftd><td>10<\u002Ftd><\u002Ftr><tr><td>50<\u002Ftd><td>12<\u002Ftd><\u002Ftr><tr><td>100<\u002Ftd><td>14<\u002Ftd><\u002Ftr><tr><td>150<\u002Ftd><td>16<\u002Ftd><\u002Ftr><\u002Ftable>What is the original length of the spring?\", \"10 cm\", [\"12 cm\", \"14 cm\", \"16 cm\"]],\n            [\"variables\", \"mcq\", \"Tom tested how much water different materials absorbed.<br><table class='question-table'><tr><th>Material<\u002Fth><th>Mass before dipping (g)<\u002Fth><th>Mass after dipping (g)<\u002Fth><\u002Ftr><tr><td>X<\u002Ftd><td>10<\u002Ftd><td>12<\u002Ftd><\u002Ftr><tr><td>Y<\u002Ftd><td>10<\u002Ftd><td>25<\u002Ftd><\u002Ftr><tr><td>Z<\u002Ftd><td>10<\u002Ftd><td>10<\u002Ftd><\u002Ftr><\u002Ftable>Which material is waterproof?\", \"Material Z\", [\"Material X\", \"Material Y\", \"Both X and Y\"]],\n            [\"variables\", \"mcq\", \"A student dropped seeds with different wing lengths and recorded the distance travelled.<br><table class='question-table'><tr><th>Length of Wing (cm)<\u002Fth><th>Distance Travelled (m)<\u002Fth><\u002Ftr><tr><td>2<\u002Ftd><td>1.5<\u002Ftd><\u002Ftr><tr><td>4<\u002Ftd><td>3.2<\u002Ftd><\u002Ftr><tr><td>6<\u002Ftd><td>5.8<\u002Ftd><\u002Ftr><\u002Ftable>What is the correct conclusion based on the data?\", \"As the length of the wing increases, the distance travelled by the seed increases.\", [\"As the mass of the seed increases, the distance travelled increases.\", \"The length of the wing does not affect the time taken to reach the ground.\", \"Seeds without wings will travel the furthest distance due to lower air resistance.\"]],\n            [\"variables\", \"EXP\", \"Why is a layer of oil added to the water in a root absorption experiment?\", [\"To ensure a fair test\", \"The oil floats on the water surface\", \"Controlled Variables\", \"Prevents water loss through evaporation so any decrease is strictly due to root absorption\"], [\"To provide nutrients\", \"The oil mixes with the water\", \"Plant Nutrition\", \"The plant roots absorb the oil for energy during photosynthesis\"], [\"To test heat transfer\", \"The oil blocks sunlight\", \"Photosynthesis\", \"Prevents the plant from making its own food\"]],\n            [\"variables\", \"EXP\", \"When testing which cup keeps water hot longest, why use the exact same volume of water?\", [\"To ensure a fair test\", \"Only the cup material differs\", \"Controlled Variables\", \"Differing water volumes would alter the rate of heat loss, making it impossible to conclude which material is the better insulator\"], [\"To test heat capacity\", \"Different volume used\", \"Dependent Variable\", \"The volume determines the final temperature measured by the thermometer\"], [\"To act as a control\", \"Water is the control\", \"Experimental Design\", \"The water volume acts as the baseline for comparison with the cup material\"]],\n            [\"variables\", \"EXP\", \"Why did the student repeat the toy car ramp experiment three times and calculate the average?\", [\"To increase data reliability\", \"Multiple trials are conducted\", \"Data Reliability\", \"Averaging minimises the effect of human errors or anomalous results from a single trial\"], [\"To ensure a fair test\", \"Variables are kept constant\", \"Controlled Variables\", \"Repeating the experiment ensures that all variables are kept strictly constant\"], [\"To test different variables\", \"Change the ramp height\", \"Fair Testing\", \"Repeating allows testing of different ramp heights safely in one session\"]],\n            [\"variables\", \"mcq\", \"Nicole cleaned her right thumb with soap and her left thumb with Liquid T.<br><table class='question-table'><tr><th>Cleaning Agent<\u002Fth><th>Bacteria at 3 mins<\u002Fth><th>Bacteria at 1 hour<\u002Fth><\u002Ftr><tr><td>Soap<\u002Ftd><td>200<\u002Ftd><td>500<\u002Ftd><\u002Ftr><tr><td>Liquid T<\u002Ftd><td>100<\u002Ftd><td>110<\u002Ftd><\u002Ftr><\u002Ftable>What can Nicole conclude about Liquid T?\", \"Liquid T is more effective in killing bacteria and slowing their reproduction rate than soap.\", [\"Soap is more effective in killing bacteria than Liquid T.\", \"Liquid T causes bacteria to reproduce faster than soap.\", \"Both Liquid T and soap are equally effective at removing bacteria.\"]],\n            [\"variables\", \"mcq\", \"When investigating if light intensity affects the rate of photosynthesis, what is the independent variable?\", \"The distance of the lamp from the plant.\", [\"The number of oxygen bubbles produced.\", \"The volume of water in the beaker.\", \"The type of aquatic plant used.\"]],\n            [\"variables\", \"fitb\", \"What do you do when one reading is very different from the rest?\", \"If a reading drastically differs from the rest in a repeated experiment, it is called an _[anomalous]_ result and the trial should be _[repeated]_ to ensure reliability.\"],\n            [\"variables\", \"EXP\", \"Why is a datalogger better than a thermometer for recording a beaker of cooling water overnight?\", [\"To collect data continuously\", \"Temperature is recorded over time\", \"Data Collection\", \"Eliminates human reading errors and records data at exact intervals automatically without sleep\"], [\"To ensure a fair test\", \"Keep temperature constant\", \"Controlled Variables\", \"The datalogger ensures the water cools at a constant rate throughout the night\"], [\"To prevent heat loss\", \"Water cools down\", \"Heat Transfer\", \"Waiting ensures the liquid loses all its heat to the surroundings before measuring\"]],\n            [\"variables\", \"fitb\", \"How do you ensure an experiment is fair?\", \"To ensure the seed dispersal experiment is a _[fair]_ test, variables such as the amount of wind and the _[mass]_ of the seed must be kept constant.\"],\n            [\"variables\", \"fitb\", \"What are the names of the changed and measured variables?\", \"In a scientific experiment, the variable that we purposely change is called the _[independent]_ variable, while the variable that we measure is the _[dependent]_ variable.\"],\n            [\"variables\", \"fitb\", \"Why should an experiment be repeated?\", \"To improve the _[reliability]_ of an experiment, a student should repeat the procedure at least three times and calculate the _[average]_ result.\"],\n            [\"variables\", \"fitb\", \"Why do we use a control setup?\", \"A control setup provides a basis for _[comparison]_ to prove the result is caused solely by the _[independent]_ variable.\"],\n            [\"variables\", \"mcq\", \"A student placed identical plants in different light intensities.<br><table class='question-table'><tr><th>Light Intensity (lux)<\u002Fth><th>Number of bubbles per minute<\u002Fth><\u002Ftr><tr><td>100<\u002Ftd><td>5<\u002Ftd><\u002Ftr><tr><td>300<\u002Ftd><td>15<\u002Ftd><\u002Ftr><tr><td>500<\u002Ftd><td>25<\u002Ftd><\u002Ftr><\u002Ftable>What is the conclusion?\", \"As light intensity increases, the rate of photosynthesis increases.\", [\"As light intensity increases, the rate of photosynthesis decreases.\", \"Light intensity has no effect on the rate of photosynthesis.\", \"The plant will stop photosynthesising at 500 lux.\"]],\n            [\"variables\", \"EXP\", \"Why is it important to use identical beakers when testing evaporation rate?\", [\"To ensure a fair test\", \"Only the exposed surface area differs\", \"Controlled Variables\", \"Different beaker materials might absorb or conduct heat differently, affecting the evaporation rate\"], [\"To make measurements easy\", \"They look the same\", \"Data Collection\", \"It is easier to read the volume on identical beakers\"], [\"To test the beaker material\", \"Different materials are used\", \"Independent Variable\", \"The experiment is testing how the material affects evaporation\"]],\n            [\"variables\", \"mcq\", \"In an experiment testing how the number of batteries affects bulb brightness, what must be kept constant?\", \"The type of bulb used.\", [\"The number of batteries.\", \"The brightness of the bulb.\", \"The number of circuits built.\"]],\n            [\"variables\", \"fitb\", \"What do you call the variable you keep the same?\", \"Variables that must not be changed in order to ensure a fair test are called _[controlled]_ variables.\"],\n            [\"variables\", \"EXP\", \"Why must the same person drop the ball in a bounce-height experiment?\", [\"To ensure a fair test\", \"The force of dropping remains constant\", \"Controlled Variables\", \"Different people might apply different amounts of downward force, making the test unfair\"], [\"To increase reliability\", \"The person counts better\", \"Data Reliability\", \"The same person will have less human reading error\"], [\"To act as a control setup\", \"The person is the baseline\", \"Experimental Design\", \"The person is acting as the control for the experiment\"]],\n            [\"variables\", \"mcq\", \"A student tested how far a toy car travelled on different surfaces.<br><table class='question-table'><tr><th>Surface<\u002Fth><th>Distance (cm)<\u002Fth><\u002Ftr><tr><td>Glass<\u002Ftd><td>80<\u002Ftd><\u002Ftr><tr><td>Wood<\u002Ftd><td>50<\u002Ftd><\u002Ftr><tr><td>Carpet<\u002Ftd><td>20<\u002Ftd><\u002Ftr><\u002Ftable>Which surface provided the most friction?\", \"Carpet\", [\"Glass\", \"Wood\", \"Both Wood and Carpet\"]],\n            [\"variables\", \"fitb\", \"What is the purpose of a graph?\", \"A line graph helps us to easily identify the _[trend]_ or relationship between the independent and dependent variables.\"],\n            [\"variables\", \"EXP\", \"Why use the exact same mass of ice when testing which material melts ice the fastest?\", [\"To ensure a fair test\", \"Only the material type differs\", \"Controlled Variables\", \"A larger mass of ice would naturally take longer to melt, making the results invalid\"], [\"To test the mass of ice\", \"Different masses melt differently\", \"Independent Variable\", \"The experiment aims to see if mass affects melting time\"], [\"To increase reliability\", \"The same mass is counted\", \"Data Reliability\", \"Using the same mass prevents miscalculation of the remaining ice\"]],\n            [\"variables\", \"mcq\", \"A student investigates the relationship between temperature and the rate at which sugar dissolves. What should be the independent variable?\", \"The temperature of the water.\", [\"The amount of sugar.\", \"The time taken for the sugar to dissolve.\", \"The volume of water used.\"]],\n            [\"variables\", \"fitb\", \"How should you read a measuring cylinder?\", \"To avoid parallax error, you must read the volume of a liquid with your eye level at the bottom of the _[meniscus]_.\"],\n            [\"variables\", \"EXP\", \"What is the purpose of placing an identical empty beaker next to the experimental beaker containing a plant?\", [\"To act as a control setup\", \"It contains no plant\", \"Experimental Design\", \"It proves that any decrease in water volume is due to the plant's roots absorbing it, not just evaporation\"], [\"To catch the spilled water\", \"It is empty\", \"Safety\", \"It prevents water from spilling onto the table\"], [\"To increase data reliability\", \"There are two beakers\", \"Data Reliability\", \"Having two beakers ensures the measurements are twice as accurate\"]],\n            [\"variables\", \"mcq\", \"If a line graph shows a downward slope over time, what does this indicate?\", \"The dependent variable is decreasing as the independent variable increases.\", [\"The dependent variable is increasing as the independent variable increases.\", \"There is no relationship between the variables.\", \"The independent variable is decreasing over time.\"]],\n            [\"variables\", \"fitb\", \"What tool is best for continuous temperature readings?\", \"A _[datalogger]_ is a device that can automatically record sensor readings continuously over a long period of time.\"],\n            [\"variables\", \"EXP\", \"Why must the string used in a pendulum experiment be the exact same type and thickness?\", [\"To ensure a fair test\", \"Only the length of the string differs\", \"Controlled Variables\", \"A thicker or heavier string might have different air resistance, affecting the swing time\"], [\"To test the string material\", \"Different strings swing differently\", \"Independent Variable\", \"The experiment is testing which string material is the fastest\"], [\"To increase data reliability\", \"The string won't break\", \"Data Reliability\", \"A strong string ensures the pendulum doesn't break during the three trials\"]],\n            [\"variables\", \"mcq\", \"A student placed a block of ice at 0°C in a room at 30°C. Which graph would best represent the temperature of the ice/water over the next hour?\", \"A line that remains flat at 0°C for a while, then slopes steadily upwards.\", [\"A line that slopes steadily upwards immediately from 0°C.\", \"A line that drops below 0°C and then goes up.\", \"A line that remains perfectly flat at 0°C forever.\"]],\n            [\"variables\", \"fitb\", \"What does a steeper gradient on a distance-time graph mean?\", \"On a distance-time graph, a steeper line indicates that the object is moving at a higher _[speed]_.\"]\n        ];\n\n        let fullQuestionBank = [];\n\n        function parseRawBank(raw) {\n            return raw.map((item, idx) => {\n                let id = Date.now() + idx;\n                if (item[1] === \"mcq\") {\n                    return { id, type: \"mcq\", topic: item[0], q: item[2], correct: item[3], distractors: item[4] };\n                } else if (item[1] === \"fitb\") {\n                    return { id, type: \"fitb\", topic: item[0], q: item[2], text: item[3] };\n                } else {\n                    return { id, type: \"match\", topic: item[0], template: item[1], q: item[2], \n                             correct: { 0: item[3][0], 1: item[3][1], 2: item[3][2], 3: item[3][3] },\n                             distractors: [\n                                 { 0: item[4][0], 1: item[4][1], 2: item[4][2], 3: item[4][3] },\n                                 { 0: item[5][0], 1: item[5][1], 2: item[5][2], 3: item[5][3] }\n                             ]\n                    };\n                }\n            });\n        }\n\n        function initBank() {\n            let saved = null;\n            try {\n                // Changed the local storage key to force refresh\n                saved = localStorage.getItem('scienceClawBank_v9');\n            } catch(e) {\n                console.warn(\"localStorage not available, defaulting to initial bank.\");\n            }\n\n            if (saved) {\n                fullQuestionBank = JSON.parse(saved);\n            } else {\n                fullQuestionBank = parseRawBank(defaultRawBank);\n            }\n        }\n\n        // --- EDITOR LOGIC ---\n        function promptEditor() {\n            pendingUnlock = 'editor';\n            document.getElementById('password-modal').classList.add('active');\n            document.getElementById('editor-password').value = \"\";\n        }\n\n        function promptDashboard() {\n            pendingUnlock = 'dashboard';\n            document.getElementById('password-modal').classList.add('active');\n            document.getElementById('editor-password').value = \"\";\n        }\n\n        function getAdminPw() {\n            try { return localStorage.getItem('sciclaw:adminPw:v1') || 'Shirtpapasg'; } catch (e) { return 'Shirtpapasg'; }\n        }\n        function saveAdminPw() {\n            const el = document.getElementById('admin-new-pw');\n            const v = (el ? el.value : '').trim();\n            if (v.length < 4) { showMessage('Password must be at least 4 characters.', 3000); return; }\n            try { localStorage.setItem('sciclaw:adminPw:v1', v); } catch (e) {}\n            if (el) el.value = '';\n            if (window.sfx) sfx.coin();\n            showMessage('🔑 Password updated. It now unlocks both the Dashboard and the Question Bank Editor.', 4000);\n        }\n        function verifyPassword() {\n            const pwd = document.getElementById('editor-password').value;\n            if (pwd === getAdminPw()) {\n                document.getElementById('password-modal').classList.remove('active');\n                if (pendingUnlock === 'dashboard') openDashboard();\n                else openEditor();\n            } else {\n                showMessage(\"Incorrect Password!\", 2000);\n            }\n        }\n\n        function openEditor() {\n            document.getElementById('editor-modal').classList.add('active');\n            document.getElementById('editor-form-area').style.display = 'none';\n            renderEditorList();\n        }\n\n        // ---- MOE command-word skill tags (2024 syllabus glossary, 4 tiers) ----\n        const CMD_TIERS = {\n            1: { name: 'Tier 1 · Recall', color: '#3fc35f', bg: 'rgba(63,195,95,.16)', line: 'rgba(63,195,95,.45)' },\n            2: { name: 'Tier 2 · Organise & describe', color: '#4a90e2', bg: 'rgba(74,144,226,.16)', line: 'rgba(74,144,226,.45)' },\n            3: { name: 'Tier 3 · Reason & apply', color: '#ffb627', bg: 'rgba(255,182,39,.16)', line: 'rgba(255,182,39,.45)' },\n            4: { name: 'Tier 4 · Evaluate & create', color: '#b557e6', bg: 'rgba(181,87,230,.16)', line: 'rgba(181,87,230,.45)' },\n        };\n        const CMD_TAGS = [\n            { term: 'formulate hypothesis', tier: 4, re: /hypothes/i },\n            { term: 'generate possibilities', tier: 4, re: /generate possibilit|other ways|different ways to/i },\n            { term: 'make decisions', tier: 4, re: /make (a )?decision|decide which|choose the (best|most suitable)/i },\n            { term: 'solve problem', tier: 4, re: /suggest (a|one|two|some)? ?(way|ways|method|improvement|solution)|how can .{0,40}(solve|prevent|reduce|improve|stop)/i },\n            { term: 'evaluate', tier: 4, re: /evaluate|do you agree|is (it|this) (a )?fair|reasonable\\?/i },\n            { term: 'analyse', tier: 4, re: /analys/i },\n            { term: 'investigate', tier: 4, re: /investigat|aim of (the )?experiment|fair test|controlled variable|independent variable|dependent variable|reliab/i },\n            { term: 'predict', tier: 3, re: /predict|what (will|would) happen/i },\n            { term: 'relate', tier: 3, re: /relationship|as the .{0,50}(increase|decrease)|trend/i },\n            { term: 'infer', tier: 3, re: /infer|conclu|based on (the )?(graph|table|data|results|information)|recorded|measured .{0,30}(table|graph)/i },\n            { term: 'compare', tier: 2, re: /compare|similarit|difference between|different from/i },\n            { term: 'differentiate', tier: 2, re: /differentiate|distinguish/i },\n            { term: 'classify', tier: 2, re: /which group|group does .{0,40}belong|belongs? to .{0,30}group|^ *classify\\b|[.?!;]\\s*classify\\b|classify (these|the following)|group (the|them)\\b|sort (the|them|these)/i },\n            { term: 'show an understanding', tier: 3, re: /explain|give (a |one |two )?reasons?|why (do|does|is|are|did|can|cannot|must|use)|account for|what happens when|fail to|purpose of/i },\n            { term: 'describe', tier: 2, re: /describe/i },\n            { term: 'measure', tier: 2, re: /measure/i },\n            { term: 'observe', tier: 2, re: /observ/i },\n            { term: 'communicate', tier: 2, re: /draw (a|the)|complete the (table|diagram|drawing)|label the/i },\n            { term: 'use apparatus', tier: 2, re: /apparatus|thermometer|beaker|measuring cylinder|data ?logger/i },\n            { term: 'list', tier: 1, re: /\\blist\\b|name (two|three|one|the)/i },\n            { term: 'recognise', tier: 1, re: /recognis/i },\n            { term: 'identify', tier: 1, re: /identify|which (of the|one|two)|circle the|tick the/i },\n            { term: 'state', tier: 1, re: /\\bstate\\b|write down|fill in|what (is|are|does|do|can)/i },\n        ];\n        function detectTag(text) {\n            const s = String(text || '').replace(/<[^>]*>/g, ' ');\n            for (let i = 0; i < CMD_TAGS.length; i++) if (CMD_TAGS[i].re.test(s)) return CMD_TAGS[i];\n            return { term: 'show an understanding', tier: 3 };\n        }\n        function cmdChip(tag) {\n            const t = CMD_TIERS[tag.tier];\n            return '<span style=\"display:inline-block;background:' + t.bg + ';border:1px solid ' + t.line + ';color:' + t.color + ';font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px;white-space:nowrap\">' + tag.term + '<\u002Fspan>';\n        }\n        function renderTagLegend() {\n            const box = document.getElementById('tag-legend');\n            if (!box) return;\n            const counts = {};\n            fullQuestionBank.forEach(q => { const t = detectTag(q.q); counts[t.term] = counts[t.term] || { tag: t, n: 0 }; counts[t.term].n++; });\n            let html = '<div style=\"font-family:var(--font-display);font-weight:900;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-bottom:2px\">🏷 Skill tags (MOE 2024 command words — auto-tagged)<\u002Fdiv>'\n                + '<div style=\"font-size:11.5px;color:var(--sc-text-muted,#9fb0c3);margin:4px 0 8px\">A balanced bank mixes tiers — use the counts to check suitability.<\u002Fdiv>';\n            [1, 2, 3, 4].forEach(tier => {\n                const terms = Object.values(counts).filter(c => c.tag.tier === tier).sort((a, b) => b.n - a.n);\n                if (!terms.length) return;\n                html += '<div style=\"font-family:var(--font-display);font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:' + CMD_TIERS[tier].color + ';margin:8px 0 5px\">' + CMD_TIERS[tier].name + '<\u002Fdiv>'\n                    + '<div style=\"display:flex;flex-wrap:wrap;gap:5px\">' + terms.map(c => cmdChip(c.tag).replace('<\u002Fspan>', ' × ' + c.n + '<\u002Fspan>')).join('') + '<\u002Fdiv>';\n            });\n            box.innerHTML = html;\n        }\n\n        // ---- REVIEWABLE TWIN SET (teacher-approved rephrasings) ----\n        const LS_TWINS = 'scienceClawTwins_v1';\n        function getTwinStore() { try { return JSON.parse(localStorage.getItem(LS_TWINS) || '{}') || {}; } catch (e) { return {}; } }\n        function saveTwinStore(s) { try { localStorage.setItem(LS_TWINS, JSON.stringify(s)); } catch (e) {} }\n        function getApprovedTwin(id) { const s = getTwinStore(); const e = s[id]; return (e && e.approved && e.text) ? e.text : null; }\n\n        function openTwinReview() {\n            document.getElementById('editor-form-area').style.display = 'none';\n            document.getElementById('twin-review-area').style.display = 'block';\n            renderTwinReview();\n        }\n        function closeTwinReview() {\n            document.getElementById('twin-review-area').style.display = 'none';\n        }\n        function plainQ(q) { return (q.q || '').replace(/<[^>]*>?/gm, ' ').replace(/\\s+/g, ' ').trim(); }\n\n        function renderTwinReview() {\n            const box = document.getElementById('twin-review-list');\n            const store = getTwinStore();\n            box.innerHTML = fullQuestionBank.map((q, idx) => {\n                const e = store[q.id] || {};\n                const approved = !!e.approved;\n                const draft = e.text || '';\n                const tag = detectTag(q.q);\n                return `<div class=\"twin-card\" id=\"twincard-${idx}\" ondblclick=\"focusTwin(${idx})\" style=\"background:var(--sc-ink-900,#0c1626);border:1px solid ${approved ? 'rgba(63,195,95,.55)' : 'rgba(255,255,255,.10)'};border-radius:14px;padding:13px 15px;margin-bottom:11px;transition:all .45s cubic-bezier(.4,0,.2,1)\">\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap\">\n                        <span style=\"font-family:var(--font-display);font-weight:800;font-size:11px;color:var(--sc-text-muted,#9fb0c3)\">${q.topic} · ${q.type.toUpperCase()}<\u002Fspan>\n                        ${cmdChip(tag)}\n                        ${approved ? '<span style=\"background:rgba(63,195,95,.16);border:1px solid rgba(63,195,95,.5);color:#5fe07a;font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px\">✓ Approved<\u002Fspan>' : '<span style=\"background:rgba(255,182,39,.12);border:1px solid rgba(255,182,39,.4);color:#ffb627;font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px\">Draft<\u002Fspan>'}\n                        <span style=\"margin-left:auto;font-size:11px;color:var(--sc-text-muted,#9fb0c3)\">dbl-click = focus<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:var(--sc-text-soft,#c9d6e5);margin-bottom:8px\"><b style=\"color:#fff\">Original:<\u002Fb> ${plainQ(q)}<\u002Fdiv>\n                    <textarea id=\"twin-text-${idx}\" placeholder=\"Rephrased twin (same concept, new sentence structure, keep science keywords)…\" style=\"width:100%;min-height:58px;box-sizing:border-box;background:#0a1320;border:1px solid rgba(255,255,255,.14);border-radius:10px;color:#eaf2fb;padding:9px 11px;font-size:13px;line-height:1.5;resize:vertical\">${draft.replace(/<\u002Fg, '&lt;')}<\u002Ftextarea>\n                    <div style=\"display:flex;gap:8px;margin-top:8px;flex-wrap:wrap\">\n                        <button class=\"btn-blue\" onclick=\"event.stopPropagation();generateTwin(${idx})\" id=\"gen-${idx}\">✨ Generate draft<\u002Fbutton>\n                        <button class=\"btn-neutral\" onclick=\"event.stopPropagation();saveTwinDraft(${idx})\">💾 Save edit<\u002Fbutton>\n                        <button class=\"btn-green\" onclick=\"event.stopPropagation();approveTwin(${idx})\">${approved ? '↺ Re-open' : '✓ Approve'}<\u002Fbutton>\n                    <\u002Fdiv>\n                <\u002Fdiv>`;\n            }).join('');\n        }\n\n        async function generateTwin(idx) {\n            const q = fullQuestionBank[idx];\n            const btn = document.getElementById('gen-' + idx);\n            const ta = document.getElementById('twin-text-' + idx);\n            if (!navigator.onLine || !(window.claude && window.claude.complete)) {\n                showMessage('⚠️ Generating drafts needs internet. You can type the twin manually and Approve.', 4000);\n                return;\n            }\n            if (btn) { btn.disabled = true; btn.innerText = '✨ Generating…'; }\n            try {\n                let prompt, tokens = [];\n                if (q.type === 'fitb') {\n                    const orig = q.text || '';\n                    tokens = orig.match(/_\\[(.*?)\\]_/g) || [];\n                    prompt =\n`You are a Singapore primary science teacher writing a TWIN of a fill-in-the-blank question for a student who got it wrong.\nRewrite the sentence with a DIFFERENT structure so the student re-applies the concept, testing the EXACT SAME blanks.\nSTRICT RULES:\n- Keep every blank token EXACTLY, character-for-character: ${tokens.join('  ')}\n- Never change text inside _[ ]_ tokens. You MAY change their order in the sentence, so a different keyword is asked first — but the rewritten sentence MUST stay scientifically correct and natural.\n- Same concept, difficulty and correct answers. Change only surrounding phrasing / clause order. P3–P6 level.\n- Return ONLY the rewritten sentence with the tokens in place.\n\nSENTENCE: ${orig}`;\n                } else {\n                    let keep = [];\n                    if (q.type === 'mcq' && q.correct) keep.push(q.correct);\n                    if (q.type === 'match' && Array.isArray(q.correct)) keep = keep.concat(q.correct);\n                    prompt =\n`You are a Singapore primary science teacher rewriting a quiz question for a student who got it wrong.\nRephrase the QUESTION so the sentence/clause structure differs and the student must RE-APPLY the concept, not recall wording.\nSTRICT RULES:\n- Same science concept, difficulty and correct answer. Do NOT change the science.\n- Keep these key science words intact — they are the tested answer: ${keep.filter(Boolean).join(', ') || '(the scientific terms in the question)'}.\n- Change only phrasing / word order / clause structure. One or two short sentences, P3–P6 reading level.\n- Return ONLY the rephrased question text — no quotes, no preamble.\n\nQUESTION: ${plainQ(q)}`;\n                }\n                const out = await window.claude.complete(prompt);\n                const cleaned = (out || '').trim().replace(/^[\"'\\s]+|[\"'\\s]+$/g, '');\n                // For fitb, only accept if every blank token survived (keyword preserved)\n                const ok = q.type === 'fitb' ? (cleaned && tokens.every(t => cleaned.indexOf(t) !== -1)) : !!cleaned;\n                if (ok && ta) ta.value = cleaned;\n                else if (!ok) showMessage('Draft dropped a keyword — try again or edit manually.', 3500);\n                if (window.sfx) sfx.correct();\n            } catch (e) {\n                showMessage('Could not generate — check your connection, or type it manually.', 4000);\n            } finally { if (btn) { btn.disabled = false; btn.innerText = '✨ Generate draft'; } }\n        }\n\n        async function generateAllTwins() {\n            const btn = document.getElementById('gen-all-btn');\n            if (!navigator.onLine || !(window.claude && window.claude.complete)) {\n                showMessage('⚠️ Generating drafts needs internet.', 4000); return;\n            }\n            const store = getTwinStore();\n            if (btn) { btn.disabled = true; }\n            for (let i = 0; i < fullQuestionBank.length; i++) {\n                const q = fullQuestionBank[i];\n                if (store[q.id] && store[q.id].approved) continue;\n                const ta = document.getElementById('twin-text-' + i);\n                if (ta && ta.value.trim()) continue; // don't overwrite existing drafts\n                if (btn) btn.innerText = `✨ Generating ${i + 1}/${fullQuestionBank.length}…`;\n                await generateTwin(i);\n            }\n            if (btn) { btn.disabled = false; btn.innerText = '✨ Generate drafts for all un-approved'; }\n            showMessage('Drafts ready — review, edit, then Approve each.', 4000);\n        }\n\n        function saveTwinDraft(idx) {\n            const q = fullQuestionBank[idx];\n            const ta = document.getElementById('twin-text-' + idx);\n            const store = getTwinStore();\n            store[q.id] = { text: (ta ? ta.value.trim() : ''), approved: (store[q.id] && store[q.id].approved) || false };\n            saveTwinStore(store);\n            if (window.sfx) sfx.click();\n            showMessage('Twin draft saved.', 1800);\n        }\n        function approveTwin(idx) {\n            const q = fullQuestionBank[idx];\n            const ta = document.getElementById('twin-text-' + idx);\n            const store = getTwinStore();\n            const cur = store[q.id] || {};\n            const nowApproved = !cur.approved;\n            if (nowApproved && (!ta || !ta.value.trim())) { showMessage('Write or generate the twin text first.', 3000); return; }\n            store[q.id] = { text: (ta ? ta.value.trim() : cur.text || ''), approved: nowApproved };\n            saveTwinStore(store);\n            if (nowApproved) addCopyrightFree({ text: (ta ? ta.value.trim() : ''), topic: q.topic, type: q.type, kind: 'approved-twin' });\n            if (window.sfx) sfx[nowApproved ? 'coin' : 'click']();\n            renderTwinReview();\n        }\n\n        // ---- FOCUS MODE: isolate one original + its twin, animate the rest away ----\n        function focusTwin(idx) {\n            const cards = [...document.querySelectorAll('.twin-card')];\n            cards.forEach(c => {\n                if (c.id === 'twincard-' + idx) return;\n                c.style.opacity = '0';\n                c.style.transform = 'scale(.92) translateY(-8px)';\n                c.style.maxHeight = c.offsetHeight + 'px';\n            });\n            setTimeout(() => {\n                cards.forEach(c => { if (c.id !== 'twincard-' + idx) { c.style.maxHeight = '0'; c.style.margin = '0'; c.style.padding = '0'; c.style.border = 'none'; c.style.overflow = 'hidden'; } });\n                const focused = document.getElementById('twincard-' + idx);\n                if (focused) {\n                    focused.style.boxShadow = '0 0 0 2px var(--sc-blue,#4a90e2), 0 14px 40px rgba(0,0,0,.5)';\n                    focused.style.transform = 'scale(1.01)';\n                    if (!document.getElementById('focus-exit-' + idx)) {\n                        const bar = document.createElement('div');\n                        bar.id = 'focus-exit-' + idx;\n                        bar.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:10px';\n                        bar.innerHTML = '<span style=\"font-family:var(--font-display);font-weight:800;color:var(--sc-blue-bright,#66aaff)\">🔬 Focus Mode — original & twin only<\u002Fspan><button class=\"btn-neutral\" onclick=\"exitFocusTwin()\" style=\"margin-left:auto\">✕ Exit Focus<\u002Fbutton>';\n                        focused.parentNode.insertBefore(bar, focused);\n                    }\n                }\n            }, 450);\n            if (window.sfx) sfx.select();\n        }\n        function exitFocusTwin() {\n            document.querySelectorAll('[id^=\"focus-exit-\"]').forEach(b => b.remove());\n            renderTwinReview();\n        }\n\n        function renderEditorList() {\n            const tbody = document.getElementById('editor-table-body');\n            tbody.innerHTML = \"\";\n            renderTagLegend();\n            // Bank questions — ORANGE type = original bank (not copyright-free).\n            // GREEN type = copyright-free (teacher-approved original rephrasing).\n            fullQuestionBank.forEach((q, idx) => {\n                const tr = document.createElement('tr');\n                let displayQ = q.q.replace(/<[^>]*>?/gm, '').substring(0, 50) + \"...\"; \n                const badgeClass = q.isCopyrightFree ? 'copyright-free' : 'original';\n                tr.innerHTML = `\n                    <td><span class=\"type-badge ${badgeClass}\">${q.type.toUpperCase()}<\u002Fspan><\u002Ftd>\n                    <td>${q.topic}<\u002Ftd>\n                    <td>${cmdChip(detectTag(q.q))}<\u002Ftd>\n                    <td>${displayQ}<\u002Ftd>\n                    <td>\n                        <button class=\"edit-btn\" onclick=\"openQuestionForm(${idx})\">Edit<\u002Fbutton>\n                        <button class=\"del-btn\" onclick=\"deleteQuestion(${idx})\">Del<\u002Fbutton>\n                    <\u002Ftd>\n                `;\n                tbody.appendChild(tr);\n            });\n            // Copyright-free collection (approved twins) — always green, read-only here.\n            const cf = getCFStore();\n            if (cf.length) {\n                const hdr = document.createElement('tr');\n                hdr.innerHTML = '<td colspan=\"5\" style=\"color:#3fc35f;font-weight:800;padding-top:14px\">©️❌ Copyright-Free Questions (' + cf.length + ') — approved twins, free to reuse<\u002Ftd>';\n                tbody.appendChild(hdr);\n                cf.forEach((e, ci) => {\n                    const tr = document.createElement('tr');\n                    const plain = String(e.text || '').replace(/<[^>]*>?/gm, '').substring(0, 50) + \"...\";\n                    tr.innerHTML = `\n                        <td><span class=\"type-badge copyright-free\">${(e.type || 'twin').toUpperCase()}<\u002Fspan><\u002Ftd>\n                        <td>${e.topic || ''}<\u002Ftd>\n                        <td><\u002Ftd>\n                        <td>${plain}<\u002Ftd>\n                        <td><button class=\"del-btn\" onclick=\"removeCopyrightFree(${ci})\">Del<\u002Fbutton><\u002Ftd>\n                    `;\n                    tbody.appendChild(tr);\n                });\n            }\n        }\n        function removeCopyrightFree(ci) {\n            const list = getCFStore();\n            if (ci < 0 || ci >= list.length) return;\n            if (!confirm('Remove this copyright-free question from the collection?')) return;\n            list.splice(ci, 1);\n            try { localStorage.setItem(LS_CF, JSON.stringify(list)); } catch(e){}\n            renderEditorList();\n        }\n\n        function toggleFormFields() {\n            const type = document.getElementById('edit-type').value;\n            document.getElementById('form-match').style.display = (type === 'match') ? 'block' : 'none';\n            document.getElementById('form-mcq').style.display = (type === 'mcq') ? 'block' : 'none';\n            document.getElementById('form-fitb').style.display = (type === 'fitb') ? 'block' : 'none';\n        }\n\n        function openQuestionForm(idx) {\n            document.getElementById('editor-form-area').style.display = 'block';\n            const title = document.getElementById('form-title');\n            \n            if (idx === null) {\n                title.innerText = \"Add New Question\";\n                document.getElementById('edit-id').value = \"\";\n                document.getElementById('edit-q').value = \"\";\n                document.getElementById('edit-topic').value = \"p3_diversity\";\n                document.getElementById('edit-type').value = \"match\";\n                \n                document.getElementById('edit-match-correct').value = \"\";\n                document.getElementById('edit-match-d1').value = \"\";\n                document.getElementById('edit-match-d2').value = \"\";\n                document.getElementById('edit-mcq-correct').value = \"\";\n                document.getElementById('edit-mcq-d1').value = \"\";\n                document.getElementById('edit-mcq-d2').value = \"\";\n                document.getElementById('edit-mcq-d3').value = \"\";\n                document.getElementById('edit-fitb-text').value = \"\";\n                \n            } else {\n                title.innerText = \"Edit Question\";\n                const q = fullQuestionBank[idx];\n                document.getElementById('edit-id').value = q.id;\n                document.getElementById('edit-q').value = q.q;\n                document.getElementById('edit-topic').value = q.topic;\n                document.getElementById('edit-type').value = q.type;\n                \n                if (q.type === 'match') {\n                    document.getElementById('edit-template').value = q.template;\n                    document.getElementById('edit-match-correct').value = `${q.correct[0]} | ${q.correct[1]} | ${q.correct[2]} | ${q.correct[3]}`;\n                    document.getElementById('edit-match-d1').value = `${q.distractors[0][0]} | ${q.distractors[0][1]} | ${q.distractors[0][2]} | ${q.distractors[0][3]}`;\n                    document.getElementById('edit-match-d2').value = `${q.distractors[1][0]} | ${q.distractors[1][1]} | ${q.distractors[1][2]} | ${q.distractors[1][3]}`;\n                } else if (q.type === 'mcq') {\n                    document.getElementById('edit-mcq-correct').value = q.correct;\n                    document.getElementById('edit-mcq-d1').value = q.distractors[0];\n                    document.getElementById('edit-mcq-d2').value = q.distractors[1];\n                    document.getElementById('edit-mcq-d3').value = q.distractors[2];\n                } else if (q.type === 'fitb') {\n                    document.getElementById('edit-fitb-text').value = q.text;\n                }\n            }\n            toggleFormFields();\n        }\n\n        function saveQuestion() {\n            const idVal = document.getElementById('edit-id').value;\n            const type = document.getElementById('edit-type').value;\n            \n            let newQ = {\n                id: idVal ? parseInt(idVal) : Date.now(),\n                topic: document.getElementById('edit-topic').value,\n                type: type,\n                q: document.getElementById('edit-q').value\n            };\n\n            if (!newQ.q) return showMessage(\"Question text cannot be empty!\", 2000);\n\n            if (type === 'match') {\n                newQ.template = document.getElementById('edit-template').value;\n                // Items are separated by \"|\" (pipes) so items may contain commas.\n                // Falls back to comma-splitting for simple lists typed the old way.\n                const parseList = (str) => {\n                    if (str.indexOf('|') > -1) return str.split('|').map(s => s.trim()).filter(s => s.length);\n                    return str.split(',').map(s => s.trim()).filter(s => s.length);\n                };\n                const cor = parseList(document.getElementById('edit-match-correct').value);\n                const d1 = parseList(document.getElementById('edit-match-d1').value);\n                const d2 = parseList(document.getElementById('edit-match-d2').value);\n                if (cor.length !== 4 || d1.length !== 4 || d2.length !== 4) return showMessage(\"Match lists must have exactly 4 items separated by | (pipes)!\", 3500);\n                newQ.correct = { 0: cor[0], 1: cor[1], 2: cor[2], 3: cor[3] };\n                newQ.distractors = [\n                    { 0: d1[0], 1: d1[1], 2: d1[2], 3: d1[3] },\n                    { 0: d2[0], 1: d2[1], 2: d2[2], 3: d2[3] }\n                ];\n            } else if (type === 'mcq') {\n                newQ.correct = document.getElementById('edit-mcq-correct').value;\n                newQ.distractors = [\n                    document.getElementById('edit-mcq-d1').value,\n                    document.getElementById('edit-mcq-d2').value,\n                    document.getElementById('edit-mcq-d3').value\n                ];\n                if (!newQ.correct || !newQ.distractors[0]) return showMessage(\"Please fill in MCQ options!\", 2000);\n            } else if (type === 'fitb') {\n                newQ.text = document.getElementById('edit-fitb-text').value;\n                if (!newQ.text.includes('_[') || !newQ.text.includes(']_')) return showMessage(\"FITB must include at least one blank using _[keyword]_ format!\", 3000);\n            }\n\n            if (idVal) {\n                const idx = fullQuestionBank.findIndex(q => q.id === parseInt(idVal));\n                if (idx > -1) {\n                    // merge over the old question so flags like isCopyrightFree survive the edit\n                    fullQuestionBank[idx] = Object.assign({}, fullQuestionBank[idx], newQ);\n                }\n            } else {\n                fullQuestionBank.push(newQ);\n            }\n\n            saveToLocalStorage();\n            document.getElementById('editor-form-area').style.display = 'none';\n            renderEditorList();\n            showMessage(\"Question Saved!\", 2000);\n        }\n\n        function deleteQuestion(idx) {\n            if (confirm(\"Are you sure you want to delete this question?\")) {\n                fullQuestionBank.splice(idx, 1);\n                saveToLocalStorage();\n                renderEditorList();\n            }\n        }\n\n        function restoreDefaultBank() {\n            if (confirm(\"WARNING: This will erase all custom questions and restore the default bank. Proceed?\")) {\n                fullQuestionBank = parseRawBank(defaultRawBank);\n                saveToLocalStorage();\n                renderEditorList();\n                showMessage(\"Default Bank Restored!\", 2000);\n            }\n        }\n\n        function saveToLocalStorage() {\n            try {\n                localStorage.setItem('scienceClawBank_v9', JSON.stringify(fullQuestionBank));\n            } catch (e) {\n                console.warn(\"localStorage not available, unable to save edits.\");\n            }\n        }\n\n        // Game State & Quiz Variables\n        let credits = 0;\n        let adminMode = false;\n        // ADMIN TEST MODE: unlimited credits for fast testing. Applies to Solo, Versus & Co-op.\n        // CONVENTION: every new game mode MUST honour `adminMode` at its credit gate\n        //   (e.g. `if (adminMode || player.credits >= 1) { if (!adminMode) player.credits--; ... }`)\n        //   so teachers can fast-track testing without earning credits.\n        try { adminMode = localStorage.getItem('sciclaw:adminMode:v1') === '1'; } catch (e) {}\n        let prizesWon = 0;\n        let gameState = 'idle';\n        let totalPlaySeconds = 0;\n        let playtimeInterval = null;\n        let notified30 = false;\n        let notified50 = false;\n        \n        let globalCorrectAnswers = 0;\n        let wrongQuestionsLog = new Set();\n        let currentQuestionText = \"\";\n        let currentQData = null; \n\n        // --- STUDENT RECORD STATE ---\n        let questionsAnswered = 0;\n        let wrongAnswersLog = [];   // {timestamp, topic, qType, question, studentAnswer, correctAnswer}\n        let correctAnswersLog = []; // {timestamp, topic, level, question, correctAnswer, isVariant}\n        let studentName = '';\n        let studentClass = '';\n        let pendingUnlock = 'editor';\n        // Cumulative analytics (persisted) for the Teacher Dashboard charts\n        let attemptsByTopic = {}, wrongByTopic = {}, attemptsByType = {}, wrongByType = {};\n        // Per-quiz-session counters for the end-of-session student report\n        let sessionAnswered = 0, sessionCorrect = 0, sessionWrong = [];\n        const TYPE_LABELS = { mcq: 'Multiple Choice', fitb: 'Fill-in-the-Blank', match: 'Matching / Analysis' };\n        const TOPIC_LABELS = {\n            p3_diversity: 'P3 Diversity', p3_interactions: 'P3 Interactions (Magnets)',\n            p4_cycles: 'P4 Cycles', p4_energy: 'P4 Energy', p5_systems: 'P5 Systems',\n            p5_cycles: 'P5 Cycles', p6_interactions: 'P6 Interactions', p6_energy: 'P6 Energy',\n            variables: 'Variables & Data'\n        };\n        const topicLabel = (t) => TOPIC_LABELS[t] || t || 'Unknown';\n        const fmtDuration = (s) => {\n            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;\n            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;\n        };\n        \n        let timer = 30; \n        let timerInterval = null;\n\n        let activeQuestionPool = [];\n        let quizTarget = 0;\n        let quizTimerInterval = null;\n        let quizTimeLeft = 0;\n        let quizBonusEligible = true;\n        let creditReward = 0;\n        let currentQuestionCount = 0;\n        let correctAnswers = 0;\n\n        // --- ENH6: Timed / Untimed (Practice) mode + adaptive per-question time ---\n        let quizMode = 'timed';\n        try { quizMode = localStorage.getItem('scienceClawQuizMode') || 'timed'; } catch (e) {}\n        let hintUsedThisQ = false;   // ENH5: hint used on current question\n        let sessionHints = 0;        // ENH5: total hints this session\n        function questionTime(q) {\n            if (!q) return 60;\n            if (q.type === 'match') return 90;              // CECL reasoning — most time\n            if (q.type === 'fitb') return q.scaffoldTier ? 60 : 50;\n            if (q.type === 'mcq') return 45;                // quick recall\n            return 60;\n        }\n        function setQuizMode(m) {\n            quizMode = m;\n            try { localStorage.setItem('scienceClawQuizMode', m); } catch (e) {}\n            const t = document.getElementById('quiz-mode-toggle');\n            if (t) t.textContent = (m === 'timed')\n                ? '⏱️ Timed mode — tap for 🧘 Practice'\n                : '🧘 Practice mode (untimed) — tap for ⏱️ Timed';\n            if (window.sfx) sfx.click();\n        }\n        function toggleQuizMode() { setQuizMode(quizMode === 'timed' ? 'untimed' : 'timed'); }\n\n        // --- ENH1: Adaptive difficulty — a session tier that follows the student's accuracy ---\n        let adaptiveTier = 2;              // 1 easy · 2 medium · 3 hard\n        function qTier(q) {\n            if (!q) return 2;\n            if (q.type === 'match') return 3;             // CECL reasoning\n            if (q.type === 'fitb') return q.scaffoldTier ? 1 : 2;\n            if (q.type === 'mcq') return 1;               // recall\n            return 2;\n        }\n        function nudgeTier(correct) {\n            adaptiveTier = correct ? Math.min(3, adaptiveTier + 1) : Math.max(1, adaptiveTier - 1);\n        }\n\n        // --- ENH7: Spaced repetition (Leitner boxes). A \"session\" = one quiz run. ---\n        const LS_SRS = 'scienceClawSRS_v1';\n        const LS_SESSION_N = 'scienceClawSessionN_v1';\n        const SRS_INTERVALS = [0, 1, 2, 4, 8];   // box index → sessions until due again\n        let reviewKeysThisSession = new Set();\n        function srsGet() { try { return JSON.parse(localStorage.getItem(LS_SRS) || '{}') || {}; } catch (e) { return {}; } }\n        function srsSet(o) { try { localStorage.setItem(LS_SRS, JSON.stringify(o)); } catch (e) {} }\n        function sessionN() { try { return parseInt(localStorage.getItem(LS_SESSION_N) || '0', 10) || 0; } catch (e) { return 0; } }\n        function bumpSession() { const n = sessionN() + 1; try { localStorage.setItem(LS_SESSION_N, String(n)); } catch (e) {} return n; }\n        function qKey(q) { return q ? (q.id != null ? 'id' + q.id : String(q.q || '').slice(0, 60)) : ''; }\n        function srsSchedule(q, correct) {\n            if (!q || q.isVariant) return;   // never schedule the generated twins\n            const s = srsGet(); const k = qKey(q); const now = sessionN();\n            let box = (s[k] && s[k].box) || 0;\n            box = correct ? Math.min(SRS_INTERVALS.length - 1, box + 1) : 1;  // wrong → back to box 1 (due next session)\n            s[k] = { box, due: now + SRS_INTERVALS[box], t: q.topic };\n            srsSet(s);\n        }\n        function dueReviewKeys() {\n            const s = srsGet(); const now = sessionN(); const out = [];\n            Object.keys(s).forEach(k => { if (s[k].box > 0 && s[k].due <= now) out.push(k); });\n            return out;\n        }\n        // Priority pick: (1) a twin retest [isVariant] must come next, (2) a due review, (3) closest tier.\n        function pickAdaptiveIndex() {\n            const pool = activeQuestionPool;\n            if (!pool.length) return -1;\n            for (let i = pool.length - 1; i >= 0; i--) { if (pool[i].isVariant) return i; }\n            for (let i = pool.length - 1; i >= 0; i--) { if (reviewKeysThisSession.has(qKey(pool[i]))) return i; }\n            let best = -1, bestd = 99;\n            for (let i = 0; i < pool.length; i++) { const d = Math.abs(qTier(pool[i]) - adaptiveTier); if (d < bestd) { bestd = d; best = i; } }\n            return best < 0 ? pool.length - 1 : best;\n        }\n\n        // --- UI FUNCTIONS ---\n        function updateHUD() {\n            document.getElementById('credit-display').innerText = adminMode ? '∞' : credits;\n            document.getElementById('prizes-display').innerText = prizesWon;\n            document.getElementById('score-display').innerText = sciencePoints;\n            document.getElementById('btn-start').disabled = !adminMode && credits < 1;\n            // SHARED WALLET: mirror credits/prizes into SciClawState so the launcher and\n            // the Genie always see the true balance, and Genie earnings are spendable here.\n            if (window.SciClawState) {\n                try {\n                    var p = SciClawState.getPlayer();\n                    p.credits = credits; p.prizes = prizesWon;\n                    SciClawState.savePlayer(p);\n                } catch (e) {}\n            }\n        }\n\n        function showMessage(msg, duration = 4000) {\n            const box = document.getElementById('message-box');\n            box.innerText = msg;\n            box.style.display = 'block';\n            setTimeout(() => { box.style.display = 'none'; }, duration);\n        }\n\n        function showTopUpMenu() {\n            document.getElementById('topup-modal').classList.add('active');\n        }\n\n        function closeModals() {\n            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));\n        }\n\n        // --- DRAG AND DROP LOGIC (MATCH) ---\n        function allowDrop(ev) { ev.preventDefault(); }\n        function drag(ev) { ev.dataTransfer.setData(\"text\", ev.target.id); }\n        function drop(ev) {\n            ev.preventDefault();\n            const data = ev.dataTransfer.getData(\"text\");\n            const draggedEl = document.getElementById(data);\n            if (!draggedEl) return;\n            \n            let target = ev.target;\n            while (target && !target.classList.contains('drop-zone') && !target.classList.contains('pool-col')) {\n                target = target.parentElement;\n            }\n            if (!target) return;\n\n            if (target.classList.contains('drop-zone') && target.children.length > 0) {\n                const existingItem = target.firstChild;\n                const poolId = 'pool-' + existingItem.dataset.type;\n                document.getElementById(poolId).appendChild(existingItem);\n            }\n            target.appendChild(draggedEl);\n        }\n\n        // --- CLICK-TO-SELECT (MATCH) — tap a tile to drop it into its row, tap again to remove ---\n        function selectItem(el) {\n            const type = el.dataset.type;\n            const zone = document.getElementById('ans-' + type);\n            if (el.parentElement === zone) {\n                document.getElementById('pool-' + type).appendChild(el);\n                if (window.sfx) sfx.move();\n                return;\n            }\n            if (zone.children.length > 0) {\n                const existing = zone.firstChild;\n                document.getElementById('pool-' + existing.dataset.type).appendChild(existing);\n            }\n            zone.appendChild(el);\n            if (window.sfx) sfx.select();\n        }\n\n        function shuffleArray(array) {\n            for (let i = array.length - 1; i > 0; i--) {\n                const j = Math.floor(Math.random() * (i + 1));\n                [array[i], array[j]] = [array[j], array[i]];\n            }\n            return array;\n        }\n\n        // --- QUIZ LOGIC ---\n        function getSelectedTopics() {\n            const checkboxes = document.querySelectorAll('.topic-cb');\n            let selected = [];\n            checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });\n            return selected;\n        }\n\n        // ---- Versus / Co-op topic selection ----\n        const VS_TOPIC_LIST = [\n            { v: 'p3_diversity',    l: 'P3 · Diversity' },\n            { v: 'p3_interactions', l: 'P3 · Interactions' },\n            { v: 'p4_cycles',       l: 'P4 · Cycles' },\n            { v: 'p4_energy',       l: 'P4 · Energy' },\n            { v: 'p5_systems',      l: 'P5 · Systems' },\n            { v: 'p5_cycles',       l: 'P5 · Cycles' },\n            { v: 'p6_interactions', l: 'P6 · Interactions' },\n            { v: 'p6_energy',       l: 'P6 · Energy' },\n            { v: 'variables',       l: 'Process Skills' },\n        ];\n        function vsTopicChecks(prefix) {\n            return VS_TOPIC_LIST.map(t =>\n                `<label style=\"display:flex;align-items:center;gap:6px;font-size:12.5px;padding:3px 0;cursor:pointer\">\n                    <input type=\"checkbox\" class=\"${prefix}\" value=\"${t.v}\" checked> ${t.l}\n                <\u002Flabel>`).join('');\n        }\n        function renderVsTopics() {\n            const box = document.getElementById('vs-topics');\n            if (!box) return;\n            if (vsCoop) {\n                // one shared set — applies to BOTH players\n                box.innerHTML = `\n                    <label style=\"font-weight:800;font-size:13px;color:var(--sc-cyan);display:block;margin-bottom:4px\">🤝 Shared topics (both players)<\u002Flabel>\n                    <div style=\"max-height:150px;overflow:auto;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;columns:2;column-gap:16px\">\n                        ${vsTopicChecks('vs-topic-shared')}\n                    <\u002Fdiv>`;\n            } else {\n                // two independent sets — one per player\n                box.innerHTML = `\n                    <div style=\"display:flex;gap:12px\">\n                        <div style=\"flex:1\">\n                            <label style=\"font-weight:800;font-size:13px;color:#22d3ee;display:block;margin-bottom:4px\">🔵 P1 topics<\u002Flabel>\n                            <div style=\"max-height:150px;overflow:auto;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 10px\">\n                                ${vsTopicChecks('vs-topic-0')}\n                            <\u002Fdiv>\n                        <\u002Fdiv>\n                        <div style=\"flex:1\">\n                            <label style=\"font-weight:800;font-size:13px;color:#ffb43a;display:block;margin-bottom:4px\">🟣 P2 topics<\u002Flabel>\n                            <div style=\"max-height:150px;overflow:auto;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 10px\">\n                                ${vsTopicChecks('vs-topic-1')}\n                            <\u002Fdiv>\n                        <\u002Fdiv>\n                    <\u002Fdiv>`;\n            }\n        }\n        function vsGetTopics(i) {\n            const cls = vsCoop ? 'vs-topic-shared' : ('vs-topic-' + i);\n            const sel = [];\n            document.querySelectorAll('.' + cls).forEach(cb => { if (cb.checked) sel.push(cb.value); });\n            return sel;\n        }\n\n        function startQuiz(questions, reward) {\n            const selectedTopics = getSelectedTopics();\n            if (selectedTopics.length === 0) {\n                showMessage(\"Please select at least one topic!\", 3000);\n                return;\n            }\n\n            let availableQuestions = fullQuestionBank.filter(q => selectedTopics.includes(q.topic));\n            if (availableQuestions.length === 0) {\n                showMessage(\"No questions available for the selected topics! Please add some in the editor.\", 4000);\n                return;\n            }\n\n            quizTarget = questions;\n            creditReward = reward;\n            quizBonusEligible = true;\n            currentQuestionCount = 0;\n            correctAnswers = 0;\n            sessionAnswered = 0; sessionCorrect = 0; sessionWrong = [];\n            \n            activeQuestionPool = [...availableQuestions];\n            shuffleArray(activeQuestionPool);\n\n            // ENH7: new session — pull due spaced-repetition reviews to the front (served first),\n            // capped so they never flood a short quiz.\n            bumpSession();\n            reviewKeysThisSession = new Set();\n            const due = new Set(dueReviewKeys());\n            if (due.size) {\n                const reviews = availableQuestions.filter(q => due.has(qKey(q)));\n                shuffleArray(reviews);\n                const cap = Math.max(1, Math.ceil(quizTarget / 2));\n                reviews.slice(0, cap).forEach(q => reviewKeysThisSession.add(qKey(q)));\n            }\n            adaptiveTier = 2;   // ENH1: reset difficulty each session\n\n            document.getElementById('topup-modal').classList.remove('active');\n            document.getElementById('quiz-modal').classList.add('active');\n            try { if (window.sfx && sfx.startMusic && !versusMode) sfx.startMusic('solo'); } catch (e) {}\n            setQuizMode(quizMode);\n            loadNextQuestion();\n        }\n\n        // --- Per-question 60s timer. Running out of time on ANY question forfeits the\n        // completion bonus (base 1-credit-per-correct is still awarded). ---\n        function startQuizTimer() {\n            stopQuizTimer();\n            const el = document.getElementById('quiz-timer');\n            if (quizMode === 'untimed') {\n                if (el) { el.innerText = '🧘 Practice — take your time'; el.style.color = 'var(--sc-green-bright,#3fc35f)'; }\n                return;   // no countdown, bonus never forfeited on time\n            }\n            quizTimeLeft = questionTime(currentQData);\n            if (el) { el.innerText = '⏱️ ' + quizTimeLeft + 's'; el.style.color = 'var(--sc-yellow)'; }\n            quizTimerInterval = setInterval(() => {\n                quizTimeLeft--;\n                if (el) {\n                    el.innerText = '⏱️ ' + quizTimeLeft + 's';\n                    el.style.color = quizTimeLeft <= 10 ? 'var(--sc-red)' : 'var(--sc-yellow)';\n                }\n                if (quizTimeLeft <= 0) {\n                    stopQuizTimer();\n                    quizBonusEligible = false; // out of time -> no bonus for this session\n                    onQuizTimeout();\n                }\n            }, 1000);\n        }\n        function stopQuizTimer() {\n            if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }\n        }\n        function onQuizTimeout() {\n            showMessage(\"⏱️ Time's up for this question!\", 2000);\n            if (window.sfx) sfx.wrong();\n            nudgeTier(false);\n            srsSchedule(currentQData, false);\n            sessionAnswered++;\n            currentQuestionCount++;\n            loadNextQuestion();\n        }\n        function quitQuiz() {\n            stopQuizTimer();\n            closeModals();\n            const earned = correctAnswers; // 1 per correct, no bonus\n            credits += earned;\n            updateHUD();\n            autoSaveSession();\n            showMessage(`Quiz ended. You earned ${earned} credit${earned===1?'':'s'} (no bonus).`, 3000);\n            if (window.sfx && earned > 0) sfx.coin();\n            showSessionReport();\n        }\n\n        // NOTE: An earlier same-topic \"concept twin\" finder was removed. It could pull a\n        // DIFFERENT question that shared a topic but tested a DIFFERENT learning outcome\n        // (e.g. magnetic attraction vs magnetic repulsion). Twins are now always built\n        // from the SAME question the student just attempted, so the retest is guaranteed\n        // to test the exact same learning outcome.\n\n        function loadNextQuestion() {\n            if (currentQuestionCount >= quizTarget) {\n                stopQuizTimer();\n                closeModals();\n                let earned = correctAnswers; // 1 credit per correct answer\n                credits += earned;\n                if (quizBonusEligible && correctAnswers === quizTarget && quizTarget > 1) {\n                    const bonus = Math.max(0, creditReward - quizTarget);\n                    credits += bonus;\n                    unlockBadge('perfect_run');\n                    if (sessionHints === 0 && quizTarget >= 3) unlockBadge('no_hint_run');\n                    showMessage(`🏆 All done in time! ${earned} + ${bonus} bonus = ${earned + bonus} credits!`);\n                    if (window.sfx) sfx.win();\n                } else {\n                    showMessage(`You got ${correctAnswers}/${quizTarget} correct. Earned ${earned} credit${earned===1?'':'s'} (no bonus).`);\n                    if (window.sfx && earned > 0) sfx.coin();\n                }\n                updateHUD();\n                autoSaveSession();\n                showSessionReport();\n                return;\n            }\n\n            // Reset UI states\n            document.getElementById('btn-submit').style.display = 'inline-block';\n            document.getElementById('btn-next-q').style.display = 'none';\n            document.getElementById('answer-reveal').style.display = 'none';\n            hintUsedThisQ = false;\n            { const hb = document.getElementById('hint-box'); if (hb) hb.style.display = 'none';\n              const bh = document.getElementById('btn-hint'); if (bh) bh.style.display = 'inline-block'; }\n            document.getElementById('quiz-progress').innerText = `Question ${currentQuestionCount + 1} of ${quizTarget}`;\n            \n            if (activeQuestionPool.length === 0) {\n                const selectedTopics = getSelectedTopics();\n                activeQuestionPool = fullQuestionBank.filter(q => selectedTopics.includes(q.topic));\n                shuffleArray(activeQuestionPool);\n            }\n            \n            const qData = activeQuestionPool.splice(pickAdaptiveIndex(), 1)[0];\n            currentQData = qData;\n            currentQuestionText = qData.q;\n            startQuizTimer();\n            const isReview = !qData.isVariant && reviewKeysThisSession.has(qKey(qData));\n            if (qData.isVariant) {\n                const ladderLabel = qData.scaffoldTier\n                    ? `🪜 Easier version — same idea (Tier ${qData.scaffoldTier})`\n                    : `🔁 Twin question — same concept, new example`;\n                document.getElementById('quiz-progress').innerHTML = `Question ${currentQuestionCount + 1} of ${quizTarget} · <span style=\"color:var(--sc-blue-bright)\">${ladderLabel}<\u002Fspan>`;\n            } else if (isReview) {\n                document.getElementById('quiz-progress').innerHTML = `Question ${currentQuestionCount + 1} of ${quizTarget} · <span style=\"color:var(--sc-green-bright,#3fc35f)\">🔁 Review — seen before, let's lock it in<\u002Fspan>`;\n            }\n            document.getElementById('question-text').innerHTML = qData.q; \n\n            // Hide all UIs first\n            document.getElementById('ui-match').style.display = 'none';\n            document.getElementById('ui-mcq').style.display = 'none';\n            document.getElementById('ui-fitb').style.display = 'none';\n            \n            if (qData.type === 'match') {\n                document.getElementById('ui-match').style.display = 'block';\n                let qLabels = templates[qData.template] || templates[\"CECL\"];\n                for(let i=0; i<4; i++){\n                    document.getElementById(`lbl-${i}`).innerText = qLabels[i] + \":\";\n                    document.getElementById(`pool-title-${i}`).innerText = qLabels[i] + \" Table\";\n                }\n                const types = [0, 1, 2, 3];\n                types.forEach(type => {\n                    document.getElementById(`ans-${type}`).innerHTML = '';\n                    const pool = document.getElementById(`pool-${type}`);\n                    while (pool.children.length > 1) pool.removeChild(pool.lastChild);\n                });\n                types.forEach(type => {\n                    let items = [\n                        { text: qData.correct[type], isCorrect: true },\n                        { text: qData.distractors[0][type], isCorrect: false },\n                        { text: qData.distractors[1][type], isCorrect: false }\n                    ];\n                    shuffleArray(items);\n                    items.forEach((item, index) => {\n                        const el = document.createElement('div');\n                        el.id = `drag-${type}-${index}`;\n                        el.className = 'draggable-item';\n                        el.draggable = true;\n                        el.ondragstart = drag;\n                        el.innerText = item.text;\n                        el.dataset.type = type;\n                        el.dataset.isCorrect = item.isCorrect;\n                        el.onclick = function() { selectItem(el); };\n                        document.getElementById(`pool-${type}`).appendChild(el);\n                    });\n                });\n            } else if (qData.type === 'mcq') {\n                document.getElementById('ui-mcq').style.display = 'flex';\n                const mcqContainer = document.getElementById('ui-mcq');\n                mcqContainer.innerHTML = \"\";\n                let opts = [{text: qData.correct, isCorrect: true}];\n                qData.distractors.forEach(d => opts.push({text: d, isCorrect: false}));\n                shuffleArray(opts);\n                opts.forEach(opt => {\n                    const btn = document.createElement('button');\n                    btn.className = 'mcq-btn';\n                    btn.innerText = opt.text;\n                    btn.onclick = function() {\n                        document.querySelectorAll('.mcq-btn').forEach(b => b.classList.remove('selected'));\n                        this.classList.add('selected');\n                        this.dataset.isCorrect = opt.isCorrect;\n                    };\n                    mcqContainer.appendChild(btn);\n                });\n            } else if (qData.type === 'fitb') {\n                document.getElementById('ui-fitb').style.display = 'block';\n                const fitbContainer = document.getElementById('ui-fitb');\n                // The blank sentence lives in `text`. Fallback: if text is missing/blank\n                // but the question stem itself carries _[ ]_ tokens, use that so inputs\n                // still render (guards bad uploads & older cached banks).\n                let src = (qData.text && /_\\[.*?\\]_/.test(qData.text)) ? qData.text\n                        : (/_\\[.*?\\]_/.test(qData.q || '') ? qData.q : (qData.text || qData.q || ''));\n                // If we pulled the blanks from the stem, clear the duplicate stem display.\n                if (src === qData.q && /_\\[.*?\\]_/.test(qData.q || '')) {\n                    document.getElementById('question-text').innerHTML = 'Fill in the blank:';\n                }\n                // Replace _[keyword]_ with specific length underlines input\n                let parsedText = src.replace(/_\\[(.*?)\\]_/g, (match, keyword) => {\n                    let len = keyword.length;\n                    let underlineStr = Array(len).fill('_').join(' ');\n                    return `<input type=\"text\" class=\"fitb-input\" data-answer=\"${keyword}\" maxlength=\"${len}\" placeholder=\"${underlineStr}\" style=\"width: ${Math.max(len * 20, 50)}px;\" autocomplete=\"off\">`;\n                });\n                fitbContainer.innerHTML = parsedText;\n            }\n            requestAnimationFrame(fitQuizText);\n        }\n\n        // Auto-shrink question stem, data table & options so nothing is clipped / hidden below the fold\n        function fitQuizText(){\n            const modal = document.getElementById('quiz-modal');\n            if(!modal || !modal.classList.contains('active')) return;\n            const qt = document.getElementById('question-text');\n            const opts = Array.from(modal.querySelectorAll('.mcq-btn'));\n            const tbl = qt ? qt.querySelector('.question-table') : null;\n            let qS = 22, oS = 16, tS = 14;\n            const applyQ = () => { if(qt) qt.style.fontSize = qS + 'px'; };\n            const applyO = () => { opts.forEach(b => b.style.fontSize = oS + 'px'); };\n            const applyT = () => { if(tbl) tbl.style.fontSize = tS + 'px'; };\n            applyQ(); applyO(); applyT();\n            let guard = 0;\n            while(modal.scrollHeight > modal.clientHeight + 1 && guard < 60){\n                if(qS > 14){ qS -= 1; applyQ(); }\n                if(oS > 12){ oS -= 0.5; applyO(); }\n                if(tbl && tS > 11){ tS -= 0.5; applyT(); }\n                if(qS <= 14 && oS <= 12 && (!tbl || tS <= 11)) break;\n                guard++;\n            }\n        }\n        window.addEventListener('resize', () => requestAnimationFrame(fitQuizText));\n\n        function submitAnswer() {\n            let allFilled = true;\n            let allCorrect = true;\n            let correctText = \"\";\n\n            if (currentQData.type === 'match') {\n                const types = [0, 1, 2, 3];\n                let correctParts = [];\n                types.forEach(type => {\n                    correctParts.push(currentQData.correct[type]);\n                    const zone = document.getElementById(`ans-${type}`);\n                    if (zone.children.length === 0) allFilled = false;\n                    else if (zone.firstChild.dataset.isCorrect !== \"true\") allCorrect = false;\n                });\n                correctText = \"<strong>Correct Sequence:<\u002Fstrong><br>\" + correctParts.join(\"<br>➔ \");\n            } else if (currentQData.type === 'mcq') {\n                const selectedBtn = document.querySelector('.mcq-btn.selected');\n                if (!selectedBtn) allFilled = false;\n                else if (selectedBtn.dataset.isCorrect !== \"true\") allCorrect = false;\n                correctText = \"<strong>Correct Answer:<\u002Fstrong><br>\" + currentQData.correct;\n            } else if (currentQData.type === 'fitb') {\n                const inputs = document.querySelectorAll('.fitb-input');\n                let correctBlanks = [];\n                inputs.forEach(input => {\n                    correctBlanks.push(input.dataset.answer);\n                    if (input.value.trim() === \"\") allFilled = false;\n                    else if (input.value.trim().toLowerCase() !== input.dataset.answer.toLowerCase()) allCorrect = false;\n                });\n                correctText = \"<strong>Correct Keywords:<\u002Fstrong><br>\" + correctBlanks.join(\", \");\n            }\n\n            if (!allFilled) {\n                return showMessage(\"Please complete all parts of the question!\", 2000);\n            }\n\n            // --- record this attempt for the student report & analytics ---\n            questionsAnswered++;\n            sessionAnswered++;\n            const tpKey = currentQData.topic, tyKey = currentQData.type;\n            attemptsByTopic[tpKey] = (attemptsByTopic[tpKey] || 0) + 1;\n            attemptsByType[tyKey] = (attempt
