literally appears in the stem\n    let evidence = '';\n    for (const ph of (entry.keywords || [])) { if (q.toLowerCase().indexOf(String(ph).toLowerCase()) !== -1) { evidence = ph; break; } }\n    return { evidence, link };\n  }\n  loadLibraryQuestion(id) {\n    const entry = this.bank().find((e) => e.id === id);\n    if (!entry) return;\n    this.sfx('coin');\n    this.setState({ pickerOpen: false });\n    this.setQuestion(this.bankToQuestion(entry), 'library');\n  }\n  pickerLevels() {\n    const LCOL = { all: '#66ccff', P3: '#3fc35f', P4: '#4a90e2', P5: '#b557e6', P6: '#ffb627' };\n    const base = 'font-weight:800;font-size:13.5px;padding:7px 16px;border-radius:999px;cursor:pointer;';\n    const mk = (key, label) => ({\n      label, onClick: () => { this.sfx('click'); this.setState({ pickerLevel: key }); },\n      style: this.state.pickerLevel === key\n        ? base + 'background:' + LCOL[key] + ';color:#06121f;border:1px solid ' + LCOL[key] + ';'\n        : base + 'background:rgba(255,255,255,.04);color:var(--sc-text-muted);border:1px solid var(--sc-glass-line);',\n    });\n    return [mk('all', 'All levels'), mk('P3', 'P3'), mk('P4', 'P4'), mk('P5', 'P5'), mk('P6', 'P6')];\n  }\n  pickerItems() {\n    const COL = { P3: '#3fc35f', P4: '#4a90e2', P5: '#b557e6', P6: '#ffb627' };\n    let list = this.bank();\n    if (this.state.pickerLevel !== 'all') list = list.filter((e) => e.level === this.state.pickerLevel);\n    return list.map((e) => {\n      const c = COL[e.level] || '#66ccff';\n      const tg = this.detectTag(e.question);\n      return {\n        id: e.id, level: e.level, topic: e.topic, theme: e.theme, question: e.question,\n        badgeStyle: 'background:' + c + ';color:#06121f;font-weight:900;font-size:12px;padding:3px 11px;border-radius:999px;flex:none;',\n        topicStyle: 'color:' + c + ';font-weight:800;font-size:13.5px;',\n        cmd: tg.term, cmdStyle: this.cmdChipStyle(tg.tier),\n        onClick: () => this.loadLibraryQuestion(e.id),\n      };\n    });\n  }\n\n  // ---------- MOE COMMAND-WORD TAGS (2024 syllabus glossary, grouped in 4 tiers) ----------\n  CMD_TIERS() {\n    return {\n      1: { name: 'Tier 1 · Recall', color: '#3fc35f', bg: 'rgba(63,195,95,.16)', line: 'rgba(63,195,95,.45)' },\n      2: { name: 'Tier 2 · Organise & describe', color: '#4a90e2', bg: 'rgba(74,144,226,.16)', line: 'rgba(74,144,226,.45)' },\n      3: { name: 'Tier 3 · Reason & apply', color: '#ffb627', bg: 'rgba(255,182,39,.16)', line: 'rgba(255,182,39,.45)' },\n      4: { name: 'Tier 4 · Evaluate & create', color: '#b557e6', bg: 'rgba(181,87,230,.16)', line: 'rgba(181,87,230,.45)' },\n    };\n  }\n  CMD_TAGS() {\n    // Ordered: most specific/frequent first. The first regex that matches wins.\n    // Tier 1 (Recall): state, list, identify, recognise — check these FIRST (most common in P3-P6)\n    // Tier 2 (Organise): describe, measure, observe, compare, differentiate, classify, communicate, use apparatus\n    // Tier 3 (Reason): explain/show understanding, predict, relate, infer\n    // Tier 4 (Evaluate): analyse, investigate, evaluate, make decisions, solve problem, generate possibilities, formulate hypothesis\n    if (!this._cmdTags) this._cmdTags = [\n      // TIER 1 — check FIRST (most frequent in primary worksheets)\n      { term: 'state', tier: 1, re: /\\bstate\\b|write down|fill in|what (is|are|does|do|can)/i },\n      { term: 'list', tier: 1, re: /\\blist\\b|name (two|three|one|the)/i },\n      { term: 'identify', tier: 1, re: /identify|which (of the|one|two)|circle the|tick the/i },\n      { term: 'recognise', tier: 1, re: /recognis/i },\n      // TIER 2 — describe and measure are high frequency, check early\n      { term: 'describe', tier: 2, re: /describe/i },\n      { term: 'measure', tier: 2, re: /measure/i },\n      { term: 'observe', tier: 2, re: /observ/i },\n      { term: 'compare', tier: 2, re: /compare|similarit|difference between|different from/i },\n      { term: 'differentiate', tier: 2, re: /differentiate|distinguish/i },\n      { term: 'classify', tier: 2, re: /which group|group does .{0,40}belong|belongs? to .{0,30}group|^ *classify\\b|[.?!;]\\s*classify\\b|classify (these|the following)|group (the|them)\\b|sort (the|them|these)/i },\n      { term: 'communicate', tier: 2, re: /draw (a|the)|complete the (table|diagram|drawing)|label the/i },\n      { term: 'use apparatus', tier: 2, re: /apparatus|thermometer|beaker|measuring cylinder|data ?logger/i },\n      // TIER 3 — reasoning\n      { term: 'explain', tier: 3, re: /\\bexplain\\b|give (a |one |two )?reasons?|why (do|does|is|are|did|can|cannot)|account for/i },\n      { term: 'predict', tier: 3, re: /predict|what (will|would) happen/i },\n      { term: 'relate', tier: 3, re: /relationship|as the .{0,50}(increase|decrease)|trend/i },\n      { term: 'infer', tier: 3, re: /infer|conclu|based on (the )?(graph|table|data|results|information)|recorded|measured .{0,30}(table|graph)/i },\n      // TIER 4 — evaluation & creation\n      { term: 'analyse', tier: 4, re: /analys/i },\n      { term: 'investigate', tier: 4, re: /investigat|aim of (the )?experiment|fair test|controlled variable|independent variable|dependent variable|reliab/i },\n      { term: 'evaluate', tier: 4, re: /evaluate|do you agree|is (it|this) (a )?fair|reasonable\\?/i },\n      { term: 'make decisions', tier: 4, re: /make (a )?decision|decide which|choose the (best|most suitable)/i },\n      { term: 'solve problem', tier: 4, re: /suggest (a|one|two|some)? ?(way|ways|method|improvement|solution)|how can .{0,40}(solve|prevent|reduce|improve|stop)/i },\n      { term: 'generate possibilities', tier: 4, re: /generate possibilit|other ways|different ways to/i },\n      { term: 'formulate hypothesis', tier: 4, re: /hypothes/i },\n    ];\n    return this._cmdTags;\n  }\n  detectTag(text) {\n    const s = String(text || '');\n    const tags = this.CMD_TAGS();\n    for (let i = 0; i < tags.length; i++) if (tags[i].re.test(s)) return tags[i];\n    return { term: 'show an understanding', tier: 3 };\n  }\n  cmdChipStyle(tier) {\n    const t = this.CMD_TIERS()[tier] || this.CMD_TIERS()[3];\n    return 'background:' + t.bg + ';border:1px solid ' + t.line + ';color:' + t.color + ';font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px;flex:none;';\n  }\n  tagLegend() {\n    let list = this.bank();\n    if (this.state.pickerLevel !== 'all') list = list.filter((e) => e.level === this.state.pickerLevel);\n    const counts = {};\n    list.forEach((e) => { const t = this.detectTag(e.question); counts[t.term] = counts[t.term] || { term: t.term, tier: t.tier, n: 0 }; counts[t.term].n++; });\n    const tiers = this.CMD_TIERS();\n    return [1, 2, 3, 4].map((tier) => ({\n      name: tiers[tier].name,\n      nameStyle: 'font:800 11px/1 var(--font-display);letter-spacing:.06em;text-transform:uppercase;color:' + tiers[tier].color + ';margin:8px 0 5px;',\n      terms: Object.values(counts).filter((c) => c.tier === tier).sort((a, b) => b.n - a.n).map((c) => ({\n        label: c.term + ' × ' + c.n,\n        style: this.cmdChipStyle(tier),\n      })),\n    })).filter((g) => g.terms.length);\n  }\n\n  // ---------- SAMPLE EDITOR (teacher, password-gated) ----------\n  openEditGate() { this.sfx('click'); this.setState({ editPwOpen: true, editPwError: '' }); }\n  closeEditGate() { this.sfx('click'); this.setState({ editPwOpen: false, editPwError: '' }); }\n  tabStyle(active) {\n    return 'height:38px;padding:0 18px;border-radius:999px;font:800 13.5px/1 var(--font-display);cursor:pointer;'\n      + (active\n        ? 'border:1px solid rgba(255,182,39,.55);background:rgba(255,182,39,.16);color:var(--sc-yellow);'\n        : 'border:1px solid var(--sc-glass-line);background:rgba(255,255,255,.04);color:var(--sc-text-muted);');\n  }\n  levelBtnStyle(active) {\n    return 'height:42px;padding:0 14px;border-radius:10px;font:800 13.5px/1 var(--font-display);cursor:pointer;'\n      + (active\n        ? 'border:1px solid rgba(74,144,226,.7);background:rgba(74,144,226,.25);color:#fff;box-shadow:0 0 10px rgba(74,144,226,.35);'\n        : 'border:1px solid var(--sc-glass-line);background:rgba(255,255,255,.04);color:var(--sc-text-muted);');\n  }\n  adminPw() { try { return localStorage.getItem('sciclaw:adminPw:v1') || 'Shirtpapasg'; } catch (e) { return 'Shirtpapasg'; } }\n\n  // ---------- TWIN BANK (topic folders, teacher-authored twins) ----------\n  TWIN_KEY() { return 'sciclaw:twinBank:v1'; }\n  adminTwins() { try { return JSON.parse(localStorage.getItem(this.TWIN_KEY()) || '[]') || []; } catch (e) { return []; } }\n  writeAdminTwins(list) { try { localStorage.setItem(this.TWIN_KEY(), JSON.stringify(list)); } catch (e) {} }\n  setEditorTab(tab) {\n    this.sfx('click');\n    this.setState({ editorTab: tab, editEntry: null, editDraft: null, twinFolder: null, twinFormOpen: false, twinEditId: null, twinDraft: null });\n  }\n  twinFolders() {\n    const map = {};\n    this.bank().forEach((e) => { map[e.topic] = map[e.topic] || { topic: e.topic, sample: 0, admin: 0 }; map[e.topic].sample++; });\n    this.adminTwins().forEach((t) => { map[t.topic] = map[t.topic] || { topic: t.topic, sample: 0, admin: 0 }; map[t.topic].admin++; });\n    return Object.values(map).sort((a, b) => a.topic.localeCompare(b.topic)).map((f) => ({\n      topic: f.topic,\n      sub: f.sample + ' sample' + (f.sample === 1 ? '' : 's') + ' · ' + f.admin + ' by you',\n      onClick: () => { this.sfx('select'); this.setState({ twinFolder: f.topic }); },\n    }));\n  }\n  twinList() {\n    const t = this.state.twinFolder;\n    if (!t) return [];\n    const COL = { P3: '#3fc35f', P4: '#4a90e2', P5: '#b557e6', P6: '#ffb627' };\n    const badge = (lv) => 'background:' + (COL[lv] || '#66ccff') + ';color:#06121f;font-weight:900;font-size:12px;padding:3px 11px;border-radius:999px;flex:none;';\n    const admin = this.adminTwins().filter((x) => x.topic === t).map((x) => ({\n      id: x.id, question: x.question, level: x.level || 'P5', isAdmin: true,\n      cmd: this.detectTag(x.question).term, cmdStyle: this.cmdChipStyle(this.detectTag(x.question).tier),\n      tag: '✍️ by you', tagStyle: 'background:rgba(255,182,39,.18);color:var(--sc-yellow);font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px;',\n      badgeStyle: badge(x.level || 'P5'),\n      onEdit: () => this.openTwinForm(x),\n      onDelete: () => this.deleteTwin(x.id),\n    }));\n    const samples = this.bank().filter((e) => e.topic === t).map((e) => ({\n      id: e.id, question: e.question, level: e.level, isAdmin: false,\n      cmd: this.detectTag(e.question).term, cmdStyle: this.cmdChipStyle(this.detectTag(e.question).tier),\n      tag: '📚 sample', tagStyle: 'background:rgba(102,204,255,.14);color:var(--sc-cyan,#66ccff);font-weight:800;font-size:11px;padding:2px 9px;border-radius:999px;',\n      badgeStyle: badge(e.level),\n    }));\n    return admin.concat(samples);\n  }\n  openTwinForm(x) {\n    this.sfx('click');\n    this.setState({\n      twinFormOpen: true, twinEditId: x ? x.id : null,\n      twinDraft: x\n        ? { topic: x.topic, level: x.level || 'P5', question: x.question || '', choice: x.choice || '', evidence: x.evidence || '', concept: x.concept || '', link: x.link || '' }\n        : { topic: this.state.twinFolder || '', level: 'P5', question: '', choice: '', evidence: '', concept: '', link: '' },\n    });\n  }\n  setTwinField(f, v) { const d = Object.assign({}, this.state.twinDraft || {}); d[f] = v; this.setState({ twinDraft: d }); }\n  saveTwin() {\n    const d = this.state.twinDraft || {};\n    const topic = (d.topic || '').trim(), q = (d.question || '').trim();\n    if (!topic || !q || !(d.evidence || '').trim() || !(d.concept || '').trim() || !(d.link || '').trim()) {\n      this.sfx('wrong');\n      this.showToast('Fill in the topic, question, Evidence, Concept and Link first.');\n      return;\n    }\n    const list = this.adminTwins();\n    const entry = {\n      id: this.state.twinEditId || ('twin-' + Date. st and guide the student straight to the fully-offline sample library.\n      this.sfx('click');\n      this.showToast(\"Reading your own question (paste, PDF, photo) needs the AI-connected Genie — that runs on the hosted app, not the GitHub copy. The sample library works fully offline. 📚\");\n      this.setState({ pickerOpen: true });\n      return;\n    }\n    this.sfx('coin');\n    this.runLiveAI(text);\n  }\n\n  async runLiveAI(text) {\n    const cached = this.readCache(text);\n    if (cached) { this.setQuestion(cached, 'ai'); return; }\n    this.clearTimers();\n    this.setState({ screen: 'processing', mood: 'thinking', aiError: '', aiLoading: true, procNote: '' });\n    try {\n      const raw = await window.claude.complete(this.buildPrompt(text));\n      const data = this.parseAI(raw);\n      if (!data) throw new Error('parse');\n      if (data.valid === false) {\n        this.setState({ screen: 'home', mood: 'encourage', aiLoading: false, aiError: data.reason || \"I couldn't read that clearly. Please retype or paste one clear question.\" });\n        this.sfx('wrong');\n        return;\n      }\n      const q = this.buildFromAI(data, text);\n      this.writeCache(text, q);\n      this.setState({ aiLoading: false });\n      this.setQuestion(q, 'ai');\n    } catch (e) {\n      console.error('runLiveAI failed:', e && e.stack || e);\n      this.setState({ screen: 'home', mood: 'encourage', aiLoading: false, aiError: \"Hmm, I couldn't read that clearly. Please retype or paste one clear question — a single question works best.\" });\n      this.sfx('wrong');\n    }\n  }\n\n  // ---------- AI PROMPT ----------\n  buildPrompt(text) {\n    const digest = (window.ScienceSyllabus && window.ScienceSyllabus.promptDigest)\n      ? window.ScienceSyllabus.promptDigest() : '';\n    return [\n'You are the ShirtpapaSG Genie, a Singapore Primary Science (P3–P6) tutor. You coach students using the CECL method:',\n'C = Choice (the stance/answer the question forces, e.g. \"Yes, Object Y is a magnet\" or \"Container A\"; ONLY present when the question asks \"Do you agree?\" / \"Which …?\" — absent for \"Explain\"/\"Why\" questions).',\n'E = Evidence (what the question stem, table, diagram or data SHOWS — quoted/paraphrased from the question).',\n'C = Concept (the science RULE from the syllabus that the student must RECALL — not stated in the question).',\n'L = Link (one short clause tying it back to exactly what was asked, usually starting \"Thus, …\").',\n'',\n'Here is the 2024 syllabus + acceptable-answer concept bank to ground the Concept and to validate the topic:',\ndigest,\n'',\n'TASK: Read the STUDENT QUESTION below (it may be OCR text from a scanned exam page). Transcribe it FAITHFULLY, then break it down.',\n'',\n'TRANSCRIPTION RULES (very important — the scan is often a multi-part question):',\n'- A question often has a shared intro/diagram description, then labelled sub-parts (a), (b), (c) (or (i),(ii)). Put the shared intro + any diagram/data description in the top-level \"stem\".',\n'- Put EACH sub-part as its OWN entry in the \"parts\" array, using ONLY that sub-part\\'s own wording for its \"ask\". NEVER merge one sub-part\\'s text into another (e.g. do not push part (c)\\'s global-warming sentence into part (a)\\'s ask). Keep marks like \"[1]\"/\"[2]\" out of the ask.',\n'- If there is only ONE question (no sub-parts), still return a \"parts\" array with a single element (leave \"tag\" as \"\").',\n'',\n'CLASSIFY EACH PART BY ITS COMMAND WORD — this decides the answer style:',\n'- \"Give a reason\" / \"State\" / \"Name\" / \"List\" / \"Identify\" / \"What is/are the …\" asking for a fact or short recall  →  \"style\":\"short\". Provide ONE simple, direct, PSLE-style \"answer\" sentence. NO CECL, NO Evidence/Concept/Link, NO explanation, NO twin. (e.g. (a) \"Polar bears have lungs and do not have gills, thus they cannot breathe under water.\"; (b) \"Frictional force and gravitational force.\")',\n'- \"Explain\" / \"Suggest … Explain\" / \"Why …\" / \"Account for\" / \"How does …\"  →  \"style\":\"open\": full CECL (steps + twin).',\n'- A pure DEFINITION (\"What is a magnet?\")  →  \"style\":\"definition\" (2–3 simple guiding steps, no CECL).',\n'- A pure RELATIONSHIP (\"What is the relationship between X and Y?\", no \"explain\")  →  \"style\":\"relationship\".',\n'- When unsure between short and open: if the part is worth 1 mark or asks to \"give/state/name/list\", choose \"short\"; if it asks to \"explain/suggest/why\" or is worth 2+ marks, choose \"open\".',\n'',\n'If the whole thing is NOT readable science (gibberish/unrelated), return {\"valid\":false,\"reason\":\"<one short, kind sentence telling them what to do>\"}.',\n'',\n'OUTPUT BUDGET (your reply is capped — be concise so the JSON is COMPLETE and valid):',\n'- A \"short\" answer = ONE plain sentence, max 22 words (e.g. \"Polar bears have lungs and no gills, so they cannot breathe under water.\").',\n'- Every coaching text field (prompt/hint/placeholder/why) = max 14 words. \"model\" = max 22 words.',\n'- Give at most 2 keyword groups per step, 1–2 words each.',\n'- Only ONE part needs full CECL steps + twin (the \"open\" one). Keep everything tight so the JSON closes properly.',\n'',\n'Return ONLY a JSON object (no markdown, no commentary) with this exact shape:',\n'{',\n'  \"valid\": true,',\n'  \"topic\": \"<one of the syllabus topic names>\",',\n'  \"level\": \"P3\" | \"P4\" | \"P5\" | \"P6\",',\n'  \"stem\": \"<the shared situation/diagram/data, cleaned up — NO sub-part asks here>\",',\n'  \"parts\": [',\n'    {',\n'      \"tag\": \"<the part label exactly as printed, e.g. (a) — or \\\\\"\\\\\" if single-part>\",',\n'      \"ask\": \"<ONLY this part\\'s own question, one sentence>\",',\n'      \"style\": \"short\" | \"open\" | \"definition\" | \"relationship\",',\n'      // style \"short\":',\n'      \"answer\": \"<ONE simple direct sentence, max 22 words>\",',\n'      // style \"open\" or \"definition\": include \"highlight T QUESTION:',\n'\"\"\"', text, '\"\"\"',\n    ].join('\\n');\n  }\n\n  // ---------- AI PARSE (tolerant) ----------\n  parseAI(raw) {\n    if (!raw) return null;\n    let s = String(raw).trim();\n    // strip ```json fences if present\n    s = s.replace(/^```(?:json)?/i, '').replace(/```$/, '').trim();\n    const a = s.indexOf('{');\n    if (a === -1) return null;\n    s = s.slice(a);\n    // 1) try the clean outermost {...}\n    const b = s.lastIndexOf('}');\n    if (b > 0) {\n      const t = s.slice(0, b + 1);\n      try { return JSON.parse(t); } catch (e) {}\n      try { return JSON.parse(t.replace(/,\\s*([}\\]])/g, '$1')); } catch (e) {}\n    }\n    // 2) the response was TRUNCATED (1024-token output cap) — repair it.\n    return this.repairTruncatedJSON(s);\n  }\n  // Balance an unfinished JSON object/array so we can salvage the parts that DID arrive.\n  repairTruncatedJSON(s) {\n    let inStr = false, esc = false; const stack = [];\n    let lastSafe = -1; // index just after the last fully-closed top-of-stack value\n    for (let i = 0; i < s.length; i++) {\n      const ch = s[i];\n      if (esc) { esc = false; continue; }\n      if (ch === '\\\\') { esc = true; continue; }\n      if (ch === '\"') { inStr = !inStr; continue; }\n      if (inStr) continue;\n      if (ch === '{' || ch === '[') stack.push(ch === '{' ? '}' : ']');\n      else if (ch === '}' || ch === ']') { stack.pop(); lastSafe = i + 1; }\n      else if (ch === ',' && stack.length) lastSafe = i; // a comma at any depth is a safe cut point\n    }\n    const tryParse = (str) => {\n      // close an open string, drop a dangling \"key\": or partial value, then balance brackets\n      let out = str;\n      if (inStr) { /* handled by cutting at lastSafe below */ }\n      out = out.replace(/[\\s,]*$/, '');\n      // append needed closers based on a fresh scan of `out`\n      let is = false, es = false; const st = [];\n      for (let i = 0; i < out.length; i++) {\n        const c = out[i];\n        if (es) { es = false; continue; }\n        if (c === '\\\\') { es = true; continue; }\n        if (c === '\"') { is = !is; continue; }\n        if (is) continue;\n        if (c === '{' || c === '[') st.push(c === '{' ? '}' : ']');\n        else if (c === '}' || c === ']') st.pop();\n      }\n      if (is) out += '\"';\n      out = out.replace(/[\\s,]*$/, '').replace(/:\\s*$/, ': null');\n      for (let i = st.length - 1; i >= 0; i--) out += st[i];\n      out = out.replace(/,\\s*([}\\]])/g, '$1');\n      try { return JSON.parse(out); } catch (e) { return null; }\n    };\n    // cut at the last safe comma/closer (drops the half-written field) and balance\n    let candidate = lastSafe > 0 ? s.slice(0, lastSafe) : s;\n    let r = tryParse(candidate);\n    if (r) return r;\n    // fall back: try the whole string balanced\n    return tryParse(s);\n  }\n\n  // ---------- BUILD QUESTION FROM AI DATA ----------\n  // Multi-part orchestrator: a scanned question may have sub-parts (a)(b)(c).\n  // The first CECL-worthy part drives the coaching flow; \"short\" parts\n  // (\"Give a reason\", \"State\", \"Name\", \"List\") become simple quick-answers.\n  partFinalAnswer(p) {\n    if (!p) return '';\n    if (p.style === 'short') return p.answer || '';\n    if (p.style === 'relationship') return (p.relationship && p.relationship.answer) || '';\n    const steps = Array.isArray(p.steps) ? p.steps : [];\n    return steps.map((s) => s && s.model).filter(Boolean).join(' ');\n  }\n  buildShortQuestion(d, original) {\n    const segs = this.buildSegments((d.stem || '') + ' ', {}, false, []);\n    return {\n      topic: d.topic || 'Science', level: d.level || 'P5', type: 'short',\n      source: 'Your question · read by the Genie ✨', diagram: null,\n      activeParts: [], partMeta: {},\n      segments: segs.length ? segs : [{ t: (d.stem || original || '') }],\n      stem: d.stem || original || '', ask: '',\n      parts: {}, finalClauses: [], quickParts: [],\n      tip: 'For “give a reason” / “stat elect'), 100);\n    } else { this.beginCombine(); }\n  }\n  beginCombine() {\n    const q = this.state.q;\n    this.clearTimers();\n    this.setState({ screen: 'combine', combineStep: 0, mood: 'cast' });\n    const n = q.finalClauses.length;\n    for (let i = 1; i <= n; i++) {\n      this.later(() => { this.sfx('coin'); this.setState({ combineStep: i }); if (i === n) { this.sfx('win'); this.setState({ mood: 'celebrate' }); } }, 950 * i);\n    }\n  }\n  beginTwin() { this.sfx('click'); this.clearTimers(); if (this.twinRef.current) this.twinRef.current.value = ''; this.setState({ screen: 'twin', mood: 'happy', twinSubmitted: false, twinResult: null, twinScaffold: false, scaffoldIdx: 0, scaffoldResults: {}, scaffoldTries: 0, scaffoldNudge: '' }); }\n  // ---------- COPY DETECTION ----------\n  // Real learning means rewording the idea. If the typed answer is essentially the\n  // model answer verbatim (fewer than ~3 words changed), it's a copy, not understanding.\n  _tok(s) { return (s || '').toLowerCase().replace(/[^a-z0-9\\s]/g, ' ').replace(/\\s+/g, ' ').trim().split(' ').filter(Boolean); }\n  copyCheck(answer, modelText) {\n    const A = this._tok(answer), M = this._tok(modelText);\n    if (A.length < 4 || M.length < 4) return { copied: false, novel: 99 };\n    // count student words that are NOT accounted for in the model (multiset)\n    const map = {}; M.forEach((w) => { map[w] = (map[w] || 0) + 1; });\n    let novel = 0; A.forEach((w) => { if (map[w] > 0) map[w]--; else novel++; });\n    const overlap = A.length - novel; // student words taken from the model\n    // a copy = almost all words came from the model AND fewer than 3 words are the student's own\n    const copied = novel < 3 && overlap >= Math.ceil(M.length * 0.6);\n    return { copied, novel };\n  }\n  submitTwin() {\n    const q = this.state.q; const tw = q.twin;\n    const txt = this.twinRef.current ? this.twinRef.current.value : '';\n    // \"I don't know\" / blank → DON'T dump the answer. Coach part-by-part instead.\n    if (this.looksStuck(txt)) { this.startScaffold(); return; }\n    // COPY GUARD: identical-to-model answers don't show learning — ask them to reword.\n    const modelText = (tw.finalClauses || []).map((c) => c.t).join(' ');\n    const cc = this.copyCheck(txt, modelText);\n    if (cc.copied) {\n      this.sfx('wrong');\n      this.setState({ twinAnswer: txt, twinSubmitted: true, twinResult: { passed: false, copied: true, novel: cc.novel }, mood: 'encourage' });\n      this.postToTeacher({ event: 'twin-attempt', topic: tw.topic || q.topic, level: tw.level || q.level, correct: 'COPIED', answer: txt, credits: this.state.credits });\n      return; // no credits, no \"nailed it\"\n    }\n    let groups = [];\n    tw.activeParts = tw.activeParts || this.activeParts(tw);\n    tw.activeParts.forEach((k) => { if (tw.parts[k] && tw.parts[k].keywords) groups = groups.concat(tw.parts[k].keywords); });\n    const res = this.gradeAnswer(txt, groups);\n    const passed = res.total === 0 ? true : res.hit >= Math.ceil(res.total * 0.6);\n    this.sfx(passed ? 'correct' : 'wrong');\n    try { this.S.recordAttempt(passed); } catch (e) {}\n    let credits = this.state.credits, earned = this.state.creditsEarned, awarded = this.state.creditAwarded;\n    if (passed && !awarded) {\n      const reward = (this.S.REWARD_TWIN_CORRECT || 3);\n      const p = this.S.addCredits(reward);\n      credits = p.credits; earned = reward; awarded = true;\n      this.later(() => this.sfx('coin'), 380);\n      this.showToast('🪙 +' + reward + ' claw credits earned!');\n    }\n    this.setState({ twinAnswer: txt, twinSubmitted: true, twinResult: { ...res, passed }, credits, creditsEarned: earned, creditAwarded: awarded, mood: passed ? 'celebrate' : 'encourage' });\n    // log the student's response + gameplay to the teacher's Google Sheet (if configured)\n    this.postToTeacher({ event: 'twin-attempt', topic: q.twin.topic || q.topic, level: q.twin.level || q.level, correct: passed ? 'YES' : 'no', answer: txt || '(blank)', credits });\n  }\n\n  // ---------- \"I DON'T KNOW\" → PART-BY-PART GUIDED SCAFFOLD ----------\n  // Triggered when a student is stuck. Never dumps the full answer: it coaches one\n  // CECL part at a time, in order, letting them try (or peek) each part.\n  looksStuck(txt) {\n    const t = (txt || '').toLowerCase().replace(/[^a-z\\s?]/g, ' ').replace(/\\s+/g, ' ').trim();\n    if (t.length < 4) return true; // blank / a stray character\n    const STUCK = ['i dunno', 'dunno', 'i dont know', 'i do not know', 'dont know', 'do not know', 'idk', 'no idea', 'not sure', 'unsure', 'no clue', 'i cant', 'i cannot', 'cant do', 'i give up', 'help me', 'i need help', 'stuck', 'confused', 'pass', 'skip', 'i dont understand', 'dont understand'];\n    if (STUCK.some((p) => t === p || t.indexOf(p) !== -1)) return true;\n    return false;\n  }\n  startScaffold() {\n    this.sfx('select');\n    const tw = this.state.q.twin;\n    tw.activeParts = tw.activeParts || this.activeParts(tw);\n    this.setState({ twinScaffold: true, scaffoldIdx: 0, scaffoldResults: {}, scaffoldTries: 0, scaffoldNudge: '', mood: 'encourage' });\n    this.later(() => { if (this.scaffoldRef.current) { this.scaffoldRef.current.value = ''; this.scaffoldRef.current.focus(); } }, 80);\n  }\n  scaffoldKey() { const tw = this.state.q.twin; return (tw.activeParts || this.activeParts(tw))[this.state.scaffoldIdx]; }\n  checkScaffoldPart() {\n    const tw = this.state.q.twin; const key = this.scaffoldKey();\n    const txt = this.scaffoldRef.current ? this.scaffoldRef.current.value : '';\n    const kw = (tw.parts[key] && tw.parts[key].keywords) || [];\n    const res = this.gradeAnswer(txt, kw);\n    if (res.correct || (kw.length && res.hit >= 1)) {\n      this.sfx('correct');\n      this.setState({ scaffoldResults: { ...this.state.scaffoldResults, [key]: 'self' }, scaffoldNudge: '', mood: 'celebrate' });\n      this.later(() => this.advanceScaffold(), 650);\n    } else {\n      const tries = this.state.scaffoldTries + 1;\n      this.sfx('wrong');\n      if (tries >= 2) {\n        // after two tries, gently show this part and move on so they never get stuck\n        this.revealScaffoldPart(true);\n      } else {\n        this.setState({ scaffoldTries: tries, scaffoldNudge: (tw.parts[key] && tw.parts[key].hint) || 'Think about what this part is really asking — you can do it!', mood: 'encourage' });\n      }\n    }\n  }\n  revealScaffoldPart(autoMove) {\n    const key = this.scaffoldKey();\n    this.sfx('select');\n    this.setState({ scaffoldResults: { ...this.state.scaffoldResults, [key]: 'shown' }, scaffoldNudge: '', mood: 'happy' });\n    this.later(() => this.advanceScaffold(), autoMove ? 900 : 500);\n  }\n  advanceScaffold() {\n    const tw = this.state.q.twin; const parts = tw.activeParts || this.activeParts(tw);\n    if (this.state.scaffoldIdx < parts.length - 1) {\n      this.setState({ scaffoldIdx: this.state.scaffoldIdx + 1, scaffoldTries: 0, scaffoldNudge: '', mood: 'cast' });\n      this.later(() => { if (this.scaffoldRef.current) { this.scaffoldRef.current.value = ''; this.scaffoldRef.current.focus(); } this.sfx('select'); }, 120);\n    } else {\n      this.finishScaffold();\n    }\n  }\n  finishScaffold() {\n    const tw = this.state.q.twin; const parts = tw.activeParts || this.activeParts(tw);\n    const self = parts.filter((k) => this.state.scaffoldResults[k] === 'self').length;\n    const shown = parts.filter((k) => this.state.scaffoldResults[k] === 'shown').length; // hints used\n    const allHinted = parts.length > 0 && shown >= parts.length; // needed the answer shown for EVERY part\n    const passed = parts.length ? self >= Math.ceil(parts.length * 0.6) : false;\n    this.sfx(passed ? 'win' : 'correct');\n    try { this.S.recordAttempt(passed); } catch (e) {}\n    let credits = this.state.credits, earned = this.state.creditsEarned, awarded = this.state.creditAwarded;\n    if (passed && !awarded) {\n      const reward = (this.S.REWARD_TWIN_CORRECT || 3);\n      const p = this.S.addCredits(reward); credits = p.credits; earned = reward; awarded = true;\n      this.later(() => this.sfx('coin'), 380);\n      this.showToast('🪙 +' + reward + ' claw credits earned!');\n    }\n    this.setState({\n      twinAnswer: 'Built it together, part by part 🧩', twinScaffold: false,\n      twinSubmitted: true, twinResult: { passed, scaffolded: true, selfCount: self, hintsUsed: shown, allHinted, total: parts.length },\n      credits, creditsEarned: earned, creditAwarded: awarded, mood: passed ? 'celebrate' : 'happy',\n    });\n    this.postToTeacher({ event: 'twin-guided', topic: tw.topic || this.state.q.topic, level: tw.level || this.state.q.level, correct: self + '/' + parts.length + ' self, ' + shown + ' hint' + (shown === 1 ? '' : 's'), answer: allHinted ? 'Needed every part shown (struggling)' : 'Guided scaffold', credits });\n  }\n  scaffoldMeta(field) {\n    const q = this.state.q;\n    if (!q || !this.state.twinScaffold) return field === 'color' ? '#66ccff' : '';\n    const key = this.scaffoldKey(); const m = this.meta(key);\n    if (field === 'label') return m.label;\n    if (field === 'color') return m.color;\n    const p = (q.parts && q.parts[key]) || {};\n    if (field === 'prompt') return p.prompt || ('Write the ' + m.label + ' for this question.');\n    if (field === 'placeholder') return p.placeholder || 'Type just this part…';\n    return '';\n  }\n  scaffoldBoxes() {\n    const q = this.state.q;\n    if (!q || !this.state.twinScaffold) return [];\n    const tw = q.twin; const parts = tw.activeParts || this.activeParts(tw);\n    const cur = this.state.scaffoldIdx;\n    return parts.map((k, j) => {\n      const r = this.state.scaffoldResults[k];\n      const done = r === 'self' || r === 'shown';\n      const box = this.makeBox(k, { body: done ? ((tw.parts[k] && tw.parts[k].model) || '') : '', dim: j > cur && !done, glow: j === cur });\n      box.tag = r === 'self' ? '✓ you got it!' : r === 'show      focus = '⚠️ Your child still struggles with this topic. Try another similar question in this topic to get better.';\n    } else if (tr.scaffolded) {\n      const hints = tr.hintsUsed || 0;\n      twinLine = 'worked through a twin question with guided help — using ' + hints + ' hint' + (hints === 1 ? '' : 's') + ', and completing ' + (tr.selfCount || 0) + ' of ' + tr.total + ' parts independently.';\n      focus = hints > 0 ? 'A little more practice on this topic will help them do it without hints.' : (missed.length ? 'Focus area: the ' + missed.join(' and ') + ' step' + (missed.length > 1 ? 's' : '') + '.' : 'Strong understanding. 🌟');\n    } else if (tr.passed) {\n      const twinHints = (this.state.twinHintCount || 0);\n      if (twinHints > 0) {\n        twinLine = 'attempted a twin question and got it right, but used hints along the way. Great effort! 💪';\n        focus = 'Try the next question without hints — you\\'ve got this!';\n      } else {\n        twinLine = 'attempted a twin question on their own — and nailed it with no hints. ✅';\n        focus = missed.length ? 'Focus area: the ' + missed.join(' and ') + ' step' + (missed.length > 1 ? 's' : '') + '.' : 'Strong across every CECL step. 🌟';\n      }\n    } else {\n      twinLine = 'attempted a twin question on their own — a good effort we have saved for revision.';\n      focus = missed.length ? 'Focus area: the ' + missed.join(' and ') + ' step' + (missed.length > 1 ? 's' : '') + '.' : 'Keep practising to build confidence.';\n    }\n    return 'Your child practised a ' + q.level + ' ' + q.topic + ' open-ended question using the Shirtpapa CECL method (Choice · Evidence · Concept · Link). They worked through every part with the Genie, then ' + twinLine + ' ' + focus + ' The twin question is now in their Question Bank for more practice.';\n  }\n\n  downloadFeedback() {\n    this.sfx('click');\n    const q = this.state.q; if (!q) return;\n    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n    const row = (c) => '<tr><td class=\"lab\" style=\"color:' + this.meta(c.cecl).color + '\">' + this.meta(c.cecl).label + '<\u002Ftd><td>' + esc(c.t) + '<\u002Ftd><\u002Ftr>';\n    const cecltbl = (clauses) => '<table>' + clauses.map(row).join('') + '<\u002Ftable>';\n    const html = '<!doctype html><html><head><meta charset=\"utf-8\"><title>ShirtpapaSG Genie — Feedback<\u002Ftitle><style>'\n      + 'body{font-family:-apple-system,Segoe UI,Arial,sans-serif;color:#0a1320;max-width:720px;margin:32px auto;padding:0 24px;line-height:1.5}'\n      + 'h1{font-size:22px;margin:0 0 2px}.sub{color:#667;font-size:13px;margin-bottom:18px}'\n      + 'h2{font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:#334;border-bottom:2px solid #eee;padding-bottom:6px;margin:22px 0 10px}'\n      + 'table{width:100%;border-collapse:collapse;margin:6px 0}td{border:1px solid #ddd;padding:8px 10px;font-size:14px;vertical-align:top}'\n      + '.lab{font-weight:800;width:90px}.q{background:#f5f7fa;border:1px solid #e4e8ee;border-radius:8px;padding:12px 14px;font-size:14px}'\n      + '.tip{background:#fff7e6;border:1px solid #ffd98a;border-radius:8px;padding:12px 14px;font-size:14px}'\n      + '.par{background:#eef4ff;border:1px solid #cfe0ff;border-radius:8px;padding:12px 14px;font-size:14px}'\n      + '@media print{body{margin:0}}<\u002Fstyle><\u002Fhead><body>'\n      + '<h1>🧞 ShirtpapaSG Genie — Question Feedback<\u002Fh1><div class=\"sub\">' + q.level + ' · ' + q.topic + ' · CECL method<\u002Fdiv>'\n      + '<h2>The question<\u002Fh2><div class=\"q\">' + esc(q.stem) + '<br><b>' + esc(q.ask) + '<\u002Fb><\u002Fdiv>'\n      + '<h2>Model answer (CECL)<\u002Fh2>' + cecltbl(q.finalClauses)\n      + '<h2>Tip from the Genie<\u002Fh2><div class=\"tip\">💡 ' + esc(q.tip) + '<\u002Fdiv>'\n      + '<h2>Twin question (now in the Question Bank)<\u002Fh2><div class=\"q\">' + esc(q.twin.stem) + '<br><b>' + esc(q.twin.ask) + '<\u002Fb><\u002Fdiv>' + cecltbl(q.twin.finalClauses)\n      + '<h2>For parents<\u002Fh2><div class=\"par\">' + esc(this.parentSummary()) + '<\u002Fdiv>'\n      + this.lineageReportHtml(esc)\n      + '<\u002Fbody><\u002Fhtml>';\n    try {\n      const w = window.open('', '_blank');\n      if (w) { w.document.open(); w.document.write(html); w.document.close(); this.later(() => { try { w.focus(); w.print(); } catch (e) {} }, 500); return; }\n    } catch (e) {}\n    const blob = new Blob([html], { type: 'text/html' });\n    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'shirtpapa-feedback.html'; a.click();\n  }\n  lineageReportHtml(esc) {\n    const log = this.state.lineage || [];\n    if (!log.length) return '';\n    const names = this.distinctNames(log);\n    const rows = log.map((e) => '<tr><td>' + esc('by ' + e.name) + '<\u002Ftd><td>' + esc(e.date) + '<\u002Ftd><td>' + esc(e.action || '') + '<\u002Ftd><\u002Ftr>').join('');\n    const shared = names.length > 1;\n    const banner = shared\n      ? '<div style=\"background:#fde8e6;border:1px solid #f3b4ae;border-radius:8px;padding:12px 14px;font-size:14px;color:#8a1c12;margin-bottom:8px\">⚠️ <b>Shared save file detected.<\u002Fb> This file has been used under ' + names.length + ' different names (' + esc(names.join(', ')) + '). A single save file used by more than one student usually means progress was shared/copied.<\u002Fdiv>'\n      : '<div style=\"background:#e7f6ec;border:1px solid #b6e0c2;border-radius:8px;padding:12px 14px;font-size:14px;color:#15623a;margin-bottom:8px\">✓ Single owner: <b>' + esc(names[0] || 'Student') + '<\u002Fb>. This save file has only ever belonged to one student.<\u002Fdiv>';\n    return '<h2>Save-file history (chain of custody)<\u002Fh2>' + banner\n      + '<table><tr><td class=\"lab\">Owner<\u002Ftd><td class=\"lab\">Date<\u002Ftd><td class=\"lab\">Action<\u002Ftd><\u002Ftr>' + rows + '<\u002Ftable>';\n  }\n\n  /* ---------- genie speech ---------- */\n  say() {\n    const s = this.state.screen, q = this.state.q;\n    if (s === 'home') return \"Hi! I'm the ShirtpapaSG Genie. 🧞 Paste a question — or try mine — and I'll show you how to crack it, step by step.\";\n    if (s === 'processing') return 'Hmm, let me read this carefully… 🔍✨';\n    if (s === 'reveal') {\n      if (!q) return '';\n      return this.state.revealStep >= q.activeParts.length\n        ? \"There it is — broken into colour-coded parts! Now let's solve it together, one piece at a time. 👇\"\n        : 'Watch closely… I am pulling out the key parts of your question. ✨';\n    }\n    if (s === 'guided') {\n      if (!q) return '';\n      const meta = this.meta(this.curKey());\n      const last = this.state.guidedIdx >= q.activeParts.length - 1;\n      return 'Let me teach you the ' + meta.label + '. Watch how I build it' + (last ? ' — then we put the whole answer together! ✨' : '… ✨');\n    }\n    if (s === 'combine') {\n      if (!q) return '';\n      return this.state.combineStep >= q.finalClauses.length\n        ? 'And THAT is your full model answer! See how each colour links together? 🌟'\n        : 'Now watch the parts join into one complete answer… ✨';\n    }\n    if (s === 'twin') {\n      if (this.state.twinScaffold) {\n        const m = this.scaffoldMeta('label');\n        return this.state.scaffoldNudge ? 'Almost! Have another go at the ' + m + '. 💪'\n          : \"No worries — let's build it together, one part at a time. Start with the \" + m + '. 🧩';\n      }\n      if (this.state.twinSubmitted) {\n        const tr = this.state.twinResult;\n        if (tr && tr.copied) return \"Hmm… that looks word-for-word like my model answer. 🤔 Copying doesn't help you learn — try writing it in your OWN words (change at least 3–4 words).\";\n        if (tr && tr.scaffolded) {\n          if (tr.allHinted) return \"We got there together — but you needed every part shown. That's okay! This topic needs more practice. Try another similar question to get stronger. 💪\";\n          return tr.passed ? '🎉 You built the whole answer yourself, piece by piece — fantastic!' : \"Great teamwork! We pieced it together — read it through and you'll own it next time. 💪\";\n        }\n        return tr && tr.passed ? '🎉 Brilliant! Same idea, new story — you have truly got it!' : \"Nice effort! Compare with my answer below — you're nearly there. 💪\";\n      }\n      return \"Your turn! Same concept, brand-new story. Write the full CECL answer — or tap \\u201CI'm not sure\\u201D and I'll guide you. 🪄\";\n    }\n    if (s === 'summary') return 'Awesome work today! Here is your recap — you can save it as a PDF for your parents. 📄';\n    if (s === 'bank') return 'Your Question Bank — every twin you finish lands here. Your own growing practice set! 📚';\n    return '';\n  }\n\n  /* ---------- view models ---------- */\n  // Resolve a step's display meta. A live/definition question may carry its own\n  // `partMeta` (custom labels + colours for non-CECL steps); otherwise fall back\n  // to the standard CECL palette. Standard keys (choice/evidence/concept/link)\n  // therefore keep working unchanged.\n  meta(key) {\n    const q = this.state.q;\n    if (q && q.partMeta && q.partMeta[key]) return q.partMeta[key];\n    return this.CECL[key] || this.CECL.evidence;\n  }\n  boxStyleFor(meta, opts) {\n    const base = { border: '2px solid ' + meta.color, borderRadius: '14px', background: 'var(--sc-ink-900)', padding: '12px 14px', transition: 'all .5s var(--ease-pop)', boxShadow: 'none' };\n    if (opts.hidden) return { ...base, opacity: 0, transform: 'translateY(18px) scale(.9)' };\n    if (opts.dim) return { ...base, opacity: 0.4, transform: 'none' };\n    return { ...base, opacity: 1, transform: 'none', boxShadow: opts.glow ? meta.glow : 'none' };\n  }\n  makeBox(key, opts) {\n    const meta = this.meta(key);\n    return {\n      key, label: meta.label, letter: meta.letter, color: meta.color, body: opts.body || '',\n      boxStyle: this.boxStyleFor(meta, opts),\n
