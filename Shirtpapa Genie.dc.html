document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"31e8cfbb-4208-43ef-8937-fec391d4bdd2\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   SCIENCE CLAW — COLOR TOKENS\n   Dark arcade palette: near-black navy backdrop + neon accents.\n   Each HUD stat owns a hue (credits=green, prizes=purple, etc).\n   ============================================================ */\n\n:root {\n  /* --- Base surfaces (the dark cabinet world) --- */\n  --sc-black:        #04070c;   /* deepest backdrop */\n  --sc-bg:           #070d15;   /* app background */\n  --sc-scene:        #08131f;   /* 3D scene / canvas backdrop */\n  --sc-ink-900:      #0a1320;   /* solid panel fill (opaque) */\n  --sc-ink-800:      #111c2b;\n  --sc-ink-700:      #1b283a;\n\n  /* --- Neon accents (one hue per concept) --- */\n  --sc-yellow:       #ffb627;   /* section headers, player name, gold */\n  --sc-yellow-soft:  #ffd06b;\n  --sc-green:        #3fc35f;   /* credits, collection, success */\n  --sc-green-bright: #5ee07a;\n  --sc-green-btn:    #34b14d;   /* primary action button fill */\n  --sc-green-btn-hi: #43c95f;\n  --sc-blue:         #4a90e2;   /* accuracy, active/selected state */\n  --sc-blue-bright:  #6aa9f0;\n  --sc-blue-deep:    #2f6fd6;\n  --sc-purple:       #b557e6;   /* prizes, crystals */\n  --sc-purple-bright:#cd7bf5;\n  --sc-red:          #e8493f;   /* danger, miss, magnet, joystick */\n  --sc-red-bright:   #ff6a5e;\n  --sc-cyan:         #66ccff;   /* atom, info highlight */\n\n  /* --- Science item identity colors (prizes) --- */\n  --sc-item-battery: #ffd400;\n  --sc-item-atom:    #66ccff;\n  --sc-item-plant:   #58e066;\n  --sc-item-magnet:  #ff5a5a;\n  --sc-item-crystal: #f06fff;\n\n  /* --- Text --- */\n  --sc-text:         #ffffff;\n  --sc-text-soft:    #d6dee6;\n  --sc-text-muted:   #8a98a6;\n  --sc-text-faint:   #5a6775;\n  --sc-text-on-accent: #08131f; /* dark text on bright fills */\n\n  /* --- Lines & dividers --- */\n  --sc-line:         rgba(255,255,255,0.14);\n  --sc-line-strong:  rgba(255,255,255,0.28);\n  --sc-line-cabinet: #7a1f1f;    /* red trim on the cabinet bezel */\n\n  /* --- Glass panel fills (translucent, used with blur) --- */\n  --sc-glass:        rgba(7, 13, 21, 0.82);\n  --sc-glass-soft:   rgba(7, 13, 21, 0.66);\n  --sc-glass-strong: rgba(4, 7, 12, 0.92);\n  --sc-glass-line:   rgba(255,255,255,0.10);\n\n  /* --- Control surfaces --- */\n  --sc-btn-neutral:    #2b3340;   /* gray secondary button */\n  --sc-btn-neutral-hi: #3a4452;\n  --sc-input-bg:       #0e1925;\n  --sc-input-line:     rgba(255,255,255,0.16);\n\n  /* ============================================================\n     SEMANTIC ALIASES\n     ============================================================ */\n  --bg-app:          var(--sc-bg);\n  --bg-scene:        var(--sc-scene);\n  --surface-panel:   var(--sc-glass);\n  --surface-panel-solid: var(--sc-ink-900);\n  --surface-modal:   var(--sc-glass-strong);\n  --surface-input:   var(--sc-input-bg);\n\n  --text-body:       var(--sc-text);\n  --text-secondary:  var(--sc-text-soft);\n  --text-muted:      var(--sc-text-muted);\n  --text-heading:    var(--sc-yellow);\n\n  --border-panel:    var(--sc-glass-line);\n  --border-divider:  var(--sc-line);\n\n  --accent-primary:  var(--sc-green);\n  --accent-active:   var(--sc-blue);\n  --accent-danger:   var(--sc-red);\n\n  /* stat hues */\n  --stat-player:     var(--sc-yellow);\n  --stat-credits:    var(--sc-green-bright);\n  --stat-streak:     var(--sc-yellow-soft);\n  --stat-prizes:     var(--sc-purple-bright);\n  --stat-accuracy:   var(--sc-blue-bright);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SCIENCE CLAW — TYPOGRAPHY TOKENS\n   Friendly rounded display (Nunito) for headers + arcade labels,\n   clean system sans for body. Bold, high-contrast, kid-readable.\n   Nunito is loaded from Google Fonts CDN (substitution flagged in\n   readme — swap for a licensed copy in production).\n   ============================================================ */\n\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"218ec6e0-aa6c-406f-959a-d54c8b6f2d5c\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e4445fd0-f17e-4464-875a-015d3c3a6a68\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0ab932d0-4129-4295-a044-c128ef3b7b7c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ccb83ab7-bdd5-4b00-94f9-ecbc9e589bc7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"de7b623f-462c-4abd-84d8-4994d5cb896c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Nunito'; 12em;   /* @kind other */\n  --ls-normal:    0;        /* @kind other */\n\n  /* --- Semantic aliases --- */\n  --text-title-font:   var(--font-display);\n  --text-title-weight: var(--fw-extra);\n  --text-header-weight: var(--fw-bold);\n  --text-body-font:    var(--font-body);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SCIENCE CLAW — SPACING & SIZING TOKENS\n   8px base rhythm. HUD panels are compact; touch targets >= 44px.\n   ============================================================ */\n\n:root {\n  /* --- Spacing scale --- */\n  --sp-0:   0;      /* @kind spacing */\n  --sp-1:   4px;\n  --sp-2:   8px;\n  --sp-3:   12px;\n  --sp-4:   16px;\n  --sp-5:   20px;   /* default panel padding */\n  --sp-6:   24px;\n  --sp-8:   32px;\n  --sp-10:  40px;\n  --sp-12:  48px;\n\n  /* --- Panel insets --- */\n  --pad-panel:   20px;\n  --pad-panel-sm: 15px;\n  --pad-modal:   30px;\n\n  /* --- Layout: HUD overlay margins from viewport edge --- */\n  --edge:        20px;\n  --edge-lg:     25px;\n\n  /* --- Component sizes --- */\n  --hud-width:   240px;     /* left player HUD */\n  --panel-width: 280px;     /* collection / side panels */\n  --control-h:   44px;      /* min interactive height (touch) */\n  --btn-h:       48px;\n  --btn-h-sm:    38px;\n  --input-h:     48px;\n\n  /* --- Gaps --- */\n  --gap-stack:   8px;       /* between HUD rows */\n  --gap-row:     10px;      /* between inline buttons */\n  --gap-grid:    12px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SCIENCE CLAW — EFFECTS: radii, shadows, blur, glow, motion\n   Glassmorphic panels (blur + translucent black), rounded corners,\n   neon glow on accents, snappy arcade transitions.\n   ============================================================ */\n\n:root {\n  /* --- Corner radii --- */\n  --r-sm:   8px;\n  --r-md:   12px;    /* buttons, small panels */\n  --r-lg:   16px;\n  --r-xl:   20px;    /* HUD panels, modals */\n  --r-pill: 999px;\n  --r-round: 50%;\n\n  /* --- Blur (glassmorphism) --- */\n  --blur-panel:  blur(6px);   /* @kind other */\n  --blur-modal:  blur(10px);  /* @kind other */\n\n  /* --- Outer shadows (panels float over the 3D scene) --- */\n  --shadow-panel:  0 8px 28px rgba(0, 0, 0, 0.55);\n  --shadow-modal:  0 0 40px rgba(0, 0, 0, 0.70);\n  --shadow-btn:    0 2px 0 rgba(0, 0, 0, 0.35);\n  --shadow-btn-press: 0 1px 0 rgba(0, 0, 0, 0.35);\n\n  /* --- Inner highlight (top edge catch-light on glass) --- */\n  --inset-glass: inset 0 1px 0 rgba(255, 255, 255, 0.08);\n\n  /* --- Neon glows (per accent) --- */\n  --glow-green:  0 0 16px rgba(63, 195, 95, 0.55);\n  --glow-blue:   0 0 16px rgba(74, 144, 226, 0.55);\n  --glow-yellow: 0 0 16px rgba(255, 182, 39, 0.50);\n  --glow-purple: 0 0 16px rgba(181, 87, 230, 0.50);\n  --glow-red:    0 0 14px rgba(232, 73, 63, 0.55);\n  --glow-soft:   0 0 10px rgba(255, 255, 255, 0.12);\n\n  /* --- Text glow (neon labels) --- */\n  --text-glow-green:  0 0 8px rgba(94, 224, 122, 0.45);\n  --text-glow-yellow: 0 0 8px rgba(255, 182, 39, 0.40);\n\n  /* --- Borders --- */\n  --bw:        1px;        /* @kind other */\n  --bw-active: 2px;        /* @kind other */ /* selected view button ring */\n\n  /* --- Motion --- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);     /* @kind other */\n  --ease-pop:   cubic-bezier(0.34, 1.56, 0.64, 1);  /* @kind other */ /* arcade bounce */\n  --dur-fast:   120ms;  /* @kind other */\n  --dur-base:   180ms;  /* @kind other */\n  --dur-slow:   280ms;  /* @kind other */\n  --transition-control: all var(--dur-fast) var(--ease-out);\n\n  /* --- Semantic aliases --- */\n  --radius-panel:  var(--r-xl);\n  --radius-button: var(--r-md);\n  --shadow-card:   var(--shadow-panel);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SCIENCE CLAW DESIGN SYSTEM — global entry point.\n   Consumers link THIS file only. Imports tokens + fonts.\n   (Keep this file as @import lines only — no inline rules.)\n   ============================================================ */\n\n/* ============================================================\n   SCIENCE CLAW — COLOR TOKENS\n   Dark arcade palette: near-black navy backdrop + neon accents.\n   Each HUD stat owns a hue (credits=green, prizes=purple, etc).\n   ============================================================ */\n\n:root {\n  /* --- Base surfaces (the dark cabinet world) --- */\n  --sc-black:        #04070c;   /* deepest backdrop */\n  --sc-bg:           #070d15;   /* app background */\n  --sc-scene:        #08131f;   /* 3D scene / canvas backdrop */\n  --sc-ink-900:      #0a1320;   /* solid panel fill (opaque) */\n  --sc-ink-800:      #111c2b;\n  --sc-ink-700:      #1b283a;\n\n  /* --- Neon accents (one hue per concept) --- */\n  --sc-yellow:       #ffb627;   /* section headers, player name, gold */\n  --sc-yellow-soft:  #ffd06b;\n  --sc-green:        #3fc35f;   /* credits, collection, success */\n  --sc-green-bright: #5ee07a;\n  --sc-green-btn:    #34b14d;   /* primary action button fill */\n  --sc-green-btn-hi: #43c95f;\n  --sc-blue:         #4a90e2;   /* accuracy, active/selected state */\n  --sc-blue-bright:  #6aa9f0;\n  --sc-blue-deep:    #2f6fd6;\n  --sc-purple:       #b557e6;   /* prizes, crystals */\n  --sc-purple-bright:#cd7bf5;\n  --sc-red:          #e8493f;   /* danger, miss, magnet, joystick */\n  --sc-red-bright:   #ff6a5e;\n  --sc-cyan:         #66ccff;   /* atom, info highlight */\n\n  /* --- Science item identity colors (prizes) --- */\n  --sc-item-battery: #ffd400;\n  --sc-item-atom:    #66ccff;\n  --sc-item-plant:   #58e066;\n  --sc-item-magnet:  #ff5a5a;\n  --sc-item-crystal: #f06fff;\n\n  /* --- Text --- */\n  --sc-text:         #ffffff;\n  --sc-text-soft:    #d6dee6;\n  --sc-text-muted:   #8a98a6;\n  --sc-text-faint:   #5a6775;\n  --sc-text-on-accent: #08131f; /* dark text on bright fills */\n\n  /* --- Lines & dividers --- */\n  --sc-line:         rgba(255,255,255,0.14);\n  --sc-line-strong:  rgba(255,255,255,0.28);\n  --sc-line-cabinet: #7a1f1f;    /* red trim on the cabinet bezel */\n\n  /* --- Glass panel fills (translucent, used with blur) --- */\n  --sc-glass:        rgba(7, 13, 21, 0.82);\n  --sc-glass-soft:   rgba(7, 13, 21, 0.66);\n  --sc-glass-strong: rgba(4, 7, 12, 0.92);\n  --sc-glass-line:   rgba(255,255,255,0.10);\n\n  /* --- Control surfaces --- */\n  --sc-btn-neutral:    #2b3340;   /* gray secondary button */\n  --sc-btn-neutral-hi: #3a4452;\n  --sc-input-bg:       #0e1925;\n  --sc-input-line:     rgba(255,255,255,0.16);\n\n  /* ============================================================\n     SEMANTIC ALIASES\n     ============================================================ */\n  --bg-app:          var(--sc-bg);\n  --bg-scene:        var(--sc-scene);\n  --surface-panel:   var(--sc-glass);\n  --surface-panel-solid: var(--sc-ink-900);\n  --surface-modal:   var(--sc-glass-strong);\n  --surface-input:   var(--sc-input-bg);\n\n  --text-body:       var(--sc-text);\n  --text-secondary:  var(--sc-text-soft);\n  --text-muted:      var(--sc-text-muted);\n  --text-heading:    var(--sc-yellow);\n\n  --border-panel:    var(--sc-glass-line);\n  --border-divider:  var(--sc-line);\n\n  --accent-primary:  var(--sc-green);\n  --accent-active:   var(--sc-blue);\n  --accent-danger:   var(--sc-red);\n\n  /* stat hues */\n  --stat-player:     var(--sc-yellow);\n  --stat-credits:    var(--sc-green-bright);\n  --stat-streak:     var(--sc-yellow-soft);\n  --stat-prizes:     var(--sc-purple-bright);\n  --stat-accuracy:   var(--sc-blue-bright);\n}\n\n/* ============================================================\n   SCIENCE CLAW — TYPOGRAPHY TOKENS\n   Friendly rounded display (Nunito) for headers + arcade labels,\n   clean system sans for body. Bold, high-contrast, kid-readable.\n   Nunito is loaded from Google Fonts CDN (substitution flagged in\n   readme — swap for a licensed copy in production).\n   ================= -title-weight: var(--fw-extra);\n  --text-header-weight: var(--fw-bold);\n  --text-body-font:    var(--font-body);\n}\n\n/* ============================================================\n   SCIENCE CLAW — SPACING & SIZING TOKENS\n   8px base rhythm. HUD panels are compact; touch targets >= 44px.\n   ============================================================ */\n\n:root {\n  /* --- Spacing scale --- */\n  --sp-0:   0;      /* @kind spacing */\n  --sp-1:   4px;\n  --sp-2:   8px;\n  --sp-3:   12px;\n  --sp-4:   16px;\n  --sp-5:   20px;   /* default panel padding */\n  --sp-6:   24px;\n  --sp-8:   32px;\n  --sp-10:  40px;\n  --sp-12:  48px;\n\n  /* --- Panel insets --- */\n  --pad-panel:   20px;\n  --pad-panel-sm: 15px;\n  --pad-modal:   30px;\n\n  /* --- Layout: HUD overlay margins from viewport edge --- */\n  --edge:        20px;\n  --edge-lg:     25px;\n\n  /* --- Component sizes --- */\n  --hud-width:   240px;     /* left player HUD */\n  --panel-width: 280px;     /* collection / side panels */\n  --control-h:   44px;      /* min interactive height (touch) */\n  --btn-h:       48px;\n  --btn-h-sm:    38px;\n  --input-h:     48px;\n\n  /* --- Gaps --- */\n  --gap-stack:   8px;       /* between HUD rows */\n  --gap-row:     10px;      /* between inline buttons */\n  --gap-grid:    12px;\n}\n\n/* ============================================================\n   SCIENCE CLAW — EFFECTS: radii, shadows, blur, glow, motion\n   Glassmorphic panels (blur + translucent black), rounded corners,\n   neon glow on accents, snappy arcade transitions.\n   ============================================================ */\n\n:root {\n  /* --- Corner radii --- */\n  --r-sm:   8px;\n  --r-md:   12px;    /* buttons, small panels */\n  --r-lg:   16px;\n  --r-xl:   20px;    /* HUD panels, modals */\n  --r-pill: 999px;\n  --r-round: 50%;\n\n  /* --- Blur (glassmorphism) --- */\n  --blur-panel:  blur(6px);   /* @kind other */\n  --blur-modal:  blur(10px);  /* @kind other */\n\n  /* --- Outer var(--font-display)\">Stuck on a question?<\u002Fdiv>\n          <div style=\"color:var(--sc-text-muted);font-size:15px;margin-top:6px\">Drop it in. I'll break it down the Shirtpapa way — <b style=\"color:var(--sc-red)\">C<\u002Fb><b style=\"color:var(--sc-blue)\">E<\u002Fb><b style=\"color:var(--sc-yellow)\">C<\u002Fb><b style=\"color:var(--sc-green)\">L<\u002Fb> — and coach you to the answer.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--sc-ink-900);border:1px solid var(--sc-glass-line);border-radius:var(--r-xl);box-shadow:var(--shadow-panel);padding:18px\">\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--sc-cyan);background:rgba(102,204,255,.12);border:1px solid rgba(102,204,255,.3);padding:5px 11px;border-radius:var(--r-pill)\">📋 Paste text<\u002Fspan>\n            <button sc-camel-on-click=\"{{ onPickImage }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--sc-text-muted);background:var(--sc-ink-800);border:1px solid var(--sc-line);padding:5px 11px;border-radius:var(--r-pill);cursor:pointer\" style-hover=\"border-color:rgba(102,204,255,.5);color:#fff\">📷 Image<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onPickPdf }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--sc-text-muted);background:var(--sc-ink-800);border:1px solid var(--sc-line);padding:5px 11px;border-radius:var(--r-pill);cursor:pointer\" style-hover=\"border-color:rgba(102,204,255,.5);color:#fff\">📄 PDF<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onPickDoc }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--sc-text-muted);background:var(--sc-ink-800);border:1px solid var(--sc-line);padding:5px 11px;border-radius:var(--r-pill);cursor:pointer\" styl px;margin-top:14px\">\n        <!-- achievement banner: radiating, colourful, celebratory -->\n        <div style=\"position:relative;overflow:hidden;border-radius:var(--r-xl);padding:22px;margin-bottom:16px;background:radial-gradient(130% 150% at 0% 0%, rgba(181,87,230,.24), rgba(102,204,255,.10) 48%, rgba(7,13,21,.55) 82%);border:1px solid rgba(181,87,230,.42);box-shadow:var(--shadow-panel)\">\n          <div style=\"position:absolute;top:-46px;left:-46px;width:170px;height:170px;pointer-events:none;opacity:.45;background:conic-gradient(from 0deg, rgba(255,182,39,.55), transparent 25%, rgba(102,204,255,.55) 50%, transparent 75%, rgba(255,182,39,.55));border-radius:50%;animation:spg-rays 16s linear infinite;filter:blur(7px)\"><\u002Fdiv>\n          <div style=\"position:relative;display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n            <div style=\"width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(181,87,230,.2);border:2px solid var(--sc-purple-bright);animation:spg-radiate 2.4s ease-out infinite;flex:none\">🏆<\u002Fdiv>\n            <div style=\"flex:1;min-width:200px\">\n              <div style=\"font:900 25px/1.05 var(--font-display);background:linear-gradient(90deg,#66ccff,#b557e6,#ffb627,#66ccff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:spg-shine 5s linear infinite\">My Collection of Questions<\u002Fdiv>\n              <div style=\"margin-top:5px;font-size:13.5px;line-height:1.5;color:var(--sc-text-soft)\">Every twin you conquer lands here — your own growing trophy shelf of science mastery. 🌟<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:2px;flex:none\">\n              <div style=\"font:900 32px/1 var(--font-display);color:var(--sc-yellow);text-shadow:var(--text-glow-yellow)\">{{ bankCount }}<\u002Fdiv>\n              <div style=\"font:800 10px/1 var(--font-display);letter-spacing:.1em;text-transform:uppercase;color:var(--sc-text-faint)\">earned<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;display:flex;gap:10px;margin-top:16px;flex-wrap:wrap\">\n            <div style=\"flex:1;min-width:200px\"><x-import component-from-global-scope=\"ScienceClawDesignSystem_0049d4.Button\" hint-size=\"100%,46px\" variant=\"primary\" sc-camel-on-click=\"{{ onOpenSave }}\">💾 Save &amp; Email My Progress<\u002Fx-import><\u002Fdiv>\n            <div style=\"flex:1;min-width:160px\"><x-import component-from-global-scope=\"ScienceClawDesignSystem_0049d4.Button\" hint-size=\"100%,46px\" variant=\"neutral\" sc-camel-on-click=\"{{ onHome }}\">＋ New question<\u002Fx-import><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ bankItems }}\" as=\"item\" hint-placeholder-count=\"2\">\n            <div style=\"{{ item.cardStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px\">\n                <x-import component-from-global-scope=\"ScienceClawDesignSystem_0049d4.Badge\" hint-size=\"auto,22px\" tone=\"cyan\">{{ item.topic }}<\u002Fx-import>\n                <span style=\"font-size:12px;font-weight:800;color:var(--sc-blue-bright);background:rgba(74,144,226,.14);border:1px solid rgba(74,144,226,.3);padding:3px 9px;border-radius:var(--r-pill)\">{{ item.level }}<\u002Fspan>\n                <sc-if value=\"{{ item.isNew }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px;font-weight:800;color:#08131f;background:var(--sc-green);padding:3px 9px;border-radius:999px\">✨ NEW<\u002Fspan><\u002Fsc-if>\n                <span style=\"margin-left:auto;font-size:12px;color:var(--sc-text-faint)\">{{ item.by }} · {{ item.when }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:15px;line-height:1.5;color:#fff;font-weight:600;margin-bottom:12px\">{{ item.ask }}<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px;border-top:1px solid var(--sc-line);padding-top:12px\">\n                <sc-for list=\"{{ item.clauses }}\" as=\"cl\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:12px;align-items:baseline\">\n                    <span style=\"{{ cl.chipStyle }}\">{{ cl.label }}<\u002Fspan>\n                    <span style=\"font-size:14px;line-height:1.45;color:var(--sc-text-soft)\">{{ cl.t }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n  <footer style=\"width:100%;max-width:920px;margin:0 auto;padding:10px 20px 26px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap\">\n    <div style=\"font:800 13px/1 var(--font-display);letter-spacing:.04em;color:var(--sc-text-faint)\">Credited to <span style=\"background:linear-gradient(90deg,#66ccff,#b557e6,#ffb627,#66ccff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:spg-shine 6s linear infinite;font-weight:900\">ShirtpapaSG<\u002Fspan> · V2<\u002Fdiv>\n    <button sc-camel-on-click=\"{{ onOpenTeacher }}\" style=\"font:700 12px/1 var(--font-display);color:var(--sc-text-muted);background:transparent;border:1px solid var(--sc-line);padding:6px 12px;border-radius:var(--r-pill);cursor:pointer\" style-hover=\"border-color:rgba(102,204,255,.5);color:#fff\">👩‍🏫 Teacher setup<\u002Fbutton>\n  <\u002Ffooter>\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ toastStyle }}\">{{ toast }}<\u002Fdiv><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.pasteRef = React.createRef();\n    this.guidedRef = React.createRef();\n    this.twinRef = React.createRef();\n    this.scaffoldRef = React.createRef();\n    this.fileRef = React.createRef();\n    this.nameRef = React.createRef();\n    this.emailRef = React.createRef();\n    this.restoreRef = React.createRef();\n    this.teacherUrlRef = React.createRef();\n    this.editPwRef = React.createRef();\n    this._timers = [];\n    this.CECL = {\n      choice:   { label: 'Choice',   letter: 'C', color: '#e8493f', soft: 'rgba(232,73,63,0.16)',  glow: 'var(--glow-red)' },\n      evidence: { label: 'Evidence', letter: 'E', color: '#4a90e2', soft: 'rgba(74,144,226,0.16)', glow: 'var(--glow-blue)' },\n      concept:  { label: 'Concept',  letter: 'C', color: '#ffb627', soft: 'rgba(255,182,39,0.16)', glow: 'var(--glow-yellow)' },\n      link:     { label: 'Link',     letter: 'L', color: '#3fc35f', soft: 'rgba(63,195,95,0.16)',  glow: 'var(--glow-green)' },\n    };\n    this.state = {\n      screen: 'home', mood: 'happy', muted: false,\n      bank: this.S.seedBank(this.makeSeedBank()), credits: this.S.getPlayer().credits,\n      creditsEarned: 0, creditAwarded: false, toast: null,\n      q: null, origin: 'sample',\n      aiLoading: false, aiError: '',\n      pickerOpen: false, pickerLevel: 'all',\n      editPwOpen: false, editPwError: '', editUnlocked: false, editorOpen: false, editEntry: null, editDraft: null,\n      editorTab: 'samples', twinFolder: null, twinFormOpen: false, twinEditId: null, twinDraft: null,\n      saveOpen: false, teacherOpen: false, teacherStatus: '', teacherStatusOk: false,\n      ownerName: '', lineage: [],\n      procNote: '',\n      revealStep: 0,\n      guidedIdx: 0, answers: {}, results: {}, gSubmitted: false, showHint: false,\n      combineStep: 0,\n      twinSubmitted: false, twinResult: null, twinAnswer: '',\n      twinBanked: false,\n      twinScaffold: false, scaffoldIdx: 0, scaffoldResults: {}, scaffoldTries: 0, scaffoldNudge: '',\n    };\n  }\n\n  /* ---------- data ---------- */\n  makeHero() {\n    return {\n      topic: 'Magnets', level: 'P5', type: 'open', diagram: 'rings',\n      source: 'Your upload · Section B, Q6(a)',\n      segments: [\n        { t: 'Three ring magnets — A, B and C — are stacked on a vertical rod. ' },\n        { t: 'The magnets float, leaving gaps between them.', cecl: 'evidence' },\n        { t: ' Explain ' },\n        { t: 'what makes the magnets float', cecl: 'link' },\n        { t: '.' },\n      ],\n      stem: 'Three ring magnets (A, B and C) are stacked on a vertical rod. The magnets float, leaving gaps between them.',\n      ask: 'Explain what makes the magnets float.',\n      parts: {\n        choice: { present: false, note: 'This question says \"Explain\" — there is no decision to make, so we skip Choice and go straight to the science. ✦' },\n        evidence: {\n          prompt: '🔵 EVIDENCE first. Look at how the magnets sit. They push apart and float — so which poles must be facing each other?',\n          hint: 'They repel and float apart… so the poles facing each other must be the SAME kind.',\n          placeholder: 'e.g. The ___ poles of the magnets are facing each other',\n          model: 'The like poles of magnets A, B and C are facing each other.',\n          why: 'Evidence = what we SEE. Here, the way the magnets are arranged.',\n          keywords: [['like pole', 'same pole', 'like-pole', 'similar pole'], ['facing', 'face', 'towards each other']],\n        },\n        concept: {\n          prompt: '🟡 CONCEPT — the science rule from your syllabus. When LIKE poles face each other, what do magnets do?',\n          hint: 'Like poles do NOT attract… they do the opposite!',\n          placeholder: 'e.g. The magnets are ___ one another',\n          model: 'The ring magnets are repelling one another.',\n          why: 'The syllabus rule: like poles always repel (push apart).',\n          keywords: [['repel', 'repels', 'repelling', 'push away', 'pushing away', 'push apart', 'pushing apart']],\n        },\n        link: {\n          prompt: '🟢 LINK — finish it off. Tie the science back to the question. Begin with \"Thus,…\"',\n          hint: 'Answer exactly what was asked: what happens to the magnets?',\n          placeholder: 'e.g. Thus, the magnets ___',\n          model: 'Thus, the magnets float.',\n          why: 'Always answer the actual question — start with \"Thus,\".',\n          keywords: [['float', 'floating', 'levitat', 'hover', 'lifted']],\n        },\n      },\n      finalClauses: [\n        { cecl: 'evidence', t: 'The like poles of magnets A, B and C are facing each other.' },\n        { cecl: 'concept', t: 'The ring magnets are repelling one another.' },\n        { cecl: 'link', t: 'Thus, the magnets float.' },\n      ],\n      tip: 'For \"Explain\" questions: state the Evidence (what you see) → the Concept (the science rule) → the Link (answer the question). No Choice needed!',\n      twin: {\n        topic: 'Magnets', level: 'P5', type: 'open', diagram: 'rings',\n        stem: 'Priya slid three round disc magnets onto an upright wooden chopstick. The top two magnets floated above the bottom one without touching.',\n        ask: 'Explain what makes the magnets float.',\n        parts: {\n          choice: { present: false },\n          evidence: { model: 'The like poles of the disc magnets are facing each other.', keywords: [['like pole', 'same pole'], ['facing', 'face']] },\n          concept: { model: 'The disc magnets are repelling one another.', keywords: [['repel', 'push away', 'push apart', 'repelling']] },\n          link: { model: 'Thus, the magnets float.', keywords: [['float', 'levitat', 'hover']] },\n        },\n        finalClauses: [\n          { cecl: 'evidence', t: 'The like poles of the disc magnets are facing each other.' },\n          { cecl: 'concept', t: 'The disc magnets are repelling one another.' },\n          { cecl: 'link', t: 'Thus, the magnets float.' },\n        ],\n      },\n    };\n  }\n\n  makeSeedBank() {\n    return [\n      {\n        topic: 'Magnets', level: 'P5', by: 'You', ts: Date.now() - 2 * 86400000,\n        ask: 'Andy brought the South pole of a magnet near ends A and B of hanging Object Y. Near A it moved closer; near B it moved away. Is Object Y a magnet? Explain.',\n        clauses: [\n          { cecl: 'choice', t: 'Yes, Object Y is a magnet.' },\n          { cecl: 'evidence', t: 'When the South pole was brought near part B, Object Y moved away from the magnet.' },\n          { cecl: 'concept', t: 'Only magnets can repel each other, when like poles are facing each other.' },\n          { cecl: 'link', t: 'Thus, Object Y is a magnet.' },\n        ],\n      },\n      {\n        topic: 'Heat', level: 'P4', by: 'You', ts: Date.now() - 5 * 86400000,\n        ask: 'A metal spoon is left in a bowl of hot soup. After a while the handle feels hot. Explain why.',\n        clauses: [\n          { cecl: 'evidence', t: 'The handle of the metal spoon became hot.' },\n          { cecl: 'concept', t: 'Metal is a good conductor of heat; heat travels from the hot soup along the spoon.' },\n          { cecl: 'link', t: 'Thus, the handle feels hot.' },\n        ],\n      },\n    ];\n  }\n\n  /* ---------- shared app state (single source of truth — see app-state.js) ---------- */\n  get S() {\n    if (typeof window !== 'undefined' && window.SciClawState) return window.SciClawState;\n    // Inline fallback for the very first render, before app-state.js loads.\n    // Identical keys/shapes to app-state.js, so the two never drift.\n    const PK = 'sciclaw:player:v1', BK = 'sciclaw:bank:v1';\n    const rd = (k, f) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch (e) { return f; } };\n    const wr = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} };\n    const dp = () => ({ name: 'Guest', studentClass: 'P5', credits: 3, streak: 0, prizes: 0, correct: 0, attempted: 0, collection: {} });\n    return {\n      REWARD_TWIN_CORRECT: 3,\n      getPlayer() { return Object.assign(dp(), rd(PK, {})); },\n      savePlayer(p) { wr(PK, p); return p; },\n      addCredits(n) { const p = this.getPlayer(); p.credits = (p.credits || 0) + n; return this.savePlayer(p); },\n      recordAttempt() {},\n      getBank() { return rd(BK, null); },\n      saveBank(a) { wr(BK, a || []); return a || []; },\n      seedBank(a) { const b = this.getBank(); if (!b || !b.length) { this.saveBank(a); return a; } return b; },\n      addToBank(it) { const b = this.getBank() || []; b.unshift(it); this.saveBank(b); return b; },\n    };\n  }\n  relTime(ts) {\n    const s = Math.max(0, Date.now() - ts), m = 60000, h = 3600000, d = 86400000;\n    if (s < m) return 'Just now';\n    if (s < h) return Math.floor(s / m) + 'm ago';\n    if (s < d) return Math.floor(s / h) + 'h ago';\n    return Math.floor(s / d) + 'd ago';\n  }\n  showToast(msg) {\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState({ toast: msg });\n    this._toastTimer = setTimeout(() => this.setState({ toast: null }), 3000);\n  }\n  // Real cross-page navigation to the app's front door (index.html), where the\n  // Claw Machine lives. Same origin → the wallet & bank carry over automatically.\n  goLauncher() { this.sfx('click'); try { window.location.assign('index.html'); } catch (e) {} }\n  playClaw() { this.sfx('coin'); try { window.location.assign('index.html'); } catch (e) { this.showToast('Your ' + this.state.credits + ' credits are saved for the Claw Machine!'); } }\n\n  /* ---------- helpers ---------- */\n  sfx(name) { try { if (!this.state.muted && window.sfx && window.sfx[name]) window.sfx[name](); } catch (e) {} }\n  clearTimers() { this._timers.forEach((t) => clearTimeout(t)); this._timers = []; }\n  later(fn, ms) { const id = setTimeout(fn, ms); this._timers.push(id); return id; }\n  // Re-read the shared wallet/bank AFTER mount (app-state.js + storage are reliably\n  // ready by now). This is also what shows the fresh balance when the student returns\n  // to the Genie from the Claw Machine having spent or earned credits elsewhere.\n  componentDidMount() { this.syncWallet(); this.loadLineage(); this.later(() => this.syncWallet(), 350); }\n  // ---------- SAVE-FILE CHAIN OF CUSTODY (anti-cheat) ----------\n  // A save file carries an owner name + a custody log. The owner is locked once set,\n  // so a shared file can't be re-badged. If >1 distinct name appears, it was shared.\n  LINEAGE_KEY() { return 'sciclaw:lineage:v1'; }\n  loadLineage() {\n    try {\n      const v = JSON.parse(localStorage.getItem(this.LINEAGE_KEY()) || 'null');\n      if (v && v.owner) this.setState({ ownerName: v.owner, lineage: Array.isArray(v.log) ? v.log : [] });\n    } catch (e) {}\n  }\n  saveLineage(owner, log) { try { localStorage.setItem(this.LINEAGE_KEY(), JSON.stringify({ owner, log })); } catch (e) {} }\n  distinctNames(log) { const s = {}; (log || []).forEach((e) => { if (e && e.name) s[e.name.toLowerCase()] = e.name; }); return Object.keys(s).map((k) => s[k]); }\n  syncWallet() { try { const p = this.S.getPlayer(); this.setState({ credits: p.credits, bank: this.S.seedBank(this.makeSeedBank()) }); } catch (e) {} }\n  componentWillUnmount() { this.clearTimers(); if (this._toastTimer) clearTimeout(this._toastTimer); }\n\n  gradeAnswer(text, groups) {\n    const t = (text || '').toLowerCase().replace(/[^a-z0-9\\s-]/g, ' ');\n    if (!groups || !groups.length) return { correct: t.trim().length > 3, missed: [], hit: 0, total: 0 };\n    let missed = [], hit = 0;\n    for (const g of groups) {\n      const ok = g.some((syn) => t.includes(syn.toLowerCase()));\n      if (ok) hit++; else missed.push(g[0]);\n    }\n    return { correct: missed.length === 0, missed, hit, total: groups.length };\n  }\n  activeParts(q) {\n    return ['choice', 'evidence', 'concept', 'link'].filter((k) => k !== 'choice' || (q.parts.choice && q.parts.choice.present));\n  }\n\n  /* ---------- flow ---------- */\n  go(screen, mood) { this.sfx('click'); this.clearTimers(); this.setState({ screen, mood: mood || this.state.mood }); }\n  toggleMute() { const m = !this.state.muted; try { window.sfx && window.sfx.mute && window.sfx.mute(m); } catch (e) {} this.setState({ muted: m }); }\n\n  setQuestion(q, origin) {\n    q.activeParts = q.activeParts || this.activeParts(q);\n    if (q.twin) q.twin.activeParts = q.twin.activeParts || q.activeParts.slice();\n    this.clearTimers();\n    this.setState({\n      q, origin, screen: 'processing', mood: 'thinking',\n      revealStep: 0, guidedIdx: 0, answers: {}, results: {}, gSubmitted: false, showHint: false,\n      combineStep: 0, twinSubmitted: false, twinResult: null, twinBanked: false, aiError: '',\n      twinScaffold: false, scaffoldIdx: 0, scaffoldResults: {}, scaffoldTries: 0, scaffoldNudge: '',\n      creditAwarded: false, creditsEarned: 0,\n    });\n    this.later(() => this.startReveal(), 1900);\n  }\n  loadSample() { this.sfx('coin'); this.setQuestion(this.makeHero(), 'sample'); }\n\n  // ---------- FILE UPLOAD → TEXT → live AI ----------\n  // window.claude.complete is text-only, so we extract text first:\n  //  • image → OCR (Tesseract.js)   • PDF → pdf.js text layer   • .docx → unzip word/document.xml\n  // then hand the text to the same breakdown() the paste box uses.\n  pickFile(kind) {\n    if (!this.fileRef.current) return;\n    this.sfx('click');\n    const el = this.fileRef.current;\n    el.accept = kind === 'image' ? 'image/*'\n      : kind === 'pdf' ? 'application/pdf,.pdf'\n      : '.doc,.docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword';\n    this._pickKind = kind; el.value = ''; el.click();\n  }\n  async onFileChosen(e) {\n    const file = e && e.target && e.target.files && e.target.files[0];\n    if (!file) return;\n    const label = this._pickKind === 'image' ? 'image' : this._pickKind === 'pdf' ? 'PDF' : 'document';\n    this.clearTimers();\n    // IMAGES: read directly with Claude vision (far more reliable than OCR — keeps (a)(b)(c) structure).\n    if (this._pickKind === 'image' || (file.type || '').indexOf('image/') === 0) {\n      if (!(window.claude && window.claude.complete)) {\n        this.sfx('click');\n        this.setState({ screen: 'home', mood: 'encourage', procNote: '', pickerOpen: true, aiError: 'Reading a photo needs the online Genie. On this offline version, pick a ready-made question below.' });\n        return;\n      }\n      this.setState({ screen: 'processing', mood: 'thinking', aiError: '', procNote: 'Reading your image with AI… (a few seconds)' });\n      let img;\n      try { img = await this.imageToB64Fit(file); }\n      catch (err) { this.setState({ screen: 'home', mood: 'encourage', procNote: '', aiError: \"I couldn't open that image. Try a clearer, well-lit photo — or paste the question text.\" }); this.sfx('wrong'); return; }\n      return this.runLiveAIVision(img.b64, img.mediaType);\n    }\n    this.setState({ screen: 'processing', mood: 'thinking', aiError: '', procNote: 'Reading your ' + label + '…' });\n    let text = '';\n    try { text = await this.extractText(file); }\n    catch (err) {\n      this.setState({ screen: 'home', mood: 'encourage', procNote: '', aiError: this.uploadErrMsg(err, label) });\n      this.sfx('wrong'); return;\n    }\n    text = (text || '').replace(/\\u00a0/g, ' ').replace(/[ \\t]+/g, ' ').replace(/\\n{3,}/g, '\\n\\n').trim();\n    if (text.length < 8) {\n      this.setState({ screen: 'home', mood: 'encourage', procNote: '', aiError: \"I couldn't read clear text from that \" + label + \". Please paste or type the question instead — one clear question works best.\" });\n      this.sfx('wrong'); return;\n    }\n    if (this.pasteRef.current) this.pasteRef.current.value = text;\n    this.startBreakdown(text); // pass extracted text directly (paste box isn't mounted here)\n  }\n  uploadErrMsg(err, label) {\n    const m = String((err && err.message) || err || '');\n    if (m === 'doc-old') return \"Old .doc files aren't supported — please save as .docx or PDF, or just paste the text.\";\n    return \"I couldn't open that \" + label + \" (reading files needs an internet connection). Please paste or type the question instead — or try a sample question, which works offline.\";\n  }\n  async extractText(file) {\n    const name = (file.name || '').toLowerCase(), type = file.type || '';\n    if (type.indexOf('image/') === 0) return await this.ocrImage(file);\n    if (type === 'application/pdf' || name.endsWith('.pdf')) return await this.readPdf(file);\n    if (name.endsWith('.docx') || type.indexOf('wordprocessingml') !== -1) return await this.readDocx(file);\n    if (name.endsWith('.doc')) throw new Error('doc-old');\n    return await file.text();\n  }\n  async readPdf(file) {\n    const pdfjs = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs');\n    try { pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs'; } catch (e) {}\n    const buf = await file.arrayBuffer();\n    const doc = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;\n    const max = Math.min(doc.numPages, 6); let out = '';\n    for (let i = 1; i <= max; i++) { const pg = await doc.getPage(i); const tc = await pg.getTextContent(); out += tc.items.map((it) => it.str).join(' ') + '\\n'; }\n    return out;\n  }\n  async readDocx(file) {\n    const fflate = await import('https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js');\n    const buf = new Uint8Array(await file.arrayBuffer());\n    const files = fflate.unzipSync(buf);\n    const xml = files['word/document.xml']; if (!xml) throw new Error('docx');\n    let s = new TextDecoder('utf-8').decode(xml);\n    s = s.replace(/<\\/w:p>/g, '\\n').replace(/<[^>]+>/g, '');\n    return s.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '\"').replace(/&#39;/g, \"'\");\n  }\n  async ocrImage(file) {\n    if (!window.Tesseract) await this.loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js');\n    if (!window.Tesseract) throw new Error('ocr-load');\n    const res = await window.Tesseract.recognize(file, 'eng');\n    return (res && res.data && res.data.text) || '';\n  }\n  // Downscale + JPEG-compress an image so its base64 fits the vision request limit (~256KB total).\n  imageToB64(file, maxDim, quality) {\n    return new Promise((resolve, reject) => {\n      const img = new Image();\n      const url = URL.createObjectURL(file);\n      img.onload = () => {\n        URL.revokeObjectURL(url);\n        let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;\n        const scale = Math.min(1, maxDim / Math.max(w, h));\n        w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));\n        const c = document.createElement('canvas'); c.width = w; c.height = h;\n        const ctx = c.getContext('2d');\n        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); // flatten transparency to white\n        ctx.drawImage(img, 0, 0, w, h);\n        try {\n          const dataUrl = c.toDataURL('image/jpeg', quality);\n          resolve({ b64: dataUrl.split(',')[1] || '', mediaType: 'image/jpeg' });\n        } catch (err) { reject(err); }\n      };\n      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('img-load')); };\n      img.src = url;\n    });\n  }\n  async imageToB64Fit(file) {\n    const tries = [[1600, 0.82], [1280, 0.8], [1024, 0.75], [820, 0.7], [640, 0.62]];\n    for (let i = 0; i < tries.length; i++) {\n      const r = await this.imageToB64(file, tries[i][0], tries[i][1]);\n      if (r.b64 && r.b64.length < 235000) return r; // leave headroom for the prompt\n    }\n    return await this.imageToB64(file, 540, 0.55);\n  }\n  // VISION breakdown: send the image + the same CECL prompt, get the structured multi-part JSON.\n  async runLiveAIVision(b64, mediaType) {\n    try {\n      const prompt = this.buildPrompt('(The exam question is in the ATTACHED IMAGE. Read ALL of it directly from the image — every sub-part (a), (b), (c) — and transcribe each part faithfully. Ignore the page number. Describe any diagram/table briefly in the shared \"stem\".)');\n      const raw = await window.claude.complete({ messages: [{ role: 'user', content: [\n        { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },\n        { type: 'text', text: prompt },\n      ] }] });\n      const data = this.parseAI(raw);\n      if (!data) throw new Error('parse');\n      if (data.valid === false) {\n        this.setState({ screen: 'home', mood: 'encourage', aiLoading: false, aiError: data.reason || \"I couldn't read that image clearly. Try a sharper, well-lit photo — or paste the question text.\" });\n        this.sfx('wrong'); return;\n      }\n      const q = this.buildFromAI(data, '(image upload)');\n      this.setState({ aiLoading: false });\n      this.setQuestion(q, 'ai');\n    } catch (e) {\n      console.error('vision breakdown failed:', e && e.stack || e);\n      this.setState({ screen: 'home', mood: 'encourage', aiLoading: false, aiError: \"Hmm, I couldn't read that image. Try a clearer, well-lit photo of one question — or paste the text instead.\" });\n      this.sfx('wrong');\n    }\n  }\n  loadScript(src) { return new Promise((resolve, reject) => { const sc = document.createElement('script'); sc.src = src; sc.onload = () => resolve(); sc.onerror = () => reject(new Error('script')); document.head.appendChild(sc); }); }\n\n  // ---------- SAVE & EMAIL MY PROGRESS (portable across devices) ----------\n  openSave() { this.sfx('click'); this.setState({ saveOpen: true }); this.later(() => { try { if (this.nameRef.current) this.nameRef.current.value = this.state.ownerName || (this.S.getPlayer().name || '').replace(/^Guest$/, ''); } catch (e) {} }, 60); }\n  closeSave() { this.sfx('click'); this.setState({ saveOpen: false }); }\n  safeName(s) { return (s || 'Student').replace(/[^a-z0-9 _-]/gi, '').replace(/\\s+/g, ' ').trim() || 'Student'; }\n  todayStr() { const d = new Date(); const p = (n) => (n < 10 ? '0' + n : '' + n); return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }\n  saveProgress() {\n    const typed = this.safeName(this.nameRef.current ? this.nameRef.current.value : '');\n    const email = (this.emailRef.current ? this.emailRef.current.value : '').trim();\n    if (!email || email.indexOf('@') === -1) { this.showToast('Please type a valid email so you can send it to yourself. ✉️'); return; }\n    // OWNER LOCK: the first name committed becomes the permanent owner of this save file.\n    const owner = this.state.ownerName || typed;\n    const today = this.todayStr();\n    // append to the custody log (dedupe same person on the same day)\n    let log = (this.state.lineage || []).slice();\n    const last = log[log.length - 1];\n    if (!last || last.name !== owner || last.date !== today) {\n      log.push({ name: owner, date: today, action: log.length ? 'saved' : 'created' });\n    }\n    this.saveLineage(owner, log);\n    this.setState({ ownerName: owner, lineage: log });\n    this.sfx('coin');\n    // persist the name into the shared player record\n    try { this.S.patchPlayer({ name: owner }); } catch (e) {}\n    const payload = {\n      app: 'ShirtpapaSG Genie', version: 3, savedAt: new Date().toISOString(),\n      name: owner, owner, email,\n      savedBy: 'by ' + owner + ' on ' + today,\n      lineage: log,\n      player: this.S.getPlayer(),\n      bank: this.S.getBank() || [],\n    };\n    const fname = 'My Save File_' + owner + '_' + today + '.json';\n    try {\n      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });\n      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fname; a.click();\n      setTimeout(() => { try { URL.revokeObjectURL(a.href); } catch (e) {} }, 4000);\n    } catch (e) {}\n    // open the student's email pre-filled (mailto can't attach — instruct them to attach the just-downloaded file)\n    const subject = encodeURIComponent('My ShirtpapaSG Genie progress — ' + owner);\n    const body = encodeURIComponent(\n      'Hi ' + owner + ',\\n\\nHere is my ShirtpapaSG Genie progress.\\n\\n' +\n      'IMPORTANT: attach the file that was just downloaded to your device:\\n  ' + fname + '\\n\\n' +\n      'On a new device, open ShirtpapaSG Genie → My Collection of Questions → Save & Email My Progress → \"Restore from a save file\", and choose this file.\\n\\n' +\n      'Questions collected: ' + ((this.S.getBank() || []).length) + '\\nCredits: ' + (this.S.getPlayer().credits || 0) + '\\n\\n— ShirtpapaSG Genie 🧞');\n    try { window.location.href = 'mailto:' + encodeURIComponent(email) + '?subject=' + subject + '&body=' + body; } catch (e) {}\n    this.showToast('Saved! 📥 Check your downloads, then attach it to the email. ');\n  }\n  pickRestore() { this.sfx('click'); if (this.restoreRef.current) { this.restoreRef.current.value = ''; this.restoreRef.current.click(); } }\n  async onRestoreChosen(e) {\n    const file = e && e.target && e.target.files && e.target.files[0]; if (!file) return;\n    try {\n      const txt = await file.text();\n      const data = JSON.parse(txt);\n      if (!data || (!data.bank && !data.player)) throw new Error('shape');\n      if (data.player) { try { this.S.savePlayer(Object.assign(this.S.getPlayer(), data.player)); } catch (e2) {} }\n      if (Array.isArray(data.bank)) { try { this.S.saveBank(data.bank); } catch (e2) {} }\n      // ---- chain of custody ----\n      const fileOwner = this.safeName(data.owner || data.name || 'Student');\n      let log = Array.isArray(data.lineage) ? data.lineage.slice() : [{ name: fileOwner, date: this.todayStr(), action: 'created' }];\n      // Who is opening it on THIS device? If a different name was already locked here,\n      // record it — that means the save file is being shared between students.\n      const deviceName = this.state.ownerName || (this.S.getPlayer().name && this.S.getPlayer().name !== 'Guest' ? this.safeName(this.S.getPlayer().name) : '');\n      const today = this.todayStr();\n      if (deviceName && deviceName.toLowerCase() !== fileOwner.toLowerCase()) {\n        log.push({ name: deviceName, date: today, action: 'opened-by-another' });\n      }\n      // The filename/owner is now permanently the file's owner — it can't be renamed.\n      this.saveLineage(fileOwner, log);\n      const p = this.S.getPlayer();\n      try { this.S.patchPlayer({ name: fileOwner }); } catch (e2) {}\n      const shared = this.distinctNames(log).length > 1;\n      this.setState({ saveOpen: false, bank: this.S.getBank() || [], credits: p.credits, ownerName: fileOwner, lineage: log });\n      this.sfx(shared ? 'wrong' : 'win');\n      this.showToast(shared\n        ? '⚠️ This save file has been used by more than one name — it looks shared. It stays locked to \"' + fileOwner + '\".'\n        : 'Welcome back, ' + fileOwner + '! Your collection is restored. 🎉');\n    } catch (err) {\n      this.sfx('wrong');\n      this.showToast(\"That file couldn't be read. Please choose a 'My Save File' you downloaded earlier.\");\n    }\n  }\n\n  // ---------- TEACHER GOOGLE-SHEET SYNC ----------\n  // One shared endpoint for BOTH apps: the Genie key and the Claw game key are\n  // kept in sync so a teacher sets the URL once and both feed the same sheet.\n  getTeacherUrl() { try { return localStorage.getItem('sciclaw:teacherUrl:v1') || localStorage.getItem('scienceClawEndpoint') || 'https://script.google.com/macros/s/AKfycbz7xMqT6wyu2V42WhKMZhuqAxqYX18EHJMQm_7PMo2ZJ4P6UJs0fHlv621GWoYOKQeAGw/exec'; } catch (e) { return 'https://script.google.com/macros/s/AKfycbz7xMqT6wyu2V42WhKMZhuqAxqYX18EHJMQm_7PMo2ZJ4P6UJs0fHlv621GWoYOKQeAGw/exec'; } }\n  setTeacherUrlShared(url) { try { localStorage.setItem('sciclaw:teacherUrl:v1', url); localStorage.setItem('scienceClawEndpoint', url); } catch (e) {} }\n  openTeacher() { this.sfx('click'); this.setState({ teacherOpen: true, teacherStatus: this.getTeacherUrl() ? '✅ Sync is ON — logging to your sheet.' : 'Sync is off — paste your URL to switch it on.', teacherStatusOk: !!this.getTeacherUrl() }); this.later(() => { try { if (this.teacherUrlRef.current) this.teacherUrlRef.current.value = this.getTeacherUrl(); } catch (e) {} }, 60); }\n  closeTeacher() { this.sfx('click'); this.setState({ teacherOpen: false }); }\n  saveTeacherUrl() {\n    const url = (this.teacherUrlRef.current ? this.teacherUrlRef.current.value : '').trim();\n    if (!/^https:\\/\\/script\\.google\\.com\\/macros\\/s\\//.test(url)) { this.setState({ teacherStatus: '⚠️ That doesn\\u2019t look like an Apps Script URL (it should start with https://script.google.com/macros/s/…).', teacherStatusOk: false }); this.sfx('wrong'); return; }\n    this.setTeacherUrlShared(url);\n    this.sfx('correct');\n    this.setState({ teacherStatus: 'Saved! Sending a test row to your sheet…', teacherStatusOk: true });\n    this.postToTeacher({ event: 'test', topic: '—', level: '—', correct: '', answer: 'Test connection from ShirtpapaSG Genie', credits: this.state.credits });\n    this.later(() => this.setState({ teacherStatus: '✅ Sync is ON. Check your Google Sheet for a \"test\" row.', teacherStatusOk: true }), 1400);\n  }\n  clearTeacherUrl() { try { localStorage.removeItem('sciclaw:teacherUrl:v1'); localStorage.removeItem('scienceClawEndpoint'); } catch (e) {} if (this.teacherUrlRef.current) this.teacherUrlRef.current.value = ''; this.sfx('click'); this.setState({ teacherStatus: 'Sync turned off.', teacherStatusOk: false }); }\n  postToTeacher(row) {\n    const url = this.getTeacherUrl(); if (!url) return;\n    const p = this.S.getPlayer();\n    const q = this.state.q || {};\n    const ctx = { gameType: 'ShirtpapaSG Genie', question: q.stem || '', correctAnswer: (q.finalText || q.modelText || '') };\n    const body = JSON.stringify(Object.assign({ name: p.name || 'Guest', studentClass: p.studentClass || '', ts: new Date().toISOString() }, ctx, row));\n    // text/plain avoids a CORS preflight; no-cors lets the Apps Script receive it (we don't need to read the reply)\n    try { fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body }); } catch (e) {}\n  }\n  copyScript() {\n    this.sfx('click');\n    try { navigator.clipboard.writeText(this.teacherScriptText()); this.showToast('Script copied! Paste it into the Apps Script editor. 📋'); }\n    catch (e) { this.showToast('Select the code and copy it manually. 📋'); }\n  }\n  teacherScriptText() {\n    return [\n      'function doPost(e) {',\n      '  // Guard: the editor\\u2019s \\u25b6 Run button calls this with no data \\u2014 that is normal.',\n      '  if (!e || !e.postData || !e.postData.contents) {',\n      '    return ContentService.createTextOutput(',\n      '      \"Ready. Deploy as a Web app, then ShirtpapaSG Genie + Claw Machine will POST to this URL.\"',\n      '    );',\n      '  }',\n      '  var lock = LockService.getScriptLock();',\n      '  try { lock.waitLock(30000); } catch (e2) {}',\n      '  try {',\n      '    var ss = SpreadsheetApp.getActiveSpreadsheet();',\n      \"    var sheet = ss.getSheetByName('Responses') || ss.insertSheet('Responses');\",\n      '    if (sheet.getLastRow() === 0) {',\n      \"      sheet.appendRow(['Time','Game Type','Name','Class','Level','Topic','Question','Student Answer','Correct Answer','Result','Score']);\",\n      '    }',\n      '    var d = JSON.parse(e.postData.contents);',\n      \"    var gt = d.gameType || '';\",\n      \"    var nm = d.name || ''; var cl = d['class'] || d.studentClass || '';\",\n      '    if (d.wrongAnswers && d.wrongAnswers.length) {',\n      '      // Claw Machine session summary + one row per wrong answer',\n      \"      sheet.appendRow([new Date(), gt, nm, cl, '', 'SESSION SUMMARY',\",\n      \"        d.questionsAnswered + ' questions \\u00b7 ' + d.accuracy + '% accuracy \\u00b7 ' + d.playDuration,\",\n      \"        '', '', d.correctAnswers + ' correct / ' + d.wrongCount + ' wrong', d.sciencePoints]);\",\n      '      for (var i = 0; i < d.wrongAnswers.length; i++) {',\n      '        var w = d.wrongAnswers[i];',\n      \"        sheet.appendRow([new Date(), gt, nm, cl, w.level || '', w.topic || '', w.question || '', w.studentAnswer || '', w.correctAnswer || '', 'WRONG', '']);\",\n      '      }',\n      \"    } else if (d.test || d.event === 'test') {\",\n      \"      sheet.appendRow([new Date(), gt || '(test)', nm, cl, '', '', 'Test connection', '', '', 'OK', '']);\",\n      '    } else {',\n      '      // Single attempt (Genie CECL / twin, or a Claw quiz attempt)',\n      \"      sheet.appendRow([new Date(), gt, nm, cl, d.level || '', d.topic || '', d.question || '', d.answer || d.studentAnswer || '', d.correctAnswer || '', d.correct || d.result || '', d.credits || d.score || '']);\",\n      '    }',\n      '    return ContentService.createTextOutput(JSON.stringify({ ok: true }))',\n      '      .setMimeType(ContentService.MimeType.JSON);',\n      '  } catch (err) {',\n      '    return ContentService.createTextOutput(JSON.stringify({ ok: false, error: String(err) }))',\n      '      .setMimeType(ContentService.MimeType.JSON);',\n      '  } finally { try { lock.releaseLock(); } catch (e3) {} }',\n      '}',\n      '',\n      'function doGet() {',\n      \"  return ContentService.createTextOutput('Science Claw + Genie endpoint is running.');\",\n      '}',\n    ].join('\\n');\n  }\n\n  // ---------- OFFLINE LIBRARY (no internet needed) ----------\n  LIB_EDITS_KEY() { return 'sciclaw:libEdits:v1'; }\n  libOverrides() { try { return JSON.parse(localStorage.getItem(this.LIB_EDITS_KEY()) || '{}') || {}; } catch (e) { return {}; } }\n  saveLibOverride(id, patch) {\n    const ov = this.libOverrides();\n    ov[id] = Object.assign({}, ov[id] || {}, patch);\n    try { localStorage.setItem(this.LIB_EDITS_KEY(), JSON.stringify(ov)); } catch (e) {}\n  }\n  clearLibOverride(id) {\n    const ov = this.libOverrides();\n    delete ov[id];\n    try { localStorage.setItem(this.LIB_EDITS_KEY(), JSON.stringify(ov)); } catch (e) {}\n  }\n  bank() {\n    const base = (typeof window !== 'undefined' && window.SCIENCE_QUESTION_BANK) || [];\n    const ov = this.libOverrides();\n    if (!ov || !Object.keys(ov).length) return base;\n    return base.map((e) => (ov[e.id] ? Object.assign({}, e, ov[e.id]) : e));\n  }\n\n  // Pick the twin: an explicit same-concept twin authored on the entry wins; else a\n  // same-TOPIC sibling (truly the same concept); else a same-theme sibling (honest relabel).\n  pickTwin(entry) {\n    // 1st priority: a teacher-authored twin from the same TOPIC folder\n    const mine = this.adminTwins().filter((t) => t.topic === entry.topic && t.question && t.question.trim() && t.id !== entry.id);\n    if (mine.length) return Object.assign({ _exact: true }, mine[Math.floor(Math.random() * mine.length)]);\n    if (entry.twin) {\n      const t = entry.twin;\n      return {\n        topic: entry.topic, level: entry.level, theme: entry.theme, _exact: true,\n        question: t.stem + (t.ask ? ' ' + t.ask : ''),\n        choice: t.choice || '', evidence: t.evidence || '', concept: t.concept || '', link: t.link || '',\n        keywords: t.keywords || entry.keywords, table: t.table || null, diagram: t.diagram || null,\n      };\n    }\n    const all = this.bank();\n    const sameTopic = all.filter((e) => e.id !== entry.id && e.topic === entry.topic);\n    // Prefer a sibling whose MOE command-word TIER matches (same skill difficulty),\n    // then fall back to any same-topic sibling.\n    const wantTier = this.detectTag(entry.question).tier;\n    const sameTier = sameTopic.filter((e) => this.detectTag(e.question).tier === wantTier);\n    if (sameTier.length) return Object.assign({ _exact: true }, sameTier[Math.floor(Math.random() * sameTier.length)]);\n    if (sameTopic.length) return Object.assign({ _exact: true }, sameTopic[Math.floor(Math.random() * sameTopic.length)]);\n    const sameTheme = all.filter((e) => e.id !== entry.id && e.theme === entry.theme && e.level === entry.level);\n    if (sameTheme.length) return Object.assign({ _exact: false }, sameTheme[Math.floor(Math.random() * sameTheme.length)]);\n    const sameLevel = all.filter((e) => e.id !== entry.id && e.level === entry.level);\n    return sameLevel.length ? Object.assign({ _exact: false }, sameLevel[Math.floor(Math.random() * sameLevel.length)]) : null;\n  }\n\n  // Turn a model sentence + the question's keyword chain into ONE lenient accept-group:\n  // the student passes the part if they mention ANY one of these content words.\n  deriveGroup(modelText, chain) {\n    if (!this._stop) {\n      this._stop = new Set(('the a an and or of to in on for with from into is are was were be been being it its it\\u2019s this that these those as at by so than then thus because when while which what who how why does do did will would can could not no off out up down more less most least same different little large small big high low fast slow only also very much many few each both into onto over under their there here they them his her he she we you your our about between near far away across through after before during until since other some any all one two three four five g ml cm \\u00b0c').split(/\\s+/));\n    }\n    const groups = [];\n    // chain phrases first (these are the marker keywords)\n    (chain || []).forEach((ph) => { const w = String(ph).toLowerCase().trim(); if (w) groups.push(w); });\n    // then distinctive content words from the model answer\n    const words = String(modelText || '').toLowerCase().replace(/[^a-z0-9\\s-]/g, ' ').split(/\\s+/)\n      .filter((w) => w.length > 3 && !this._stop.has(w));\n    const
